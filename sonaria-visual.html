<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SonarIA | Sovereign Suite v400</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --mclaren: #FF8000; --redbull: #000B29; --aston: #00665E; --pearl: #FDFDFF; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--pearl); @apply text-slate-900 overflow-hidden h-screen; }
    
    .sidebar { @apply bg-[#000B29] h-screen transition-all duration-500 flex flex-col z-50 shadow-2xl; width: 280px; }
    .nav-link { @apply flex items-center gap-4 px-6 py-4 mx-3 rounded-2xl transition-all cursor-pointer text-slate-400 font-bold text-sm mb-1; }
    .nav-link.active { @apply bg-white/5 text-white border-l-4 border-[#FF8000] shadow-lg; }
    .nav-link:hover:not(.active) { @apply bg-white/5 text-white; }
    
    .main-workspace { @apply flex-1 flex flex-col h-screen overflow-y-auto custom-scroll p-12 bg-white/50 relative; }
    .view-section { @apply hidden opacity-0; }
    .view-section.active { @apply block opacity-100; animation: fadeIn 0.5s ease-out; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .mirror-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; @apply gap-8 p-6 border-b border-slate-50 transition-all items-start rounded-3xl; }
    .mirror-grid:hover { @apply bg-blue-50/50 scale-[1.01]; }
    
    mark { @apply bg-yellow-300 text-black px-1.5 rounded-md font-extrabold; }
    
    /* La Cruz Sutil */
    .cross-mark { @apply absolute top-6 right-6 text-slate-100 opacity-5; }
    
    .custom-scroll::-webkit-scrollbar { width: 4px; }
    .custom-scroll::-webkit-scrollbar-thumb { @apply bg-slate-200 rounded-full; }
  </style>
</head>
<body class="antialiased">

  <div class="flex h-screen overflow-hidden">
    
    <!-- SIDEBAR (MENU FUNCIONAL) -->
    <aside id="sidebar" class="sidebar">
        <div class="p-8 mb-6 relative">
            <h1 class="text-2xl font-black text-white italic tracking-tighter">Sonar<span class="text-[#FF8000]">IA</span></h1>
            <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mt-1">Sovereign Pro v400</p>
            <div class="cross-mark"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M11 2h2v9h9v2h-9v9h-2v-9H2v-2h9V2z"/></svg></div>
        </div>

        <nav id="sidebarNav" class="flex-1 space-y-1">
            <div onclick="switchView('radar')" id="nav-radar" class="nav-link active"><i data-lucide="radar"></i> <span>01 Radar (Semáforo)</span></div>
            <div onclick="switchView('mirror')" id="nav-mirror" class="nav-link"><i data-lucide="languages"></i> <span>02 Letra & Sincro</span></div>
            <div onclick="switchView('pedagogy')" id="nav-pedagogy" class="nav-link"><i data-lucide="graduation-cap"></i> <span>03 Taller de Aula</span></div>
            <div onclick="switchView('reports')" id="nav-reports" class="nav-link"><i data-lucide="file-text"></i> <span>04 Reporte UTP</span></div>
        </nav>

        <div class="p-8 mt-auto border-t border-white/5 bg-black/20">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-2xl bg-[#00665E] flex items-center justify-center font-black text-white italic">M</div>
                <div class="leading-tight"><p class="text-xs font-bold text-white italic">Mauricio P.</p><p class="text-[9px] text-slate-500 uppercase font-black">Plan School</p></div>
            </div>
        </div>
    </aside>

    <!-- ÁREA DE TRABAJO -->
    <main class="main-workspace custom-scroll">
        
        <!-- HEADER -->
        <header class="flex justify-between items-center mb-16 border-b border-slate-100 pb-8">
            <h2 id="viewTitle" class="text-3xl font-[950] tracking-tight text-[#000B29] uppercase italic leading-none">Radar de Aula</h2>
            <div class="flex gap-4">
                <div class="bg-white border border-slate-200 px-4 py-2 rounded-xl flex items-center gap-3">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_#22c55e]"></span>
                    <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Sincronizado</span>
                </div>
            </div>
        </header>

        <!-- VIEW: RADAR -->
        <div id="view-radar" class="view-section active space-y-12">
            <div class="bg-white border border-slate-100 rounded-[40px] p-12 shadow-sm border-b-[16px] border-[#000B29]">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <input id="titulo" type="text" placeholder="¿Qué canción evaluaremos?" class="p-5 bg-slate-50 rounded-3xl font-bold text-xl border-transparent focus:bg-white focus:ring-8 focus:ring-blue-100 transition-all outline-none">
                    <button id="analyzeBtn" class="bg-[#000B29] text-white rounded-[32px] font-black text-lg hover:bg-[#FF8000] shadow-2xl transition-all active:scale-95 italic">Iniciar Evaluación</button>
                </div>
            </div>

            <div id="resultsWrapper" class="hidden space-y-12">
                <div id="statusHero" class="bg-white border border-slate-100 rounded-[40px] p-12 border-t-[24px] flex justify-between items-center shadow-xl">
                    <div class="flex-1">
                        <span id="resPill" class="px-4 py-1.5 bg-slate-100 rounded-full text-[10px] font-black uppercase text-slate-500 mb-6 inline-block italic tracking-widest">—</span>
                        <h3 id="summaryTitle" class="text-7xl font-black tracking-tighter italic text-[#000B29] leading-none">—</h3>
                    </div>
                    <div class="text-right">
                        <div class="text-[110px] font-black italic tracking-tighter text-[#000B29] leading-none" id="riskValue">0%</div>
                        <p class="text-[10px] font-black text-red-600 uppercase tracking-widest italic tracking-[0.3em]">Riesgo Escolar</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- VIEW: MIRROR (LETRA ENTERA) -->
        <div id="view-mirror" class="view-section">
            <div class="bg-white border border-slate-100 rounded-[40px] overflow-hidden shadow-2xl relative">
                <div class="cross-mark text-[#000B29] opacity-5"><svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M11 2h2v9h9v2h-9v9h-2v-9H2v-2h9V2z"/></svg></div>
                <div class="p-8 bg-[#000B29] text-white flex justify-between items-center px-12">
                    <h4 class="text-[10px] font-black uppercase tracking-[0.5em]">Linguistic Mirror: Comparativa 3 Columnas</h4>
                    <span class="px-4 py-1 bg-emerald-500/20 text-emerald-400 rounded-xl text-[9px] font-black uppercase">Métrica OK</span>
                </div>
                <div class="grid grid-cols-3 gap-8 p-6 bg-slate-50 border-b border-slate-100 font-black text-[9px] text-slate-400 uppercase tracking-[0.3em] px-14">
                    <span>Original</span><span>Adaptada</span><span>Significado</span>
                </div>
                <div id="lyricsContainer" class="bg-white max-h-[600px] overflow-y-auto pr-4 custom-scroll">
                    <!-- Dinámico -->
                </div>
            </div>
        </div>

        <!-- VIEW: PEDAGOGY -->
        <div id="view-pedagogy" class="view-section space-y-12">
            <div id="pedagogyTabs" class="flex gap-4 mb-10 overflow-x-auto pb-4 custom-scroll"></div>
            <div id="pedagogyContent">
                <!-- Se llena dinámicamente -->
            </div>
        </div>

    </main>
  </div>

  <script>
    lucide.createIcons();
    const API_BASE = "https://sonaria-api-test.onrender.com";
    const $ = id => document.getElementById(id);

    // NAVEGACIÓN SPA REFORZADA
    function switchView(viewName) {
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        $(`view-${viewName}`).classList.add('active');
        $(`nav-${viewName}`).classList.add('active');
        $("viewTitle").innerText = viewName.toUpperCase().replace('RADAR', 'Radar de Aula').replace('MIRROR', 'Letra & Sincro').replace('PEDAGOGY', 'Pedagogía');
    }

    async function analizar() {
        const btn = $("analyzeBtn");
        if (!$("titulo").value) return alert("Indica la obra");
        btn.disabled = true; btn.innerHTML = `<span class="animate-pulse italic">ESCANEO DE IMPACTO...</span>`;

        try {
            const res = await fetch(`${API_BASE}/analizar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem("mejoraria_token") },
                body: JSON.stringify({ titulo: $("titulo").value, artista: "" })
            });
            const raw = await res.json();
            if(raw.status === "error") throw new Error(raw.message);
            const data = raw.data;

            // Render Radar
            $("resultsWrapper").classList.remove("hidden");
            $("statusHero").style.borderColor = data.color === "green" ? "#00665E" : data.color === "orange" ? "#FF8000" : "#E10600";
            $("riskValue").innerText = data.risk_percent + "%";
            $("summaryTitle").innerText = data.resultado;
            $("resPill").innerText = data.resultado;

            // Render Mirror (3 Columnas)
            $("lyricsContainer").innerHTML = data.letra_comparada.map(l => `
                <div class="mirror-grid group">
                    <div class="text-[10px] text-slate-300 italic group-hover:text-blue-600 transition-all">${l.original}</div>
                    <div class="text-[12px] font-black ${l.changed ? 'text-[#FF8000]' : 'text-slate-800'} transition-all">
                        ${l.changed ? `<mark>${l.adapted}</mark>` : l.adapted}
                    </div>
                    <div class="text-[10px] text-slate-400 font-bold opacity-60 uppercase italic">Significado Pedagógico</div>
                </div>
            `).join('');

            // Render Pedagogy Matrix (NotebookLM Tabs)
            window.matrix = data.pedagogy_matrix;
            const tabs = $("pedagogyTabs");
            tabs.innerHTML = Object.keys(data.pedagogy_matrix).map((name, i) => `
                <button onclick="showPedContent('${name}')" class="px-8 py-3 bg-white border border-slate-200 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-[#000B29] hover:text-white transition-all shadow-sm shrink-0">
                    ${name}
                </button>
            `).join('');
            showPedContent(Object.keys(data.pedagogy_matrix)[0]);

            // WOW: Salto automático al veredicto
            setTimeout(() => switchView('radar'), 500);

        } catch(e) { 
            console.error(e);
            alert("Error de Sincronización: El motor Render se está refrescando. Reintenta en 10 seg."); 
        }
        finally { btn.disabled = false; btn.innerText = "Iniciar Evaluación"; }
    }

    function showPedContent(name) {
        const d = window.matrix[name];
        $("pedagogyContent").innerHTML = `
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10 animate-fade-in">
                <div class="bg-white border border-slate-100 rounded-[40px] p-12 shadow-sm border-l-[16px] border-[#00665E]">
                    <h4 class="text-3xl font-black text-[#000B29] tracking-tighter leading-none mb-4 italic italic">${d.oa}</h4>
                    <p class="text-sm font-bold text-slate-400 leading-relaxed italic uppercase tracking-widest">${d.desc}</p>
                    <div class="mt-10 p-6 bg-slate-50 rounded-3xl border border-slate-100">
                        <span class="text-[9px] font-black text-slate-400 uppercase block mb-2 italic italic">Actividad:</span>
                        <p class="text-sm font-black text-slate-700 italic italic">${d.actividad}</p>
                    </div>
                </div>
                <div class="bg-[#000B29] rounded-[40px] p-12 text-white shadow-2xl flex flex-col justify-center text-center">
                    <span class="text-[9px] font-black text-[#FF8000] uppercase block mb-6 italic tracking-widest italic italic">Pregunta de Mediación Crítica:</span>
                    <p class="text-3xl font-black italic italic italic leading-tight tracking-tighter italic">"${d.reflexion}"</p>
                </div>
            </div>
        `;
    }

    $("analyzeBtn").onclick = analizar;
  </script>
</body>
</html>
