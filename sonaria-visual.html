<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | SonarIA Matrix</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; @apply bg-black text-slate-300; overflow: hidden; }
    .sidebar { @apply w-64 bg-black flex flex-col h-screen fixed left-0 top-0 z-[100] p-2 border-r border-white/5; }
    .main-view { @apply ml-64 bg-[#121212] rounded-lg mt-2 mr-2 h-[calc(100vh-112px)] overflow-y-auto custom-scroll p-12; }
    .course-card { @apply p-4 rounded-2xl border-2 border-transparent transition-all cursor-pointer text-center; }
    .course-card.green { @apply bg-green-900/20 border-green-500 text-green-400; }
    .course-card.orange { @apply bg-orange-900/20 border-orange-500 text-orange-400; }
    .course-card.red { @apply bg-red-900/20 border-red-500 text-red-600 opacity-40; }
    .mirror-row { display: grid; grid-template-columns: 1fr 1fr; @apply gap-10 p-4 border-b border-white/5; }
    mark { @apply bg-yellow-400 text-black px-1 rounded font-bold; }
  </style>
</head>
<body class="antialiased">

  <aside class="sidebar">
    <div class="p-6 text-blue-500 italic font-black text-2xl uppercase">SonarIA</div>
    <nav class="flex-1 space-y-1">
        <div class="p-4 text-white bg-white/5 rounded-xl font-bold text-sm italic border-l-4 border-blue-600"><i data-lucide="radar"></i> Radar / Matrix</div>
    </nav>
    <div class="p-4 bg-white/5 rounded-2xl m-2"><p class="text-xs font-bold text-white italic">Mauricio P.</p><p class="text-[9px] uppercase text-slate-500 font-black tracking-widest">Plan School Active</p></div>
  </aside>

  <main class="main-view">
    <div class="max-w-4xl mx-auto space-y-12">
        <h2 class="text-6xl font-black tracking-tighter text-white italic italic">Consultor Matrix</h2>
        
        <div class="bg-white/5 p-10 rounded-[40px] border border-white/10 flex gap-6">
            <input id="titulo" type="text" placeholder="Imagine..." class="flex-1 bg-white/5 p-5 rounded-2xl font-bold text-xl border-none outline-none text-white focus:ring-4 focus:ring-blue-600">
            <button id="analyzeBtn" class="bg-blue-600 text-white px-10 rounded-2xl font-black italic hover:bg-blue-500 transition-all">Analizar</button>
        </div>

        <div id="matrixArea" class="hidden space-y-8">
            <h3 class="text-2xl font-black italic italic">Idoneidad por Grado</h3>
            <div id="matrixGrid" class="grid grid-cols-6 gap-4"></div>
        </div>

        <div id="syncArea" class="hidden bg-[#181818] p-10 rounded-[40px] border border-white/5">
            <h4 id="courseLabel" class="text-blue-500 font-black uppercase text-[10px] tracking-[0.4em] mb-4">---</h4>
            <div id="lyricsContainer" class="space-y-2"></div>
        </div>
    </div>
  </main>

  <script>
    lucide.createIcons();
    const API_BASE = "https://sonaria-api-test.onrender.com";
    const $ = id => document.getElementById(id);
    let lastData = null;

    async function analizar() {
        const btn = $("analyzeBtn");
        if (!$("titulo").value) return;
        btn.disabled = true; btn.innerText = "ESCANEO...";
        try {
            const res = await fetch(`${API_BASE}/api/analizar/v23`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem("mejoraria_token") },
                body: JSON.stringify({ titulo: $("titulo").value })
            });
            const raw = await res.json();
            lastData = raw.data;
            $("matrixArea").classList.remove("hidden");
            $("matrixGrid").innerHTML = Object.entries(lastData.matrix).map(([code, info]) => `
                <div onclick="focusCourse('${code}')" class="course-card ${info.status}">
                    <span class="text-xs font-black">${info.label}</span>
                </div>
            `).join('');
        } catch(e) { alert("Failed to fetch: Reintenta en 10 seg."); }
        finally { btn.disabled = false; btn.innerText = "Analizar"; }
    }

    async function focusCourse(code) {
        $("syncArea").classList.remove("hidden");
        $("courseLabel").innerText = "Planificación: " + lastData.matrix[code].label;
        const res = await fetch(`${API_BASE}/api/get-adaptation`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ lyrics: lastData.lyrics_raw, course: code })
        });
        const data = await res.json();
        $("lyricsContainer").innerHTML = data.comparativa.map(l => `
            <div class="mirror-row">
                <div class="text-[10px] text-slate-600 italic">${l.original}</div>
                <div class="text-sm font-black ${l.changed ? 'text-blue-500' : 'text-slate-200'} italic">${l.adapted}</div>
            </div>
        `).join('');
    }

    $("analyzeBtn").onclick = analizar;
  </script>
</body>
</html>
