<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SonarIA | Grand Prix Workspace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --mclaren: #FF8000;
      --redbull: #000B29;
      --aston: #00665E;
      --pearl: #FDFDFF;
    }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--pearl); @apply text-slate-900 overflow-hidden h-screen; }
    
    /* SIDEBAR: LA CARRETERA */
    .sidebar { @apply bg-[#000B29] h-screen transition-all duration-500 flex flex-col z-50 shadow-2xl; width: 280px; }
    .nav-link { @apply flex items-center gap-4 px-6 py-4 mx-3 rounded-2xl transition-all cursor-pointer text-slate-400 font-bold text-sm mb-1; }
    .nav-link.active { @apply bg-white/5 text-white border-l-4 border-[#FF8000] shadow-lg; }
    .nav-link:hover:not(.active) { @apply bg-white/5 text-white; }
    
    /* WORKSPACE SECCIONES */
    .workspace { @apply flex-1 flex flex-col h-screen overflow-y-auto custom-scroll p-12 bg-white/50 relative; }
    .section-view { @apply hidden opacity-0 transition-all duration-700; }
    .section-view.active { @apply block opacity-100; }

    /* LINGUISTIC MIRROR */
    .mirror-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; @apply gap-8 p-6 border-b border-slate-50 transition-all items-center rounded-3xl; }
    .mirror-grid:hover { @apply bg-blue-50/50 scale-[1.01]; }
    
    mark { @apply bg-yellow-300 text-black px-1.5 rounded-md font-extrabold; }
    
    /* La Cruz Sutil */
    .cross-mark { position: absolute; top: 20px; right: 20px; width: 20px; height: 20px; opacity: 0.05; }
    .cross-mark::before, .cross-mark::after { content: ''; position: absolute; background: currentColor; }
    .cross-mark::before { width: 2px; height: 100%; left: 9px; }
    .cross-mark::after { width: 100%; height: 2px; top: 6px; }

    .custom-scroll::-webkit-scrollbar { width: 4px; }
    .custom-scroll::-webkit-scrollbar-thumb { @apply bg-slate-200 rounded-full; }
  </style>
</head>
<body class="antialiased">

  <div class="flex">
    
    <!-- SIDEBAR DE PROCESO (ORDENADO) -->
    <aside id="sidebar" class="sidebar">
        <div class="p-8 mb-6 flex flex-col relative">
            <h1 class="text-2xl font-black text-white italic tracking-tighter">Sonar<span class="text-[#FF8000]">IA</span></h1>
            <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mt-1">Sovereign Pro v300</p>
            <div class="cross-mark text-white"></div>
        </div>

        <nav class="flex-1 space-y-1">
            <div onclick="switchView('radar', this)" class="nav-link active"><i data-lucide="radar"></i> <span>01 Radar (Semáforo)</span></div>
            <div onclick="switchView('mirror', this)" class="nav-link"><i data-lucide="languages"></i> <span>02 Espejo Lírico</span></div>
            <div onclick="switchView('pedagogy', this)" class="nav-link"><i data-lucide="graduation-cap"></i> <span>03 Taller de Aula</span></div>
            <div onclick="switchView('reports', this)" class="nav-link"><i data-lucide="file-text"></i> <span>04 Reporte UTP</span></div>
        </nav>

        <div class="p-8 mt-auto border-t border-white/5 flex items-center gap-3">
            <div class="w-10 h-10 rounded-2xl bg-[#00665E] flex items-center justify-center font-black text-white shadow-lg shadow-emerald-900/20">M</div>
            <div class="leading-tight"><p class="text-xs font-bold text-white italic">Mauricio Pinto</p><p class="text-[9px] text-slate-500 font-black uppercase">Admin Colegio</p></div>
        </div>
    </aside>

    <!-- ÁREA DE TRABAJO -->
    <main class="workspace">
        
        <!-- SECCIÓN 01: RADAR (SEMAFORO) -->
        <section id="view-radar" class="section-view active space-y-10">
            <div class="bg-white border border-slate-100 rounded-[40px] p-12 shadow-sm border-b-[16px] border-[#000B29]">
                <h3 class="text-[#000B29] font-black text-[10px] uppercase tracking-[0.4em] mb-8">Paso 1: Análisis de Idoneidad</h3>
                <div class="grid grid-cols-2 gap-8 mb-10">
                    <input id="titulo" type="text" placeholder="Canción..." class="p-5 bg-slate-50 rounded-3xl font-bold text-xl border-transparent focus:bg-white focus:ring-8 focus:ring-blue-100 transition-all outline-none">
                    <input id="artista" type="text" placeholder="Artista..." class="p-5 bg-slate-50 rounded-3xl font-bold text-xl border-transparent focus:bg-white focus:ring-8 focus:ring-blue-100 transition-all outline-none">
                </div>
                <button id="analyzeBtn" class="w-full py-6 bg-[#000B29] text-white rounded-[32px] font-black text-lg hover:bg-[#FF8000] shadow-2xl transition-all active:scale-95 italic">Iniciar Escaneo de Seguridad</button>
            </div>

            <div id="resultsWrapper" class="hidden space-y-10">
                <div id="statusHero" class="bg-white border border-slate-100 rounded-[40px] p-12 border-t-[24px] flex justify-between items-center shadow-xl">
                    <div class="flex-1">
                        <span id="resPill" class="px-4 py-1.5 bg-slate-100 rounded-full text-[10px] font-black uppercase text-slate-500 mb-6 inline-block italic tracking-widest">—</span>
                        <h2 id="summaryTitle" class="text-7xl font-black tracking-tighter italic text-[#000B29] leading-none mb-6">—</h2>
                    </div>
                    <div class="text-right">
                        <div class="text-[110px] font-black italic tracking-tighter text-[#000B29] leading-none" id="riskValue">0%</div>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic tracking-[0.4em]">Riesgo Detectado</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- SECCIÓN 02: ESPEJO LÍRICO (ADAPTACIÓN) -->
        <section id="view-mirror" class="section-view space-y-10">
            <div class="bg-white border border-slate-100 rounded-[40px] overflow-hidden shadow-2xl">
                <div class="p-8 bg-[#000B29] text-white flex justify-between items-center px-12">
                    <h4 class="text-[10px] font-black uppercase tracking-[0.5em]">Comparativa de Triple Impacto (v300.0)</h4>
                    <span class="px-5 py-2 bg-emerald-500/20 text-emerald-400 rounded-xl text-[9px] font-black uppercase tracking-widest italic">Sincro Métrica OK</span>
                </div>
                <div class="grid grid-cols-3 gap-8 p-6 bg-slate-50 border-b border-slate-100 font-black text-[9px] text-slate-400 uppercase tracking-[0.3em] px-14">
                    <span>Original</span><span>Versión Docente</span><span>Significado</span>
                </div>
                <div id="lyricsContainer" class="bg-white max-h-[600px] overflow-y-auto custom-scroll">
                    <!-- Inyección dinámica -->
                </div>
            </div>
        </section>

        <!-- SECCIÓN 03: TALLER (PEDAGOGÍA) -->
        <section id="view-pedagogy" class="section-view space-y-10">
            <div id="pedagogyTabs" class="flex gap-4 mb-10 overflow-x-auto pb-4 pr-10"></div>
            <div id="pedagogyContent" class="grid grid-cols-1 md:grid-cols-2 gap-10">
                <!-- OA, Actividad, Pregunta -->
            </div>
        </section>

    </main>
  </div>

  <script>
    lucide.createIcons();
    const API_BASE = "https://sonaria-api-test.onrender.com";
    const $ = id => document.getElementById(id);

    function switchView(viewName, el) {
        document.querySelectorAll('.section-view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        $(`view-${viewName}`).classList.add('active');
        if(el) el.classList.add('active');
    }

    async function analizar() {
        const btn = $("analyzeBtn");
        btn.disabled = true; btn.innerHTML = `<span class="animate-pulse italic uppercase tracking-[0.2em]">Ejecutando Inteligencia...</span>`;
        try {
            const res = await fetch(`${API_BASE}/api/analizar/v300`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem("mejoraria_token") },
                body: JSON.stringify({ titulo: $("titulo").value, artista: $("artista").value })
            });
            const raw = await res.json();
            const data = raw.data;

            // 1. Radar
            $("resultsWrapper").classList.remove("hidden");
            $("statusHero").style.borderColor = data.color === "green" ? "#00665E" : data.color === "orange" ? "#FF8000" : "#E10600";
            $("riskValue").innerText = data.risk_percent + "%";
            $("summaryTitle").innerText = data.resultado;
            $("resPill").innerText = data.ruta;

            // 2. Mirror
            $("lyricsContainer").innerHTML = data.letra_comparada.map(l => `
                <div class="mirror-grid group hover:bg-blue-50/50">
                    <div class="text-[10px] text-slate-300 italic group-hover:text-[#000B29] transition-all">${l.original}</div>
                    <div class="text-[11px] font-black ${l.changed ? 'text-[#FF8000]' : 'text-slate-800'} transition-all italic">
                        ${l.changed ? `<mark>${l.adapted}</mark>` : l.adapted}
                    </div>
                    <div class="text-[10px] text-slate-400 font-bold opacity-60 uppercase italic">Referencia Pedagógica</div>
                </div>
            `).join('');

            // 3. Pedagogy Matrix (Tabs)
            window.matrix = data.pedagogy_matrix;
            const tabs = $("pedagogyTabs");
            tabs.innerHTML = Object.keys(data.pedagogy_matrix).map((name, i) => `
                <button onclick="showPedContent('${name}')" class="px-6 py-3 bg-white border border-slate-200 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-[#000B29] hover:text-white transition-all shadow-sm shrink-0">
                    ${name}
                </button>
            `).join('');
            
            showPedContent(Object.keys(data.pedagogy_matrix)[0]);

            // Efecto WoW: Salto automático al veredicto
            setTimeout(() => switchView('radar'), 500);

        } catch(e) { alert("Error de Sincronización"); }
        finally { btn.disabled = false; btn.innerText = "Iniciar Escaneo de Seguridad"; }
    }

    function showPedContent(name) {
        const d = window.matrix[name];
        $("pedagogyContent").innerHTML = `
            <div class="bg-white border border-slate-100 rounded-[40px] p-12 shadow-sm border-l-[16px] border-[#00665E]">
                <span class="text-[9px] font-black text-emerald-600 uppercase block mb-3">Marco Curricular Chile</span>
                <h4 class="text-3xl font-black text-[#000B29] tracking-tighter leading-none mb-4 italic">${d.oa}</h4>
                <p class="text-sm font-bold text-slate-400 leading-relaxed mb-8 uppercase tracking-widest">${d.desc}</p>
                <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100">
                    <span class="text-[9px] font-black text-slate-400 uppercase block mb-2 italic">Actividad Propuesta:</span>
                    <p class="text-sm font-black text-slate-700 italic">${d.actividad}</p>
                </div>
            </div>
            <div class="bg-[#000B29] rounded-[40px] p-12 text-white shadow-2xl flex flex-col justify-center relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-8 opacity-10 group-hover:rotate-12 transition-transform duration-700"><i data-lucide="help-circle" class="w-24 h-24"></i></div>
                <span class="text-[9px] font-black text-[#FF8000] uppercase block mb-4 italic tracking-widest">Pregunta de Mediación Crítica:</span>
                <p class="text-2xl font-black italic leading-tight italic tracking-tighter italic">"${d.reflexion}"</p>
                <button class="mt-10 w-full py-4 bg-white text-[#000B29] rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl">Vincular al Informe PDF</button>
            </div>
        `;
        lucide.createIcons();
    }

    $("analyzeBtn").onclick = analizar;
  </script>
</body>
</html>
