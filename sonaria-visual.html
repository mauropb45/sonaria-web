<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SonarIA Pro | Workspace de Élite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; @apply bg-[#F3F5F9] text-[#1A1D23]; overflow: hidden; }
    
    /* Paleta F1 / Racing */
    .bg-racing-blue { background-color: #060D2E; } /* Red Bull Navy */
    .text-racing-red { color: #E10600; } /* F1 Red */
    .bg-racing-red { background-color: #E10600; }
    
    .sidebar { @apply transition-all duration-500 fixed top-0 h-screen z-50 shadow-2xl; }
    .glass-card { @apply bg-white border border-slate-200 rounded-[24px] shadow-sm hover:shadow-xl transition-all duration-300; }
    
    /* Panel de Letras (Drawer) */
    #lyricsDrawer { @apply fixed right-0 top-0 h-screen w-[450px] bg-white border-l border-slate-200 translate-x-full transition-transform duration-500 z-50 p-8 overflow-y-auto; }
    #lyricsDrawer.open { @apply translate-x-0; }

    mark { @apply bg-[#FFD700] text-black px-1 rounded font-bold; } /* Amarillo de destaque */
    
    .custom-scroll::-webkit-scrollbar { width: 4px; }
    .custom-scroll::-webkit-scrollbar-thumb { @apply bg-slate-300 rounded-full; }
  </style>
</head>
<body class="antialiased">

  <!-- SIDEBAR IZQUIERDA (NAVEGACIÓN) -->
  <aside class="sidebar left-0 w-20 hover:w-64 bg-racing-blue text-white group">
    <div class="p-6">
        <h1 class="text-xl font-extrabold italic group-hover:block hidden">Sonar<span class="text-racing-red font-black">IA</span></h1>
        <div class="w-8 h-8 bg-racing-red rounded-lg flex items-center justify-center font-black italic block group-hover:hidden">S</div>
    </div>
    <nav class="mt-10 space-y-2">
        <div class="flex items-center gap-4 px-6 py-4 hover:bg-white/10 cursor-pointer transition-all border-l-4 border-racing-red">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <span class="opacity-0 group-hover:opacity-100 font-bold text-xs uppercase tracking-widest">Radar</span>
        </div>
        <div class="flex items-center gap-4 px-6 py-4 hover:bg-white/10 cursor-pointer transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13"></path></svg>
            <span class="opacity-0 group-hover:opacity-100 font-bold text-xs uppercase tracking-widest">Historial</span>
        </div>
    </nav>
  </aside>

  <!-- MAIN WORKSPACE -->
  <main class="ml-20 flex-1 h-screen overflow-y-auto p-12 custom-scroll">
    
    <!-- HEADER -->
    <header class="flex justify-between items-end mb-12">
        <div>
            <h2 class="text-4xl font-[900] tracking-tighter text-racing-blue italic uppercase">Performance Center</h2>
            <p class="text-slate-400 font-bold text-[10px] uppercase tracking-[0.4em] mt-2">Versión 3.0 • Staging Pro</p>
        </div>
        <div class="flex-1 max-w-xl mx-12">
            <div class="bg-white p-2 rounded-2xl border-2 border-slate-100 flex shadow-sm focus-within:border-racing-blue transition-all">
                <input id="titulo" type="text" placeholder="Imagine - John Lennon" class="flex-1 px-4 bg-transparent outline-none font-bold text-lg">
                <button id="analyzeBtn" class="bg-racing-blue text-white px-8 py-3 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-racing-red transition-all">Analizar</button>
            </div>
        </div>
        <div class="flex gap-4">
            <div id="clock" class="text-right"><p class="text-lg font-black leading-none" id="time">--:--</p><p class="text-[8px] font-black text-slate-400 uppercase tracking-widest" id="date">-- ---</p></div>
        </div>
    </header>

    <!-- BENTO GRID DE RESULTADOS -->
    <div id="resultsWrapper" class="hidden grid grid-cols-12 gap-6 pb-20">
        
        <!-- CARD: VEREDICTO & RIESGO -->
        <div class="col-span-8 glass-card p-10 flex justify-between items-center border-t-8 border-racing-red">
            <div>
                <span class="px-3 py-1 bg-racing-red/10 text-racing-red rounded-full text-[9px] font-black uppercase tracking-widest italic">Análisis Crítico</span>
                <h3 id="summaryTitle" class="text-5xl font-black tracking-tighter mt-4 leading-none italic">—</h3>
                <div class="mt-8 flex gap-8">
                    <div><p class="text-[9px] font-black text-slate-400 uppercase">Match OA</p><p id="oaLabel" class="text-xl font-black text-racing-blue">--</p></div>
                    <div class="border-l border-slate-100 pl-8"><p class="text-[9px] font-black text-slate-400 uppercase">Edad Mínima</p><p id="edadSug" class="text-xl font-black">6+</p></div>
                </div>
            </div>
            <div class="text-right">
                <div class="text-8xl font-black text-racing-blue tracking-tighter" id="riskValue">0%</div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Riesgo Escolar</p>
            </div>
        </div>

        <!-- CARD: ACCIONES RÁPIDAS -->
        <div class="col-span-4 flex flex-col gap-6">
            <button onclick="toggleDrawer()" class="flex-1 glass-card p-6 flex items-center justify-between hover:bg-racing-blue hover:text-white group">
                <span class="font-black uppercase text-xs tracking-widest italic">Ver Letra Completa</span>
                <svg class="w-6 h-6 text-racing-red" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
            </button>
            <a id="ytLink" target="_blank" class="flex-1 glass-card p-6 flex items-center justify-between hover:bg-[#FF0000] hover:text-white group transition-all">
                <span class="font-black uppercase text-xs tracking-widest italic">YouTube Lyrics</span>
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.016 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
            </a>
        </div>

        <!-- CARD: PLANIFICACIÓN (DERECHA) -->
        <div class="col-span-12 lg:col-span-5 glass-card p-10 bg-white">
            <h4 class="text-[10px] font-black uppercase tracking-widest text-racing-red mb-6">Planificación de Aula</h4>
            <div class="space-y-6">
                <div><span class="text-[9px] font-black text-slate-400 uppercase">Actividad Teórica</span><p id="actTeorica" class="text-sm font-bold mt-1">--</p></div>
                <div><span class="text-[9px] font-black text-slate-400 uppercase">Ejecución Práctica</span><p id="actPractica" class="text-sm font-bold mt-1">--</p></div>
            </div>
        </div>

        <!-- CARD: INTELIGENCIA (IZQUIERDA) -->
        <div class="col-span-12 lg:col-span-7 glass-card p-10 bg-racing-blue text-white relative overflow-hidden">
            <div class="absolute top-0 right-0 p-8 opacity-10"><svg class="w-32 h-32" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"></path></svg></div>
            <h4 class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-6">Reflexión y Contexto</h4>
            <p id="pregContexto" class="text-2xl font-black italic tracking-tighter leading-tight mb-8">"--"</p>
            <button class="bg-white text-racing-blue px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-xl">Bajar Guía de Trabajo</button>
        </div>
    </div>
  </main>

  <!-- LYRICS DRAWER -->
  <aside id="lyricsDrawer">
    <div class="flex justify-between items-center mb-10">
        <h3 class="font-black text-sm uppercase tracking-widest italic">Linguistic Engine</h3>
        <button onclick="toggleDrawer()" class="text-slate-400 hover:text-black font-black text-xs">CERRAR ✕</button>
    </div>
    <div class="space-y-8" id="lyricsContent">
        <!-- Inyección 3 Columnas -->
    </div>
  </aside>

  <script>
    const API_BASE = "https://sonaria-api-test.onrender.com";
    const $ = id => document.getElementById(id);

    function toggleDrawer() { $("lyricsDrawer").classList.toggle("open"); }

    async function analizar() {
        const btn = $("analyzeBtn");
        btn.disabled = true; btn.innerText = "ESCANEO DE ÉLITE...";
        try {
            const res = await fetch(`${API_BASE}/analizar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem("mejoraria_token") },
                body: JSON.stringify({ titulo: $("titulo").value, artista: "" })
            });
            const data = await res.json();
            renderDashboard(data);
        } catch(e) { alert("Error"); }
        finally { btn.disabled = false; btn.innerText = "Analizar"; }
    }

    function renderDashboard(data) {
        $("resultsWrapper").classList.remove("hidden");
        $("riskValue").innerText = data.risk_percent + "%";
        $("summaryTitle").innerText = data.resultado;
        $("oaLabel").innerText = data.oa;
        $("actTeorica").innerText = data.actividad_teorica;
        $("actPractica").innerText = data.actividad_practica;
        $("pregContexto").innerText = `"${data.pregunta_desafio}"`;
        $("ytLink").href = data.yt_link;

        // Render Letra en el Drawer
        $("lyricsContent").innerHTML = data.letra_comparada.map(l => `
            <div class="grid grid-cols-1 gap-2 border-b border-slate-50 pb-4">
                <p class="text-[10px] text-slate-300 italic leading-none">${l.original}</p>
                <p class="text-xs font-bold text-slate-800">${l.adapted.replace(/mark/g, 'mark')}</p>
                <p class="text-[10px] text-blue-500 font-bold opacity-60 uppercase">${l.translated}</p>
            </div>
        `).join('');
    }

    function updateTime() {
        const n = new Date();
        $("time").innerText = n.toLocaleTimeString('es-CL', {hour:'2-digit', minute:'2-digit'});
        $("date").innerText = n.toLocaleDateString('es-CL', {day:'2-digit', month:'short'}).toUpperCase();
    }
    setInterval(updateTime, 1000); updateTime();
    $("analyzeBtn").onclick = analizar;
  </script>
</body>
</html>
