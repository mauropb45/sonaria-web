<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SonarIA Pro | Platinum Suite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Outfit:wght@900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; @apply bg-black text-white; overflow: hidden; }
    
    /* Layout Spotify Desktop */
    .sidebar { @apply w-64 bg-black flex flex-col p-3 transition-all duration-500 h-screen fixed left-0 top-0 z-[100]; }
    .sidebar.collapsed { width: 90px; }
    .nav-card { @apply bg-[#121212] rounded-2xl p-4 mb-2; }
    .nav-item { @apply flex items-center gap-4 px-4 py-3 rounded-xl transition-all cursor-pointer text-slate-400 font-bold text-sm hover:text-white; }
    .nav-item.active { @apply text-white bg-white/5 shadow-lg shadow-white/5; }
    
    /* Área Principal */
    .main-canvas { @apply ml-64 bg-[#121212] rounded-lg mt-2 mb-2 mr-2 flex-1 h-[calc(100vh-16px)] overflow-y-auto custom-scroll relative; transition: margin 0.5s; }
    .main-canvas.expanded { @apply ml-24; }
    
    /* Mirror Sync Table */
    .lyrics-grid { display: grid; grid-template-columns: 1fr 1fr 1.2fr; @apply gap-8 p-6 border-b border-white/5 items-start transition-all; }
    .lyrics-row:hover { @apply bg-white/5; }
    .original { @apply text-slate-500 italic text-xs; }
    .adapted { @apply text-slate-100 font-black text-sm; }
    
    /* Tooltips */
    .tooltip-trigger { @apply relative inline-block cursor-help border-b border-blue-500; }
    .tooltip-box { @apply absolute bottom-full left-1/2 -translate-x-1/2 mb-3 w-48 p-3 bg-slate-900 text-white text-[9px] rounded-xl opacity-0 invisible transition-all duration-300 z-50 shadow-2xl; }
    .tooltip-trigger:hover .tooltip-box { @apply opacity-100 visible -translate-y-2; }

    .custom-scroll::-webkit-scrollbar { width: 6px; }
    .custom-scroll::-webkit-scrollbar-thumb { @apply bg-white/10 rounded-full; }
  </style>
</head>
<body class="antialiased select-none">

  <!-- SIDEBAR (TU BIBLIOTECA) -->
  <aside id="sidebar" class="sidebar">
    <div class="nav-card">
        <div class="flex items-center justify-between mb-8 px-2">
            <h1 class="text-xl font-black italic tracking-tighter text-blue-500 nav-text">SonarIA</h1>
            <button onclick="toggleSidebar()" class="text-slate-500 hover:text-white"><i data-lucide="menu"></i></button>
        </div>
        <nav class="space-y-1">
            <div onclick="switchView('radar')" class="nav-item active"><i data-lucide="home"></i> <span class="nav-text">Radar de Aula</span></div>
            <div onclick="switchView('setup')" class="nav-item"><i data-lucide="settings"></i> <span class="nav-text">Configurar Colegio</span></div>
        </nav>
    </div>

    <div class="nav-card flex-1 overflow-hidden flex flex-col">
        <div class="flex items-center justify-between px-2 mb-4">
            <div class="flex items-center gap-2 text-slate-400 font-bold text-xs uppercase tracking-widest"><i data-lucide="library"></i> <span class="nav-text">Proceso Docente</span></div>
        </div>
        <div class="flex-1 overflow-y-auto custom-scroll space-y-1">
            <div onclick="switchView('pedagogy')" class="nav-item"><i data-lucide="graduation-cap"></i> <span class="nav-text">Matriz Pedagógica</span></div>
            <div onclick="switchView('sync')" class="nav-item"><i data-lucide="languages"></i> <span class="nav-text">Linguistic Sync</span></div>
            <div onclick="switchView('history')" class="nav-item"><i data-lucide="database"></i> <span class="nav-text">Biblioteca SQL</span></div>
            <div onclick="switchView('reports')" class="nav-item"><i data-lucide="file-bar-chart"></i> <span class="nav-text">Reportes UTP</span></div>
        </div>
    </div>

    <div class="p-4 bg-black/20 rounded-2xl border border-white/5 flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center font-black text-xs">M</div>
        <div class="nav-text"><p class="text-[10px] font-bold">Mauricio P.</p><p class="text-[8px] text-slate-500 font-black uppercase">Plan Pro</p></div>
    </div>
  </aside>

  <!-- MAIN CANVAS -->
  <main id="mainCanvas" class="main-canvas">
    
    <!-- TOPBAR FIXA -->
    <header class="sticky top-0 bg-[#121212]/90 backdrop-blur-md px-10 py-6 flex justify-between items-center z-40">
        <h2 id="viewTitle" class="text-xl font-black uppercase tracking-widest italic opacity-50">Radar de Aula</h2>
        <div class="flex gap-4">
            <button class="bg-blue-600 text-white px-6 py-2 rounded-full font-black text-[10px] uppercase tracking-widest shadow-lg shadow-blue-900/40">Sincronizado</button>
        </div>
    </header>

    <div class="p-10 max-w-6xl mx-auto space-y-12">
        
        <!-- RADAR INPUT -->
        <section id="radar-section" class="space-y-10">
            <div class="bg-[#181818] p-12 rounded-[40px] border-b-8 border-blue-600 shadow-2xl">
                <h3 class="text-[10px] font-black uppercase text-blue-500 tracking-[0.4em] mb-8">Escaneo de Impacto Artístico</h3>
                <div class="grid grid-cols-2 gap-8 mb-8">
                    <input id="titulo" type="text" placeholder="Imagine - John Lennon" class="bg-[#242424] p-5 rounded-2xl font-bold text-xl outline-none focus:ring-4 focus:ring-blue-900 transition-all border border-transparent">
                    <button id="analyzeBtn" class="bg-white text-black py-5 rounded-[24px] font-black text-lg hover:scale-[1.02] active:scale-95 transition-all italic">Analizar Obra</button>
                </div>
            </div>

            <!-- RESULTADOS BENTO -->
            <div id="resultsWrapper" class="hidden space-y-10 animate-fade-in">
                <div class="grid grid-cols-12 gap-8">
                    <div id="statusHero" class="col-span-8 bg-[#181818] rounded-[40px] p-12 border-t-[20px] flex justify-between items-center relative overflow-hidden">
                        <div class="relative z-10">
                            <span id="resPill" class="px-4 py-1 bg-white/5 rounded-full text-[10px] font-black uppercase text-slate-500 mb-6 inline-block italic tracking-widest">—</span>
                            <h2 id="summaryTitle" class="text-6xl font-black tracking-tighter italic">—</h2>
                        </div>
                        <div class="text-right z-10">
                            <div class="text-[100px] font-black tracking-tighter leading-none italic" id="riskValue">0%</div>
                            <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mt-2 italic">Riesgo Escolar</p>
                        </div>
                    </div>
                    <div class="col-span-4 bg-blue-600 rounded-[40px] p-10 flex flex-col justify-center">
                        <h4 class="text-[10px] font-black uppercase tracking-widest opacity-60 mb-4 italic">Dato Artístico</h4>
                        <p id="bandContext" class="text-lg font-bold italic leading-tight"></p>
                    </div>
                </div>

                <!-- MIRROR SYNC (LETRA ENTERA) -->
                <div class="bg-[#181818] rounded-[40px] overflow-hidden border border-white/5">
                    <div class="p-8 bg-black/40 flex justify-between items-center border-b border-white/5 px-12">
                        <h4 class="text-[10px] font-black uppercase tracking-[0.4em] text-slate-500 italic">Linguistic Sync (Original | Adaptada | Sentido)</h4>
                        <button class="bg-blue-600 text-white px-6 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg">Bajar Informe UTP</button>
                    </div>
                    <div id="lyricsContainer" class="divide-y divide-white/5">
                        <!-- Inyección -->
                    </div>
                </div>
            </div>
        </section>

        <!-- PLACEHOLDER -->
        <div id="placeholder" class="h-96 flex flex-col items-center justify-center opacity-10">
            <h3 class="text-[140px] font-black italic tracking-tighter uppercase italic">READY</h3>
        </div>
    </div>
  </main>

  <script>
    lucide.createIcons();
    const API_BASE = "https://sonaria-api-test.onrender.com";
    const $ = id => document.getElementById(id);

    function toggleSidebar() {
        $("sidebar").classList.toggle("collapsed");
        $("mainCanvas").classList.toggle("expanded");
        document.querySelectorAll(".nav-text").forEach(t => t.classList.toggle("hidden"));
    }

    async function analizar() {
        const btn = $("analyzeBtn");
        if (!$("titulo").value) return alert("Indica la obra");
        btn.disabled = true; btn.innerHTML = `<span class="animate-pulse">SINCRONIZANDO...</span>`;

        try {
            const res = await fetch(`${API_BASE}/api/analizar/v20`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem("mejoraria_token") },
                body: JSON.stringify({ titulo: $("titulo").value, artista: "", curso: "7B" })
            });
            const raw = await res.json();
            renderDashboard(raw.data);
        } catch(e) { alert("Error"); }
        finally { btn.disabled = false; btn.innerText = "Analizar Obra"; }
    }

    function renderResult(data) {
        $("placeholder").classList.add("hidden");
        $("resultsWrapper").classList.remove("hidden");
        
        const hero = $("statusHero");
        hero.style.borderColor = data.color === "green" ? "#22c55e" : data.color === "orange" ? "#f97316" : "#ef4444";
        
        $("riskValue").innerText = data.risk_percent + "%";
        $("summaryTitle").innerText = data.resultado;
        $("resPill").innerText = data.lectura_sugerida;
        $("bandContext").innerText = data.band_context;

        $("lyricsContainer").innerHTML = data.matrix.map(l => `
            <div class="mirror-row group hover:bg-white/5">
                <div class="original text-[10px] group-hover:text-blue-500 transition-all">${l.original}</div>
                <div class="adapted text-[12px] font-black ${l.changed ? 'text-blue-400' : 'text-slate-100'} transition-all italic">
                    ${l.changed ? `<span class="tooltip-trigger">${l.adapted}<span class="tooltip-box"><b>Métrica OK:</b> ${l.reason}</span></span>` : l.adapted}
                </div>
                <div class="text-[10px] text-slate-500 font-bold opacity-60 uppercase italic">Significado: ${data.oa.oa}</div>
            </div>
        `).join('');

        $("mainCanvas").scrollTo({ top: 400, behavior: 'smooth' });
    }

    $("analyzeBtn").onclick = analizar;
  </script>
</body>
</html>
