<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SonarIA | Professional Workspace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; @apply bg-[#F8FAFB] text-slate-800; overflow: hidden; }
    .sidebar { @apply bg-[#060D2E] text-white w-64 transition-all duration-300 flex flex-col h-screen z-50; }
    .sidebar.collapsed { @apply w-20; }
    .main-workspace { @apply flex-1 flex flex-col h-screen overflow-y-auto custom-scroll; }
    .glass-card { @apply bg-white border border-slate-100 rounded-[32px] shadow-sm hover:shadow-xl transition-all duration-500; }
    .nav-link { @apply flex items-center gap-4 px-6 py-4 transition-all cursor-pointer text-slate-400 hover:text-white border-l-4 border-transparent; }
    .nav-link.active { @apply bg-white/5 text-white border-red-600; }
    
    /* Comparador de 3 Columnas */
    .lyrics-row { display: grid; grid-template-columns: 1fr 1fr; @apply gap-8 p-6 border-b border-slate-50 transition-all; }
    .lyrics-row:hover { @apply bg-blue-50/50; }

    .custom-scroll::-webkit-scrollbar { width: 4px; }
    .custom-scroll::-webkit-scrollbar-thumb { @apply bg-slate-200 rounded-full; }
  </style>
</head>
<body class="flex">

  <!-- SIDEBAR (IZQUIERDA) -->
  <aside id="sidebar" class="sidebar">
    <div class="p-8 mb-6 flex justify-between items-center">
        <h1 class="text-xl font-black italic tracking-tighter sidebar-text">Sonar<span class="text-blue-400">IA</span></h1>
        <button onclick="toggleSidebar()" class="text-slate-500 hover:text-white">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
    </div>
    <nav class="flex-1 space-y-1">
        <div class="nav-link active"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg> <span class="sidebar-text font-bold text-xs uppercase tracking-widest">Radar de Aula</span></div>
        <div class="nav-link"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13"></path></svg> <span class="sidebar-text font-bold text-xs uppercase tracking-widest">Planificación</span></div>
    </nav>
    <div class="p-8 mt-auto border-t border-white/5 flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-black text-xs">MP</div>
        <div class="sidebar-text"><p class="text-xs font-bold leading-none">Mauricio P.</p><p class="text-[9px] text-slate-500 font-black uppercase mt-1">Plan School</p></div>
    </div>
  </aside>

  <!-- ÁREA DE TRABAJO -->
  <main class="main-workspace">
    
    <!-- TOPBAR FIX (Z-JERARQUÍA) -->
    <header class="bg-white/70 backdrop-blur-md border-b border-slate-100 px-12 py-6 flex justify-between items-center sticky top-0 z-40">
        <div><h2 class="text-2xl font-black tracking-tight italic uppercase text-[#060D2E]">Performance Center</h2></div>
        <div id="clock" class="text-right text-slate-400 font-bold tabular-nums">
            <span id="time" class="text-lg">00:00</span>
        </div>
    </header>

    <div class="max-w-6xl mx-auto p-12 w-full space-y-10">
        
        <!-- ENTRADA -->
        <section class="glass-card p-10 border-b-[12px] border-blue-600">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                <input id="titulo" type="text" placeholder="Imagine..." class="w-full p-4 bg-slate-50 rounded-2xl font-bold text-lg border-transparent focus:bg-white focus:ring-8 focus:ring-blue-100 transition-all outline-none">
                <input id="artista" type="text" placeholder="John Lennon..." class="w-full p-4 bg-slate-50 rounded-2xl font-bold text-lg border-transparent focus:bg-white focus:ring-8 focus:ring-blue-100 transition-all outline-none">
            </div>
            <button id="analyzeBtn" class="w-full py-5 bg-[#060D2E] text-white rounded-[24px] font-black text-lg hover:bg-blue-600 transition-all italic">Analizar e Iniciar Inteligencia Artística</button>
        </section>

        <!-- RESULTADOS -->
        <div id="resultsWrapper" class="hidden space-y-10 pb-32">
            
            <!-- KPIs -->
            <div id="statusHero" class="glass-card p-12 border-t-[20px] flex flex-col md:flex-row justify-between items-center gap-10 bg-white">
                <div class="flex-1">
                    <span id="resPill" class="px-3 py-1 bg-slate-100 rounded-full text-[10px] font-black uppercase text-slate-500 mb-4 inline-block italic">—</span>
                    <h3 id="summaryTitle" class="text-5xl font-black tracking-tighter leading-tight italic">—</h3>
                    <p id="oaLabel" class="text-blue-600 font-bold mt-4 text-sm uppercase tracking-widest"></p>
                </div>
                <div class="text-right">
                    <div class="text-[90px] font-black tracking-tighter italic text-[#060D2E] leading-none" id="riskValue">0%</div>
                    <p class="text-[10px] font-black text-red-600 uppercase tracking-widest mt-2">Riesgo Escolar Detectado</p>
                </div>
            </div>

            <!-- ESTRATEGIA -->
            <div class="glass-card p-10 bg-slate-900 text-white flex flex-col md:flex-row gap-10 items-center">
                <div class="w-16 h-16 rounded-2xl bg-blue-600 flex items-center justify-center font-black text-2xl italic shadow-lg shadow-blue-500/20 shrink-0">OA</div>
                <div>
                    <h4 class="text-[10px] font-black uppercase text-slate-500 tracking-widest mb-2">Justificación Pedagógica</h4>
                    <p id="oaDesc" class="text-sm font-bold text-slate-300 italic mb-4"></p>
                    <p id="preguntaDesafio" class="text-2xl font-black text-white leading-tight italic"></p>
                </div>
            </div>

            <!-- COMPARADOR -->
            <div class="glass-card overflow-hidden">
                <div class="p-8 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                    <span class="text-[10px] font-black uppercase tracking-widest italic text-slate-400 italic">Sincronización Artística (v12)</span>
                    <button class="bg-blue-600 text-white px-6 py-2 rounded-xl text-[10px] font-black uppercase">Descargar Informe UTP</button>
                </div>
                <div id="lyricsContainer" class="bg-white"></div>
            </div>

        </div>

        <!-- PLACEHOLDER -->
        <div id="placeholder" class="h-96 flex flex-col items-center justify-center border-4 border-dashed border-slate-200 rounded-[48px] text-slate-200 text-center">
            <h3 class="text-3xl font-black uppercase italic tracking-tighter">SonarIA Ready</h3>
        </div>

    </div>
  </main>

  <script>
    const API_BASE = "https://sonaria-api-test.onrender.com";
    const $ = id => document.getElementById(id);

    function toggleSidebar() {
        const s = $("sidebar");
        const texts = document.querySelectorAll(".sidebar-text");
        s.classList.toggle("collapsed");
        texts.forEach(t => t.classList.toggle("hidden"));
    }

    async function analizar() {
        const btn = $("analyzeBtn");
        if (!$("titulo").value) return alert("Indica la obra");
        btn.disabled = true; btn.innerHTML = `<span class="animate-pulse italic">Escaneando...</span>`;

        try {
            const res = await fetch(`${API_BASE}/api/analizar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem("mejoraria_token") },
                body: JSON.stringify({ titulo: $("titulo").value, artista: $("artista").value })
            });
            const raw = await res.json();
            const data = raw.data; // Desempaquetamos de 'data' enviado por el backend
            
            $("placeholder").classList.add("hidden");
            $("resultsWrapper").classList.remove("hidden");
            
            // Render semáforo
            const hero = $("statusHero");
            hero.style.borderColor = data.color === "green" ? "#22c55e" : data.color === "orange" ? "#f97316" : "#ef4444";
            
            $("riskValue").innerText = data.risk_percent + "%";
            $("summaryTitle").innerText = data.resultado;
            $("resPill").innerText = data.resultado;
            $("oaLabel").innerText = data.oa;
            $("oaDesc").innerText = data.oa_desc;
            $("preguntaDesafio").innerText = `"${data.pregunta}"`;

            $("lyricsContainer").innerHTML = data.letra_comparada.map(l => `
                <div class="lyrics-row group">
                    <div class="text-[11px] text-slate-300 italic group-hover:text-blue-400 transition-all">${l.original}</div>
                    <div class="text-[11px] font-bold ${l.changed ? 'text-blue-600' : 'text-slate-800'} italic transition-all">${l.adapted}</div>
                </div>
            `).join('');

            $("resultsWrapper").scrollIntoView({ behavior: 'smooth' });

        } catch(e) { alert("Error de comunicación"); }
        finally { btn.disabled = false; btn.innerText = "Analizar e Iniciar Inteligencia Artística"; }
    }

    function time() {
        $("time").innerText = new Date().toLocaleTimeString('es-CL', {hour:'2-digit', minute:'2-digit'});
    }
    setInterval(time, 1000); time();
    $("analyzeBtn").onclick = analizar;
  </script>
</body>
</html>
