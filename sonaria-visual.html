<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SonarIA Pro | Desktop Suite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; @apply bg-black text-slate-300; overflow: hidden; }
    .sidebar { @apply w-64 bg-black flex flex-col h-screen fixed left-0 top-0 z-[100] transition-all duration-500 p-2 border-r border-white/5; }
    .main-view { @apply ml-64 bg-[#121212] rounded-lg mt-2 mr-2 h-[calc(100vh-112px)] overflow-y-auto custom-scroll relative transition-all; }
    .safety-player { @apply fixed bottom-0 left-0 right-0 h-24 bg-black border-t border-white/5 px-8 flex items-center justify-between z-[110]; }
    .glass-card { @apply bg-white/5 border border-white/10 rounded-[32px] p-10 transition-all duration-500 hover:bg-white/[0.08]; }
    .mirror-row { display: grid; grid-template-columns: 1fr 1fr 1.2fr; @apply gap-10 p-6 border-b border-white/5 transition-all items-center; }
    .mirror-row:hover { @apply bg-white/5 scale-[1.01]; }
    mark { @apply bg-yellow-400 text-black px-1.5 rounded-md font-black; }
    .risk-bar-fill { @apply h-full transition-all duration-[2s] ease-out shadow-[0_0_20px_rgba(37,99,235,0.4)]; }
    .custom-scroll::-webkit-scrollbar { width: 5px; }
    .custom-scroll::-webkit-scrollbar-thumb { @apply bg-white/10 rounded-full; }
  </style>
</head>
<body class="antialiased select-none">

  <!-- SIDEBAR (SPOTIFY STYLE) -->
  <aside class="sidebar">
    <div class="p-6 mb-6">
        <h1 class="text-2xl font-[950] tracking-tighter italic text-blue-500">SonarIA</h1>
    </div>
    <nav class="flex-1 space-y-1">
        <div onclick="switchView('radar', this)" class="flex items-center gap-4 px-6 py-3 rounded-xl text-white bg-white/5 cursor-pointer font-bold text-sm"><i data-lucide="radar"></i> Radar de Aula</div>
        <div onclick="switchView('pedagogy', this)" class="flex items-center gap-4 px-6 py-3 rounded-xl text-slate-400 hover:text-white cursor-pointer font-bold text-sm transition-all"><i data-lucide="graduation-cap"></i> Inteligencia</div>
        <div onclick="switchView('sync', this)" class="flex items-center gap-4 px-6 py-3 rounded-xl text-slate-400 hover:text-white cursor-pointer font-bold text-sm transition-all"><i data-lucide="languages"></i> Sincro & Letra</div>
    </nav>
    <div class="mt-auto p-4 bg-white/5 rounded-2xl m-2 flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-black text-white">M</div>
        <div class="text-[10px] font-bold"><p class="text-white italic">Mauricio P.</p><p class="text-slate-500 uppercase">Plan School</p></div>
    </div>
  </aside>

  <!-- MAIN WORKSPACE -->
  <main class="main-view custom-scroll">
    <header class="sticky top-0 bg-[#121212]/90 backdrop-blur-md px-12 py-8 flex justify-between items-center z-40 border-b border-white/5">
        <h2 id="viewTitle" class="text-xl font-black uppercase tracking-widest italic opacity-40">Radar de Aula</h2>
        <button class="bg-blue-600 text-white px-6 py-2 rounded-full font-black text-[10px] uppercase tracking-widest shadow-xl">Pro Active</button>
    </header>

    <div class="p-12 max-w-6xl mx-auto space-y-12">
        <!-- RADAR SECTION -->
        <div id="view-radar" class="block animate-in space-y-12">
            <div class="glass-card border-b-8 border-blue-600">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    <input id="titulo" type="text" placeholder="Imagine - John Lennon" class="bg-white/5 p-5 rounded-2xl font-bold text-xl outline-none focus:ring-4 focus:ring-blue-900 border-none text-white">
                    <button id="analyzeBtn" class="bg-white text-black py-5 rounded-[24px] font-[900] text-lg hover:scale-105 transition-all italic">Analizar e Iniciar Sincro</button>
                </div>
            </div>
            
            <div id="bigStatus" class="hidden glass-card p-12 border-t-[20px] flex justify-between items-center">
                <div class="flex-1">
                    <span id="resPill" class="px-4 py-1.5 bg-white/5 rounded-full text-[10px] font-black uppercase text-slate-500 mb-6 inline-block italic">—</span>
                    <h3 id="summaryTitle" class="text-6xl font-black tracking-tighter italic text-white">—</h3>
                </div>
                <div class="text-right"><div class="text-[110px] font-black italic tracking-tighter text-white/10 leading-none" id="riskBig">0%</div><p class="text-[10px] font-black text-slate-500 uppercase tracking-widest italic">Riesgo Escolar</p></div>
            </div>
        </div>

        <!-- SYNC SECTION -->
        <div id="view-sync" class="hidden space-y-8">
            <div class="glass-card !p-0 overflow-hidden">
                <div class="p-8 bg-white/5 flex justify-between items-center border-b border-white/5">
                    <h4 class="text-[10px] font-black uppercase tracking-[0.4em] text-slate-500 italic">Comparativa Métrica v22</h4>
                    <span class="px-4 py-1.5 bg-green-500/20 text-green-400 rounded-xl text-[9px] font-black uppercase tracking-widest">Métrica OK</span>
                </div>
                <div id="lyricsContainer" class="bg-black/20"></div>
            </div>
        </div>

        <!-- PEDAGOGY SECTION -->
        <div id="view-pedagogy" class="hidden space-y-12">
            <div class="grid grid-cols-2 gap-10">
                <div class="glass-card"><h4 class="text-blue-500 font-black text-[10px] uppercase mb-6 italic">Planificación por OA</h4><p id="oaLabel" class="text-3xl font-black text-white italic mb-2 leading-none"></p><p id="oaDesc" class="text-sm font-bold text-slate-400 italic"></p></div>
                <div class="glass-card bg-[#060D2E] text-white flex flex-col justify-center"><span class="text-[10px] font-black text-blue-400 uppercase mb-4 italic">Sugerencia de Aula:</span><p id="preguntaDesafio" class="text-2xl font-black italic leading-tight italic"></p></div>
            </div>
        </div>
    </div>
  </main>

  <!-- SAFETY PLAYER -->
  <footer class="safety-player">
    <div class="flex items-center gap-4 w-[30%]">
        <div id="miniStatus" class="w-14 h-14 bg-white/5 rounded-lg flex items-center justify-center font-black text-xs italic text-white/10 shadow-inner">S</div>
        <div class="overflow-hidden"><p id="playingTitle" class="font-black text-sm truncate text-white uppercase italic">Esperando Análisis</p><p id="playingResult" class="text-[10px] text-slate-500 font-black uppercase italic">—</p></div>
    </div>
    <div class="flex flex-col items-center gap-3 w-[40%]">
        <span class="text-[10px] font-black italic text-slate-500 uppercase tracking-widest">Monitor de Seguridad Persistente</span>
        <div class="w-full flex items-center gap-4"><span class="text-[9px] font-bold text-slate-600">0%</span><div class="flex-1 h-1.5 bg-white/5 rounded-full overflow-hidden"><div id="riskBar" class="risk-bar-fill w-0 bg-blue-600 shadow-[0_0_15px_#3b82f6]"></div></div><span class="text-[9px] font-bold text-slate-600">100%</span></div>
    </div>
    <div class="flex items-center justify-end gap-6 w-[30%] text-slate-500 italic font-black text-[10px] uppercase tracking-widest">v22.0 Sovereign Sync</div>
  </footer>

  <script>
    lucide.createIcons();
    const API_BASE = "https://sonaria-api-test.onrender.com";
    const $ = id => document.getElementById(id);

    function switchView(viewName, el) {
        document.querySelectorAll('[id^="view-"]').forEach(v => v.classList.add('hidden'));
        $(`view-${viewName}`).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active', 'text-white', 'bg-white/5'));
        el.classList.add('active', 'text-white', 'bg-white/5');
        $("viewTitle").innerText = viewName.toUpperCase();
    }

    async function analizar() {
        const btn = $("analyzeBtn");
        btn.disabled = true; btn.innerHTML = `<span class="animate-pulse">ESCANEANDO...</span>`;
        try {
            const res = await fetch(`${API_BASE}/api/analizar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem("mejoraria_token") },
                body: JSON.stringify({ titulo: $("titulo").value, artista: "" })
            });
            const raw = await res.json();
            renderDashboard(raw.data);
        } catch(e) { alert("Error"); }
        finally { btn.disabled = false; btn.innerText = "Analizar e Iniciar Sincro"; }
    }

    function renderResult(data) {
        $("bigStatus").classList.remove("hidden");
        $("summaryTitle").innerText = data.resultado;
        $("resPill").innerText = data.resultado;
        $("riskBig").innerText = data.risk_percent + "%";
        
        // El "Player"
        $("playingTitle").innerText = data.titulo;
        $("playingResult").innerText = data.resultado;
        $("riskBar").style.width = data.risk_percent + "%";
        $("riskBar").className = `risk-bar-fill h-full transition-all duration-[2s] bg-${data.color}-500`;
        
        // Pedagogía
        $("oaLabel").innerText = data.oa.oa;
        $("oaDesc").innerText = data.oa.desc;
        $("preguntaDesafio").innerText = `"${data.pregunta}"`;

        // Letras
        $("lyricsContainer").innerHTML = data.letra_comparada.map(l => `
            <div class="mirror-row group">
                <div class="original text-[10px] italic group-hover:text-blue-400 transition-all">${l.original}</div>
                <div class="adapted font-black text-sm ${l.changed ? 'text-blue-400' : 'text-slate-100'} transition-all italic">${l.changed ? `<mark>${l.adapted}</mark>` : l.adapted}</div>
            </div>
        `).join('');
    }
    $("analyzeBtn").onclick = analizar;
  </script>
</body>
</html>
