<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SonarIA | Sovereign Workspace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; @apply bg-[#F3F5F9] text-slate-900; overflow: hidden; }
    .sidebar { @apply bg-[#060D2E] text-slate-400 transition-all duration-500 flex flex-col h-screen fixed left-0 z-50 shadow-2xl w-20 hover:w-72; }
    .nav-item { @apply flex items-center gap-4 px-6 py-4 hover:bg-white/5 hover:text-white transition-all cursor-pointer border-l-4 border-transparent font-bold text-sm; }
    .nav-item.active { @apply bg-white/5 text-white border-[#E10600]; }
    .nav-label { @apply opacity-0 group-hover:opacity-100 transition-opacity duration-300 whitespace-nowrap; }
    
    .workspace { @apply ml-20 transition-all duration-500 h-screen overflow-y-auto p-12 bg-white/50 backdrop-blur-sm; }
    .glass-card { @apply bg-white border border-slate-200 rounded-[40px] shadow-sm hover:shadow-xl transition-all duration-500; }
    
    /* 3 Columnas Pro */
    .lyrics-row { display: grid; grid-template-columns: 1fr 1fr 1.2fr; @apply gap-10 p-6 border-b border-slate-50 transition-all items-center rounded-3xl; }
    .lyrics-row:hover { @apply bg-blue-50/50 scale-[1.01]; }
    
    .custom-scroll::-webkit-scrollbar { width: 4px; }
    .custom-scroll::-webkit-scrollbar-thumb { @apply bg-slate-200 rounded-full; }
  </style>
</head>
<body class="antialiased">

  <div class="flex">
    
    <!-- SIDEBAR INTELIGENTE -->
    <aside id="sidebar" class="sidebar group">
        <div class="p-8 mb-6 flex items-center">
            <div class="w-10 h-10 bg-[#E10600] rounded-2xl flex items-center justify-center text-white italic font-black text-xl shadow-lg shrink-0">S</div>
            <span class="nav-label ml-4 text-xl font-black text-white italic">SonarIA</span>
        </div>

        <nav class="flex-1 space-y-1">
            <div onclick="showTab('radar')" class="nav-item active"><svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg> <span class="nav-label">Radar</span></div>
            <div onclick="showTab('pedagogy')" class="nav-item"><svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13"></path></svg> <span class="nav-label">Pedagogía</span></div>
            <div onclick="showTab('lyrics')" class="nav-item"><svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10"></path></svg> <span class="nav-label">Letras Sync</span></div>
            <div onclick="showTab('setup')" class="nav-item"><svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5"></path></svg> <span class="nav-label">Mi Colegio</span></div>
        </nav>

        <div class="p-6 mt-auto">
            <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center text-white font-black text-xs shadow-lg">MP</div>
        </div>
    </aside>

    <!-- ÁREA DE TRABAJO -->
    <main class="workspace flex-1">
        
        <header class="flex justify-between items-end mb-16 px-4">
            <div>
                <h2 id="viewTitle" class="text-4xl font-[950] tracking-tighter text-[#060D2E] uppercase italic leading-none">Radar de Aula</h2>
                <p class="text-slate-400 font-bold text-[10px] uppercase tracking-[0.5em] mt-2 italic italic">Performance Center v15.0</p>
            </div>
            <div class="flex gap-4">
                <div class="glass-card px-6 py-2 flex items-center gap-3">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_#22c55e]"></span>
                    <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Motor Online</span>
                </div>
            </div>
        </header>

        <div class="max-w-6xl mx-auto space-y-12">
            
            <!-- SECCIONES DINÁMICAS -->
            <div id="radarTab" class="tab-content animate-fade-in">
                <div class="glass-card p-12 border-b-[16px] border-blue-600">
                    <div class="grid grid-cols-2 gap-8">
                        <input id="titulo" type="text" placeholder="Canción..." class="p-5 bg-slate-50 rounded-2xl font-bold text-xl outline-none focus:ring-8 focus:ring-blue-50 transition-all">
                        <input id="artista" type="text" placeholder="Artista..." class="p-5 bg-slate-50 rounded-2xl font-bold text-xl outline-none focus:ring-8 focus:ring-blue-50 transition-all">
                    </div>
                    <button id="analyzeBtn" class="w-full mt-10 py-6 bg-[#060D2E] text-white rounded-[32px] font-black text-lg hover:bg-[#E10600] shadow-2xl active:scale-95 transition-all italic">Analizar y Generar Pack</button>
                </div>
            </div>

            <!-- RESULTADOS DASHBOARD -->
            <div id="resultsArea" class="hidden space-y-12">
                
                <!-- KPI CARD -->
                <div class="glass-card p-12 border-t-[24px] border-[#060D2E] flex justify-between items-center bg-white relative overflow-hidden">
                    <div class="relative z-10">
                        <h3 id="summaryTitle" class="text-6xl font-black tracking-tighter italic text-[#060D2E] mb-4">Analizando</h3>
                        <div class="flex gap-10">
                            <div><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Riesgo Escolar</p><div class="text-5xl font-black italic" id="riskValue">0%</div></div>
                            <div class="border-l border-slate-100 pl-10"><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Edad Mínima</p><div class="text-5xl font-black italic">6+</div></div>
                        </div>
                    </div>
                    <div class="w-32 h-32 rounded-[40px] bg-slate-50 flex items-center justify-center shadow-inner"><svg class="w-16 h-16 text-[#060D2E]/20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>
                </div>

                <!-- LINGUISTIC MIRROR -->
                <div id="lyricsTab" class="glass-card overflow-hidden">
                    <div class="p-8 bg-[#060D2E] text-white flex justify-between items-center">
                        <h4 class="text-[10px] font-black uppercase tracking-[0.5em]">Comparativa Artística (Original | Aula | Significado)</h4>
                    </div>
                    <div id="lyricsContainer" class="bg-white max-h-[600px] overflow-y-auto p-4 custom-scroll italic"></div>
                </div>

                <!-- PEDAGOGÍA -->
                <div id="pedagogyTab" class="glass-card p-12 bg-white border-blue-100">
                    <div class="grid grid-cols-2 gap-16">
                        <div class="space-y-8">
                            <div><span class="text-[10px] font-black text-blue-400 uppercase block mb-2">OA MINEDUC</span><p id="oaLabel" class="text-3xl font-black text-[#060D2E] italic"></p></div>
                            <div><span class="text-[10px] font-black text-blue-400 uppercase block mb-2">Actividad</span><p id="actividad" class="text-sm font-bold text-slate-500 leading-relaxed"></p></div>
                        </div>
                        <div class="bg-[#060D2E] p-10 rounded-[40px] text-white shadow-2xl">
                            <span class="text-[10px] font-black text-[#E10600] uppercase block mb-4 italic tracking-widest">Pregunta Desafiante:</span>
                            <p id="preguntaDesafio" class="text-2xl font-black italic leading-tight"></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- PLACEHOLDER -->
            <div id="placeholder" class="h-96 flex items-center justify-center border-4 border-dashed border-slate-200 rounded-[48px] text-slate-200 font-black text-2xl uppercase tracking-tighter">
                SonarIA Ready for Analysis
            </div>
        </div>
    </main>
  </div>

  <script>
    const API_BASE = "https://sonaria-api-test.onrender.com";
    const $ = id => document.getElementById(id);

    async function analizar() {
        const btn = $("analyzeBtn");
        btn.disabled = true; btn.innerHTML = `<span class="animate-pulse italic uppercase tracking-tighter">Ejecutando Inteligencia...</span>`;

        try {
            const res = await fetch(`${API_BASE}/api/analizar/v15`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ titulo: $("titulo").value, artista: $("artista").value, curso: "7B" })
            });
            const data = await res.json();
            renderDashboard(data);
        } catch(e) { alert("Error de Sincronización"); }
        finally { btn.disabled = false; btn.innerText = "Analizar y Generar Pack"; }
    }

    function renderDashboard(data) {
        $("placeholder").classList.add("hidden");
        $("resultsArea").classList.remove("hidden");
        
        $("summaryTitle").innerText = data.pedagogy.seguridad > 70 ? "Apta para Aula" : "Mediación Requerida";
        $("riskValue").innerText = (100 - data.pedagogy.seguridad) + "%";
        $("oaLabel").innerText = data.pedagogy.oa;
        $("actividad").innerText = data.pedagogy.actividad_teorica;
        $("preguntaDesafio").innerText = `"${data.pedagogy.pregunta}"`;

        $("lyricsContainer").innerHTML = data.comparativa.map(l => `
            <div class="lyrics-row group">
                <div class="text-[10px] text-slate-300 italic group-hover:text-blue-500 transition-all">${l.original}</div>
                <div class="text-[11px] font-black ${l.changed ? 'text-[#E10600]' : 'text-slate-800'} transition-all">${l.adapted}</div>
                <div class="text-[10px] text-slate-400 font-bold opacity-60 uppercase italic">Referencia Pedagógica</div>
            </div>
        `).join('');
    }

    function showTab(tab) {
        // Lógica para cambio de vistas en SPA
        $("viewTitle").innerText = tab.toUpperCase();
    }

    $("analyzeBtn").onclick = analizar;
  </script>
</body>
</html>
