<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonarIA | Cockpit Master v35.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #001739; color: #001739; }
        .f1-gradient { background: linear-gradient(135deg, #001739 0%, #002b66 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .orange-glow { box-shadow: 0 10px 25px -5px rgba(255, 135, 0, 0.3); }
        .btn-animate { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-animate:active { transform: scale(0.96); }
        
        /* Layout fix for wide screens */
        @media (min-width: 1024px) {
            .main-grid { height: calc(100vh - 80px); overflow: hidden; }
            .scroll-area { overflow-y: auto; height: 100%; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,135,0,0.3); border-radius: 10px; }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <!-- HEADER ELEGANTE Y VISIBLE -->
    <header class="h-20 f1-gradient text-white px-8 shadow-2xl flex justify-between items-center shrink-0 border-b border-white/10">
        <div class="flex items-center gap-4">
            <div class="bg-orange-500 p-2.5 rounded-xl shadow-lg">
                <i data-lucide="waveform" class="text-white w-6 h-6"></i>
            </div>
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter leading-none uppercase">Sonar<span class="text-orange-500">IA</span></h1>
                <span id="plan-label" class="text-[10px] font-black tracking-[0.3em] text-orange-500 uppercase">Cuenta Pro Activa</span>
            </div>
        </div>
        
        <div class="flex items-center gap-6">
            <div id="user-info" class="text-right border-r border-white/10 pr-6 hidden md:block">
                <div id="user-mail" class="text-xs font-black italic opacity-80">maunpb45@gmail.com</div>
                <div class="text-[9px] font-bold text-blue-300 uppercase tracking-widest">Workspace Docente</div>
            </div>
            <button onclick="SonarIA.logout()" class="bg-red-500/10 hover:bg-red-500/20 p-3 rounded-full transition-all text-red-400 border border-red-500/20">
                <i data-lucide="log-out" class="w-5 h-5"></i>
            </button>
        </div>
    </header>

    <!-- CONTENEDOR PRINCIPAL: EL COCKPIT -->
    <main class="flex-grow main-grid grid grid-cols-1 lg:grid-cols-12 gap-0">
        
        <!-- COLUMNA IZQUIERDA: CONTROL (Fija en Desktop) -->
        <aside class="lg:col-span-4 p-6 lg:p-8 scroll-area bg-slate-50/50 border-r border-slate-200">
            <div class="space-y-6">
                <!-- MI AULA -->
                <section class="glass-card rounded-[2.5rem] p-8 shadow-xl">
                    <div class="flex items-center gap-3 mb-6">
                        <i data-lucide="layout-grid" class="text-orange-500 w-5 h-5"></i>
                        <h2 class="text-sm font-black uppercase tracking-widest text-slate-500 italic italic">Mi Aula</h2>
                    </div>
                    <div id="grid-cursos" class="grid grid-cols-3 gap-2"></div>
                </section>

                <!-- ANALIZADOR -->
                <section class="glass-card rounded-[2.5rem] p-8 shadow-xl relative overflow-hidden">
                    <h2 class="text-2xl font-black italic uppercase tracking-tighter mb-8">Análisis</h2>
                    <div class="space-y-4">
                        <div class="group">
                            <label class="text-[10px] font-black uppercase text-slate-400 ml-4 mb-1 block tracking-widest italic italic">Obra</label>
                            <input id="in-titulo" type="text" placeholder="Ej: Creep" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold focus:border-orange-500 outline-none transition-all">
                        </div>
                        <div class="group">
                            <label class="text-[10px] font-black uppercase text-slate-400 ml-4 mb-1 block tracking-widest italic italic">Artista</label>
                            <input id="in-artista" type="text" placeholder="Ej: Radiohead" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold focus:border-orange-500 outline-none transition-all">
                        </div>
                        <button onclick="SonarIA.analyze()" class="w-full f1-gradient text-white p-6 rounded-3xl font-black uppercase italic tracking-tighter text-xl orange-glow btn-animate flex items-center justify-center gap-3 mt-4">
                            <i data-lucide="zap" class="text-orange-500 fill-orange-500"></i> ANALIZAR
                        </button>
                    </div>
                    
                    <div id="loader" class="hidden absolute inset-0 bg-white/95 backdrop-blur-md z-20 flex flex-col items-center justify-center p-8 text-center">
                        <div class="w-16 h-1 bg-orange-500 rounded-full mb-4 animate-pulse"></div>
                        <h4 class="text-lg font-black italic uppercase tracking-tighter animate-pulse text-[#001739]">Escaneando...</h4>
                    </div>
                </section>
                
                <div class="p-4 text-center">
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest italic opacity-50 italic">SonarIA v35.3 Powered by Pedagogy AI</p>
                </div>
            </div>
        </aside>

        <!-- COLUMNA DERECHA: RESULTADOS (Scrollable) -->
        <section class="lg:col-span-8 p-6 lg:p-10 scroll-area space-y-8 bg-blue-900/5">
            
            <!-- RESULTADO RÁPIDO (GRID) -->
            <div id="sec-diag" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- DIAGNÓSTICO -->
                <div class="md:col-span-2 glass-card rounded-[3rem] p-10 shadow-xl flex flex-col justify-center min-h-[240px]">
                    <div id="diag-empty" class="text-center py-6">
                        <p class="text-slate-300 font-bold italic text-xl italic">Dashboard en espera...</p>
                    </div>
                    <div id="diag-content" class="hidden">
                        <span class="px-4 py-1 rounded-full bg-orange-500 text-white text-[10px] font-black uppercase mb-4 inline-block shadow-lg">Diagnóstico de Aula</span>
                        <h3 id="res-resultado" class="text-6xl font-black tracking-tighter text-[#001739] mb-4 uppercase italic leading-none">--</h3>
                        <p id="res-just" class="text-slate-600 font-medium italic border-l-4 border-orange-500 pl-6 text-lg"></p>
                    </div>
                </div>
                <!-- RIESGO -->
                <div class="glass-card rounded-[3rem] p-10 shadow-xl flex flex-col items-center justify-center text-center border-orange-500/20 border-2">
                    <div class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-2 italic">Riesgo Escolar</div>
                    <div id="res-risk" class="text-7xl font-black text-[#001739] tracking-tighter">0%</div>
                </div>
            </div>

            <!-- ADAPTACIÓN Y LETRA -->
            <section id="sec-canvas" class="hidden glass-card rounded-[3rem] overflow-hidden shadow-xl animate-in fade-in slide-in-from-bottom-10 duration-700">
                <div class="flex bg-slate-50 border-b border-slate-100 p-1">
                    <button onclick="SonarIA.tab('adapt')" id="tab-adapt" class="flex-1 py-4 text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 transition-all rounded-2xl">Adaptación Pro</button>
                    <button onclick="SonarIA.tab('trans')" id="tab-trans" class="flex-1 py-4 text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 transition-all rounded-2xl">Traducción</button>
                    <button onclick="SonarIA.tab('orig')" id="tab-orig" class="flex-1 py-4 text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 transition-all rounded-2xl">Original</button>
                </div>
                <div class="p-10 lg:p-16">
                    <div id="res-adapt" class="text-xl font-bold text-slate-800 leading-relaxed whitespace-pre-wrap max-w-2xl mx-auto"></div>
                    <div id="res-trans" class="hidden text-xl italic text-slate-700 leading-relaxed whitespace-pre-wrap max-w-2xl mx-auto"></div>
                    <div id="res-orig" class="hidden text-sm text-slate-400 font-medium leading-relaxed whitespace-pre-wrap italic opacity-60 max-w-2xl mx-auto"></div>
                </div>
            </section>

            <!-- RUTA PEDAGÓGICA -->
            <section id="sec-plan" class="hidden glass-card rounded-[3rem] p-10 shadow-xl animate-in fade-in slide-in-from-bottom-10 duration-1000">
                <div class="flex items-center gap-4 mb-8">
                    <div class="bg-emerald-500 text-white p-3 rounded-2xl shadow-lg">
                        <i data-lucide="graduation-cap" class="w-6 h-6"></i>
                    </div>
                    <h3 class="text-2xl font-black italic uppercase tracking-tighter">Ruta Curricular Mineduc</h3>
                </div>
                <div id="plan-tabs" class="flex gap-2 mb-8 overflow-x-auto pb-4 no-scrollbar"></div>
                <div id="plan-content" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
                
                <div class="mt-12 pt-8 border-t border-slate-100 flex justify-end">
                    <button onclick="SonarIA.downloadPdf()" class="bg-orange-500 text-white px-10 py-5 rounded-2xl font-black uppercase italic tracking-tighter text-sm flex items-center gap-3 orange-glow hover:bg-orange-600 transition-all btn-animate">
                        <i data-lucide="file-text"></i> EXPORTAR INFORME PDF
                    </button>
                </div>
            </section>
        </section>
    </main>

    <script>
        const API_URL = "https://sonaria-api-test.onrender.com";
        const COURSE_MAP = { "1° Básico":"1", "2° Básico":"2", "3° Básico":"3", "4° Básico":"4", "5° Básico":"5", "6° Básico":"6", "7° Básico":"7", "8° Básico":"8", "I° Medio":"1M", "II° Medio":"2M", "III° Medio":"3M", "IV° Medio":"4M" };

        window.SonarIA = {
            state: { 
                cursos: JSON.parse(localStorage.getItem('my_courses') || '["7", "8", "1M"]'), 
                user: JSON.parse(localStorage.getItem('sonaria_user') || '{"email":"maunpb45@gmail.com", "plan":"pro"}'), 
                lastData: null 
            },

            init() { 
                lucide.createIcons();
                this.renderCourses(); 
                document.getElementById('user-mail').innerText = this.state.user.email; 
            },

            renderCourses() { 
                const grid = document.getElementById('grid-cursos');
                grid.innerHTML = Object.keys(COURSE_MAP).map(c => `
                    <button onclick="SonarIA.toggleCourse('${c}')" class="p-3 rounded-xl border-2 text-[9px] font-black uppercase transition-all duration-300 ${this.state.cursos.includes(COURSE_MAP[c]) ? 'f1-gradient text-white border-transparent shadow-md' : 'bg-white text-slate-400 border-slate-100 hover:border-orange-200'}">
                    ${c}</button>`).join('');
            },

            toggleCourse(c) { 
                const code = COURSE_MAP[c];
                if(this.state.cursos.includes(code)) this.state.cursos = this.state.cursos.filter(x => x !== code); 
                else this.state.cursos.push(code); 
                localStorage.setItem('my_courses', JSON.stringify(this.state.cursos));
                this.renderCourses(); 
            },

            async analyze() {
                const t = document.getElementById('in-titulo').value.trim(); 
                if(!t) return alert("Indica el título de la canción.");
                document.getElementById('loader').classList.remove('hidden');
                try {
                    const res = await fetch(API_URL + "/analizar", { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (localStorage.getItem('sonaria_token') || '')}, 
                        body: JSON.stringify({ titulo: t, artista: document.getElementById('in-artista').value, cursos_seleccionados: this.state.cursos }) 
                    });
                    const data = await res.json();
                    if(data.ok) { 
                        this.state.lastData = data; 
                        this.showResults(data); 
                    } else { alert("Error de conexión: " + data.error); }
                } catch (e) { alert("Error de red."); }
                finally { document.getElementById('loader').classList.add('hidden'); }
            },

            showResults(data) {
                document.getElementById('diag-empty').classList.add('hidden');
                document.getElementById('diag-content').classList.remove('hidden');
                document.getElementById('sec-canvas').classList.remove('hidden');
                document.getElementById('sec-plan').classList.remove('hidden');

                document.getElementById('res-resultado').innerText = data.resultado;
                document.getElementById('res-risk').innerText = data.risk_percent + "%";
                // FIX PARA EL UNDEFINED:
                document.getElementById('res-just').innerText = data.justificacion || data.resumen || "Análisis completado para los niveles seleccionados.";
                
                document.getElementById('res-orig').innerText = data.original;
                document.getElementById('res-adapt').innerHTML = data.adaptada;
                document.getElementById('res-trans').innerText = data.traducida;
                
                this.tab('adapt');
                this.renderPlan(data.pedagogia);
            },

            tab(m) { 
                const modes = ['adapt', 'trans', 'orig'];
                modes.forEach(mode => {
                    const el = document.getElementById(`res-${mode}`);
                    const btn = document.getElementById(`tab-${mode}`);
                    if(mode === m) {
                        el.classList.remove('hidden');
                        btn.classList.add('bg-orange-500', 'text-white', 'shadow-lg');
                        btn.classList.remove('text-slate-400');
                    } else {
                        el.classList.add('hidden');
                        btn.classList.remove('bg-orange-500', 'text-white', 'shadow-lg');
                        btn.classList.add('text-slate-400');
                    }
                });
            },

            renderPlan(ped) {
                const tabs = document.getElementById('plan-tabs');
                if(!ped.por_curso.length) { 
                    document.getElementById('plan-content').innerHTML = `<p class="col-span-2 text-center text-slate-400 italic">No se requiere mediación específica.</p>`; 
                    tabs.innerHTML=""; return; 
                }
                tabs.innerHTML = ped.por_curso.map((p, i) => `
                    <button onclick="SonarIA.showPlan(${i})" 
                        class="plan-tab-btn px-6 py-3 border-2 rounded-2xl font-black uppercase text-[10px] transition-all min-w-[120px] ${i===0 ? 'f1-gradient text-white border-transparent shadow-lg' : 'bg-white text-slate-400 border-slate-100'}">
                        ${p.curso}° Básico</button>`).join('');
                this.showPlan(0);
            },

            showPlan(idx) {
                const p = this.state.lastData.pedagogia.por_curso[idx];
                document.querySelectorAll('.plan-tab-btn').forEach((btn, i) => {
                    if(i === idx) btn.className = "plan-tab-btn px-6 py-3 f1-gradient text-white border-transparent rounded-2xl font-black uppercase text-[10px] min-w-[120px] shadow-lg scale-105";
                    else btn.className = "plan-tab-btn px-6 py-3 bg-white text-slate-400 border-slate-100 border-2 rounded-2xl font-black uppercase text-[10px] min-w-[120px]";
                });

                document.getElementById('plan-content').innerHTML = `
                    <div class="bg-slate-50 p-8 rounded-[2rem] border border-slate-100 shadow-inner">
                        <h4 class="text-orange-500 font-black uppercase text-[10px] mb-4 tracking-[0.2em] italic">Eje Curricular (OA)</h4>
                        <p class="text-sm font-bold text-slate-700 leading-relaxed">${p.oa}</p>
                    </div>
                    <div class="f1-gradient text-white p-8 rounded-[2rem] shadow-xl">
                        <h4 class="text-orange-400 font-black uppercase text-[10px] mb-4 tracking-[0.2em] italic">Intervención Sugerida</h4>
                        <p class="text-sm font-medium italic text-blue-50 leading-relaxed">${p.actividades[0]}</p>
                    </div>`;
            },

            downloadPdf() { alert("Generando Informe Pro..."); },
            logout() { localStorage.clear(); window.location.href = "login.html"; }
        };

        SonarIA.init();
    </script>
</body>
</html>
