<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <title>Sovereign Trinity | SonarIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; background-color: #F3F4F6; }
        .f1-navy { background-color: #001739; }
        .nav-btn.active { border-right: 4px solid #FF8700; background: rgba(255, 135, 0, 0.08); color: #FF8700; font-weight: 900; }
        .section { display: none; height: 100%; }
        .section.active { display: block; animation: fadeIn 0.4s ease; }
        
        /* EL ESTILO DE LA ADAPTACIÓN PRO */
        mark { background-color: #FFEB3B; color: #000; padding: 0 2px; border-radius: 4px; font-weight: 900; }
        
        .tab-btn { padding: 10px 20px; font-weight: 800; border-bottom: 3px solid transparent; transition: 0.3s; color: #94a3b8; }
        .tab-btn.active { color: #FF8700; border-bottom-color: #FF8700; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .scroll-v::-webkit-scrollbar { width: 4px; }
        .scroll-v::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">
    <header class="h-16 f1-navy flex items-center justify-between px-8 text-white shrink-0 z-50">
        <h1 class="text-2xl font-black italic tracking-tighter italic">Sonar<span class="text-[#FF8700]">IA</span></h1>
        <button onclick="SonarIA.logout()" class="text-[10px] font-black uppercase text-[#FF8700]">Cerrar Sesión</button>
    </header>

    <div class="flex flex-grow overflow-hidden">
        <nav class="w-64 bg-white border-r flex flex-col shrink-0 z-40 shadow-xl">
            <div class="p-6 flex flex-col gap-2">
                <button onclick="SonarIA.nav('sec-config')" id="nav-sec-config" class="nav-btn active p-4 rounded-xl text-sm font-bold text-left italic">⚙️ Mis Cursos</button>
                <button onclick="SonarIA.nav('sec-analyze')" id="nav-sec-analyze" class="nav-btn p-4 rounded-xl text-sm font-bold text-left italic">🔍 Analizador</button>
                <button onclick="SonarIA.nav('sec-diag')" id="nav-sec-diag" class="nav-btn p-4 rounded-xl text-sm font-bold opacity-30 text-left" disabled>🚦 Diagnóstico</button>
                <button onclick="SonarIA.nav('sec-canvas')" id="nav-sec-canvas" class="nav-btn p-4 rounded-xl text-sm font-bold opacity-30 text-left" disabled>📝 Dual Canvas</button>
                <button onclick="SonarIA.nav('sec-plan')" id="nav-sec-plan" class="nav-btn p-4 rounded-xl text-sm font-bold opacity-30 text-left" disabled>📅 Planificación</button>
            </div>
        </nav>

        <main class="flex-grow p-8 overflow-hidden relative">
            
            <!-- CANVAS SECCIÓN (TRIPLE VISUALIZACIÓN) -->
            <div id="sec-canvas" class="section h-full pb-20">
                <div class="grid grid-cols-2 gap-8 h-full">
                    <!-- IZQUIERDA: ORIGINAL -->
                    <div class="bg-white rounded-[2.5rem] p-10 shadow-xl overflow-hidden border flex flex-col">
                        <h4 class="font-black uppercase mb-4 text-slate-400 tracking-widest text-xs">Letra Original</h4>
                        <div id="res-orig" class="flex-grow overflow-y-auto whitespace-pre-wrap italic scroll-v text-sm leading-relaxed text-slate-500"></div>
                    </div>

                    <!-- DERECHA: PRO / TRADUCCION CON TABS -->
                    <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border-4 border-orange-100 flex flex-col relative">
                        <div class="flex border-b bg-slate-50">
                            <button onclick="SonarIA.switchCanvas('adapt')" id="tab-adapt" class="tab-btn active">Adaptación PRO</button>
                            <button onclick="SonarIA.switchCanvas('trans')" id="tab-trans" class="tab-btn">Traducción</button>
                        </div>
                        
                        <div class="p-10 flex-grow overflow-hidden flex flex-col">
                            <!-- Aquí se inyecta la letra adaptada con los <mark> -->
                            <div id="res-adapt" class="flex-grow overflow-y-auto font-bold text-[#001739] scroll-v text-sm leading-relaxed"></div>
                            
                            <!-- Aquí la traducción -->
                            <div id="res-trans" class="hidden flex-grow overflow-y-auto text-[#001739] scroll-v text-sm leading-relaxed italic"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Otras secciones (Config, Analyze, Diag, Plan) se mantienen igual que v71 -->
            <div id="sec-config" class="section active">
                <div class="max-w-4xl mx-auto pt-10"><h2 class="text-5xl font-black border-l-8 border-[#FF8700] pl-6 text-[#001739] uppercase">Mi Aula</h2><div class="grid grid-cols-4 gap-4 mt-8" id="grid-cursos"></div><button onclick="SonarIA.saveConfig()" class="bg-[#FF8700] text-white px-10 py-5 rounded-2xl font-black mt-8 shadow-xl">Guardar Perfil →</button></div>
            </div>
            <div id="sec-analyze" class="section">
                <div class="max-w-2xl mx-auto py-10"><h2 class="text-4xl font-black text-[#001739] mb-8 uppercase italic">Analizar</h2><div class="bg-white p-10 rounded-[3rem] shadow-2xl space-y-6 border"><input id="in-titulo" type="text" placeholder="Canción" class="w-full bg-slate-50 border-2 rounded-2xl p-5 text-xl font-bold"><input id="in-artista" type="text" placeholder="Artista" class="w-full bg-slate-50 border-2 rounded-2xl p-5 text-xl font-bold"><button onclick="SonarIA.analyze()" class="w-full bg-[#001739] text-white p-6 rounded-2xl font-black uppercase tracking-widest">Analizar</button></div></div>
            </div>
            <div id="sec-diag" class="section"><div class="max-w-5xl mx-auto pt-10"><div class="bg-white rounded-[3.5rem] p-12 shadow-2xl flex justify-between items-center border"><div><h3 id="res-resultado" class="text-7xl font-black tracking-tighter text-[#001739]">--</h3><p id="res-just" class="text-slate-600 max-w-xl text-xl mt-4 font-medium"></p></div><div class="text-right"><div id="res-risk" class="text-[10rem] font-black text-[#001739]">0%</div></div></div></div></div>
            <div id="sec-plan" class="section pt-10"><div class="max-w-5xl mx-auto" id="plan-content"></div></div>

            <div id="loader" class="hidden absolute inset-0 bg-white/80 backdrop-blur-sm z-[60] flex flex-col items-center justify-center"><div class="w-1.5 h-24 bg-[#FF8700] animate-bounce"></div></div>
        </main>
    </div>

    <script>
        const API_URL = "https://sonaria-api-test.onrender.com";
        const COURSE_MAP = { "1° Básico":"1", "2° Básico":"2", "3° Básico":"3", "4° Básico":"4", "5° Básico":"5", "6° Básico":"6", "7° Básico":"7", "8° Básico":"8", "I° Medio":"1M", "II° Medio":"2M", "III° Medio":"3M", "IV° Medio":"4M" };

        window.SonarIA = {
            state: { cursos: JSON.parse(localStorage.getItem('my_courses') || '[]'), lastData: null },
            init() { this.renderCourses(); if(this.state.cursos.length === 0) this.nav('sec-config'); else this.nav('sec-analyze'); },
            renderCourses() { 
                const grid = document.getElementById('grid-cursos'); if(!grid) return;
                grid.innerHTML = Object.keys(COURSE_MAP).map(c => `<button onclick="SonarIA.toggleCourse('${c}')" class="p-4 rounded-xl border-2 text-[10px] font-black uppercase transition-all ${this.state.cursos.includes(c) ? 'bg-[#001739] text-white' : 'bg-white text-slate-400'}">${c}</button>`).join('');
            },
            toggleCourse(c) { if(this.state.cursos.includes(c)) this.state.cursos = this.state.cursos.filter(x => x !== c); else this.state.cursos.push(c); this.renderCourses(); },
            saveConfig() { localStorage.setItem('my_courses', JSON.stringify(this.state.cursos)); this.nav('sec-analyze'); },
            nav(id) { 
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                if(document.getElementById('nav-' + id)) document.getElementById('nav-' + id).classList.add('active');
            },
            switchCanvas(mode) {
                const isAdapt = mode === 'adapt';
                document.getElementById('res-adapt').classList.toggle('hidden', !isAdapt);
                document.getElementById('res-trans').classList.toggle('hidden', isAdapt);
                document.getElementById('tab-adapt').classList.toggle('active', isAdapt);
                document.getElementById('tab-trans').classList.toggle('active', !isAdapt);
            },
            async analyze() {
                const t = document.getElementById('in-titulo').value;
                const a = document.getElementById('in-artista').value;
                document.getElementById('loader').classList.remove('hidden');
                try {
                    const res = await fetch(API_URL + "/analizar", {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ titulo: t, artista: a, cursos_seleccionados: this.state.cursos.map(c => COURSE_MAP[c]) })
                    });
                    const data = await res.json();
                    if(data.ok) {
                        this.state.lastData = data;
                        document.getElementById('res-resultado').innerText = data.resultado.toUpperCase();
                        document.getElementById('res-risk').innerText = data.risk_percent + "%";
                        document.getElementById('res-orig').innerText = data.original;
                        
                        // IMPORTANTE: innerHTML para procesar los <mark>
                        document.getElementById('res-adapt').innerHTML = data.adaptada;
                        document.getElementById('res-trans').innerText = data.letra_traducida;

                        ['nav-sec-diag', 'nav-sec-canvas', 'nav-sec-plan'].forEach(id => {
                            document.getElementById(id).disabled = false;
                            document.getElementById(id).classList.remove('opacity-30');
                        });
                        this.nav('sec-diag');
                    }
                } catch (e) { alert("Error"); }
                finally { document.getElementById('loader').classList.add('hidden'); }
            },
            logout() { localStorage.clear(); window.location.href = "login-test.html"; }
        };
        SonarIA.init();
    </script>
</body>
</html>
