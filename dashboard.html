<header class="h-16 f1-navy flex items-center justify-between px-8 text-white z-50">
    <h1 class="text-2xl font-black italic tracking-tighter uppercase leading-none">Sonar<span class="text-[#FF8700]">IA</span></h1>
    <div class="flex items-center gap-6">
        <span id="plan-indicator" class="text-[9px] font-black uppercase tracking-widest text-slate-400 italic">Plan Pro Activo</span>
        <button onclick="SonarIA.logout()" class="text-[10px] font-black uppercase text-[#FF8700]">Salir</button>
    </div>
</header>

<div class="flex flex-grow overflow-hidden">
    <nav class="w-64 bg-white border-r flex flex-col shrink-0 z-40">
        <div class="p-6 flex flex-col gap-2 mt-4">
            <button onclick="SonarIA.nav('sec-config')" id="nav-sec-config" class="nav-btn active p-4 text-sm font-bold text-left italic flex items-center gap-3"><i data-lucide="settings" class="w-4 h-4"></i> Mis Cursos</button>
            <button onclick="SonarIA.nav('sec-analyze')" id="nav-sec-analyze" class="nav-btn p-4 text-sm font-bold text-left italic flex items-center gap-3"><i data-lucide="search" class="w-4 h-4"></i> Analizador</button>
            <button onclick="SonarIA.nav('sec-diag')" id="nav-sec-diag" class="nav-btn p-4 text-sm font-bold text-left italic flex items-center gap-3 opacity-30" disabled><i data-lucide="activity" class="w-4 h-4"></i> Diagnóstico</button>
            <button onclick="SonarIA.nav('sec-canvas')" id="nav-sec-canvas" class="nav-btn p-4 text-sm font-bold text-left italic flex items-center gap-3 opacity-30" disabled><i data-lucide="shield-check" class="w-4 h-4"></i> Aula Segura <span class="pro-badge">Pro</span></button>
            <button onclick="SonarIA.nav('sec-plan')" id="nav-sec-plan" class="nav-btn p-4 text-sm font-bold text-left italic flex items-center gap-3 opacity-30" disabled><i data-lucide="book-open" class="w-4 h-4"></i> Planificación <span class="pro-badge">Pro</span></button>
        </div>
        <div class="mt-auto p-6 border-t text-center">
            <div id="user-mail" class="text-[10px] font-bold truncate mb-2 text-slate-300 italic">--</div>
        </div>
    </nav>

    <main class="flex-grow p-12 overflow-hidden relative">
        <div id="sec-config" class="section active">
            <div class="max-w-4xl pt-10">
                <h2 class="text-5xl font-black border-l-8 border-[#FF8700] pl-6 uppercase italic tracking-tighter text-[#001739]">Mi Aula</h2>
                <div class="grid grid-cols-4 gap-4 mt-12" id="grid-cursos"></div>
                <button onclick="SonarIA.saveConfig()" class="bg-[#FF8700] text-white px-10 py-5 rounded-2xl font-black uppercase mt-8 shadow-xl hover:scale-105 transition-all">Guardar Perfil →</button>
            </div>
        </div>

        <!-- ANALIZADOR CON UX MEJORADA -->
        <div id="sec-analyze" class="section">
            <div class="max-w-2xl mx-auto py-4">
                <h2 class="text-6xl font-black text-[#001739] mb-8 uppercase italic tracking-tighter text-center leading-none italic">EVALUACIÓN</h2>
                <div class="glass-card p-10 space-y-4">
                    
                    <!-- Inputs principales -->
                    <div class="grid grid-cols-2 gap-4">
                        <input id="in-titulo" type="text" placeholder="Canción" class="w-full bg-slate-50 border-2 border-slate-100 rounded-3xl p-5 text-lg font-bold focus:border-[#FF8700] outline-none transition-all">
                        <input id="in-artista" type="text" placeholder="Artista" class="w-full bg-slate-50 border-2 border-slate-100 rounded-3xl p-5 text-lg font-bold focus:border-[#FF8700] outline-none transition-all">
                    </div>

                    <!-- Ayuda y Error (Ubicación mejorada) -->
                    <div class="space-y-2">
                        <div id="analyze-error" class="hidden bg-red-50 text-red-600 p-3 rounded-xl text-[10px] font-bold text-center border border-red-100 italic"></div>
                        <div id="search-help" class="hidden flex items-center justify-center gap-3 px-4 py-2 bg-blue-50 rounded-xl">
                            <span class="text-[9px] font-black uppercase text-blue-400 italic italic">Ayuda:</span>
                            <button onclick="SonarIA.extSearch('google')" class="text-[10px] font-bold text-blue-600 underline">Buscar en Google</button>
                            <button onclick="SonarIA.extSearch('genius')" class="text-[10px] font-bold text-blue-600 underline">Genius</button>
                        </div>
                    </div>
                    
                    <textarea id="in-texto" placeholder="Pega la letra aquí (Si la búsqueda automática falla)..." class="w-full bg-slate-50 border-2 border-slate-100 rounded-3xl p-6 h-36 text-sm font-medium focus:border-[#FF8700] outline-none transition-all resize-none italic italic"></textarea>

                    <button onclick="SonarIA.analyze()" class="w-full f1-navy text-white p-6 rounded-3xl font-black uppercase shadow-xl hover:bg-orange-600 transition-all text-lg tracking-widest flex items-center justify-center gap-3">
                        <i data-lucide="zap" class="text-[#FF8700] fill-[#FF8700]"></i> ANALIZAR AHORA
                    </button>
                </div>
            </div>
        </div>

        <div id="sec-diag" class="section">
            <div class="max-w-5xl mx-auto pt-10">
                <div class="glass-card p-12 flex justify-between items-center relative overflow-hidden">
                    <div class="flex-grow">
                        <h3 id="res-resultado" class="text-7xl font-black tracking-tighter text-[#001739] leading-none mb-4 uppercase italic italic">--</h3>
                        <p id="res-just" class="text-slate-500 max-w-xl text-xl font-medium italic leading-relaxed"></p>
                    </div>
                    <div class="text-right">
                        <div class="text-[10px] font-black uppercase text-slate-300 tracking-widest mb-1 italic">Índice de Riesgo</div>
                        <div id="res-risk" class="text-[10rem] font-black text-[#001739] leading-none tracking-tighter">0%</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- RESTO DE SECCIONES IGUAL... -->
        <div id="sec-canvas" class="section h-full pb-20 relative">
            <div id="lock-canvas" class="pro-overlay hidden">
                <div class="bg-white p-12 rounded-[3rem] shadow-2xl text-center border shadow-orange-100">
                    <i data-lucide="shield-check" class="w-12 h-12 text-[#FF8700] mx-auto mb-4"></i>
                    <h3 class="text-2xl font-black uppercase italic mb-2">Contenido PRO</h3>
                    <p class="text-slate-500 font-bold mb-6 text-sm">Activa tu suscripción para acceder a la Adaptación.</p>
                    <a href="planes.html" class="inline-block bg-[#FF8700] text-white px-8 py-4 rounded-xl font-black uppercase text-xs">Activar Pro</a>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-8 h-full">
                <div class="bg-white rounded-[2.5rem] p-10 shadow-sm border flex flex-col overflow-hidden text-center italic">
                    <h4 class="font-black uppercase mb-4 text-slate-300 text-[10px] tracking-widest italic">Letra Original</h4>
                    <div id="res-orig" class="flex-grow overflow-y-auto whitespace-pre-wrap italic scroll-v text-xs text-slate-400 pr-4 font-medium"></div>
                </div>
                <div class="bg-white rounded-[2.5rem] shadow-xl border-4 border-orange-50 flex flex-col overflow-hidden relative">
                    <div class="flex bg-slate-50 border-b">
                        <button onclick="SonarIA.tab('adapt')" id="tab-adapt" class="tab-btn active p-4 text-[10px] font-black uppercase flex-1">Adaptación PRO</button>
                        <button onclick="SonarIA.tab('trans')" id="tab-trans" class="tab-btn p-4 text-[10px] font-black uppercase flex-1">Traducción</button>
                    </div>
                    <div class="p-10 flex-grow overflow-hidden">
                        <div id="res-adapt" class="flex-grow overflow-y-auto font-bold text-[#001739] scroll-v text-sm whitespace-pre-wrap"></div>
                        <div id="res-trans" class="hidden flex-grow overflow-y-auto italic text-[#001739] scroll-v text-sm whitespace-pre-wrap"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="sec-plan" class="section pt-10 relative">
            <div id="lock-plan" class="pro-overlay hidden">
                <div class="bg-white p-12 rounded-[3rem] shadow-2xl text-center border">
                    <i data-lucide="book-open" class="w-12 h-12 text-[#FF8700] mx-auto mb-4"></i>
                    <h3 class="text-2xl font-black uppercase italic mb-2">Planificación PRO</h3>
                    <a href="planes.html" class="inline-block f1-navy text-white px-8 py-4 rounded-xl font-black uppercase text-xs">Ver Planes</a>
                </div>
            </div>
            <div class="max-w-5xl mx-auto flex flex-col h-full">
                <div id="plan-tabs" class="flex gap-2 mb-6 overflow-x-auto"></div>
                <div id="plan-content" class="flex-grow overflow-y-auto pr-6"></div>
                <div class="mt-8 flex justify-end pb-8">
                    <button onclick="SonarIA.handlePdf()" class="bg-[#FF8700] text-white px-8 py-4 rounded-xl font-black uppercase italic shadow-lg flex items-center gap-3 text-xs tracking-widest">
                        <i data-lucide="file-down" class="w-4 h-4"></i> Exportar Informe PDF Pro
                    </button>
                </div>
            </div>
        </div>

        <div id="loader" class="hidden absolute inset-0 bg-white/80 backdrop-blur-sm z-[60] flex flex-col items-center justify-center">
            <div class="w-1.5 h-24 bg-[#FF8700] animate-bounce rounded-full"></div>
            <h4 class="text-xs font-black uppercase mt-4 animate-pulse italic italic">Sincronizando Sistemas Pedagógicos...</h4>
        </div>
    </main>
</div>

<script>
    lucide.createIcons();
    const API_URL = "https://sonaria-api-test.onrender.com";
    const COURSE_MAP = { "1° Básico":"1", "2° Básico":"2", "3° Básico":"3", "4° Básico":"4", "5° Básico":"5", "6° Básico":"6", "7° Básico":"7", "8° Básico":"8", "I° Medio":"1M", "II° Medio":"2M", "III° Medio":"3M", "IV° Medio":"4M" };

    window.SonarIA = {
        state: { 
            cursos: JSON.parse(localStorage.getItem('my_courses') || '[]'), 
            user: JSON.parse(localStorage.getItem('sonaria_user') || '{"plan":"free", "email":"maunpb45@gmail.com"}'), 
            lastData: null 
        },

        init() { 
            this.renderCourses(); 
            this.updatePlanUI();
            this.setupEnterKey(); // NUEVO: Tecla Enter
            if(this.state.cursos.length === 0) this.nav('sec-config'); else this.nav('sec-analyze'); 
            document.getElementById('user-mail').innerText = this.state.user.email; 
        },

        setupEnterKey() {
            const inputs = ['in-titulo', 'in-artista', 'in-texto'];
            inputs.forEach(id => {
                const el = document.getElementById(id);
                if(el) {
                    el.addEventListener('keydown', (e) => {
                        if(e.key === 'Enter' && !e.shiftKey) {
                            e.preventDefault();
                            this.analyze();
                        }
                    });
                }
            });
        },

        updatePlanUI() {
            const isPro = this.state.user.plan === 'pro';
            document.getElementById('plan-indicator').innerText = isPro ? 'Plan Pro Activo' : 'Plan Free';
            document.getElementById('plan-indicator').classList.toggle('text-emerald-500', isPro);
        },

        renderCourses() { 
            const grid = document.getElementById('grid-cursos'); if(!grid) return;
            grid.innerHTML = Object.keys(COURSE_MAP).map(c => `
                <button onclick="SonarIA.toggleCourse('${c}')" class="p-4 rounded-xl border-2 text-[10px] font-black uppercase transition-all ${this.state.cursos.includes(c) ? 'bg-[#001739] text-white border-[#001739]' : 'bg-white text-slate-400'}">${c}</button>`).join('');
        },

        toggleCourse(c) { if(this.state.cursos.includes(c)) this.state.cursos = this.state.cursos.filter(x => x !== c); else this.state.cursos.push(c); this.renderCourses(); },
        saveConfig() { localStorage.setItem('my_courses', JSON.stringify(this.state.cursos)); this.nav('sec-analyze'); },
        
        nav(id) { 
            const isPro = this.state.user.plan === 'pro';
            if(!isPro && (id === 'sec-canvas' || id === 'sec-plan')) {
                document.getElementById('lock-canvas').classList.remove('hidden');
                document.getElementById('lock-plan').classList.remove('hidden');
            } else {
                document.getElementById('lock-canvas').classList.add('hidden');
                document.getElementById('lock-plan').classList.add('hidden');
            }
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(document.getElementById('nav-' + id)) document.getElementById('nav-' + id).classList.add('active');
        },

        tab(m) { 
            const a = m==='adapt'; 
            const isPro = this.state.user.plan === 'pro';
            if(!isPro && (m === 'adapt' || m === 'trans')) return;
            document.getElementById('res-adapt').classList.toggle('hidden',!a); 
            document.getElementById('res-trans').classList.toggle('hidden',a); 
            document.getElementById('tab-adapt').classList.toggle('active',a); 
            document.getElementById('tab-trans').classList.toggle('active',!a); 
        },

        extSearch(p) {
            const t = document.getElementById('in-titulo').value;
            const a = document.getElementById('in-artista').value;
            const q = encodeURIComponent(`${t} ${a} lyrics`);
            const url = p === 'google' ? `https://www.google.com/search?q=${q}` : `https://genius.com/search?q=${q}`;
            window.open(url, '_blank');
        },

        async analyze() {
            const t = document.getElementById('in-titulo').value.trim(); 
            const a = document.getElementById('in-artista').value.trim();
            const textoManual = document.getElementById('in-texto').value.trim();
            const errorBox = document.getElementById('analyze-error');
            const searchHelp = document.getElementById('search-help');

            if(!t) return;
            
            errorBox.classList.add('hidden');
            searchHelp.classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');

            try {
                const res = await fetch(API_URL + "/analizar", { 
                    method: 'POST', 
                    headers: {
                        'Content-Type': 'application/json', 
                        'Authorization': 'Bearer ' + (localStorage.getItem('sonaria_token') || '')
                    }, 
                    body: JSON.stringify({ 
                        titulo: t, artista: a, texto: textoManual,
                        buscar_letra: textoManual === "",
                        cursos_seleccionados: this.state.cursos.map(c => COURSE_MAP[c]) 
                    }) 
                });
                
                const data = await res.json();
                
                if(data.ok) {
                    this.state.lastData = data;
                    document.getElementById('res-resultado').innerText = data.resultado;
                    document.getElementById('res-risk').innerText = data.risk_percent + "%";
                    document.getElementById('res-just').innerText = data.justificacion || data.resumen || "Análisis completado.";
                    document.getElementById('res-orig').innerText = data.original;
                    document.getElementById('res-adapt').innerHTML = data.adaptada;
                    document.getElementById('res-trans').innerText = data.traducida;
                    this.renderPlan(data.pedagogia);
                    ['nav-sec-diag', 'nav-sec-canvas', 'nav-sec-plan'].forEach(id => { 
                        const b = document.getElementById(id); 
                        if(b){ b.disabled=false; b.classList.remove('opacity-30'); } 
                    });
                    this.nav('sec-diag');
                } else { 
                    errorBox.innerText = "⚠️ No encontramos la letra automáticamente. Por favor, pégala manualmente arriba.";
                    errorBox.classList.remove('hidden');
                    searchHelp.classList.remove('hidden');
                }
            } catch (e) { 
                errorBox.innerText = "⚠️ Error de conexión.";
                errorBox.classList.remove('hidden');
            } finally { 
                document.getElementById('loader').classList.add('hidden'); 
            }
        },

        renderPlan(ped) {
            const tabs = document.getElementById('plan-tabs');
            if(!ped.por_curso.length) { 
                document.getElementById('plan-content').innerHTML = "<p class='py-20 text-center font-bold text-slate-400 italic text-xl uppercase opacity-20'>Standby.</p>"; 
                tabs.innerHTML=""; return; 
            }
            tabs.innerHTML = ped.por_curso.map((p, i) => `<button onclick="SonarIA.showPlan(${i})" class="course-tab p-4 border rounded-xl font-black uppercase text-[10px] flex-1 ${i===0 ? 'active':''}">${p.curso}°</button>`).join('');
            this.showPlan(0);
        },

        showPlan(idx) {
            const p = this.state.lastData.pedagogia.por_curso[idx];
            document.querySelectorAll('.course-tab').forEach((t, i) => t.classList.toggle('active', i===idx));
            document.getElementById('plan-content').innerHTML = `<div class="grid grid-cols-2 gap-8"><div class="bg-white p-10 rounded-[3rem] border shadow-xl"><h4 class="text-orange-500 font-black uppercase text-[10px] mb-4 italic">OA</h4><p class="text-lg font-medium text-slate-600">${p.oa}</p></div><div class="bg-[#001739] text-white p-10 rounded-[3rem] shadow-2xl"><h4 class="text-orange-400 font-black uppercase text-[10px] mb-4 italic">Actividad</h4><p class="text-lg italic font-light">${p.actividades[0]}</p></div></div>`;
        },

        handlePdf() {
            if(this.state.user.plan !== 'pro') window.location.href = "planes.html";
            else alert("Generando PDF...");
        },

        logout() { localStorage.clear(); window.location.href = "login.html"; }
    };
    SonarIA.init();
</script>
