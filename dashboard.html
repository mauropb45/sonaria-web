<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SonarIA | Sovereign Matrix</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; @apply bg-black text-slate-300; overflow: hidden; }
    .sidebar { @apply w-64 bg-black flex flex-col h-screen fixed left-0 top-0 z-[100] p-2 border-r border-white/5; }
    .main-view { @apply ml-64 bg-[#121212] rounded-lg mt-2 mr-2 h-[calc(100vh-112px)] overflow-y-auto p-12; }
    .course-card { @apply p-4 rounded-2xl border-2 border-transparent transition-all cursor-pointer text-center bg-white/5 hover:scale-105; }
    .course-card.green { @apply border-green-500 text-green-400; }
    .course-card.orange { @apply border-orange-500 text-orange-400; }
    .course-card.red { @apply border-red-500 text-red-600 opacity-40; }
    .mirror-row { display: grid; grid-template-columns: 1fr 1fr; @apply gap-10 p-4 border-b border-white/5; }
    mark { @apply bg-yellow-400 text-black px-1 rounded font-bold; }
  </style>
</head>
<body class="antialiased">

  <aside class="sidebar">
    <div class="p-6 text-blue-500 italic font-black text-2xl uppercase italic">SonarIA</div>
    <div class="p-4 bg-white/5 rounded-2xl m-2 border border-blue-500/20">
        <p id="userNameDisplay" class="text-xs font-bold text-white italic">Cargando...</p>
        <p class="text-[9px] uppercase text-slate-500 font-black">Plan Staging v23.5</p>
    </div>
  </aside>

  <main class="main-view">
    <div class="max-w-4xl mx-auto space-y-12">
        <h2 class="text-6xl font-black tracking-tighter text-white italic italic italic">Consultor Matrix</h2>
        
        <div class="bg-white/5 p-10 rounded-[40px] border border-white/10 flex gap-6 shadow-2xl">
            <input id="titulo" type="text" placeholder="¿Qué canción evaluaremos?" class="flex-1 bg-white/5 p-5 rounded-2xl font-bold text-xl border-none outline-none text-white focus:ring-4 focus:ring-blue-600">
            <button id="analyzeBtn" class="bg-blue-600 text-white px-10 rounded-2xl font-black italic hover:bg-blue-500 transition-all">Analizar</button>
        </div>

        <div id="matrixArea" class="hidden space-y-8">
            <h3 class="text-2xl font-black italic">Matrix de Idoneidad Escolar</h3>
            <div id="matrixGrid" class="grid grid-cols-6 gap-4"></div>
        </div>

        <div id="syncArea" class="hidden bg-[#181818] p-10 rounded-[40px] border border-white/5">
            <h4 id="courseLabel" class="text-blue-500 font-black uppercase text-[10px] tracking-[0.4em] mb-4">---</h4>
            <div id="lyricsContainer" class="space-y-2"></div>
        </div>
    </div>
  </main>

  <!-- BARRA DE RIESGO FIJA (PLAYER) -->
  <footer class="fixed bottom-0 left-0 right-0 h-24 bg-black border-t border-white/5 px-8 flex items-center justify-center">
    <div class="w-full max-w-xl">
        <div class="flex justify-between text-[10px] font-black mb-2 italic">
            <span>RIESGO DETECTADO</span>
            <span id="riskValue">0%</span>
        </div>
        <div class="w-full h-1.5 bg-white/10 rounded-full overflow-hidden">
            <div id="riskBar" class="h-full w-0 bg-blue-600 transition-all duration-[2s]"></div>
        </div>
    </div>
  </footer>

  <script>
    const API_BASE = "https://sonaria-api-test.onrender.com";
    const $ = id => document.getElementById(id);
    let lastData = null;

    // Cargar nombre del usuario desde localStorage
    const user = JSON.parse(localStorage.getItem("mejoraria_user") || '{"name":"Docente"}');
    $("userNameDisplay").innerText = user.name;

    async function analizar() {
        const btn = $("analyzeBtn");
        const tit = $("titulo").value.trim();
        if (!tit) return;
        btn.disabled = true; btn.innerText = "ESCANEANDO...";
        try {
            const res = await fetch(`${API_BASE}/api/analizar/v23`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem("mejoraria_token") },
                body: JSON.stringify({ titulo: tit })
            });
            const raw = await res.json();
            lastData = raw.data;
            $("matrixArea").classList.remove("hidden");
            $("riskValue").innerText = lastData.risk_percent + "%";
            $("riskBar").style.width = lastData.risk_percent + "%";
            $("matrixGrid").innerHTML = Object.entries(lastData.matrix).map(([code, info]) => `
                <div onclick="focusCourse('${code}')" class="course-card ${info.status}">
                    <span class="text-xs font-black">${info.label}</span>
                </div>
            `).join('');
        } catch(e) { alert("Error de comunicación con el motor v23.5"); }
        finally { btn.disabled = false; btn.innerText = "Analizar"; }
    }

    async function focusCourse(code) {
        $("syncArea").classList.remove("hidden");
        $("courseLabel").innerText = "Sincronizando para: " + lastData.matrix[code].label;
        const res = await fetch(`${API_BASE}/api/get-adaptation`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ lyrics: lastData.lyrics_raw, course: code })
        });
        const data = await res.json();
        $("lyricsContainer").innerHTML = data.comparativa.map(l => `
            <div class="mirror-row">
                <div class="text-[10px] text-slate-600 italic">${l.original}</div>
                <div class="text-sm font-black ${l.changed ? 'text-blue-500' : 'text-slate-200'} italic">${l.adapted}</div>
            </div>
        `).join('');
    }

    $("analyzeBtn").onclick = analizar;
  </script>
</body>
</html>
