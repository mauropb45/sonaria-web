<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonarIA v39.0 | Sovereign Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; background-color: #F3F4F6; }
        .f1-navy { background-color: #001739; }
        .f1-orange { background-color: #FF8700; }
        .nav-btn.active { border-right: 4px solid #FF8700; background: rgba(255, 135, 0, 0.1); color: #FF8700; }
        .section-content { display: none; height: 100%; }
        .section-content.active { display: block; }
        .canvas-scroll::-webkit-scrollbar { width: 4px; }
        .canvas-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <header class="h-16 f1-navy flex items-center justify-between px-8 text-white shadow-2xl shrink-0 z-50">
        <h1 class="text-2xl font-black italic tracking-tighter">Sonar<span class="text-[#FF8700]">IA</span></h1>
        <div id="engine-status" class="text-[9px] font-black uppercase bg-green-500/20 text-green-400 px-3 py-1 rounded-full animate-pulse">Sincronizando Motor...</div>
    </header>

    <div class="flex flex-grow overflow-hidden">
        
        <nav class="w-64 bg-white border-r border-slate-200 flex flex-col shrink-0 shadow-xl z-40">
            <div class="p-6 flex flex-col gap-2">
                <button onclick="SonarIA.nav('sec-config')" id="btn-nav-config" class="nav-btn active flex items-center gap-3 p-4 rounded-xl text-sm font-bold transition-all">⚙️ Mi Aula</button>
                <button onclick="SonarIA.nav('sec-analyze')" id="btn-nav-analyze" class="nav-btn flex items-center gap-3 p-4 rounded-xl text-sm font-bold transition-all">🔍 Analizador</button>
                <button onclick="SonarIA.nav('sec-diag')" id="btn-nav-diag" class="nav-btn flex items-center gap-3 p-4 rounded-xl text-sm font-bold opacity-30 transition-all" disabled>🚦 Diagnóstico</button>
                <button onclick="SonarIA.nav('sec-canvas')" id="btn-nav-canvas" class="nav-btn flex items-center gap-3 p-4 rounded-xl text-sm font-bold opacity-30 transition-all" disabled>📝 Dual Canvas</button>
            </div>
        </nav>

        <main class="flex-grow p-8 overflow-hidden relative">
            
            <!-- SECCIÓN 1: CONFIG -->
            <div id="sec-config" class="section-content active">
                <div class="max-w-4xl mx-auto space-y-8">
                    <h2 class="text-5xl font-black italic tracking-tighter uppercase border-l-8 border-[#FF8700] pl-6 text-[#001739]">Mi Perfil de Aula</h2>
                    <div class="grid grid-cols-4 gap-4" id="course-grid"></div>
                    <button onclick="SonarIA.nav('sec-analyze')" class="f1-orange text-white px-10 py-5 rounded-2xl font-black uppercase text-sm shadow-xl hover:scale-[1.02] transition-all">Configurar Analizador →</button>
                </div>
            </div>

            <!-- SECCIÓN 2: ANALIZADOR -->
            <div id="sec-analyze" class="section-content">
                <div class="max-w-2xl mx-auto py-10">
                    <h2 class="text-4xl font-black italic uppercase text-[#001739] mb-8">Analizador de Obra</h2>
                    <div class="bg-white p-10 rounded-[3rem] shadow-2xl space-y-6 border border-slate-100">
                        <input id="in-titulo" type="text" placeholder="Nombre de la canción" class="w-full bg-slate-50 border-2 rounded-2xl p-5 text-xl font-bold focus:border-[#FF8700] outline-none">
                        <input id="in-artista" type="text" placeholder="Artista" class="w-full bg-slate-50 border-2 rounded-2xl p-5 text-xl font-bold focus:border-[#FF8700] outline-none">
                        <button onclick="SonarIA.analyze()" class="w-full f1-navy text-white p-6 rounded-2xl font-black uppercase tracking-[0.3em] shadow-xl hover:bg-[#08234d] transition-all">Analizar</button>
                    </div>
                </div>
            </div>

            <!-- SECCIÓN 3: RESULTADOS -->
            <div id="sec-diag" class="section-content overflow-y-auto no-scrollbar">
                <div class="max-w-5xl mx-auto space-y-6 pb-20">
                    <div class="bg-white rounded-[3.5rem] p-12 shadow-2xl flex justify-between items-center border">
                        <div>
                            <span class="bg-[#001739] text-[#FF8700] text-[10px] font-black px-4 py-1 rounded-full uppercase mb-4 inline-block">Resultado Oficial</span>
                            <h3 id="res-resultado" class="text-7xl font-black tracking-tighter leading-none italic mb-6">--</h3>
                            <p id="res-just" class="text-slate-600 max-w-xl text-xl font-medium"></p>
                        </div>
                        <div class="text-right">
                            <div id="res-risk" class="text-[10rem] font-black tracking-tighter leading-none text-[#001739]">0%</div>
                            <p class="text-xs font-black text-slate-400 uppercase tracking-[0.3em]">Riesgo</p>
                        </div>
                    </div>
                    <div id="res-oa" class="grid grid-cols-2 gap-6 bg-white p-10 rounded-[3rem] shadow-xl border"></div>
                </div>
            </div>

            <!-- SECCIÓN 4: CANVAS -->
            <div id="sec-canvas" class="section-content h-full pb-20">
                <div class="grid grid-cols-2 gap-8 h-full">
                    <div class="bg-white rounded-[2.5rem] p-10 shadow-xl flex flex-col overflow-hidden">
                        <h4 class="text-[10px] font-black text-slate-400 uppercase mb-6 tracking-widest text-center italic">Letra Original</h4>
                        <div id="res-orig" class="flex-grow overflow-y-auto canvas-scroll text-base italic text-slate-400 whitespace-pre-wrap"></div>
                    </div>
                    <div class="bg-white rounded-[2.5rem] p-10 shadow-xl flex flex-col border-4 border-orange-100 overflow-hidden">
                        <h4 class="text-[10px] font-black text-[#FF8700] uppercase mb-6 tracking-widest text-center">Versión Adaptada Pro</h4>
                        <div id="res-adapt" class="flex-grow overflow-y-auto canvas-scroll text-base font-bold text-[#001739] whitespace-pre-wrap"></div>
                    </div>
                </div>
            </div>

            <!-- Loader -->
            <div id="loader" class="hidden absolute inset-0 bg-white/80 backdrop-blur-sm z-[60] flex flex-col items-center justify-center">
                <div class="w-1.5 h-24 bg-[#FF8700] animate-bounce"></div>
                <h4 class="text-sm font-black uppercase mt-4 animate-pulse">Sincronizando con Motor Core</h4>
            </div>

        </main>
    </div>

    <script>
        const API_URL = "https://sonaria-api.onrender.com";
        const COURSE_MAP = { "1° Básico":"1", "2° Básico":"2", "3° Básico":"3", "4° Básico":"4", "5° Básico":"5", "6° Básico":"6", "7° Básico":"7", "8° Básico":"8", "I° Medio":"1M", "II° Medio":"2M", "III° Medio":"3M", "IV° Medio":"4M" };

        window.SonarIA = {
            state: { cursos: JSON.parse(localStorage.getItem('my_courses') || '[]') },

            init() {
                this.renderCourseGrid();
                this.checkEngine();
            },

            async checkEngine() {
                try {
                    const res = await fetch(API_URL + "/");
                    if(res.ok) {
                        document.getElementById('engine-status').innerText = "ENGINE ONLINE";
                        document.getElementById('engine-status').classList.replace('text-orange-400', 'text-green-400');
                    }
                } catch(e) { setTimeout(() => this.checkEngine(), 3000); }
            },

            renderCourseGrid() {
                const grid = document.getElementById('course-grid');
                if(!grid) return;
                grid.innerHTML = Object.keys(COURSE_MAP).map(c => `
                    <button onclick="SonarIA.toggleCourse('${c}')" 
                            class="p-4 rounded-xl border-2 text-[10px] font-black transition-all ${this.state.cursos.includes(c) ? 'f1-navy text-white border-[#001739]' : 'bg-white text-slate-400 border-slate-100'}">
                        ${c}
                    </button>
                `).join('');
            },

            toggleCourse(c) {
                if(this.state.cursos.includes(c)) this.state.cursos = this.state.cursos.filter(x => x !== c);
                else this.state.cursos.push(c);
                localStorage.setItem('my_courses', JSON.stringify(this.state.cursos));
                this.renderCourseGrid();
            },

            nav(secId) {
                document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(secId).classList.add('active');
                const btnId = 'btn-nav-' + secId.split('-')[1];
                if(document.getElementById(btnId)) document.getElementById(btnId).classList.add('active');
            },

            async analyze() {
                const t = document.getElementById('in-titulo').value.trim();
                const a = document.getElementById('in-artista').value.trim();
                if(!t) return alert("Indique el título");

                document.getElementById('loader').classList.remove('hidden');
                
                try {
                    // LLAMADA PURA: Sin cabeceras manuales para evitar bloqueos de Chrome
                    const response = await fetch(API_URL + "/analizar", {
                        method: 'POST',
                        body: JSON.stringify({
                            titulo: t, 
                            artista: a,
                            cursos_seleccionados: this.state.cursos.map(c => COURSE_MAP[c])
                        })
                    });

                    const data = await response.json();
                    if(data.ok) {
                        this.renderResults(data);
                        this.unlock();
                        this.nav('sec-diag');
                    } else { alert("Fallo: " + data.error); }
                } catch (err) {
                    alert("El motor de Render está arrancando. Reintente en 10 segundos.");
                } finally {
                    document.getElementById('loader').classList.add('hidden');
                }
            },

            renderResults(data) {
                document.getElementById('res-resultado').innerText = data.resultado.toUpperCase();
                document.getElementById('res-just').innerText = data.justificacion;
                document.getElementById('res-risk').innerText = data.risk_percent + "%";
                document.getElementById('res-orig').innerText = data.letra_original;
                document.getElementById('res-adapt').innerText = data.letra_adaptada || "APTA PARA USO DIRECTO.";
                document.getElementById('res-oa').innerHTML = data.cursos_sugeridos.map(c => `
                    <div class="border-l-4 border-orange-500 pl-4 py-1">
                        <p class="font-black text-[10px] text-orange-500">NIVEL ${c}</p>
                        <p class="text-xs font-bold leading-tight">OA 01: Apreciar y analizar manifestaciones musicales.</p>
                    </div>
                `).join('');
            },

            unlock() {
                ['btn-nav-diag', 'btn-nav-canvas'].forEach(id => {
                    const btn = document.getElementById(id);
                    if(btn) { btn.disabled = false; btn.classList.remove('opacity-30'); }
                });
            }
        };

        document.addEventListener('DOMContentLoaded', () => SonarIA.init());
    </script>
</body>
</html>
