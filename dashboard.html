<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <title>Workspace | SonarIA v110.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; background-color: #F3F4F6; color: #001739; }
        .f1-navy { background-color: #001739; }
        .nav-btn.active { border-right: 4px solid #FF8700; background: rgba(255, 135, 0, 0.05); color: #FF8700; font-weight: 900; }
        .section { display: none; height: 100%; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        .glass-card { background: white; border-radius: 3.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.03); border: 1px solid #eef2f7; }
        .course-tab.active { background: #001739; color: #fff; border-radius: 12px; }
        .blur-pro { filter: blur(14px); opacity: 0.3; pointer-events: none; }
        .inner-card-white { background: white; border-radius: 2.5rem; padding: 1.5rem; box-shadow: 0 20px 50px rgba(0,0,0,0.1); width: 240px; text-align: center; border: 1px solid #fff7ed; z-index: 50; position: absolute; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .scroll-v::-webkit-scrollbar { width: 4px; }
        .scroll-v::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">
    <div id="viewer-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 bg-[#001739]/80 backdrop-blur-md">
        <div class="bg-white max-w-lg w-full rounded-[3.5rem] p-12 text-center border-4 border-orange-50 shadow-2xl">
            <h3 class="text-2xl font-black uppercase italic mb-4">Aviso Pedagógico</h3>
            <p class="text-slate-500 text-sm mb-8 italic italic">La decisión final reside siempre en el docente.</p>
            <button onclick="SonarIA.acceptViewer()" class="w-full f1-navy text-white py-5 rounded-2xl font-black uppercase italic shadow-xl">Entendido</button>
        </div>
    </div>
    
    <header class="h-16 f1-navy flex items-center justify-between px-8 text-white z-50">
        <h1 class="text-2xl font-black italic">Sonar<span class="text-[#FF8700]">IA</span></h1>
        <div id="plan-indicator" class="text-[9px] font-black uppercase border px-2 py-0.5 rounded text-slate-400 italic">Plan Free</div>
    </header>

    <div class="flex flex-grow overflow-hidden">
        <nav class="w-72 bg-white border-r flex flex-col shrink-0 z-40">
            <div class="p-10 pb-6 border-b">
                <div id="user-greeting" class="text-3xl font-black text-[#001739] italic leading-tight">¡Hola!</div>
                <div id="user-mail" class="text-[9px] font-bold text-slate-300 truncate uppercase mt-1">--</div>
            </div>
            <div class="p-6 flex flex-col gap-2">
                <button onclick="SonarIA.nav('sec-config')" id="nav-sec-config" class="nav-btn active p-4 text-sm font-bold text-left italic flex items-center gap-3"><i data-lucide="settings" class="w-4 h-4"></i> Mis Cursos</button>
                <button onclick="SonarIA.nav('sec-analyze')" id="nav-sec-analyze" class="nav-btn p-4 text-sm font-bold text-left italic flex items-center gap-3"><i data-lucide="search" class="w-4 h-4"></i> Analizador</button>
                <button onclick="SonarIA.nav('sec-diag')" id="nav-sec-diag" class="nav-btn p-4 text-sm font-bold text-left italic flex items-center gap-3 opacity-40"><i data-lucide="activity" class="w-4 h-4"></i> Diagnóstico</button>
                <button onclick="SonarIA.nav('sec-canvas')" id="nav-sec-canvas" class="nav-btn p-4 text-sm font-bold text-left italic flex items-center gap-3 opacity-40"><i data-lucide="shield-check" class="w-4 h-4"></i> Aula Segura <i data-lucide="crown" class="w-3 h-3 text-orange-500"></i></button>
                <button onclick="SonarIA.nav('sec-plan')" id="nav-sec-plan" class="nav-btn p-4 text-sm font-bold text-left italic flex items-center gap-3 opacity-40"><i data-lucide="book-open" class="w-4 h-4"></i> Planificación <i data-lucide="crown" class="w-3 h-3 text-orange-500"></i></button>
            </div>
            <div class="mt-auto p-6 border-t text-center"><a href="planes-test.html" class="block w-full py-4 bg-[#FF8700] text-white rounded-2xl font-black uppercase text-[10px] shadow-xl italic">👑 Ser PRO ahora</a></div>
        </nav>

        <main class="flex-grow p-12 overflow-hidden relative">
            <!-- MI AULA -->
            <div id="sec-config" class="section">
                <div class="max-w-4xl pt-10"><h2 class="text-6xl font-black border-l-8 border-[#FF8700] pl-6 uppercase italic">Mi Aula</h2><div class="grid grid-cols-4 gap-4 mt-12" id="grid-cursos"></div><button onclick="SonarIA.saveConfig()" class="bg-[#FF8700] text-white px-12 py-6 rounded-3xl font-black uppercase mt-10 shadow-2xl">Guardar Perfil →</button></div>
            </div>

            <!-- ANALIZADOR -->
            <div id="sec-analyze" class="section active text-center">
                <div class="max-w-2xl mx-auto py-2">
                    <h2 class="text-7xl font-black text-[#001739] mb-10 uppercase italic">EVALUACIÓN</h2>
                    <div class="glass-card p-12 space-y-6">
                        <div class="grid grid-cols-2 gap-6">
                            <input id="in-titulo" type="text" placeholder="Canción" class="w-full bg-slate-50 border-2 rounded-[2rem] p-6 text-xl font-bold focus:border-[#FF8700] outline-none">
                            <input id="in-artista" type="text" placeholder="Artista" class="w-full bg-slate-50 border-2 rounded-[2rem] p-6 text-xl font-bold focus:border-[#FF8700] outline-none">
                        </div>
                        <textarea id="in-texto" placeholder="Pega la letra aquí..." class="w-full bg-slate-50 border-2 border-slate-100 rounded-[2.5rem] p-8 h-56 text-sm font-medium focus:border-[#FF8700] outline-none resize-none italic shadow-inner leading-relaxed"></textarea>
                        <button onclick="SonarIA.analyze()" class="w-full f1-navy text-white p-7 rounded-[2.5rem] font-black uppercase shadow-2xl flex items-center justify-center gap-4 italic italic"><i data-lucide="zap" class="text-[#FF8700] fill-[#FF8700]"></i> ANALIZAR AHORA</button>
                    </div>
                </div>
            </div>

            <!-- RESULTADOS -->
            <div id="sec-diag" class="section">
                <div class="max-w-5xl mx-auto pt-10">
                    <div class="glass-card p-16 flex flex-col border-none relative overflow-hidden shadow-2xl">
                        <div class="flex justify-between items-center w-full mb-12">
                            <div><h3 id="res-resultado" class="text-8xl font-black text-[#001739] uppercase italic leading-none">--</h3><p id="res-just" class="text-slate-500 max-w-xl text-2xl font-medium mt-4 italic"></p></div>
                            <div class="text-right"><div id="res-risk" class="text-[12rem] font-black text-[#001739] leading-none tracking-tighter">0%</div></div>
                        </div>
                        <div id="diag-cta" class="hidden border-t pt-10 text-center"><button onclick="SonarIA.nav('sec-canvas')" class="bg-orange-50 text-[#FF8700] border-2 border-orange-100 px-10 py-5 rounded-[2rem] font-black uppercase text-xs">✨ Adaptar canción para trabajar seguro</button></div>
                    </div>
                </div>
            </div>

            <!-- AULA SEGURA -->
            <div id="sec-canvas" class="section h-full pb-20 relative">
                <div class="grid grid-cols-2 gap-8 h-full">
                    <div class="bg-white rounded-[3.5rem] p-12 border flex flex-col overflow-hidden"><h4 class="font-black uppercase mb-6 text-slate-300 text-xs text-center italic">Letra Original</h4><div id="res-orig" class="flex-grow overflow-y-auto italic text-lg text-slate-400"></div></div>
                    <div class="bg-white rounded-[3.5rem] shadow-2xl border-4 border-orange-50 flex flex-col overflow-hidden relative">
                        <div class="p-12 flex-grow overflow-hidden flex flex-col relative items-center justify-center" id="canvas-wrapper">
                            <div id="res-adapt" class="flex-grow overflow-y-auto font-bold text-[#001739] scroll-v text-xl w-full italic"></div>
                            <div id="teaser-canvas" class="absolute inset-0 z-50 flex items-center justify-center hidden">
                                <div class="inner-card-white">
                                    <i data-lucide="crown" class="w-12 h-12 text-[#FF8700] mx-auto mb-4 animate-bounce"></i>
                                    <h4 class="text-xl font-black uppercase mb-2 text-[#001739] italic">Contenido Pro</h4>
                                    <a href="planes-test.html" class="block w-full bg-[#FF8700] text-white py-4 mt-4 rounded-2xl font-black uppercase text-[10px] shadow-lg">Activar PRO</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- PLANIFICACIÓN -->
            <div id="sec-plan" class="section pt-10 relative">
                <div class="max-w-7xl mx-auto flex flex-col h-full relative" id="plan-container">
                    <div id="plan-tabs" class="flex gap-3 mb-8 overflow-x-auto no-scrollbar pb-2 italic"></div>
                    <div id="plan-content" class="flex-grow overflow-y-auto scroll-v pr-6 relative italic italic"></div>
                </div>
            </div>

            <div id="loader" class="hidden absolute inset-0 bg-white/80 backdrop-blur-sm z-[60] flex flex-col items-center justify-center italic"><div class="w-24 h-2 bg-[#FF8700] animate-bounce rounded-full shadow-lg"></div></div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        const API_URL = "https://sonaria-api-test.onrender.com";
        const OAs_FULL = { "1": "MU01 OA 01: Escuchar cualidades del sonido...", "3": "MU03 OA 01: Escuchar música...", "7": "MU07 OA 01: Interpretar música...", "3M": "MU3M OA 01: Valorar el rol..." };
        const COURSE_MAP = { "1° Básico":"1", "2° Básico":"2", "3° Básico":"3", "4° Básico":"4", "5° Básico":"5", "6° Básico":"6", "7° Básico":"7", "8° Básico":"8", "I° Medio":"1M", "II° Medio":"2M", "III° Medio":"3M", "IV° Medio":"4M" };

        window.SonarIA = {
            state: { 
                cursos: JSON.parse(localStorage.getItem('my_courses') || '[]'), 
                user: JSON.parse(localStorage.getItem('sonaria_user') || '{"plan":"free", "name":"Mauricio Pinto"}'), 
                lastData: null
            },
            init() { 
                const params = new URLSearchParams(window.location.search);
                if (params.get('payment') === 'success') {
                    this.state.user.plan = 'pro';
                    localStorage.setItem('sonaria_user', JSON.stringify(this.state.user));
                    alert("¡Cuenta PRO Activada!");
                    window.history.replaceState({}, document.title, "/dashboard.html");
                }
                this.renderCourses(); this.checkViewer(); this.updatePlanUI();
                document.getElementById('user-greeting').innerText = "¡Hola, " + this.state.user.name.split(' ')[0] + "!";
                document.getElementById('user-mail').innerText = this.state.user.email || "maunpb45@gmail.com";
            },
            updatePlanUI() { const isPro = this.state.user.plan === 'pro'; document.getElementById('plan-indicator').innerText = isPro ? 'Plan PRO' : 'Plan Free'; },
            checkViewer() { if(!sessionStorage.getItem('sonaria_voted')) document.getElementById('viewer-modal').classList.remove('hidden'); },
            acceptViewer() { sessionStorage.setItem('sonaria_voted', 'true'); document.getElementById('viewer-modal').classList.add('hidden'); },
            setupSmartListeners() {
                ['in-titulo', 'in-artista', 'in-texto'].forEach(id => {
                    const el = document.getElementById(id);
                    if(el) el.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.analyze(); } };
                });
                document.getElementById('in-texto').addEventListener('paste', () => {
                    setTimeout(() => { if(document.getElementById('in-texto').value.length > 50 && document.getElementById('in-titulo').value) this.analyze(); }, 200);
                });
            },
            nav(id) { 
                const el = document.getElementById(id); if(!el) return;
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                el.classList.add('active');
                const btn = document.getElementById('nav-' + id); if(btn) btn.classList.add('active');
            },
            renderCourses() { 
                const grid = document.getElementById('grid-cursos'); if(!grid) return;
                grid.innerHTML = Object.keys(COURSE_MAP).map(c => `<button onclick="SonarIA.toggleCourse('${c}')" class="p-5 rounded-2xl border-2 text-[10px] font-black uppercase transition-all shadow-sm ${this.state.cursos.includes(COURSE_MAP[c]) ? 'bg-[#001739] text-white border-[#001739]' : 'bg-white text-slate-400'}">${c}</button>`).join('');
            },
            toggleCourse(c) { 
                const code = COURSE_MAP[c];
                if(this.state.cursos.includes(code)) this.state.cursos = this.state.cursos.filter(x => x !== code); else this.state.cursos.push(code); 
                this.renderCourses(); 
            },
            saveConfig() { localStorage.setItem('my_courses', JSON.stringify(this.state.cursos)); this.nav('sec-analyze'); },
            async analyze() {
                const t = document.getElementById('in-titulo').value.trim(); if(!t) return;
                document.getElementById('loader').classList.remove('hidden');
                try {
                    const res = await fetch(API_URL + "/analizar", { 
                        method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (localStorage.getItem('sonaria_token') || '')}, 
                        body: JSON.stringify({ titulo: t, artista: document.getElementById('in-artista').value, texto: document.getElementById('in-texto').value, buscar_letra: document.getElementById('in-texto').value === "", cursos: this.state.cursos, user_plan: this.state.user.plan }) 
                    });
                    const data = await res.json();
                    if(data.ok) { this.state.lastData = data; this.showResults(data); }
                } catch (e) { console.error("Error de análisis."); }
                finally { document.getElementById('loader').classList.add('hidden'); }
            },
            showResults(data) {
                const isPro = this.state.user.plan === 'pro';
                document.getElementById('res-resultado').innerText = data.resultado;
                document.getElementById('res-risk').innerText = data.risk_percent + "%";
                document.getElementById('res-just').innerText = data.justificacion;
                document.getElementById('res-orig').innerText = data.original;
                if(data.resultado.includes("MEDIACIÓN") || data.resultado.includes("NO APTA")) document.getElementById('diag-cta').classList.remove('hidden');
                const teaserCanvas = document.getElementById('teaser-canvas');
                const adaptBox = document.getElementById('res-adapt');
                if(isPro) {
                    adaptBox.innerHTML = data.adaptada; adaptBox.classList.remove('blur-pro'); teaserCanvas.classList.add('hidden');
                } else {
                    adaptBox.innerHTML = "Contenido adaptado curricularmente... SonarIA protege tu aula."; adaptBox.classList.add('blur-pro'); teaserCanvas.classList.remove('hidden');
                }
                this.renderPlan(data.pedagogia); this.nav('sec-diag');
            },
            renderPlan(ped) {
                const tabs = document.getElementById('plan-tabs');
                tabs.innerHTML = ped.por_curso.map((p, i) => `<button onclick="SonarIA.showPlan(${i})" class="course-tab p-5 border rounded-2xl font-black text-[10px] flex-1 ${i===0 ? 'active':''} transition-all shadow-sm">${p.curso}° Básico</button>`).join('');
                this.showPlan(0);
            },
            showPlan(idx) {
                const p = this.state.lastData.pedagogia.por_curso[idx];
                const isPro = this.state.user.plan === 'pro';
                const fullOA = OAs_FULL[p.curso] || "Objetivo de Aprendizaje Ministerial";
                document.querySelectorAll('.course-tab').forEach((t, i) => t.classList.toggle('active', i===idx));
                document.getElementById('plan-content').innerHTML = `
                    <div class="grid grid-cols-2 gap-10 h-[450px] items-center">
                        <div class="bg-white p-12 rounded-[3.5rem] border shadow-xl flex flex-col justify-center h-full">
                            <h4 class="text-orange-500 font-black uppercase text-[10px] mb-4 italic tracking-widest">Match Curricular (OA)</h4>
                            <p class="text-2xl font-black text-[#001739] mb-4 italic leading-tight italic tracking-tighter">OA Música Nivel ${p.curso}</p>
                            <p class="text-[14px] text-slate-400 italic italic">${fullOA}</p>
                        </div>
                        <div class="pro-unlock-container bg-[#001739] flex items-center justify-center h-full">
                            <div class="p-12 h-full flex flex-col justify-center items-center w-full ${!isPro ? 'blur-pro' : ''}">
                                <h4 class="text-orange-400 font-black uppercase text-[10px] mb-4 italic tracking-widest italic italic">Actividad Sugerida</h4>
                                <p class="text-xl text-white italic font-light text-center">${isPro ? p.actividades[0] : 'Diseño de actividad...'}</p>
                            </div>
                            ${!isPro ? `<div class="pro-floating-card"><div class="inner-card-white italic"><i data-lucide="crown" class="w-10 h-10 text-[#FF8700] mx-auto mb-4 animate-bounce"></i><h4 class="text-lg font-black uppercase mb-2 text-[#001739] italic">Planificación Pro</h4><a href="planes-test.html" class="block w-full bg-[#FF8700] text-white py-4 rounded-2xl font-black uppercase text-[10px] mt-4 shadow-lg">Activar PRO</a></div></div>` : ''}
                        </div>
                    </div>`;
                lucide.createIcons();
            },
            logout() { localStorage.clear(); window.location.href = "login-test.html"; }
        };
        SonarIA.init();
    </script>
</body>
</html>
