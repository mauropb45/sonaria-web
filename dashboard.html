<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SonarIA | Workspace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
  <style>
    :root { --pearl: #FDFDFF; --navy: #000B29; --orange: #FF8000; }
    /* Estructura Fija - Imagen 2 Style */
    html, body { height: 100vh; overflow: hidden; background-color: var(--pearl); font-family: 'Plus Jakarta Sans', sans-serif; }
    .sidebar { @apply bg-[#000B29] h-screen flex flex-col z-50 shadow-2xl fixed left-0 top-0; width: 280px; }
    .nav-link { @apply flex items-center gap-4 px-6 py-4 mx-3 rounded-2xl transition-all cursor-pointer text-slate-400 font-bold text-sm mb-1 italic; }
    .nav-link.active { @apply bg-white/5 text-white border-l-4 border-[#FF8000] shadow-lg; }
    .nav-link.disabled { @apply opacity-20 cursor-not-allowed; }

    .workspace { @apply ml-[280px] h-screen flex flex-col relative bg-white/50 overflow-hidden; }
    .topbar { @apply h-24 border-b border-slate-100 bg-white/70 backdrop-blur-md flex items-center justify-between px-12 shrink-0 z-40; }

    /* Paneles de Contenido (SPA) */
    .view-panel { display: none; height: calc(100vh - 96px); width: 100%; padding: 40px; overflow-y: auto; }
    .view-panel.active { display: flex; flex-direction: column; animation: fadeIn 0.4s ease-out forwards; }

    .glass-card { @apply bg-white border border-slate-200 rounded-[40px] shadow-sm; }
    .mirror-row { display: grid; grid-template-columns: 1fr 1fr; @apply gap-12 p-6 border-b border-slate-50 items-start transition-all rounded-3xl; }
    mark { @apply bg-yellow-300 text-black px-1 rounded font-black; }
    
    .christian-cross { position: absolute; top: 40px; right: 40px; width: 30px; height: 30px; opacity: 0.04; pointer-events: none; }
    .christian-cross::before { content: ''; position: absolute; height: 100%; width: 3px; background: currentColor; left: 14px; }
    .christian-cross::after { content: ''; position: absolute; width: 100%; height: 3px; background: currentColor; top: 10px; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .custom-scroll::-webkit-scrollbar { width: 4px; }
    .custom-scroll::-webkit-scrollbar-thumb { @apply bg-slate-200 rounded-full; }
  </style>
</head>
<body class="antialiased">

  <div class="flex h-screen overflow-hidden">
    
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="p-8 mb-6 relative">
            <h1 class="text-3xl font-[900] tracking-tighter text-white italic italic">Sonar<span class="text-[#FF8000]">IA</span></h1>
            <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mt-1 italic">Assistant v35.0</p>
        </div>

        <nav class="flex-1 space-y-1 px-2">
            <div onclick="switchView('radar', this)" id="nav-radar" class="nav-link active"><i data-lucide="radar"></i> <span>01 Radar (Semáforo)</span></div>
            <div onclick="switchView('sync', this)" id="nav-sync" class="nav-link disabled"><i data-lucide="languages"></i> <span>02 Letra & Sincro</span></div>
            <div onclick="switchView('pedagogy', this)" id="nav-pedagogy" class="nav-link disabled"><i data-lucide="graduation-cap"></i> <span>03 Planificación</span></div>
            <div onclick="switchView('cursos', this)" class="nav-link mt-10"><i data-lucide="users"></i> <span>Mis Cursos</span></div>
        </nav>
    </aside>

    <main class="workspace">
        <div class="christian-cross"></div>
        <header class="topbar">
            <h2 id="viewTitle" class="text-2xl font-[900] tracking-tight text-[#000B29] uppercase italic font-[Outfit]">Radar de Aula</h2>
            <div class="bg-white px-4 py-2 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_#22c55e]"></span>
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Live Sync</span>
            </div>
        </header>

        <div class="flex-1 relative overflow-hidden">

            <!-- VISTA: RADAR -->
            <section id="view-radar" class="view-panel active custom-scroll">
                <div class="max-w-4xl mx-auto w-full space-y-10">
                    <div class="glass-card p-10 border-b-[16px] border-[#000B29] shadow-xl">
                        <div class="grid grid-cols-2 gap-8">
                            <input id="titulo" type="text" placeholder="Canción - Artista" class="p-5 bg-slate-50 rounded-3xl font-bold text-xl border-transparent focus:bg-white focus:ring-8 focus:ring-blue-100 transition-all outline-none">
                            <button id="analyzeBtn" class="bg-[#000B29] text-white rounded-[32px] font-black text-lg hover:bg-[#FF8000] shadow-2xl active:scale-95 transition-all italic">Analizar</button>
                        </div>
                    </div>

                    <div id="resultsHero" class="hidden animate-in">
                        <div id="statusHero" class="glass-card p-12 border-t-[24px] flex justify-between items-center shadow-2xl bg-white relative overflow-hidden">
                            <div class="flex-1">
                                <h3 id="summaryTitle" class="text-6xl font-black tracking-tighter italic text-[#000B29] leading-none mb-6">—</h3>
                                <p class="text-slate-400 font-bold text-lg italic italic">El semáforo está listo. Navega por el menú para ver la adaptación rítmica.</p>
                            </div>
                            <div class="text-right">
                                <div id="riskDisplay" class="text-[110px] font-black italic tracking-tighter text-[#000B29] leading-none">0%</div>
                                <p class="text-[10px] font-black text-red-600 uppercase tracking-widest italic tracking-[0.3em]">Riesgo Original</p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- VISTA: SYNC -->
            <section id="view-sync" class="view-panel custom-scroll">
                <div class="max-w-6xl mx-auto h-full flex flex-col glass-card overflow-hidden shadow-2xl border-t-[16px] border-[#000B29]">
                    <div class="p-8 bg-[#000B29] text-white flex justify-between items-center px-12 italic">
                        <h4 class="text-[11px] font-black uppercase tracking-[0.5em] text-slate-500 italic">Comparativa de Triple Impacto</h4>
                        <button class="bg-blue-600 text-white px-6 py-2 rounded-xl text-[10px] font-black uppercase shadow-xl hover:bg-blue-700 transition-all italic">Bajar PDF</button>
                    </div>
                    <div id="lyricsContainer" class="flex-1 overflow-y-auto custom-scroll p-10 bg-white"></div>
                </div>
            </section>

            <!-- VISTA: PEDAGOGY -->
            <section id="view-pedagogy" class="view-panel custom-scroll">
                <div class="max-w-5xl mx-auto w-full space-y-8" id="pedagogyContent"></div>
            </section>

            <!-- VISTA: CURSOS -->
            <section id="view-cursos" class="view-panel custom-scroll">
                <div class="max-w-4xl mx-auto w-full">
                    <div class="glass-card p-12 bg-white">
                        <h3 class="text-3xl font-black mb-8 italic italic italic">Configuración Docente</h3>
                        <div id="cursosGrid" class="grid grid-cols-4 gap-4 mb-12 italic italic"></div>
                        <button onclick="saveCursos()" class="w-full bg-blue-600 text-white py-5 rounded-[24px] font-black italic shadow-xl">Guardar Cursos</button>
                    </div>
                </div>
            </section>
        </div>
    </main>
  </div>

  <script>
    lucide.createIcons();
    const API_BASE = "https://sonaria-api-test.onrender.com";
    const $ = id => document.getElementById(id);
    const cursosRaw = ["1B", "2B", "3B", "4B", "5B", "6B", "7B", "8B", "IM", "IIM", "IIIM", "IVM"];
    let selectedCourses = JSON.parse(localStorage.getItem("sonaria_cursos") || '["7B","8B"]');
    let lastData = null;

    function switchView(name, el) {
        document.querySelectorAll('.view-panel').forEach(v => v.classList.remove('active'));
        $(`view-${name}`).classList.add('active');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        if(el) el.classList.add('active');
        $("viewTitle").innerText = name.toUpperCase().replace('RADAR', 'Radar de Aula').replace('SYNC', 'Adaptación').replace('PEDAGOGY', 'Planificación');
    }

    function renderCursosGrid() {
        $("cursosGrid").innerHTML = cursosRaw.map(c => {
            const active = selectedCourses.includes(c);
            return `<div onclick="toggleCourse('${c}', this)" class="p-6 rounded-[32px] border-2 cursor-pointer transition-all text-center ${active ? 'border-blue-600 bg-blue-50 font-black' : 'border-slate-100 text-slate-300 font-bold'}">${c.replace('B','°B').replace('M','°M')}</div>`;
        }).join('');
    }

    function toggleCourse(c, el) {
        if(selectedCourses.includes(c)) selectedCourses = selectedCourses.filter(x => x !== c);
        else selectedCourses.push(c);
        renderCursosGrid();
    }

    function saveCursos() {
        localStorage.setItem("sonaria_cursos", JSON.stringify(selectedCourses));
        switchView('radar', $("nav-radar"));
    }

    async function analizar() {
        const btn = $("analyzeBtn");
        if (!$("titulo").value) return;
        btn.disabled = true; btn.innerHTML = `<span class="animate-pulse italic">ESCANEO v35...</span>`;
        
        try {
            const res = await fetch(`${API_BASE}/api/analizar/v35`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ titulo: $("titulo").value })
            });
            const raw = await res.json();
            lastData = raw.data;

            document.querySelectorAll('.nav-link.disabled').forEach(l => l.classList.remove('disabled'));
            $("resultsHero").classList.remove("hidden");
            $("summaryTitle").innerText = lastData.resultado;
            $("statusHero").style.borderColor = lastData.color === "green" ? "#00665E" : "#FF8000";
            $("riskDisplay").innerText = lastData.risk_orig + "%";

            // Inyectar Letra
            $("lyricsContainer").innerHTML = lastData.comparativa.map(l => `<div class="mirror-row group hover:bg-blue-50/20"><div class="text-[11px] text-slate-300 flex-1 italic group-hover:text-blue-500">${l.original}</div><div class="text-[12px] font-black flex-1 ${l.changed?'text-blue-600':'text-slate-800'} italic">${l.changed?`<mark>${l.adapted}</mark>`:l.adapted}</div></div>`).join('');
            
            // Inyectar Pedagogía
            const ped = lastData.sugerencias_db[selectedCourses[0]];
            $("pedagogyContent").innerHTML = `<div class="glass-card p-12 bg-white border-t-[20px] border-[#060D2E]"><h4 class="text-blue-600 font-black text-[10px] uppercase mb-4 tracking-widest italic">Taller para ${selectedCourses[0]}</h4><p class="text-4xl font-black text-[#000B29] leading-tight italic mb-10">${ped.oa}</p><div class="bg-slate-50 p-10 rounded-[40px] border border-slate-100 italic font-black text-slate-700 italic">Actividad: ${ped.act}</div></div>`;
            
            alert("Análisis completo. Usa el menú lateral.");
        } catch(e) { alert("Error v35: El servidor está despertando."); }
        finally { btn.disabled = false; btn.innerText = "Analizar"; }
    }

    renderCursosGrid();
    $("analyzeBtn").onclick = analizar;
  </script>
</body>
</html>
