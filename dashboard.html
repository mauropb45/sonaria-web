<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <title>Workspace | SonarIA v95.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; background-color: #F3F4F6; color: #001739; }
        .f1-navy { background-color: #001739; }
        .f1-orange { background-color: #FF8700; }
        .nav-btn.active { border-right: 4px solid #FF8700; background: rgba(255, 135, 0, 0.08); color: #FF8700; font-weight: 900; }
        .section { display: none; height: 100%; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        .tab-btn.active { color: #FF8700; border-bottom: 3px solid #FF8700; background: #fff; }
        .course-tab.active { background: #001739; color: #fff; border-radius: 8px; }
        
        /* Modal Style */
        #viewer-modal { background: rgba(0, 23, 57, 0.7); backdrop-filter: blur(8px); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .scroll-v::-webkit-scrollbar { width: 4px; }
        .scroll-v::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        input, textarea { line-height: normal !important; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- MODAL: VIEWER DISCRETION -->
    <div id="viewer-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-white max-w-lg w-full rounded-[3rem] p-10 shadow-2xl text-center border-4 border-orange-50">
            <div class="w-16 h-16 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="shield-alert" class="text-[#FF8700] w-8 h-8"></i>
            </div>
            <h3 class="text-2xl font-black uppercase italic mb-4">Aviso de Seguridad</h3>
            <p class="text-slate-500 text-sm leading-relaxed mb-8 italic">
                SonarIA analiza riesgos y sugiere mediaciones, pero la decisión final sobre el uso de una obra pertenece siempre al <strong>criterio profesional del docente</strong>.
            </p>
            <button onclick="SonarIA.acceptViewer()" class="w-full f1-navy text-white py-5 rounded-2xl font-black uppercase italic tracking-widest shadow-xl hover:bg-orange-600 transition-all">
                Entiendo y Continuar
            </button>
        </div>
    </div>

    <!-- HEADER -->
    <header class="h-16 f1-navy flex items-center justify-between px-8 text-white z-50">
        <h1 class="text-2xl font-black italic tracking-tighter uppercase">Sonar<span class="text-[#FF8700]">IA</span></h1>
        <div class="flex items-center gap-4">
            <span id="plan-badge" class="text-[9px] font-black uppercase border border-white/20 px-2 py-0.5 rounded italic">Cargando Plan...</span>
            <button onclick="SonarIA.logout()" class="text-[10px] font-black uppercase text-[#FF8700]">Salir</button>
        </div>
    </header>

    <div class="flex flex-grow overflow-hidden">
        <!-- NAV LATERAL -->
        <nav class="w-64 bg-white border-r flex flex-col shrink-0 z-40 shadow-xl">
            <div class="p-6 flex flex-col gap-2">
                <button onclick="SonarIA.nav('sec-config')" id="nav-sec-config" class="nav-btn active p-4 rounded-xl text-sm font-bold text-left italic">⚙️ Mis Cursos</button>
                <button onclick="SonarIA.nav('sec-analyze')" id="nav-sec-analyze" class="nav-btn p-4 rounded-xl text-sm font-bold text-left italic">🔍 Analizador</button>
                <button onclick="SonarIA.nav('sec-diag')" id="nav-sec-diag" class="nav-btn p-4 rounded-xl text-sm font-bold opacity-30 text-left" disabled>🚦 Diagnóstico</button>
                <button onclick="SonarIA.nav('sec-canvas')" id="nav-sec-canvas" class="nav-btn p-4 rounded-xl text-sm font-bold opacity-30 text-left" disabled>✨ Aula Segura</button>
                <button onclick="SonarIA.nav('sec-plan')" id="nav-sec-plan" class="nav-btn p-4 rounded-xl text-sm font-bold opacity-30 text-left" disabled>📅 Planificación</button>
            </div>
            <div id="user-mail" class="mt-auto p-4 text-[10px] bg-slate-50 border-t truncate text-center font-bold text-slate-400 italic">--</div>
        </nav>

        <main class="flex-grow p-8 overflow-hidden relative">
            
            <!-- MI AULA -->
            <div id="sec-config" class="section active">
                <div class="max-w-4xl mx-auto pt-10">
                    <h2 class="text-5xl font-black border-l-8 border-[#FF8700] pl-6 uppercase italic tracking-tighter text-[#001739]">Mi Aula</h2>
                    <div class="grid grid-cols-4 gap-4 mt-8" id="grid-cursos"></div>
                    <button onclick="SonarIA.saveConfig()" class="bg-[#FF8700] text-white px-10 py-5 rounded-2xl font-black uppercase mt-8 shadow-xl hover:scale-105 transition-all">Guardar Perfil →</button>
                </div>
            </div>

            <!-- ANALIZADOR (Con Textarea ADN) -->
            <div id="sec-analyze" class="section">
                <div class="max-w-2xl mx-auto py-6">
                    <h2 class="text-5xl font-black text-[#001739] mb-8 uppercase italic tracking-tighter text-center">EVALUACIÓN</h2>
                    <div class="bg-white p-10 rounded-[3rem] shadow-2xl space-y-6 border">
                        <div class="grid grid-cols-2 gap-4">
                            <input id="in-titulo" type="text" placeholder="Canción" class="w-full bg-slate-50 border-2 rounded-2xl p-5 text-xl font-bold focus:border-[#FF8700] outline-none transition-all">
                            <input id="in-artista" type="text" placeholder="Artista" class="w-full bg-slate-50 border-2 rounded-2xl p-5 text-xl font-bold focus:border-[#FF8700] outline-none transition-all">
                        </div>
                        
                        <textarea id="in-texto" placeholder="Pega la letra aquí (El análisis se iniciará solo)..." class="w-full bg-slate-50 border-2 rounded-2xl p-6 h-48 text-sm font-medium focus:border-[#FF8700] outline-none transition-all resize-none italic shadow-inner leading-relaxed"></textarea>

                        <button onclick="SonarIA.analyze()" class="w-full bg-[#001739] text-white p-6 rounded-2xl font-black uppercase shadow-xl hover:bg-orange-600 transition-all flex items-center justify-center gap-3">
                            <i data-lucide="zap" class="text-orange-500 fill-orange-500"></i> ANALIZAR AHORA
                        </button>
                        
                        <div id="analyze-error" class="hidden bg-red-50 text-red-600 p-4 rounded-2xl text-[10px] font-bold text-center border border-red-100 italic"></div>
                    </div>
                </div>
            </div>

            <!-- DIAGNÓSTICO -->
            <div id="sec-diag" class="section">
                <div class="max-w-5xl mx-auto pt-10">
                    <div class="bg-white rounded-[3.5rem] p-12 shadow-2xl flex justify-between items-center border">
                        <div>
                            <h3 id="res-resultado" class="text-7xl font-black tracking-tighter text-[#001739]">--</h3>
                            <p id="res-just" class="text-slate-600 max-w-xl text-xl mt-4 font-medium italic leading-relaxed"></p>
                        </div>
                        <div class="text-right">
                            <div id="res-risk" class="text-[10rem] font-black text-[#001739]">0%</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- AULA SEGURA -->
            <div id="sec-canvas" class="section h-full pb-20">
                <div class="grid grid-cols-2 gap-8 h-full">
                    <div class="bg-white rounded-[2.5rem] p-10 shadow-xl border flex flex-col overflow-hidden">
                        <h4 class="font-black uppercase mb-4 text-slate-400 text-[10px] tracking-widest text-center italic">Frecuencia Original</h4>
                        <div id="res-orig" class="flex-grow overflow-y-auto whitespace-pre-wrap italic scroll-v text-sm text-slate-400 pr-4 leading-relaxed"></div>
                    </div>
                    <div class="bg-white rounded-[2.5rem] shadow-xl border-4 border-orange-50 flex flex-col overflow-hidden relative">
                        <div class="flex bg-slate-50 border-b">
                            <button onclick="SonarIA.tab('adapt')" id="tab-adapt" class="tab-btn active p-4 flex-1 text-[10px] font-black uppercase">Adaptación PRO</button>
                            <button onclick="SonarIA.tab('trans')" id="tab-trans" class="tab-btn p-4 text-[10px] font-black uppercase">Traducción</button>
                        </div>
                        <div class="p-10 flex-grow overflow-hidden flex flex-col">
                            <div id="res-adapt" class="flex-grow overflow-y-auto font-bold text-[#001739] scroll-v text-sm leading-relaxed pr-4 whitespace-pre-wrap italic"></div>
                            <div id="res-trans" class="hidden flex-grow overflow-y-auto italic text-[#001739] scroll-v text-sm leading-relaxed pr-4 whitespace-pre-wrap italic"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- PLANIFICACIÓN -->
            <div id="sec-plan" class="section pt-10">
                <div class="max-w-5xl mx-auto flex flex-col h-full">
                    <div id="plan-tabs" class="flex gap-2 mb-6 overflow-x-auto no-scrollbar"></div>
                    <div id="plan-content" class="flex-grow overflow-y-auto scroll-v pr-6 italic"></div>
                </div>
            </div>

            <div id="loader" class="hidden absolute inset-0 bg-white/80 backdrop-blur-sm z-[60] flex flex-col items-center justify-center">
                <div class="w-1.5 h-24 bg-[#FF8700] animate-bounce"></div>
                <h4 class="text-xs font-black uppercase mt-4 animate-pulse italic">Analizando Pedagogía v95...</h4>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        const API_URL = "https://sonaria-api.onrender.com";
        const COURSE_MAP = { "1° Básico":"1", "2° Básico":"2", "3° Básico":"3", "4° Básico":"4", "5° Básico":"5", "6° Básico":"6", "7° Básico":"7", "8° Básico":"8", "I° Medio":"1M", "II° Medio":"2M", "III° Medio":"3M", "IV° Medio":"4M" };

        window.SonarIA = {
            state: { 
                cursos: JSON.parse(localStorage.getItem('my_courses') || '[]'), 
                user: JSON.parse(localStorage.getItem('sonaria_user') || '{"plan":"free", "email":"docente@sonaria.cl"}'), 
                lastData: null,
                autoTimer: null
            },

            init() { 
                this.renderCourses(); 
                this.updatePlanUI();
                this.setupSmartListeners();
                this.checkViewer();
                if(this.state.cursos.length === 0) this.nav('sec-config'); else this.nav('sec-analyze'); 
                document.getElementById('user-mail').innerText = this.state.user.email; 
            },

            checkViewer() {
                if(!sessionStorage.getItem('sonaria_viewed')) {
                    document.getElementById('viewer-modal').classList.remove('hidden');
                }
            },

            acceptViewer() {
                sessionStorage.setItem('sonaria_viewed', 'true');
                document.getElementById('viewer-modal').classList.add('hidden');
            },

            setupSmartListeners() {
                // Tecla Enter
                ['in-titulo', 'in-artista', 'in-texto'].forEach(id => {
                    const el = document.getElementById(id);
                    if(el) el.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.analyze(); } };
                });

                // Pegado inteligente (Auto-Análisis)
                const textInput = document.getElementById('in-texto');
                textInput.addEventListener('input', () => {
                    if(textInput.value.trim().length > 50) {
                        clearTimeout(this.state.autoTimer);
                        this.state.autoTimer = setTimeout(() => {
                            if(document.getElementById('in-titulo').value.trim()) this.analyze();
                        }, 1000);
                    }
                });
            },

            updatePlanUI() {
                const isPro = this.state.user.plan === 'pro';
                const el = document.getElementById('plan-badge');
                el.innerText = isPro ? 'Plan Pro Activo' : 'Plan Free';
                el.classList.toggle('text-emerald-400', isPro);
            },

            renderCourses() { 
                const grid = document.getElementById('grid-cursos'); if(!grid) return;
                grid.innerHTML = Object.keys(COURSE_MAP).map(c => `<button onclick="SonarIA.toggleCourse('${c}')" class="p-4 rounded-xl border-2 text-[10px] font-black uppercase transition-all ${this.state.cursos.includes(c) ? 'bg-[#001739] text-white border-[#001739]' : 'bg-white text-slate-400'}">${c}</button>`).join('');
            },

            toggleCourse(c) { if(this.state.cursos.includes(c)) this.state.cursos = this.state.cursos.filter(x => x !== c); else this.state.cursos.push(c); this.renderCourses(); },
            saveConfig() { localStorage.setItem('my_courses', JSON.stringify(this.state.cursos)); this.nav('sec-analyze'); },
            
            nav(id) { 
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                if(document.getElementById('nav-' + id)) document.getElementById('nav-' + id).classList.add('active');
            },

            tab(m) { const a = m==='adapt'; document.getElementById('res-adapt').classList.toggle('hidden',!a); document.getElementById('res-trans').classList.toggle('hidden',a); document.getElementById('tab-adapt').classList.toggle('active',a); document.getElementById('tab-trans').classList.toggle('active',!a); },
            
            async analyze() {
                const t = document.getElementById('in-titulo').value.trim(); 
                const a = document.getElementById('in-artista').value.trim();
                const txt = document.getElementById('in-texto').value.trim();
                const errBox = document.getElementById('analyze-error');

                if(!t) return;
                errBox.classList.add('hidden');
                document.getElementById('loader').classList.remove('hidden');
                
                try {
                    const res = await fetch(API_URL + "/analizar", { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (localStorage.getItem('sonaria_token') || '')}, 
                        body: JSON.stringify({ 
                            titulo: t, artista: a, texto: txt, 
                            buscar_letra: txt === "", 
                            cursos: this.state.cursos.map(c => COURSE_MAP[c]),
                            contexto_escolar: true 
                        }) 
                    });
                    const data = await res.json();
                    if(data.ok) {
                        this.state.lastData = data;
                        document.getElementById('res-resultado').innerText = data.resultado;
                        document.getElementById('res-risk').innerText = data.risk_percent + "%";
                        document.getElementById('res-just').innerText = data.justificacion || data.resumen;
                        document.getElementById('res-orig').innerText = data.original || txt;
                        document.getElementById('res-adapt').innerHTML = data.adaptada;
                        document.getElementById('res-trans').innerText = data.traducida;
                        this.renderPlan(data.pedagogia);
                        ['nav-sec-diag', 'nav-sec-canvas', 'nav-sec-plan'].forEach(id => { 
                            const b = document.getElementById(id); if(b){ b.disabled=false; b.classList.remove('opacity-30'); } 
                        });
                        this.nav('sec-diag');
                    } else { 
                        errBox.innerText = "⚠️ No encontramos la canción. Prueba pegándola manualmente.";
                        errBox.classList.remove('hidden');
                    }
                } catch (e) { 
                    errBox.innerText = "⚠️ ERROR DE CONEXIÓN: Revisa tu servidor en Render.";
                    errBox.classList.remove('hidden');
                } finally { document.getElementById('loader').classList.add('hidden'); }
            },

            renderPlan(ped) {
                const tabs = document.getElementById('plan-tabs');
                if(!ped.por_curso.length) { 
                    document.getElementById('plan-content').innerHTML = "<p class='py-20 text-center font-bold text-slate-400 italic text-xl'>Análisis Finalizado.</p>"; 
                    tabs.innerHTML=""; return; 
                }
                tabs.innerHTML = ped.por_curso.map((p, i) => `<button onclick="SonarIA.showPlan(${i})" class="course-tab p-3 border rounded-lg font-black uppercase text-[10px] flex-1 ${i===0 ? 'active':''}">${p.curso}°</button>`).join('');
                this.showPlan(0);
            },

            showPlan(idx) {
                const p = this.state.lastData.pedagogia.por_curso[idx];
                document.querySelectorAll('.course-tab').forEach((t, i) => t.classList.toggle('active', i===idx));
                document.getElementById('plan-content').innerHTML = `<div class="grid grid-cols-2 gap-6"><div class="bg-white p-8 rounded-3xl border shadow-xl"><h4 class="text-orange-500 font-black uppercase text-[10px] mb-4 italic">OA</h4><p class="text-sm font-medium text-slate-600 leading-relaxed">${p.oa}</p></div><div class="bg-[#001739] text-white p-8 rounded-3xl shadow-xl"><h4 class="text-orange-400 font-black uppercase text-[10px] mb-4 italic">Actividad</h4><p class="text-sm italic leading-relaxed font-light">${p.actividades[0]}</p></div></div>`;
            },
            logout() { localStorage.clear(); window.location.href = "login.html"; }
        };
        SonarIA.init();
    </script>
</body>
</html>
