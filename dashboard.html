<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonarIA v35.6 | Sovereign Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; background-color: #F3F4F6; color: #001739; }
        .f1-navy { background-color: #001739; }
        .f1-orange { background-color: #FF8700; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
        .nav-btn.active { border-right: 4px solid #FF8700; background: rgba(255, 135, 0, 0.1); color: #FF8700; }
        .section-content { display: none; height: 100%; animation: fadeIn 0.3s ease-in-out; }
        .section-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .canvas-scroll::-webkit-scrollbar { width: 4px; }
        .canvas-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="h-16 f1-navy flex items-center justify-between px-8 text-white shadow-2xl shrink-0 z-50">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-black italic tracking-tighter">Sonar<span class="text-[#FF8700]">IA</span></h1>
            <div class="h-6 w-[1px] bg-white/20"></div>
            <span id="engine-status" class="text-[10px] font-bold uppercase tracking-widest text-white/50">Conectando...</span>
        </div>
        <div class="flex items-center gap-6">
            <span class="text-[10px] font-black uppercase text-[#FF8700]">v35.6 Link</span>
            <button onclick="location.reload()" class="text-xs font-bold hover:text-orange-400">REINICIAR</button>
        </div>
    </header>

    <div class="flex flex-grow overflow-hidden">
        <nav class="w-64 bg-white border-r border-slate-200 flex flex-col shrink-0 shadow-xl z-40">
            <div class="p-6 flex flex-col gap-2">
                <button onclick="SonarIA.nav('sec-config')" id="btn-nav-config" class="nav-btn active flex items-center gap-3 p-4 rounded-xl text-sm font-bold transition-all"><span>⚙️</span> Mi Aula</button>
                <button onclick="SonarIA.nav('sec-analyze')" id="btn-nav-analyze" class="nav-btn flex items-center gap-3 p-4 rounded-xl text-sm font-bold transition-all"><span>🔍</span> Analizador</button>
                <button onclick="SonarIA.nav('sec-diag')" id="btn-nav-diag" class="nav-btn flex items-center gap-3 p-4 rounded-xl text-sm font-bold transition-all opacity-30" disabled><span>🚦</span> Diagnóstico</button>
                <button onclick="SonarIA.nav('sec-canvas')" id="btn-nav-canvas" class="nav-btn flex items-center gap-3 p-4 rounded-xl text-sm font-bold transition-all opacity-30" disabled><span>📝</span> Dual Canvas</button>
                <button onclick="SonarIA.nav('sec-pedagogy')" id="btn-nav-pedagogy" class="nav-btn flex items-center gap-3 p-4 rounded-xl text-sm font-bold transition-all opacity-30" disabled><span>🎓</span> Guía Docente</button>
            </div>
            <div class="mt-auto p-6 border-t border-slate-100">
                <div id="mini-history-box" class="bg-slate-50 p-4 rounded-2xl hidden">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-2">Recientes</p>
                    <div id="mini-history" class="space-y-2 text-[10px] max-h-32 overflow-y-auto no-scrollbar"></div>
                </div>
            </div>
        </nav>

        <main class="flex-grow bg-[#F3F4F6] p-8 overflow-hidden relative">

            <div id="sec-config" class="section-content active">
                <div class="max-w-3xl mx-auto space-y-8">
                    <div>
                        <h2 class="text-4xl font-black italic tracking-tighter">Mi Perfil de Aula</h2>
                        <p class="text-slate-500 font-medium">Seleccione sus cursos para calibrar los OAs del MINEDUC.</p>
                    </div>
                    <div class="grid grid-cols-4 gap-4" id="course-grid"></div>
                    <button onclick="SonarIA.nav('sec-analyze')" class="f1-orange text-white px-8 py-4 rounded-2xl font-black uppercase text-sm shadow-lg shadow-orange-500/30 active:scale-95 transition-all">Guardar Perfil →</button>
                </div>
            </div>

            <div id="sec-analyze" class="section-content">
                <div class="max-w-2xl mx-auto space-y-6">
                    <h2 class="text-4xl font-black italic tracking-tighter">Analizador</h2>
                    <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl space-y-4 border border-slate-100">
                        <input id="in-titulo" type="text" placeholder="Título" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-5 text-lg font-bold focus:border-[#FF8700] outline-none">
                        <input id="in-artista" type="text" placeholder="Artista" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-5 text-lg font-bold focus:border-[#FF8700] outline-none">
                        <button onclick="SonarIA.analyze()" id="btn-run" class="w-full f1-navy text-white p-5 rounded-2xl font-black uppercase tracking-widest hover:bg-[#08234d] transition-all">Iniciar Análisis</button>
                    </div>
                </div>
            </div>

            <div id="sec-diag" class="section-content">
                <div class="max-w-5xl mx-auto">
                    <div class="glass rounded-[3rem] p-10 shadow-2xl flex justify-between items-center border border-white">
                        <div>
                            <span class="bg-[#001739] text-[#FF8700] text-[10px] font-black px-4 py-1 rounded-full uppercase mb-4 inline-block tracking-widest">Resultado Oficial</span>
                            <h3 id="res-resultado" class="text-6xl font-black tracking-tighter leading-none italic mb-4">--</h3>
                            <p id="res-just" class="text-slate-600 max-w-xl text-lg font-medium"></p>
                        </div>
                        <div class="text-right">
                            <div id="res-risk" class="text-9xl font-black tracking-tighter leading-none">0%</div>
                            <p class="text-xs font-black text-slate-400 uppercase tracking-widest">Riesgo Escolar</p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="sec-canvas" class="section-content h-full pb-20">
                <div class="grid grid-cols-2 gap-8 h-full">
                    <div class="bg-white rounded-[2rem] p-8 shadow-xl flex flex-col">
                        <h4 class="text-[10px] font-black text-slate-400 uppercase mb-4">Letra Original</h4>
                        <div id="res-orig" class="flex-grow overflow-y-auto canvas-scroll text-sm leading-relaxed text-slate-400 italic whitespace-pre-wrap"></div>
                    </div>
                    <div class="bg-white rounded-[2rem] p-8 shadow-xl flex flex-col border-4 border-[#FF8700]/10">
                        <h4 class="text-[10px] font-black text-[#FF8700] uppercase mb-4">Propuesta Adaptada</h4>
                        <div id="res-adapt" class="flex-grow overflow-y-auto canvas-scroll text-sm leading-relaxed text-[#001739] font-bold whitespace-pre-wrap"></div>
                    </div>
                </div>
            </div>

            <div id="sec-pedagogy" class="section-content">
                <div class="max-w-4xl mx-auto grid grid-cols-2 gap-6">
                    <div class="bg-white p-8 rounded-[2rem] shadow-xl border border-blue-50">
                        <h4 class="text-xs font-black text-[#FF8700] uppercase mb-4">OA MINEDUC</h4>
                        <div id="res-oa" class="space-y-3 text-xs font-semibold text-slate-600"></div>
                    </div>
                    <div class="bg-[#001739] p-8 rounded-[2rem] shadow-xl text-white">
                        <h4 class="text-xs font-black text-orange-400 uppercase mb-4">Actividad</h4>
                        <p id="res-act" class="text-lg font-bold italic leading-tight"></p>
                    </div>
                </div>
            </div>

            <div id="loader" class="hidden absolute inset-0 glass z-[60] flex flex-col items-center justify-center">
                <div class="w-1 h-20 bg-[#FF8700] animate-bounce mb-4"></div>
                <h4 class="text-xs font-black uppercase tracking-[0.5em] animate-pulse">Analizando Frecuencias</h4>
            </div>

        </main>
    </div>

    <script>
        const API_URL = "https://sonaria-api.onrender.com/analizar";
        const COURSE_MAP = {
            "1° Básico": "1", "2° Básico": "2", "3° Básico": "3", "4° Básico": "4",
            "5° Básico": "5", "6° Básico": "6", "7° Básico": "7", "8° Básico": "8",
            "I° Medio": "1M", "II° Medio": "2M", "III° Medio": "3M", "IV° Medio": "4M"
        };

        const SonarIA = {
            state: {
                cursos: JSON.parse(localStorage.getItem('my_courses') || '[]'),
                history: []
            },

            init() {
                this.renderCourseGrid();
                this.checkEngine();
            },

            async checkEngine() {
                try {
                    const res = await fetch("https://sonaria-api.onrender.com/");
                    if(res.ok) {
                        document.getElementById('engine-status').innerText = "ENGINE ONLINE";
                        document.getElementById('engine-status').classList.replace('text-white/50', 'text-green-400');
                    }
                } catch(e) { setTimeout(() => this.checkEngine(), 3000); }
            },

            renderCourseGrid() {
                const grid = document.getElementById('course-grid');
                grid.innerHTML = Object.keys(COURSE_MAP).map(c => `
                    <button onclick="SonarIA.toggleCourse('${c}')" 
                            class="p-4 rounded-xl border-2 text-[10px] font-black transition-all ${this.state.cursos.includes(c) ? 'f1-navy text-white border-[#001739]' : 'bg-white border-slate-100 text-slate-400'}">
                        ${c}
                    </button>
                `).join('');
            },

            toggleCourse(c) {
                if(this.state.cursos.includes(c)) this.state.cursos = this.state.cursos.filter(x => x !== c);
                else this.state.cursos.push(c);
                localStorage.setItem('my_courses', JSON.stringify(this.state.cursos));
                this.renderCourseGrid();
            },

            nav(secId) {
                document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(secId).classList.add('active');
                document.getElementById('btn-nav-' + secId.split('-')[1]).classList.add('active');
            },

            async analyze() {
                const titulo = document.getElementById('in-titulo').value.trim();
                const artista = document.getElementById('in-artista').value.trim();
                if(!titulo) return alert("Indique el título");

                const loader = document.getElementById('loader');
                loader.classList.remove('hidden');

                const codigosCursos = this.state.cursos.map(c => COURSE_MAP[c]);

                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            titulo, artista,
                            cursos_seleccionados: codigosCursos
                        })
                    });

                    const data = await response.json();
                    if(data.ok) {
                        this.renderResults(data);
                        this.unlock(true);
                        this.nav('sec-diag');
                    } else {
                        alert("Error Motor: " + (data.error || "No encontrado"));
                    }
                } catch (err) {
                    console.error(err);
                    alert("Error de Conexión: Verifique que el backend en Render esté despierto.");
                } finally {
                    loader.classList.add('hidden');
                }
            },

            renderResults(data) {
                document.getElementById('res-resultado').innerText = data.resultado;
                document.getElementById('res-just').innerText = data.justificacion;
                document.getElementById('res-risk').innerText = data.risk_percent + "%";
                document.getElementById('res-orig').innerText = data.letra_original;
                document.getElementById('res-adapt').innerText = data.letra_adaptada || "Apta para uso directo.";
                
                document.getElementById('res-oa').innerHTML = data.cursos_sugeridos.map(c => `
                    <div class="border-l-4 border-orange-500 pl-4 py-1">
                        <p class="font-black text-[10px] text-orange-500 uppercase">CURSO ${c}</p>
                        <p class="leading-tight">Analizar manifestaciones musicales considerando propósito expresivo y contexto.</p>
                    </div>
                `).join('');
                document.getElementBy
