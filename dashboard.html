<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SonarIA v35.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; background-color: #F3F4F6; }
        .f1-navy { background-color: #001739; }
        .f1-orange { background-color: #FF8700; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); }
        .canvas-scroll::-webkit-scrollbar { width: 4px; }
        .canvas-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col">

    <header class="h-16 f1-navy flex items-center justify-between px-8 text-white shadow-2xl shrink-0 z-50">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-black tracking-tighter italic">Sonar<span class="text-[#FF8700]">IA</span></h1>
            <span class="text-[9px] font-bold border border-white/20 px-2 py-1 rounded uppercase opacity-60">Sovereign Baseline</span>
        </div>
        <div class="flex items-center gap-6">
            <span class="text-[10px] font-black uppercase text-[#FF8700]">Plan Pro Institucional</span>
            <button onclick="location.href='login.html'" class="text-xs font-bold hover:text-[#FF8700]">SALIR</button>
        </div>
    </header>

    <main class="flex-grow flex overflow-hidden">
        
        <!-- Sidebar -->
        <aside class="w-80 bg-white border-r border-slate-200 flex flex-col shrink-0 shadow-lg z-40">
            <div class="p-6 space-y-6 flex flex-col h-full">
                <section>
                    <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Evaluación</h2>
                    <div class="space-y-3">
                        <input id="in-titulo" type="text" placeholder="Canción" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-3 text-sm font-semibold focus:border-[#FF8700] outline-none transition-all">
                        <input id="in-artista" type="text" placeholder="Artista" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-3 text-sm font-semibold focus:border-[#FF8700] outline-none transition-all">
                        <button onclick="SonarIA.analyze()" id="btn-main" class="w-full f1-orange text-white py-4 rounded-xl font-black text-xs uppercase shadow-lg shadow-orange-500/20 active:scale-95 transition-all">Analizar Obra</button>
                    </div>
                </section>

                <section class="flex-grow flex flex-col overflow-hidden">
                    <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 border-b pb-2">Historial Reciente</h2>
                    <div id="history-list" class="overflow-y-auto canvas-scroll space-y-2 pb-10 text-xs">
                        <!-- Historial dinámico -->
                    </div>
                </section>
            </div>
        </aside>

        <!-- Canvas Principal -->
        <section class="flex-grow relative bg-[#F3F4F6] p-8 overflow-y-auto canvas-scroll">
            
            <div id="empty-state" class="h-full flex flex-col items-center justify-center opacity-20">
                <div class="text-8xl mb-6">🎼</div>
                <h3 class="text-2xl font-black text-[#001739] uppercase italic">Esperando Análisis</h3>
            </div>

            <div id="results-view" class="hidden space-y-6 max-w-6xl mx-auto pb-20">
                
                <!-- Hero Result -->
                <div class="glass rounded-[2.5rem] p-10 shadow-2xl border border-white flex justify-between items-center relative overflow-hidden">
                    <div class="relative z-10">
                        <span class="bg-[#001739] text-[#FF8700] text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest mb-6 inline-block">Resultado Oficial Motor v34</span>
                        <h2 id="res-resultado" class="text-6xl font-black text-[#001739] tracking-tighter leading-none mb-4 italic">--</h2>
                        <p id="res-resumen" class="text-slate-600 font-semibold text-lg max-w-2xl leading-relaxed italic"></p>
                    </div>
                    <div class="text-right z-10">
                        <div id="res-score" class="text-8xl font-black text-[#001739] tracking-tighter">0%</div>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Riesgo Escolar</p>
                    </div>
                    <div class="absolute -right-20 -bottom-20 text-[#001739]/5 text-[20rem] font-black italic select-none">Sonar</div>
                </div>

                <!-- Metrics Grid -->
                <div class="grid grid-cols-3 gap-6">
                    <div class="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Edad Sugerida</span>
                        <p id="res-edad" class="text-3xl font-black text-[#001739]">--</p>
                    </div>
                    <div class="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Temas Detectados</span>
                        <p id="res-temas" class="text-sm font-bold text-slate-600 italic">--</p>
                    </div>
                    <button onclick="alert('Exportando PDF Pro con Logo Institucional...')" class="f1-navy text-white p-8 rounded-[2rem] shadow-2xl hover:bg-[#08234d] transition-all group">
                        <span class="text-[10px] font-bold text-white/30 uppercase block mb-1">Informe Pedagógico</span>
                        <span class="text-2xl font-black italic">DESCARGAR PDF →</span>
                    </button>
                </div>

                <!-- Dual Canvas -->
                <div class="grid grid-cols-2 gap-8 h-[500px]">
                    <div class="bg-white rounded-[2rem] p-8 shadow-xl flex flex-col border border-slate-100">
                        <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Letra Original (Frecuencia Base)</h4>
                        <div id="res-original" class="flex-grow overflow-y-auto canvas-scroll text-sm leading-relaxed text-slate-400 whitespace-pre-wrap italic"></div>
                    </div>
                    <div class="bg-white rounded-[2rem] p-8 shadow-xl flex flex-col border-4 border-[#FF8700]/10">
                        <h4 class="text-[10px] font-black text-[#FF8700] uppercase tracking-widest mb-4">Propuesta de Mediación Pro</h4>
                        <div id="res-adaptada" class="flex-grow overflow-y-auto canvas-scroll text-sm leading-relaxed text-[#001739] font-bold whitespace-pre-wrap"></div>
                    </div>
                </div>
            </div>

            <!-- Loader -->
            <div id="loader" class="hidden absolute inset-0 glass z-50 flex flex-col items-center justify-center">
                <div class="w-20 h-1 bg-slate-100 rounded-full mb-6 overflow-hidden">
                    <div id="progress-bar" class="h-full f1-orange transition-all duration-700" style="width: 0%"></div>
                </div>
                <p class="text-[10px] font-black text-[#001739] uppercase tracking-[0.3em] animate-pulse">Sincronizando Core...</p>
            </div>

        </section>
    </main>

    <script>
        const API_URL = "https://sonaria-api.onrender.com/api/analizar/v34";

        const SonarIA = {
            state: { history: [] },

            async analyze() {
                const titulo = document.getElementById('in-titulo').value.trim();
                const artista = document.getElementById('in-artista').value.trim();
                if(!titulo) return alert("Indique el título");

                this.toggleLoader(true);
                
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ titulo, artista })
                    });

                    const data = await response.json();
                    if(!data.ok) throw new Error(data.detail);

                    this.render(data);
                    this.addToHistory(data);
                } catch (err) {
                    alert("Error: " + err.message);
                } finally {
                    this.toggleLoader(false);
                }
            },

            render(data) {
                document.getElementById('empty-state').classList.add('hidden');
                document.getElementById('results-view').classList.remove('hidden');
                
                document.getElementById('res-resultado').innerText = data.resultado;
                document.getElementById('res-resumen').innerText = data.resumen;
                document.getElementById('res-score').innerText = `${data.risk_percent}%`;
                document.getElementById('res-edad').innerText = data.edad_sugerida;
                document.getElementById('res-temas').innerText = data.temas.join(", ");
                document.getElementById('res-original').innerText = data.texto_original;
                document.getElementById('res-adaptada').innerText = data.letra_adaptada || "Apta para uso directo.";
            },

            toggleLoader(show) {
                const loader = document.getElementById('loader');
                const bar = document.getElementById('progress-bar');
                loader.classList.toggle('hidden', !show);
                if(show) bar.style.width = '70%';
                else setTimeout(() => bar.style.width = '0%', 400);
            },

            addToHistory(data) {
                this.state.history.unshift(data);
                const list = document.getElementById('history-list');
                list.innerHTML = this.state.history.map((item, idx) => `
                    <div onclick="SonarIA.render(SonarIA.state.history[${idx}])" class="p-3 bg-slate-50 rounded-xl border border-slate-100 hover:border-[#FF8700] transition-all cursor-pointer group">
                        <p class="font-black text-[#001739] truncate">${item.titulo}</p>
                        <p class="text-[9px] text-slate-400 font-bold uppercase">${item.resultado} • ${item.risk_percent}%</p>
                    </div>
                `).join('');
            }
        };
    </script>
</body>
</html>
