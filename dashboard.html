<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonarIA | Dashboard v35.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f7fa; color: #001739; }
        .f1-navy { background-color: #001739; }
        .f1-orange { background-color: #FF8700; }
        .glass-card { background: white; border-radius: 2.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #eef2f6; }
        .btn-animate:active { transform: scale(0.96); }
        /* Estilo para secciones bloqueadas Pro */
        .pro-locked-content { filter: blur(4px); pointer-events: none; user-select: none; }
        .pro-badge-inline { background: #FF8700; color: white; padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: 900; text-transform: uppercase; margin-left: 8px; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- HEADER (Basado en tu Dashboard actual) -->
    <header class="h-16 f1-navy flex items-center justify-between px-8 text-white sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <h1 class="text-2xl font-black italic tracking-tighter">Sonar<span class="text-[#FF8700]">IA</span></h1>
            <span id="header-plan-tag" class="text-[10px] font-black uppercase bg-white/10 px-2 py-0.5 rounded ml-2">Plan Free</span>
        </div>
        <div class="flex items-center gap-4">
            <span id="user-mail" class="text-[10px] font-bold opacity-60 italic">maunpb45@gmail.com</span>
            <button onclick="SonarIA.logout()" class="text-[10px] font-black uppercase text-[#FF8700]">Salir</button>
        </div>
    </header>

    <main class="max-w-2xl mx-auto mt-8 px-4 space-y-6">
        
        <!-- SECCIÓN: MI AULA -->
        <section class="glass-card p-8">
            <div class="flex items-center gap-2 mb-6 text-slate-400">
                <i data-lucide="layout-grid" class="w-4 h-4"></i>
                <h2 class="text-[10px] font-black uppercase tracking-widest">Mi Aula</h2>
            </div>
            <div id="grid-cursos" class="grid grid-cols-4 gap-2"></div>
        </section>

        <!-- SECCIÓN: ANALIZADOR -->
        <section class="glass-card p-8">
            <h2 class="text-xl font-black uppercase tracking-tighter mb-6 italic">Análisis de Canción</h2>
            <div class="space-y-4">
                <input id="in-titulo" type="text" placeholder="Título" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold focus:border-[#FF8700] outline-none transition-all">
                <input id="in-artista" type="text" placeholder="Artista" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold focus:border-[#FF8700] outline-none transition-all">
                <button onclick="SonarIA.analyze()" class="w-full f1-navy text-white p-5 rounded-2xl font-black uppercase italic tracking-tighter shadow-xl btn-animate flex items-center justify-center gap-2">
                    <i data-lucide="zap" class="w-5 h-5 text-[#FF8700] fill-[#FF8700]"></i> ANALIZAR
                </button>
            </div>
            <div id="loader" class="hidden pt-6 text-center animate-pulse">
                <span class="text-[10px] font-black uppercase text-slate-400">Escaneando Frecuencias...</span>
            </div>
        </section>

        <!-- RESULTADOS (DIAGNÓSTICO) - SIEMPRE FREE -->
        <section id="sec-diag" class="hidden glass-card p-10">
            <div class="flex justify-between items-start">
                <div class="flex-grow">
                    <h3 id="res-resultado" class="text-5xl font-black tracking-tighter text-[#001739] leading-none uppercase italic">--</h3>
                    <p id="res-just" class="text-slate-500 text-sm mt-4 font-medium leading-relaxed"></p>
                </div>
                <div class="text-right">
                    <div class="text-[10px] font-black text-slate-400 uppercase mb-1">Riesgo Escolar</div>
                    <div id="res-risk" class="text-5xl font-black text-[#001739]">0%</div>
                </div>
            </div>
        </section>

        <!-- AULA SEGURA (ADAPTACIÓN) - LÓGICA FREE/PRO -->
        <section id="sec-canvas" class="hidden glass-card overflow-hidden">
            <div class="flex bg-slate-50 border-b">
                <button onclick="SonarIA.tab('adapt')" id="tab-adapt" class="flex-1 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400 border-b-2 border-transparent transition-all">Adaptación <span class="pro-badge-inline">Pro</span></button>
                <button onclick="SonarIA.tab('trans')" id="tab-trans" class="flex-1 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400 border-b-2 border-transparent transition-all">Traducción <span class="pro-badge-inline">Pro</span></button>
                <button onclick="SonarIA.tab('orig')" id="tab-orig" class="flex-1 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400 border-b-2 border-transparent transition-all">Original</button>
            </div>
            <div class="p-10 relative">
                <!-- Bloqueo visual para Free -->
                <div id="pro-overlay-canvas" class="hidden absolute inset-0 z-10 flex flex-col items-center justify-center bg-white/60 backdrop-blur-sm p-6 text-center">
                    <i data-lucide="lock" class="w-8 h-8 text-[#FF8700] mb-4"></i>
                    <p class="font-black uppercase text-xs">Adaptación Escolar es PRO</p>
                    <a href="planes.html" class="mt-4 bg-[#FF8700] text-white px-6 py-2 rounded-xl font-black uppercase text-[10px]">Activar Pro</a>
                </div>

                <div id="canvas-content" class="text-sm leading-relaxed whitespace-pre-wrap">
                    <div id="res-adapt" class="font-bold text-slate-800"></div>
                    <div id="res-trans" class="hidden italic text-slate-700"></div>
                    <div id="res-orig" class="hidden text-slate-400 italic"></div>
                </div>
            </div>
        </section>

        <!-- RUTA CURRICULAR - LÓGICA FREE/PRO -->
        <section id="sec-plan" class="hidden glass-card p-10 relative">
            <h3 class="text-sm font-black uppercase tracking-widest text-slate-400 mb-6 italic">Ruta Curricular</h3>
            
            <div id="plan-tabs" class="flex gap-2 mb-6 overflow-x-auto"></div>
            
            <div class="relative">
                <!-- Bloqueo visual para Free -->
                <div id="pro-overlay-plan" class="hidden absolute inset-0 z-10 flex flex-col items-center justify-center bg-white/60 backdrop-blur-sm p-6 text-center">
                    <i data-lucide="crown" class="w-8 h-8 text-[#FF8700] mb-4"></i>
                    <p class="font-black uppercase text-xs italic">La Planificación Detallada es PRO</p>
                    <a href="planes.html" class="mt-4 bg-[#001739] text-white px-6 py-2 rounded-xl font-black uppercase text-[10px]">Ver Planes</a>
                </div>

                <div id="plan-content" class="space-y-4"></div>
            </div>

            <div class="mt-8 pt-8 border-t flex justify-end">
                <button onclick="SonarIA.handlePdf()" class="bg-[#FF8700] text-white px-8 py-4 rounded-2xl font-black uppercase text-[10px] shadow-lg flex items-center gap-2">
                    <i data-lucide="file-text" class="w-4 h-4"></i> Generar PDF <span class="opacity-50">PRO</span>
                </button>
            </div>
        </section>
    </main>

    <script>
        const API_URL = "https://sonaria-api-test.onrender.com";
        const COURSE_MAP = { "1° Básico":"1", "2° Básico":"2", "3° Básico":"3", "4° Básico":"4", "5° Básico":"5", "6° Básico":"6", "7° Básico":"7", "8° Básico":"8", "I° Medio":"1M", "II° Medio":"2M", "III° Medio":"3M", "IV° Medio":"4M" };

        window.SonarIA = {
            state: { 
                cursos: JSON.parse(localStorage.getItem('my_courses') || '["7", "8", "1M"]'), 
                user: JSON.parse(localStorage.getItem('sonaria_user') || '{"plan":"free", "email":"maunpb45@gmail.com"}'), 
                lastData: null 
            },

            init() { 
                lucide.createIcons();
                this.renderCourses(); 
                this.updatePlanUI();
                document.getElementById('user-mail').innerText = this.state.user.email; 
            },

            updatePlanUI() {
                const isPro = this.state.user.plan === 'pro';
                document.getElementById('header-plan-tag').innerText = isPro ? 'Plan Pro' : 'Plan Free';
                document.getElementById('header-plan-tag').classList.toggle('text-[#FF8700]', isPro);
            },

            renderCourses() { 
                const grid = document.getElementById('grid-cursos');
                grid.innerHTML = Object.keys(COURSE_MAP).map(c => `
                    <button onclick="SonarIA.toggleCourse('${c}')" class="p-3 rounded-xl border-2 text-[9px] font-black uppercase transition-all ${this.state.cursos.includes(COURSE_MAP[c]) ? 'bg-[#001739] text-white border-[#001739]' : 'bg-white text-slate-400 border-slate-100'}">
                    ${c}</button>`).join('');
            },

            toggleCourse(c) { 
                const code = COURSE_MAP[c];
                if(this.state.cursos.includes(code)) this.state.cursos = this.state.cursos.filter(x => x !== code); 
                else this.state.cursos.push(code); 
                localStorage.setItem('my_courses', JSON.stringify(this.state.cursos));
                this.renderCourses(); 
            },

            async analyze() {
                const t = document.getElementById('in-titulo').value.trim(); 
                if(!t) return alert("Título obligatorio");
                document.getElementById('loader').classList.remove('hidden');
                try {
                    const res = await fetch(API_URL + "/analizar", { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (localStorage.getItem('sonaria_token') || '')}, 
                        body: JSON.stringify({ titulo: t, artista: document.getElementById('in-artista').value, cursos_seleccionados: this.state.cursos }) 
                    });
                    const data = await res.json();
                    if(data.ok) { 
                        this.state.lastData = data; 
                        this.showResults(data); 
                    } else { alert("Error: " + data.error); }
                } catch (e) { alert("Error de conexión"); }
                finally { document.getElementById('loader').classList.add('hidden'); }
            },

            showResults(data) {
                const isPro = this.state.user.plan === 'pro';

                document.getElementById('sec-diag').classList.remove('hidden');
                document.getElementById('sec-canvas').classList.remove('hidden');
                document.getElementById('sec-plan').classList.remove('hidden');

                // Diagnóstico (Siempre Free)
                document.getElementById('res-resultado').innerText = data.resultado;
                document.getElementById('res-risk').innerText = data.risk_percent + "%";
                document.getElementById('res-just').innerText = data.justificacion || data.resumen || "Análisis completado.";

                // Safe Classroom (Adaptación/Traducción)
                document.getElementById('res-orig').innerText = data.original;
                document.getElementById('res-adapt').innerHTML = data.adaptada;
                document.getElementById('res-trans').innerText = data.traducida;

                // Lógica de Bloqueo Visual
                if(!isPro) {
                    document.getElementById('pro-overlay-canvas').classList.remove('hidden');
                    document.getElementById('canvas-content').classList.add('pro-locked-content');
                    document.getElementById('pro-overlay-plan').classList.remove('hidden');
                    document.getElementById('plan-content').classList.add('pro-locked-content');
                    this.tab('orig'); // Forzar pestaña original en Free
                } else {
                    document.getElementById('pro-overlay-canvas').classList.add('hidden');
                    document.getElementById('canvas-content').classList.remove('pro-locked-content');
                    document.getElementById('pro-overlay-plan').classList.add('hidden');
                    document.getElementById('plan-content').classList.remove('pro-locked-content');
                    this.tab('adapt');
                }

                this.renderPlan(data.pedagogia);
            },

            tab(m) { 
                const isPro = this.state.user.plan === 'pro';
                if(!isPro && (m === 'adapt' || m === 'trans')) {
                    return; // No dejar cambiar pestañas Pro en Free
                }

                const modes = ['adapt', 'trans', 'orig'];
                modes.forEach(mode => {
                    const el = document.getElementById(`res-${mode}`);
                    const btn = document.getElementById(`tab-${mode}`);
                    if(mode === m) {
                        el.classList.remove('hidden');
                        btn.classList.add('border-[#FF8700]', 'text-[#FF8700]');
                        btn.classList.remove('text-slate-400');
                    } else {
                        el.classList.add('hidden');
                        btn.classList.remove('border-[#FF8700]', 'text-[#FF8700]');
                        btn.classList.add('text-slate-400');
                    }
                });
            },

            renderPlan(ped) {
                const tabs = document.getElementById('plan-tabs');
                if(!ped.por_curso.length) { 
                    document.getElementById('plan-content').innerHTML = "<p class='text-[10px] font-bold text-slate-400 italic'>Sin contenido específico.</p>"; 
                    tabs.innerHTML=""; return; 
                }
                tabs.innerHTML = ped.por_curso.map((p, i) => `
                    <button onclick="SonarIA.showPlan(${i})" 
                        class="plan-tab-btn px-4 py-2 border rounded-xl font-black uppercase text-[9px] ${i===0 ? 'bg-[#001739] text-white border-[#001739]' : 'bg-white text-slate-400'}">
                        ${p.curso}°</button>`).join('');
                this.showPlan(0);
            },

            showPlan(idx) {
                const p = this.state.lastData.pedagogia.por_curso[idx];
                document.querySelectorAll('.plan-tab-btn').forEach((btn, i) => {
                    btn.classList.toggle('bg-[#001739]', i===idx);
                    btn.classList.toggle('text-white', i===idx);
                    btn.classList.toggle('text-slate-400', i!==idx);
                });

                document.getElementById('plan-content').innerHTML = `
                    <div class="bg-slate-50 p-6 rounded-2xl border">
                        <h4 class="text-[#FF8700] font-black uppercase text-[9px] mb-2">OA Sugerido</h4>
                        <p class="text-xs font-bold text-slate-700">${p.oa}</p>
                    </div>
                    <div class="bg-[#001739] text-white p-6 rounded-2xl">
                        <h4 class="text-orange-400 font-black uppercase text-[9px] mb-2">Actividad</h4>
                        <p class="text-xs italic leading-relaxed">${p.actividades[0]}</p>
                    </div>`;
            },

            handlePdf() {
                if(this.state.user.plan !== 'pro') {
                    alert("Exportar a PDF es una función exclusiva de SonarIA PRO.");
                    window.location.href = "planes.html";
                } else {
                    alert("Generando informe PDF...");
                }
            },

            logout() { localStorage.clear(); window.location.href = "login.html"; }
        };

        SonarIA.init();
    </script>
</body>
</html>
