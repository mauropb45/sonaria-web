<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <title>Sovereign Workspace | SonarIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; background-color: #F3F4F6; color: #001739; }
        .f1-navy { background-color: #001739; }
        .f1-orange { background-color: #FF8700; }
        .nav-btn.active { border-right: 4px solid #FF8700; background: rgba(255, 135, 0, 0.08); color: #FF8700; font-weight: 900; }
        .section { display: none; height: 100%; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        .course-tab.active { border-bottom: 4px solid #FF8700; color: #FF8700; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .scroll-v::-webkit-scrollbar { width: 4px; }
        .scroll-v::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">
    <header class="h-16 f1-navy flex items-center justify-between px-8 text-white shrink-0 z-50 shadow-2xl">
        <h1 class="text-2xl font-black italic tracking-tighter italic">Sonar<span class="text-[#FF8700]">IA</span></h1>
        <div class="flex items-center gap-6">
            <span id="badge-plan" class="text-[9px] font-black uppercase bg-orange-500 px-3 py-1 rounded-full text-white tracking-widest">Plan Free</span>
            <button onclick="SonarIA.logout()" class="text-[10px] font-black uppercase text-[#FF8700]">Salir</button>
        </div>
    </header>

    <div class="flex flex-grow overflow-hidden">
        <nav class="w-64 bg-white border-r border-slate-200 flex flex-col shrink-0 z-40 shadow-xl">
            <div class="p-6 flex flex-col gap-2">
                <button onclick="SonarIA.nav('sec-config')" id="nav-sec-config" class="nav-btn active p-4 rounded-xl text-sm font-bold text-left transition-all italic">⚙️ Mis Cursos</button>
                <button onclick="SonarIA.nav('sec-analyze')" id="nav-sec-analyze" class="nav-btn p-4 rounded-xl text-sm font-bold text-left transition-all italic">🔍 Analizador</button>
                <button onclick="SonarIA.nav('sec-diag')" id="nav-sec-diag" class="nav-btn p-4 rounded-xl text-sm font-bold opacity-30 text-left transition-all italic" disabled>🚦 Diagnóstico</button>
                <button onclick="SonarIA.nav('sec-canvas')" id="nav-sec-canvas" class="nav-btn p-4 rounded-xl text-sm font-bold opacity-30 text-left transition-all italic" disabled>📝 Dual Canvas</button>
                <button onclick="SonarIA.nav('sec-plan')" id="nav-sec-plan" class="nav-btn p-4 rounded-xl text-sm font-bold opacity-30 text-left transition-all italic" disabled>📅 Planificación</button>
            </div>
            <div class="mt-auto p-4 text-[10px] bg-slate-50 border-t truncate text-center font-bold text-[#001739]" id="user-mail">--</div>
        </nav>

        <main class="flex-grow p-8 overflow-hidden relative">
            <!-- SECCION 1: MI AULA -->
            <div id="sec-config" class="section active">
                <div class="max-w-4xl mx-auto space-y-8 pt-10">
                    <h2 class="text-5xl font-black border-l-8 border-[#FF8700] pl-6 text-[#001739] uppercase italic tracking-tighter">Mi Aula</h2>
                    <p class="text-slate-500 font-medium italic">Seleccione sus niveles para habilitar el motor de planificación institucional.</p>
                    <div class="grid grid-cols-4 gap-4" id="grid-cursos"></div>
                    <button onclick="SonarIA.saveConfig()" class="bg-[#FF8700] text-white px-10 py-5 rounded-2xl font-black uppercase shadow-xl hover:scale-105 active:scale-95 transition-all">Guardar Configuración →</button>
                </div>
            </div>

            <!-- SECCION 2: ANALIZADOR -->
            <div id="sec-analyze" class="section">
                <div class="max-w-2xl mx-auto py-10">
                    <h2 class="text-4xl font-black text-[#001739] mb-8 uppercase italic italic tracking-tighter">Nueva Evaluación</h2>
                    <div class="bg-white p-10 rounded-[3rem] shadow-2xl space-y-6 border">
                        <input id="in-titulo" type="text" placeholder="Título" class="w-full bg-slate-50 border-2 rounded-2xl p-5 text-xl font-bold focus:border-[#FF8700] outline-none">
                        <input id="in-artista" type="text" placeholder="Artista" class="w-full bg-slate-50 border-2 rounded-2xl p-5 text-xl font-bold focus:border-[#FF8700] outline-none">
                        <button onclick="SonarIA.analyze()" class="w-full f1-navy text-white p-6 rounded-2xl font-black uppercase tracking-widest shadow-xl">Analizar</button>
                    </div>
                </div>
            </div>

            <!-- SECCION 3: DIAGNOSTICO -->
            <div id="sec-diag" class="section">
                <div class="max-w-5xl mx-auto pt-10">
                    <div class="bg-white rounded-[3.5rem] p-12 shadow-2xl flex justify-between items-center border">
                        <div>
                            <h3 id="res-resultado" class="text-7xl font-black tracking-tighter italic text-[#001739]">--</h3>
                            <p id="res-just" class="text-slate-600 max-w-xl text-xl mt-4 font-medium italic leading-relaxed"></p>
                        </div>
                        <div class="text-right"><div id="res-risk" class="text-[10rem] font-black text-[#001739]">0%</div></div>
                    </div>
                </div>
            </div>

            <!-- SECCION 4: DUAL CANVAS -->
            <div id="sec-canvas" class="section h-full pb-20">
                <div class="grid grid-cols-2 gap-8 h-full relative">
                    <div class="bg-white rounded-[2.5rem] p-10 shadow-xl overflow-hidden border flex flex-col">
                        <h4 class="font-black uppercase mb-4 text-slate-400">Original</h4>
                        <div id="res-orig" class="flex-grow overflow-y-auto whitespace-pre-wrap italic scroll-v text-sm"></div>
                    </div>
                    <div class="bg-white rounded-[2.5rem] p-10 shadow-xl overflow-hidden border-4 border-orange-100 flex flex-col relative">
                        <h4 class="font-black uppercase mb-4 text-[#FF8700]">Adaptación Pro</h4>
                        <div id="res-adapt" class="flex-grow overflow-y-auto font-bold text-[#001739] scroll-v text-sm leading-relaxed"></div>
                        <div id="pro-lock" class="hidden absolute inset-0 bg-white/95 backdrop-blur-sm flex flex-col items-center justify-center p-8 text-center">
                            <span class="text-4xl mb-4">🔒</span>
                            <h4 class="font-black uppercase text-[#001739]">Exclusivo Pro</h4>
                            <p class="text-xs text-slate-500 mt-2">La adaptación pedagógica requiere suscripción activa.</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- SECCION 5: PLANIFICACIÓN (REEVALUACIÓN POR CURSO) -->
            <div id="sec-plan" class="section h-full overflow-hidden flex flex-col">
                <div class="flex gap-4 border-b mb-6" id="plan-tabs"></div>
                <div id="plan-content" class="flex-grow overflow-y-auto scroll-v pr-6 space-y-6">
                    <!-- Contenido dinámico por curso -->
                </div>
            </div>

            <div id="loader" class="hidden absolute inset-0 bg-white/80 backdrop-blur-sm z-[60] flex flex-col items-center justify-center">
                <div class="w-1.5 h-24 bg-[#FF8700] animate-bounce"></div>
                <h4 class="text-xs font-black uppercase mt-4 animate-pulse italic">Analizando Frecuencias...</h4>
            </div>
        </main>
    </div>

    <script>
        const API = "https://sonaria-api.onrender.com";
        const COURSE_MAP = { "1° Básico":"1", "2° Básico":"2", "3° Básico":"3", "4° Básico":"4", "5° Básico":"5", "6° Básico":"6", "7° Básico":"7", "8° Básico":"8", "I° Medio":"1M", "II° Medio":"2M", "III° Medio":"3M", "IV° Medio":"4M" };

        window.SonarIA = {
            state: { 
                cursos: JSON.parse(localStorage.getItem('my_courses') || '[]'),
                user: JSON.parse(localStorage.getItem('sonaria_user') || '{}'),
                lastData: null
            },
            init() {
                if(!localStorage.getItem('sonaria_token')) window.location.href = "login-test.html";
                document.getElementById('badge-plan').innerText = this.state.user.plan.toUpperCase();
                document.getElementById('user-mail').innerText = this.state.user.email;
                this.renderCourses();
                if(this.state.cursos.length === 0) this.nav('sec-config');
                else this.nav('sec-analyze');
            },
            renderCourses() {
                const grid = document.getElementById('grid-cursos');
                if(!grid) return;
                grid.innerHTML = Object.keys(COURSE_MAP).map(c => `
                    <button onclick="SonarIA.toggleCourse('${c}')" class="p-4 rounded-xl border-2 text-[10px] font-black uppercase transition-all ${this.state.cursos.includes(c) ? 'bg-[#001739] text-white' : 'bg-white text-slate-400'}">${c}</button>
                `).join('');
            },
            toggleCourse(c) {
                if(this.state.cursos.includes(c)) this.state.cursos = this.state.cursos.filter(x => x !== c);
                else this.state.cursos.push(c);
                this.renderCourses();
            },
            async saveConfig() {
                if(this.state.cursos.length === 0) return alert("Seleccione sus cursos.");
                localStorage.setItem('my_courses', JSON.stringify(this.state.cursos));
                await fetch(API + "/save-courses", {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('sonaria_token')},
                    body: JSON.stringify({ cursos: this.state.cursos })
                });
                this.nav('sec-analyze');
            },
            nav(id) {
                if(id !== 'sec-config' && this.state.cursos.length === 0) return alert("Primero configure sus cursos");
                if((id === 'sec-diag' || id === 'sec-canvas' || id === 'sec-plan') && !this.state.lastData) return;
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                if(document.getElementById('nav-' + id)) document.getElementById('nav-' + id).classList.add('active');
            },
            async analyze() {
                const t = document.getElementById('in-titulo').value.trim();
                const a = document.getElementById('in-artista').value.trim();
                if(!t) return alert("Título obligatorio");
                document.getElementById('loader').classList.remove('hidden');
                try {
                    const res = await fetch(API + "/analizar", {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('sonaria_token')},
                        body: JSON.stringify({ titulo: t, artista: a, cursos_seleccionados: this.state.cursos.map(c => COURSE_MAP[c]) })
                    });
                    if(res.status === 401) { alert("Sesión cerrada por seguridad."); this.logout(); return; }
                    const data = await res.json();
                    if(data.ok) {
                        this.state.lastData = data;
                        document.getElementById('res-resultado').innerText = data.resultado.toUpperCase();
                        document.getElementById('res-just').innerText = data.justificacion;
                        document.getElementById('res-risk').innerText = data.risk_percent + "%";
                        document.getElementById('res-orig').innerText = data.original;
                        document.getElementById('res-adapt').innerText = data.adaptada || "CANCION SEGURA";
                        
                        if(this.state.user.plan !== 'pro') document.getElementById('pro-lock').classList.remove('hidden');
                        else document.getElementById('pro-lock').classList.add('hidden');

                        this.renderPlanification(data.pedagogia);

                        ['nav-sec-diag', 'nav-sec-canvas', 'nav-sec-plan'].forEach(id => {
                            const b = document.getElementById(id); b.disabled = false; b.classList.remove('opacity-30');
                        });
                        this.nav('sec-diag');
                    }
                } catch (e) { alert("Error de Sincronización."); }
                finally { document.getElementById('loader').classList.add('hidden'); }
            },
            renderPlanification(ped) {
                const tabs = document.getElementById('plan-tabs');
                tabs.innerHTML = ped.por_curso.map((p, i) => `
                    <button onclick="SonarIA.showCoursePlan(${i})" class="course-tab p-4 font-black uppercase text-xs transition-all ${i===0 ? 'active':''}">${p.curso}</button>
                `).join('');
                this.showCoursePlan(0);
            },
            showCoursePlan(idx) {
                const p = this.state.lastData.pedagogia.por_curso[idx];
                document.querySelectorAll('.course-tab').forEach((t, i) => t.classList.toggle('active', i===idx));
                document.getElementById('plan-content').innerHTML = `
                    <div class="grid grid-cols-2 gap-6">
                        <div class="bg-white p-8 rounded-3xl border shadow-xl">
                            <h4 class="text-orange-500 font-black uppercase text-[10px] mb-4 tracking-widest">Match Curricular (OA)</h4>
                            <ul class="space-y-3 text-sm font-medium text-slate-600">${p.oa.map(o => `<li>• ${o}</li>`).join('')}</ul>
                        </div>
                        <div class="bg-[#001739] text-white p-8 rounded-3xl shadow-xl">
                            <h4 class="text-orange-400 font-black uppercase text-[10px] mb-4 tracking-widest">Actividad de Aula</h4>
                            <ul class="space-y-3 text-sm italic">${p.actividades.map(a => `<li>- ${a}</li>`).join('')}</ul>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <div class="bg-white p-8 rounded-3xl border">
                            <h4 class="text-[#001739] font-black uppercase text-[10px] mb-4 tracking-widest">Preguntas de Reflexión</h4>
                            <ul class="space-y-3 text-sm italic text-slate-500">${p.preguntas.map(pr => `<li>¿${pr}?</li>`).join('')}</ul>
                        </div>
                        <div class="bg-white p-8 rounded-3xl border">
                            <h4 class="text-[#001739] font-black uppercase text-[10px] mb-4 tracking-widest">Cierre Pedagógico</h4>
                            <ul class="space-y-3 text-sm text-slate-500">${p.reflexiones.map(r => `<li>${r}</li>`).join('')}</ul>
                        </div>
                    </div>
                `;
            },
            logout() { localStorage.clear(); window.location.href = "login-test.html"; }
        };
        SonarIA.init();
    </script>
</body>
</html>
