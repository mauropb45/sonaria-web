<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <title>Workspace | SonarIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; background-color: #F3F4F6; }
        .f1-navy { background-color: #001739; }
        .f1-orange { background-color: #FF8700; }
        .nav-btn.active { border-right: 4px solid #FF8700; background: rgba(255, 135, 0, 0.08); color: #FF8700; font-weight: 900; }
        .section { display: none; height: 100%; }
        .section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .scroll-v::-webkit-scrollbar { width: 4px; }
        .scroll-v::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">
    <header class="h-16 f1-navy flex items-center justify-between px-8 text-white shrink-0 z-50">
        <h1 class="text-2xl font-black italic tracking-tighter">Sonar<span class="text-[#FF8700]">IA</span></h1>
        <div class="flex items-center gap-6">
            <span id="user-display" class="text-[10px] font-bold uppercase text-white/50 tracking-widest"></span>
            <button onclick="SonarIA.logout()" class="text-[10px] font-black uppercase text-[#FF8700]">Cerrar Sesión</button>
        </div>
    </header>

    <div class="flex flex-grow overflow-hidden">
        <nav class="w-64 bg-white border-r border-slate-200 flex flex-col shrink-0 z-40">
            <div class="p-6 flex flex-col gap-2">
                <button onclick="SonarIA.nav('sec-config')" id="nav-sec-config" class="nav-btn active flex items-center gap-3 p-4 rounded-xl text-sm font-bold">⚙️ Mis Cursos</button>
                <button onclick="SonarIA.nav('sec-analyze')" id="nav-sec-analyze" class="nav-btn flex items-center gap-3 p-4 rounded-xl text-sm font-bold">🔍 Analizador</button>
                <button onclick="SonarIA.nav('sec-diag')" id="nav-sec-diag" class="nav-btn flex items-center gap-3 p-4 rounded-xl text-sm font-bold opacity-30" disabled>🚦 Diagnóstico</button>
                <button onclick="SonarIA.nav('sec-canvas')" id="nav-sec-canvas" class="nav-btn flex items-center gap-3 p-4 rounded-xl text-sm font-bold opacity-30" disabled>📝 Dual Canvas</button>
            </div>
        </nav>

        <main class="flex-grow p-8 overflow-hidden relative">
            <!-- SECCION: MIS CURSOS -->
            <div id="sec-config" class="section active">
                <div class="max-w-4xl mx-auto space-y-8">
                    <h2 class="text-5xl font-black italic border-l-8 border-[#FF8700] pl-6 text-[#001739] uppercase tracking-tighter">Mi Aula</h2>
                    <p class="text-slate-500 font-medium">Seleccione sus niveles para habilitar el analizador pedagógico.</p>
                    <div class="grid grid-cols-4 gap-4" id="grid-cursos"></div>
                    <button onclick="SonarIA.saveConfig()" class="f1-orange text-white px-10 py-5 rounded-2xl font-black uppercase text-sm shadow-xl active:scale-95 transition-all">Guardar Cambios →</button>
                </div>
            </div>

            <!-- SECCION: ANALIZADOR -->
            <div id="sec-analyze" class="section">
                <div class="max-w-2xl mx-auto py-10">
                    <h2 class="text-4xl font-black italic uppercase text-[#001739] mb-8">Nueva Evaluación</h2>
                    <div class="bg-white p-10 rounded-[3rem] shadow-2xl space-y-6 border">
                        <input id="in-titulo" type="text" placeholder="Título de la obra" class="w-full bg-slate-50 border-2 rounded-2xl p-5 text-xl font-bold focus:border-[#FF8700] outline-none">
                        <input id="in-artista" type="text" placeholder="Artista" class="w-full bg-slate-50 border-2 rounded-2xl p-5 text-xl font-bold focus:border-[#FF8700] outline-none">
                        <button onclick="SonarIA.analyze()" class="w-full f1-navy text-white p-6 rounded-2xl font-black uppercase tracking-widest shadow-xl hover:bg-slate-800 transition-all">Analizar</button>
                    </div>
                </div>
            </div>

            <!-- SECCION: DIAGNOSTICO -->
            <div id="sec-diag" class="section overflow-y-auto no-scrollbar">
                <div class="max-w-5xl mx-auto pt-10 pb-20">
                    <div class="bg-white rounded-[3.5rem] p-12 shadow-2xl flex justify-between items-center border">
                        <div>
                            <span class="bg-[#001739] text-[#FF8700] text-[10px] font-black px-4 py-1 rounded-full uppercase mb-4 inline-block">Resultado Oficial</span>
                            <h3 id="res-resultado" class="text-7xl font-black tracking-tighter leading-none italic mb-6">--</h3>
                            <p id="res-just" class="text-slate-600 max-w-xl text-xl font-medium leading-relaxed"></p>
                        </div>
                        <div class="text-right">
                            <div id="res-risk" class="text-[10rem] font-black tracking-tighter leading-none text-[#001739]">0%</div>
                            <p class="text-sm font-black text-slate-400 uppercase tracking-[0.3em]">Riesgo</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- SECCION: DUAL CANVAS -->
            <div id="sec-canvas" class="section h-full pb-20">
                <div class="grid grid-cols-2 gap-8 h-full">
                    <div class="bg-white rounded-[2.5rem] p-10 shadow-xl flex flex-col overflow-hidden border">
                        <h4 class="text-[10px] font-black text-slate-400 uppercase mb-6 tracking-widest text-center">Letra Original</h4>
                        <div id="res-orig" class="flex-grow overflow-y-auto scroll-v text-base italic text-slate-400 whitespace-pre-wrap"></div>
                    </div>
                    <div class="bg-white rounded-[2.5rem] p-10 shadow-xl flex flex-col border-4 border-orange-100 overflow-hidden">
                        <h4 class="text-[10px] font-black text-[#FF8700] uppercase mb-6 tracking-widest text-center">Versión Mediada</h4>
                        <div id="res-adapt" class="flex-grow overflow-y-auto scroll-v text-base font-bold text-[#001739] whitespace-pre-wrap"></div>
                    </div>
                </div>
            </div>

            <div id="loader" class="hidden absolute inset-0 bg-white/80 backdrop-blur-sm z-[60] flex flex-col items-center justify-center">
                <div class="w-1.5 h-24 f1-orange animate-bounce"></div>
            </div>
        </main>
    </div>

    <script>
        const API = "https://sonaria-api.onrender.com/analizar";
        const COURSE_MAP = { "1° Básico":"1", "2° Básico":"2", "3° Básico":"3", "4° Básico":"4", "5° Básico":"5", "6° Básico":"6", "7° Básico":"7", "8° Básico":"8", "I° Medio":"1M", "II° Medio":"2M", "III° Medio":"3M", "IV° Medio":"4M" };

        window.SonarIA = {
            state: { 
                cursos: JSON.parse(localStorage.getItem('my_courses') || '[]'),
                user: JSON.parse(localStorage.getItem('sonaria_user') || '{}')
            },
            init() {
                if(!localStorage.getItem('sonaria_token')) window.location.href = "login.html";
                document.getElementById('user-display').innerText = this.state.user.email;
                this.renderCourses();
                // Si no tiene cursos, forzar la sección de configuración
                if(this.state.cursos.length === 0) this.nav('sec-config');
            },
            renderCourses() {
                const grid = document.getElementById('grid-cursos');
                grid.innerHTML = Object.keys(COURSE_MAP).map(c => `
                    <button onclick="SonarIA.toggleCourse('${c}')" class="p-4 rounded-xl border-2 text-[10px] font-black uppercase transition-all ${this.state.cursos.includes(c) ? 'f1-navy text-white' : 'bg-white text-slate-400'}">${c}</button>
                `).join('');
            },
            toggleCourse(c) {
                if(this.state.cursos.includes(c)) this.state.cursos = this.state.cursos.filter(x => x !== c);
                else this.state.cursos.push(c);
                this.renderCourses();
            },
            saveConfig() {
                if(this.state.cursos.length === 0) return alert("Seleccione al menos un curso.");
                localStorage.setItem('my_courses', JSON.stringify(this.state.cursos));
                this.nav('sec-analyze');
            },
            nav(id) {
                // Impedir navegación a resultados si no hay análisis
                if((id === 'sec-diag' || id === 'sec-canvas') && !this.state.lastData) return;
                
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                const btn = document.getElementById('nav-' + id);
                if(btn) btn.classList.add('active');
            },
            async analyze() {
                const t = document.getElementById('in-titulo').value.trim();
                const a = document.getElementById('in-artista').value.trim();
                if(!t) return alert("Indique título");
                document.getElementById('loader').classList.remove('hidden');
                
                try {
                    const res = await fetch(API, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + localStorage.getItem('sonaria_token')
                        },
                        body: JSON.stringify({ titulo: t, artista: a, cursos_seleccionados: this.state.cursos.map(c => COURSE_MAP[c]) })
                    });
                    const data = await res.json();
                    if(data.ok) {
                        this.state.lastData = data;
                        document.getElementById('res-resultado').innerText = data.resultado.toUpperCase();
                        document.getElementById('res-just').innerText = data.justificacion;
                        document.getElementById('res-risk').innerText = data.risk_percent + "%";
                        document.getElementById('res-orig').innerText = data.letra_original;
                        document.getElementById('res-adapt').innerText = data.letra_adaptada;
                        ['nav-sec-diag', 'nav-sec-canvas'].forEach(id => {
                            const b = document.getElementById(id);
                            b.disabled = false; b.classList.remove('opacity-30');
                        });
                        this.nav('sec-diag');
                    } else { alert("Fallo: " + data.error); }
                } catch (e) {
                    alert("Sesión expirada o iniciada en otro dispositivo.");
                    this.logout();
                } finally { document.getElementById('loader').classList.add('hidden'); }
            },
            logout() { localStorage.clear(); window.location.href = "login.html"; }
        };
        SonarIA.init();
    </script>
</body>
</html>
