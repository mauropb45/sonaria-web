<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <title>SonarIA Dashboard v43.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; background-color: #F3F4F6; }
        .f1-navy { background-color: #001739; }
        .f1-orange { background-color: #FF8700; }
        .nav-btn.active { border-right: 4px solid #FF8700; background: rgba(255, 135, 0, 0.1); color: #FF8700; font-weight: 900; }
        .section-content { display: none; height: 100%; animation: fadeIn 0.4s ease; }
        .section-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .canvas-scroll::-webkit-scrollbar { width: 4px; }
        .canvas-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">
    <header class="h-16 f1-navy flex items-center justify-between px-8 text-white shrink-0 z-50 shadow-2xl">
        <h1 class="text-2xl font-black italic tracking-tighter">Sonar<span class="text-[#FF8700]">IA</span></h1>
        <button onclick="location.reload()" class="text-[10px] font-black uppercase text-orange-400">Reiniciar</button>
    </header>

    <div class="flex flex-grow overflow-hidden">
        <nav class="w-64 bg-white border-r border-slate-200 flex flex-col shrink-0 z-40 shadow-xl">
            <div class="p-6 flex flex-col gap-2">
                <button onclick="SonarIA.nav('sec-config')" id="btn-nav-config" class="nav-btn active flex items-center gap-3 p-4 rounded-xl text-sm font-bold transition-all">⚙️ Mi Aula</button>
                <button onclick="SonarIA.nav('sec-analyze')" id="btn-nav-analyze" class="nav-btn flex items-center gap-3 p-4 rounded-xl text-sm font-bold transition-all">🔍 Analizador</button>
                <button onclick="SonarIA.nav('sec-diag')" id="btn-nav-diag" class="nav-btn flex items-center gap-3 p-4 rounded-xl text-sm font-bold opacity-30 transition-all" disabled>🚦 Diagnóstico</button>
                <button onclick="SonarIA.nav('sec-canvas')" id="btn-nav-canvas" class="nav-btn flex items-center gap-3 p-4 rounded-xl text-sm font-bold opacity-30 transition-all" disabled>📝 Dual Canvas</button>
            </div>
        </nav>

        <main class="flex-grow p-8 overflow-hidden relative">
            <div id="sec-config" class="section-content active">
                <div class="max-w-4xl mx-auto space-y-8">
                    <h2 class="text-5xl font-black italic border-l-8 border-[#FF8700] pl-6 text-[#001739]">MI AULA</h2>
                    <div class="grid grid-cols-4 gap-4" id="course-grid"></div>
                    <button onclick="SonarIA.nav('sec-analyze')" class="f1-orange text-white px-10 py-5 rounded-2xl font-black uppercase text-sm shadow-xl hover:scale-105 transition-all">Siguiente →</button>
                </div>
            </div>

            <div id="sec-analyze" class="section-content">
                <div class="max-w-2xl mx-auto py-10">
                    <h2 class="text-4xl font-black italic uppercase text-[#001739] mb-8">Analizador</h2>
                    <div class="bg-white p-10 rounded-[3rem] shadow-2xl space-y-6 border">
                        <input id="in-titulo" type="text" placeholder="Título" class="w-full bg-slate-50 border-2 rounded-2xl p-5 text-xl font-bold">
                        <input id="in-artista" type="text" placeholder="Artista" class="w-full bg-slate-50 border-2 rounded-2xl p-5 text-xl font-bold">
                        <button onclick="SonarIA.analyze()" class="w-full f1-navy text-white p-6 rounded-2xl font-black uppercase tracking-[0.2em] shadow-xl hover:bg-[#08234d] transition-all">Analizar</button>
                    </div>
                </div>
            </div>

            <div id="sec-diag" class="section-content overflow-y-auto no-scrollbar pt-10 pb-20">
                <div class="max-w-5xl mx-auto space-y-6">
                    <div class="bg-white rounded-[3.5rem] p-12 shadow-2xl flex justify-between items-center border">
                        <div>
                            <span class="bg-[#001739] text-[#FF8700] text-[10px] font-black px-4 py-1.5 rounded-full uppercase mb-4 inline-block">Veredicto Motor v34</span>
                            <h3 id="res-resultado" class="text-7xl font-black tracking-tighter leading-none italic mb-6">--</h3>
                            <p id="res-just" class="text-slate-600 max-w-xl text-xl font-medium"></p>
                        </div>
                        <div class="text-right">
                            <div id="res-risk" class="text-[10rem] font-black tracking-tighter leading-none text-[#001739]">0%</div>
                            <p class="text-sm font-black text-slate-400 uppercase tracking-[0.3em]">Riesgo</p>
                        </div>
                    </div>
                    <div id="res-oa" class="grid grid-cols-2 gap-6 bg-white p-10 rounded-[3rem] shadow-xl border"></div>
                </div>
            </div>

            <div id="sec-canvas" class="section-content h-full pb-20">
                <div class="grid grid-cols-2 gap-8 h-full">
                    <div class="bg-white rounded-[2.5rem] p-10 shadow-xl flex flex-col overflow-hidden">
                        <h4 class="text-[10px] font-black text-slate-400 uppercase mb-6 tracking-widest text-center italic">Original</h4>
                        <div id="res-orig" class="flex-grow overflow-y-auto canvas-scroll text-base italic text-slate-400 whitespace-pre-wrap"></div>
                    </div>
                    <div class="bg-white rounded-[2.5rem] p-10 shadow-xl flex flex-col border-4 border-orange-100 overflow-hidden">
                        <h4 class="text-[10px] font-black text-[#FF8700] uppercase mb-6 tracking-widest text-center font-black italic">Propuesta de Mediación</h4>
                        <div id="res-adapt" class="flex-grow overflow-y-auto canvas-scroll text-base font-bold text-[#001739] whitespace-pre-wrap"></div>
                    </div>
                </div>
            </div>

            <div id="loader" class="hidden absolute inset-0 bg-white/90 backdrop-blur-sm z-[60] flex flex-col items-center justify-center">
                <div class="w-1.5 h-24 bg-[#FF8700] animate-bounce"></div>
                <h4 class="text-sm font-black uppercase mt-4 animate-pulse">Procesando...</h4>
            </div>
        </main>
    </div>

    <script>
        const API = "https://sonaria-api.onrender.com";
        const COURSE_MAP = { "1° Básico":"1", "2° Básico":"2", "3° Básico":"3", "4° Básico":"4", "5° Básico":"5", "6° Básico":"6", "7° Básico":"7", "8° Básico":"8", "I° Medio":"1M", "II° Medio":"2M", "III° Medio":"3M", "IV° Medio":"4M" };

        window.SonarIA = {
            state: { cursos: JSON.parse(localStorage.getItem('my_courses') || '[]') },
            init() { this.renderCourses(); },
            renderCourses() {
                const grid = document.getElementById('course-grid');
                if(!grid) return;
                grid.innerHTML = Object.keys(COURSE_MAP).map(c => `
                    <button onclick="SonarIA.toggleCourse('${c}')" class="p-4 rounded-xl border-2 text-[10px] font-black uppercase transition-all ${this.state.cursos.includes(c) ? 'f1-navy text-white' : 'bg-white text-slate-400'}">${c}</button>
                `).join('');
            },
            toggleCourse(c) {
                if(this.state.cursos.includes(c)) this.state.cursos = this.state.cursos.filter(x => x !== c);
                else this.state.cursos.push(c);
                localStorage.setItem('my_courses', JSON.stringify(this.state.cursos));
                this.renderCourses();
            },
            nav(id) {
                document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                const btn = document.getElementById('btn-nav-' + id.split('-')[1]);
                if(btn) btn.classList.add('active');
            },
            async analyze() {
                const t = document.getElementById('in-titulo').value.trim();
                const a = document.getElementById('in-artista').value.trim();
                if(!t) return alert("Indique el título");
                document.getElementById('loader').classList.remove('hidden');
                try {
                    const res = await fetch(API + "/analizar", {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ titulo: t, artista: a, cursos_seleccionados: this.state.cursos.map(c => COURSE_MAP[c]) })
                    });
                    const data = await res.json();
                    if(data.ok) {
                        document.getElementById('res-resultado').innerText = data.resultado.toUpperCase();
                        document.getElementById('res-just').innerText = data.justificacion;
                        document.getElementById('res-risk').innerText = data.risk_percent + "%";
                        document.getElementById('res-orig').innerText = data.letra_original;
                        document.getElementById('res-adapt').innerText = data.letra_adaptada || "APTA PARA USO DIRECTO.";
                        document.getElementById('res-oa').innerHTML = data.cursos_sugeridos.map(c => `<div class="border-l-4 border-orange-500 pl-4 py-1"><p class="font-black text-[10px] text-orange-500 uppercase tracking-widest">NIVEL ${c}</p><p class="text-xs font-bold leading-tight">OA: Apreciar y analizar manifestaciones musicales.</p></div>`).join('');
                        ['btn-nav-diag', 'btn-nav-canvas'].forEach(id => { 
                            const b = document.getElementById(id); b.disabled = false; b.classList.remove('opacity-30');
                        });
                        this.nav('sec-diag');
                    } else { alert("Fallo Motor: " + data.error); }
                } catch (e) { alert("Error de Sincronización."); }
                finally { document.getElementById('loader').classList.add('hidden'); }
            }
        };
        document.addEventListener('DOMContentLoaded', () => SonarIA.init());
    </script>
</body>
</html>
