<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SonarIA | Sovereign Workspace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; @apply bg-[#FDFDFF] text-[#060D2E]; overflow: hidden; }
    .sidebar { @apply bg-[#000B29] h-screen transition-all duration-500 flex flex-col z-50 shadow-2xl; width: 280px; }
    .sidebar.collapsed { width: 85px; }
    .nav-link { @apply flex items-center gap-4 px-6 py-4 mx-3 rounded-2xl transition-all cursor-pointer text-slate-400 font-bold text-sm mb-1; }
    .nav-link.active { @apply bg-white/5 text-white border-l-4 border-[#FF8000] shadow-lg; }
    .nav-link:hover:not(.active) { @apply bg-white/5 text-white; }
    .workspace { @apply flex-1 flex flex-col h-screen overflow-y-auto custom-scroll p-12 bg-white/50 relative transition-all; }
    .bento-card { @apply bg-white border border-slate-100 rounded-[40px] p-10 shadow-sm hover:shadow-2xl transition-all duration-500; }
    .mirror-row { display: grid; grid-template-columns: 1fr 1fr 1.2fr; @apply gap-10 p-6 border-b border-slate-50 transition-all items-center rounded-3xl; }
    .mirror-row:hover { @apply bg-blue-50/50 scale-[1.01] shadow-inner; }
    .custom-scroll::-webkit-scrollbar { width: 4px; }
    .custom-scroll::-webkit-scrollbar-thumb { @apply bg-slate-200 rounded-full; }
  </style>
</head>
<body class="antialiased">

  <div class="flex h-screen overflow-hidden">
    <!-- SIDEBAR DE PROCESO INTELIGENTE -->
    <aside id="sidebar" class="sidebar">
        <div class="p-8 mb-6 flex justify-between items-center">
            <h1 class="text-2xl font-black text-white italic tracking-tighter nav-text">Sonar<span class="text-[#FF8000]">IA</span></h1>
            <button onclick="toggleSidebar()" class="text-slate-500 hover:text-white"><i data-lucide="menu"></i></button>
        </div>

        <nav class="flex-1 space-y-1">
            <div onclick="showSection('setup', this)" class="nav-link"><i data-lucide="settings"></i> <span class="nav-text">01 Configuración</span></div>
            <div onclick="showSection('radar', this)" class="nav-link active"><i data-lucide="radar"></i> <span class="nav-text">02 Radar (Semáforo)</span></div>
            <div onclick="showSection('pedagogy', this)" class="nav-link"><i data-lucide="graduation-cap"></i> <span class="nav-text">03 Inteligencia</span></div>
            <div onclick="showSection('sync', this)" class="nav-link"><i data-lucide="languages"></i> <span class="nav-text">04 Sincro Métrica</span></div>
            <div onclick="showSection('reports', this)" class="nav-link"><i data-lucide="file-text"></i> <span class="nav-text">05 Reportes UTP</span></div>
        </nav>

        <div class="p-8 mt-auto border-t border-white/5 bg-black/20">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-2xl bg-[#00665E] flex items-center justify-center font-black text-white italic">M</div>
                <div class="nav-text leading-tight"><p class="text-xs font-bold text-white italic">Mauricio P.</p><p class="text-[9px] text-slate-500 uppercase font-black">Pro Workspace</p></div>
            </div>
        </div>
    </aside>

    <!-- WORKSPACE -->
    <main class="workspace flex-1">
        <header class="flex justify-between items-center mb-16">
            <h2 id="viewTitle" class="text-3xl font-[950] tracking-tight text-[#000B29] uppercase italic italic">Radar de Aula</h2>
            <div class="px-6 py-2 bg-white rounded-full border border-slate-100 flex items-center gap-3 shadow-sm italic font-bold text-[10px]">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_#22c55e]"></span> MOTOR v25.0 LIVE
            </div>
        </header>

        <div class="max-w-6xl mx-auto space-y-12">
            <!-- INPUT PANEL -->
            <section class="bento-card p-12 border-b-[16px] border-[#000B29] bg-white">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    <div class="space-y-6">
                        <input id="titulo" type="text" placeholder="Imagine - John Lennon" class="w-full p-5 bg-slate-50 rounded-3xl font-bold text-xl border-transparent focus:bg-white focus:ring-8 focus:ring-blue-100 transition-all outline-none">
                    </div>
                    <div class="flex flex-col justify-end">
                        <button id="analyzeBtn" class="bg-[#000B29] text-white py-6 rounded-[32px] font-black text-lg hover:bg-[#FF8000] shadow-2xl active:scale-95 transition-all italic italic">Iniciar Evaluación</button>
                    </div>
                </div>
            </section>

            <!-- RESULTS (SHOWN AFTER ANALYSIS) -->
            <div id="resultsWrapper" class="hidden space-y-12 pb-40">
                <div id="statusHero" class="bento-card p-12 border-t-[24px] flex justify-between items-center bg-white shadow-xl">
                    <div class="flex-1">
                        <span id="resPill" class="px-4 py-1.5 bg-slate-100 rounded-full text-[10px] font-black uppercase text-slate-500 mb-6 inline-block italic tracking-widest">—</span>
                        <h3 id="summaryTitle" class="text-6xl font-black tracking-tighter italic text-[#000B29] leading-none mb-4">—</h3>
                    </div>
                    <div class="text-right">
                        <div class="text-[120px] font-black italic tracking-tighter text-[#000B29] leading-none" id="riskValue">0%</div>
                        <p class="text-[10px] font-black text-red-600 uppercase tracking-widest italic tracking-[0.3em]">Riesgo Escolar</p>
                    </div>
                </div>
                <!-- Mirror Section -->
                <div class="bento-card !p-0 overflow-hidden">
                    <div class="p-8 bg-[#000B29] text-white flex justify-between items-center px-12 italic italic">
                        <h4 class="text-[10px] font-black uppercase tracking-[0.5em]">Linguistic Mirror: Sincronización Métrica</h4>
                        <button class="bg-blue-600 px-6 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg italic">Bajar Pack PDF</button>
                    </div>
                    <div id="lyricsContainer" class="bg-white p-6 space-y-2"></div>
                </div>
            </div>
            
            <div id="placeholder" class="h-96 flex flex-col items-center justify-center border-4 border-dashed border-slate-200 rounded-[48px] text-slate-200 font-black text-2xl uppercase tracking-tighter">
                SonarIA Sovereign Studio Ready
            </div>
        </div>
    </main>
  </div>

  <script>
    lucide.createIcons();
    const API_BASE = "https://sonaria-api-test.onrender.com";
    const $ = id => document.getElementById(id);

    function toggleSidebar() {
        $("sidebar").classList.toggle("collapsed");
        document.querySelectorAll(".nav-text").forEach(t => t.classList.toggle("hidden"));
    }

    async function analizar() {
        const btn = $("analyzeBtn");
        if (!$("titulo").value) return;
        btn.disabled = true; btn.innerHTML = `<span class="animate-pulse">ESCANEANDO...</span>`;
        try {
            const res = await fetch(`${API_BASE}/api/analizar/v24`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem("mejoraria_token") },
                body: JSON.stringify({ titulo: $("titulo").value })
            });
            const raw = await res.json();
            const data = raw.data;

            $("placeholder").classList.add("hidden");
            $("resultsWrapper").classList.remove("hidden");
            $("statusHero").style.borderColor = data.color === "green" ? "#00665E" : data.color === "orange" ? "#FF8000" : "#E10600";
            $("riskValue").innerText = data.risk_percent + "%";
            $("summaryTitle").innerText = data.resultado;
            $("resPill").innerText = data.resultado;

            $("lyricsContainer").innerHTML = data.letra_comparada.map(l => `
                <div class="mirror-row group hover:bg-blue-50/50 flex gap-10 p-4 border-b border-slate-50 transition-all rounded-xl">
                    <div class="text-[10px] text-slate-300 italic flex-1">${l.original}</div>
                    <div class="text-sm font-black flex-1 ${l.changed ? 'text-blue-500' : 'text-slate-800'} italic">${l.adapted}</div>
                </div>
            `).join('');

        } catch(e) { alert("Error de Sincronización v25"); }
        finally { btn.disabled = false; btn.innerText = "Iniciar Evaluación"; }
    }
    $("analyzeBtn").onclick = analizar;
  </script>
</body>
</html>
