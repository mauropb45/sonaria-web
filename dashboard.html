<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <title>SonarIA v37.3 | Sovereign Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; background-color: #F3F4F6; color: #001739; }
        .f1-navy { background-color: #001739; }
        .f1-orange { background-color: #FF8700; }
        .nav-btn.active { border-right: 4px solid #FF8700; background: rgba(255, 135, 0, 0.1); color: #FF8700; }
        .section-content { display: none; height: 100%; animation: fadeIn 0.3s ease; }
        .section-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .canvas-scroll::-webkit-scrollbar { width: 4px; }
        .canvas-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <header class="h-16 f1-navy flex items-center justify-between px-8 text-white shadow-2xl shrink-0 z-50">
        <h1 class="text-2xl font-black italic">Sonar<span class="text-[#FF8700]">IA</span></h1>
        <div class="flex items-center gap-4">
            <span id="engine-status" class="text-[9px] font-black uppercase text-orange-400">Sincronizando Motor...</span>
            <button onclick="location.reload()" class="text-[10px] font-black uppercase text-white/40 hover:text-white transition-colors">Reiniciar</button>
        </div>
    </header>

    <div class="flex flex-grow overflow-hidden">
        <nav class="w-64 bg-white border-r border-slate-200 flex flex-col shrink-0 shadow-xl z-40">
            <div class="p-6 flex flex-col gap-2">
                <button onclick="SonarIA.nav('sec-config')" id="btn-nav-config" class="nav-btn active flex items-center gap-3 p-4 rounded-xl text-sm font-bold">⚙️ Mi Aula</button>
                <button onclick="SonarIA.nav('sec-analyze')" id="btn-nav-analyze" class="nav-btn flex items-center gap-3 p-4 rounded-xl text-sm font-bold">🔍 Analizador</button>
                <button onclick="SonarIA.nav('sec-diag')" id="btn-nav-diag" class="nav-btn flex items-center gap-3 p-4 rounded-xl text-sm font-bold opacity-30" disabled>🚦 Diagnóstico</button>
                <button onclick="SonarIA.nav('sec-canvas')" id="btn-nav-canvas" class="nav-btn flex items-center gap-3 p-4 rounded-xl text-sm font-bold opacity-30" disabled>📝 Dual Canvas</button>
                <button onclick="SonarIA.nav('sec-pedagogy')" id="btn-nav-pedagogy" class="nav-btn flex items-center gap-3 p-4 rounded-xl text-sm font-bold opacity-30" disabled>🎓 Guía Docente</button>
            </div>
        </nav>

        <main class="flex-grow p-8 overflow-hidden relative">
            
            <div id="sec-config" class="section-content active">
                <div class="max-w-4xl mx-auto space-y-8">
                    <h2 class="text-5xl font-black italic tracking-tighter uppercase border-l-8 border-[#FF8700] pl-6">Mi Perfil de Aula</h2>
                    <div class="grid grid-cols-4 gap-4" id="course-grid"></div>
                    <button onclick="SonarIA.saveConfig()" class="f1-orange text-white px-10 py-5 rounded-2xl font-black uppercase text-sm shadow-xl active:scale-95 transition-all">Guardar e Ir al Analizador →</button>
                </div>
            </div>

            <div id="sec-analyze" class="section-content">
                <div class="max-w-2xl mx-auto space-y-8 py-10">
                    <h2 class="text-4xl font-black italic tracking-tighter uppercase">Analizador de Obra</h2>
                    <div class="bg-white p-10 rounded-[3rem] shadow-2xl space-y-6 border border-slate-100 text-left">
                        <input id="in-titulo" type="text" placeholder="Canción" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-5 text-xl font-bold focus:border-[#FF8700] outline-none transition-all">
                        <input id="in-artista" type="text" placeholder="Artista" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-5 text-xl font-bold focus:border-[#FF8700] outline-none transition-all">
                        <button id="btn-run" onclick="SonarIA.analyze()" class="w-full f1-navy text-white p-6 rounded-2xl font-black uppercase tracking-[0.3em] shadow-xl hover:bg-[#08234d] transition-all">Analizar</button>
                    </div>
                </div>
            </div>

            <div id="sec-diag" class="section-content">
                <div class="max-w-5xl mx-auto py-10">
                    <div class="bg-white rounded-[3.5rem] p-12 shadow-2xl flex justify-between items-center border border-white">
                        <div>
                            <span class="bg-[#001739] text-[#FF8700] text-[10px] font-black px-4 py-1.5 rounded-full uppercase mb-6 inline-block">Resultado Oficial</span>
                            <h3 id="res-resultado" class="text-7xl font-black tracking-tighter leading-none italic mb-6">--</h3>
                            <p id="res-just" class="text-slate-600 max-w-xl text-xl font-medium italic"></p>
                        </div>
                        <div class="text-right">
                            <div id="res-risk" class="text-[10rem] font-black tracking-tighter leading-none">0%</div>
                            <p class="text-sm font-black text-slate-400 uppercase tracking-[0.4em]">Riesgo</p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="sec-canvas" class="section-content h-full pb-20">
                <div class="grid grid-cols-2 gap-8 h-full">
                    <div class="bg-white rounded-[2.5rem] p-10 shadow-xl flex flex-col border border-slate-100 overflow-hidden">
                        <h4 class="text-[10px] font-black text-slate-400 uppercase mb-6">Lírica Original</h4>
                        <div id="res-orig" class="flex-grow overflow-y-auto canvas-scroll text-base leading-relaxed text-slate-400 italic whitespace-pre-wrap pr-4"></div>
                    </div>
                    <div class="bg-white rounded-[2.5rem] p-10 shadow-xl flex flex-col border-4 border-[#FF8700]/10 overflow-hidden">
                        <h4 class="text-[10px] font-black text-[#FF8700] uppercase mb-6">Propuesta Pro</h4>
                        <div id="res-adapt" class="flex-grow overflow-y-auto canvas-scroll text-base leading-relaxed text-[#001739] font-bold whitespace-pre-wrap pr-4"></div>
                    </div>
                </div>
            </div>

            <div id="sec-pedagogy" class="section-content">
                <div class="max-w-5xl mx-auto grid grid-cols-2 gap-8 py-10 text-center">
                    <div class="bg-white p-10 rounded-[3rem] shadow-xl border border-blue-50">
                        <h4 class="text-xs font-black text-[#FF8700] uppercase mb-6 italic text-center">OA MINEDUC</h4>
                        <div id="res-oa" class="space-y-6 text-sm font-semibold text-slate-600 text-left"></div>
                    </div>
                    <div class="bg-[#001739] p-10 rounded-[3rem] shadow-2xl text-white">
                        <h4 class="text-xs font-black text-orange-400 uppercase mb-6 italic tracking-widest text-center">Actividad</h4>
                        <p id="res-act" class="text-2xl font-bold italic mt-10"></p>
                    </div>
                </div>
            </div>

            <div id="loader" class="hidden absolute inset-0 bg-white/80 backdrop-blur-sm z-[60] flex flex-col items-center justify-center">
                <div class="w-1.5 h-24 bg-[#FF8700] animate-bounce mb-6"></div>
                <h4 class="text-sm font-black uppercase tracking-[0.6em] animate-pulse">Analizando...</h4>
            </div>

        </main>
    </div>

    <script>
        // DECLARACIÓN INMEDIATA (Soluciona ReferenceError)
        window.SonarIA = {
            API_URL: "https://sonaria-api.onrender.com",
            COURSE_MAP: { "1° Básico":"1", "2° Básico":"2", "3° Básico":"3", "4° Básico":"4", "5° Básico":"5", "6° Básico":"6", "7° Básico":"7", "8° Básico":"8", "I° Medio":"1M", "II° Medio":"2M", "III° Medio":"3M", "IV° Medio":"4M" },
            state: { cursos: JSON.parse(localStorage.getItem('my_courses') || '[]') },

            init() {
                this.renderCourseGrid();
                this.checkEngine();
            },

            async checkEngine() {
                try {
                    const res = await fetch(this.API_URL + "/");
                    if(res.ok) {
                        document.getElementById('engine-status').innerText = "ENGINE ONLINE";
                        document.getElementById('engine-status').className = "text-[9px] font-black text-green-400 uppercase";
                    }
                } catch(e) { setTimeout(() => this.checkEngine(), 3000); }
            },

            renderCourseGrid() {
                const grid = document.getElementById('course-grid');
                if(!grid) return;
                grid.innerHTML = Object.keys(this.COURSE_MAP).map(c => `
                    <button onclick="SonarIA.toggleCourse('${c}')" 
                            class="p-5 rounded-2xl border-2 text-[11px] font-black uppercase transition-all ${this.state.cursos.includes(c) ? 'f1-navy text-white border-[#001739]' : 'bg-white border-slate-100 text-slate-400'}">
                        ${c}
                    </button>
                `).join('');
            },

            toggleCourse(c) {
                if(this.state.cursos.includes(c)) this.state.cursos = this.state.cursos.filter(x => x !== c);
                else this.state.cursos.push(c);
                this.renderCourseGrid();
            },

            saveConfig() {
                localStorage.setItem('my_courses', JSON.stringify(this.state.cursos));
                this.nav('sec-analyze');
            },

            nav(secId) {
                document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                const target = document.getElementById(secId);
                if(target) target.classList.add('active');
                const btnId = 'btn-nav-' + secId.split('-')[1];
                if(document.getElementById(btnId)) document.getElementById(btnId).classList.add('active');
            },

            async analyze() {
                const titulo = document.getElementById('in-titulo').value.trim();
                const artista = document.getElementById('in-artista').value.trim();
                if(!titulo) return alert("Indique el título");

                document.getElementById('loader').classList.remove('hidden');
                const codigos = this.state.cursos.map(c => this.COURSE_MAP[c]);

                try {
                    const response = await fetch(this.API_URL + "/analizar", {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ titulo, artista, cursos_seleccionados: codigos })
                    });
                    const data = await response.json();
                    if(data.ok) {
                        this.renderResults(data);
                        this.unlock(true);
                        this.nav('sec-diag');
                    } else { alert("Fallo: " + (data.error || "No encontrado")); }
                } catch (err) { 
                    alert("Error de Sincronización. El motor está despertando."); 
                } finally { 
                    document.getElementById('loader').classList.add('hidden'); 
                }
            },

            renderResults(data) {
                document.getElementById('res-resultado').innerText = data.resultado.toUpperCase();
                document.getElementById('res-just').innerText = data.justificacion;
                document.getElementById('res-risk').innerText = data.risk_percent + "%";
                document.getElementById('res-orig').innerText = data.letra_original;
                document.getElementById('res-adapt').innerText = data.letra_adaptada || "CANCION SEGURA PARA USO DIRECTO.";
                
                document.getElementById('res-oa').innerHTML = data.cursos_sugeridos.map(c => `<div class="border-l-4 border-orange-500 pl-6 py-2"><p class="font-black text-[10px] text-orange-500">NIVEL ${c}</p><p class="font-bold italic">OA 01: Apreciar y analizar manifestaciones musicales considerando contexto e impacto en los oyentes.</p></div>`).join('');
                document.getElementById('res-act').innerText = `DESAFÍO: Analizar el tema "${data.temas[0] || 'la obra'}" y su relación con el entorno social del curso.`;
            },

            unlock(val) {
                ['btn-nav-diag', 'btn-nav-canvas', 'btn-nav-pedagogy'].forEach(id => {
                    const btn = document.getElementById(id);
                    if(btn) { btn.disabled = !val; btn.classList.toggle('opacity-30', !val); }
                });
            }
        };

        // KICKSTART
        document.addEventListener('DOMContentLoaded', () => SonarIA.init());
    </script>
</body>
</html>
