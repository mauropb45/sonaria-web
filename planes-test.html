<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Planes Pro | SonarIA Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f7fa; }
        .f1-gradient { background: linear-gradient(135deg, #001739 0%, #002b66 100%); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">
    <div class="max-w-4xl w-full text-center">
        <h1 class="text-6xl font-black italic tracking-tighter text-[#001739] mb-4 uppercase">Sonar<span class="text-orange-500">IA</span> PRO</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-12">
            <div class="bg-white rounded-[3rem] p-10 shadow-2xl border">
                <h3 class="text-2xl font-black uppercase italic mb-2">Mensual Test</h3>
                <div class="text-5xl font-black text-[#001739] mb-8">$10 <span class="text-lg">CLP</span></div>
                <button onclick="comprar('pro_monthly', this)" class="w-full f1-gradient text-white py-5 rounded-2xl font-black uppercase italic shadow-lg">Pagar $10</button>
            </div>
            <div class="f1-navy text-white rounded-[3rem] p-10 shadow-2xl">
                <h3 class="text-2xl font-black uppercase italic mb-2">Anual Test</h3>
                <div class="text-5xl font-black mb-8">$20 <span class="text-lg">CLP</span></div>
                <button onclick="comprar('pro_annual', this)" class="w-full bg-white text-[#001739] py-5 rounded-2xl font-black uppercase italic shadow-lg">Pagar $20</button>
            </div>
        </div>
    </div>
    <script>
        lucide.createIcons();
        async function comprar(plan, btn) {
            const token = localStorage.getItem("sonaria_token");
            const user = JSON.parse(localStorage.getItem("sonaria_user") || "{}");
            const oldText = btn.innerText;
            btn.disabled = true; btn.innerText = "Cargando...";

            try {
                const res = await fetch("https://sonaria-api-test.onrender.com/payments/create-checkout", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                    body: JSON.stringify({ plan, email: user.email })
                });
                const data = await res.json();
                if(data.ok && data.checkout_url) window.location.href = data.checkout_url;
                else alert("Error en el servidor: " + data.error);
            } catch (e) { alert("Error de conexión."); }
            finally { btn.disabled = false; btn.innerText = oldText; }
        }
    </script>
</body>
</html>
