<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planes Pro | SonarIA Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f7fa; }
        .f1-gradient { background: linear-gradient(135deg, #001739 0%, #002b66 100%); }
        .orange-glow { box-shadow: 0 15px 30px -5px rgba(255, 135, 0, 0.4); }
        .card-pro { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid transparent; }
        .card-pro:hover { transform: translateY(-10px); border-color: #FF8700; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-5xl w-full">
        <div class="text-center mb-12">
            <h1 class="text-6xl font-black italic tracking-tighter text-[#001739] mb-4 uppercase">
                Sonar<span class="text-orange-500">IA</span> PRO
            </h1>
            <p class="text-xl text-slate-400 font-medium italic">Modo Laboratorio: Precios de Prueba habilitados.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
            <div class="bg-white rounded-[3rem] p-10 shadow-2xl card-pro flex flex-col">
                <h3 class="text-3xl font-black italic text-[#001739] mb-2 uppercase italic">Prueba Mensual</h3>
                <div class="text-5xl font-black text-[#001739] mb-6">$10 <span class="text-lg text-slate-400">CLP</span></div>
                <button onclick="comprar('pro_monthly', this)" class="w-full f1-gradient text-white py-5 rounded-2xl font-black uppercase italic tracking-tighter orange-glow transition-all">Pagar $10 ahora</button>
            </div>

            <div class="f1-navy rounded-[3rem] p-10 shadow-2xl card-pro flex flex-col relative overflow-hidden">
                <h3 class="text-3xl font-black italic text-white mb-2 uppercase italic">Prueba Anual</h3>
                <div class="text-5xl font-black text-white mb-6">$20 <span class="text-lg text-blue-300/50">CLP</span></div>
                <button onclick="comprar('pro_annual', this)" class="w-full bg-white text-[#001739] py-5 rounded-2xl font-black uppercase italic tracking-tighter shadow-xl hover:bg-orange-500 hover:text-white transition-all">Pagar $20 ahora</button>
            </div>
        </div>
        
        <div class="mt-8 text-center">
            <a href="dashboard.html" class="text-slate-400 font-black uppercase text-[10px] tracking-widest hover:text-orange-500 transition-all">← Volver al Dashboard</a>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const API = "https://sonaria-api-test.onrender.com";

        async function comprar(plan, btn) {
            const token = localStorage.getItem("sonaria_token");
            const user = JSON.parse(localStorage.getItem("sonaria_user") || "{}");

            const originalText = btn.innerHTML;
            btn.innerHTML = `<span class="animate-pulse italic">Conectando con MercadoPago...</span>`;
            btn.disabled = true;

            try {
                const res = await fetch(`${API}/payments/create-checkout`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                    body: JSON.stringify({ plan: plan, email: user.email })
                });

                const data = await res.json();
                if (data.checkout_url) window.location.href = data.checkout_url;
                else { alert("Error al generar checkout."); btn.innerHTML = originalText; btn.disabled = false; }
            } catch (err) { alert("Error de red."); btn.innerHTML = originalText; btn.disabled = false; }
        }
    </script>
</body>
</html>
