<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonarIA Pro | Dashboard v3.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; background-image: radial-gradient(circle at 2% 2%, rgba(47,111,237,0.08) 0%, transparent 25%); }
        .antigravity { @apply bg-white border border-slate-100 rounded-[32px] shadow-sm transition-all duration-500 hover:-translate-y-1 hover:shadow-2xl; }
        .mirror-row { @apply grid grid-cols-2 gap-8 p-4 rounded-2xl transition-all duration-300 border border-transparent hover:bg-blue-50/50 hover:border-blue-100; }
        .bar-bg { @apply w-full h-2.5 bg-slate-100 rounded-full overflow-hidden; }
        .bar-fill { @apply h-full transition-all duration-[1.5s] ease-out; }
        .metric-badge { @apply px-2 py-0.5 bg-orange-100 text-orange-700 text-[8px] font-black rounded-md ml-2 border border-orange-200 uppercase tracking-tighter; }
    </style>
</head>
<body class="p-6 md:p-10 text-slate-800 antialiased">
    <div class="max-w-7xl mx-auto">
        
        <!-- HEADER -->
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-4xl font-[950] tracking-tighter italic">Sonar<span class="text-blue-600">IA</span></h1>
            <div id="userInfo" class="flex items-center gap-4 bg-white p-2 pr-6 rounded-full border border-slate-100 shadow-sm">
                <div id="userLetter" class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center text-white font-black text-sm uppercase">M</div>
                <div class="flex flex-col text-left">
                    <span id="userName" class="text-[11px] font-[900] text-slate-800 leading-none mb-1 italic">Mauricio Pinto</span>
                    <span class="text-[9px] font-black text-blue-500 uppercase tracking-widest italic">Docente Pro Activo</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <!-- IZQUIERDA -->
            <div class="lg:col-span-4 space-y-6">
                <div class="antigravity p-8 border-b-4 border-blue-500 bg-white/80 backdrop-blur-md">
                    <h3 class="text-blue-600 font-black uppercase text-[10px] tracking-widest mb-8">Radar de Aula</h3>
                    <div class="space-y-4">
                        <input id="titulo" type="text" placeholder="Título" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border-transparent outline-none focus:bg-white focus:ring-4 focus:ring-blue-50 transition-all">
                        <input id="artista" type="text" placeholder="Artista" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border-transparent outline-none focus:bg-white focus:ring-4 focus:ring-blue-50 transition-all">
                        <button id="analyzeBtn" class="w-full py-5 bg-slate-900 text-white rounded-[24px] font-black hover:bg-blue-600 shadow-xl transition-all active:scale-95 flex items-center justify-center gap-3 italic">Evaluar Canción</button>
                    </div>
                </div>
            </div>

            <!-- DERECHA -->
            <div class="lg:col-span-8 space-y-8">
                <div id="resultsWrapper" class="hidden space-y-8">
                    <!-- HERO -->
                    <div id="statusHero" class="antigravity border-t-[20px] p-10">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-10 mb-10">
                            <div>
                                <div id="suitabilityIcon" class="w-20 h-20 rounded-[32px] bg-white shadow-xl flex items-center justify-center mb-6"></div>
                                <h2 id="summaryTitle" class="text-4xl md:text-5xl font-[950] tracking-tighter text-slate-900 leading-none italic mb-4">—</h2>
                                <span id="lecturaSug" class="px-4 py-1.5 bg-slate-100 rounded-full text-[10px] font-black uppercase tracking-widest text-slate-500">—</span>
                            </div>
                            <div class="space-y-5">
                                <div>
                                    <div class="flex justify-between text-[10px] font-black mb-2 tracking-widest"><span>RIESGO DETECTADO</span><span id="riskText">0%</span></div>
                                    <div class="bar-bg"><div id="riskBar" class="bar-fill"></div></div>
                                </div>
                                <div>
                                    <div class="flex justify-between text-[10px] font-black mb-2 tracking-widest"><span>PERTINENCIA ESCOLAR</span><span id="schoolText">0%</span></div>
                                    <div class="bar-bg"><div id="schoolBar" class="bar-fill bg-green-400"></div></div>
                                </div>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-6 border-t border-slate-100 pt-10 text-center">
                            <div><span class="block text-[10px] font-black text-slate-400 uppercase mb-1 italic">Edad</span><span id="edadSug" class="text-2xl font-black">—</span></div>
                            <div class="border-x border-slate-100 px-4">
                                <span class="block text-[10px] font-black text-blue-600 uppercase mb-1 italic tracking-widest">OA Chile</span>
                                <span id="oaSug" class="text-2xl font-black text-blue-600">—</span>
                            </div>
                            <div><span class="block text-[10px] font-black text-slate-400 uppercase mb-1 italic">Estrategia</span><span id="rutaSug" class="text-xs font-black uppercase text-slate-700">—</span></div>
                        </div>
                    </div>

                    <!-- PLANIFICACIÓN -->
                    <div class="antigravity p-10 bg-gradient-to-br from-blue-50 to-indigo-50 border-blue-100 flex items-start gap-8">
                        <div>
                            <h4 class="text-blue-600 font-black text-[10px] uppercase mb-4 tracking-[0.3em]">Planificación de Aula</h4>
                            <p id="preguntaDesafio" class="text-2xl font-black text-slate-800 leading-tight mb-4 italic tracking-tight"></p>
                            <p id="oaDesc" class="text-xs text-slate-400 font-bold mb-3 uppercase tracking-widest leading-relaxed"></p>
                            <p id="justificacion" class="text-sm text-slate-600 font-medium leading-relaxed italic"></p>
                        </div>
                    </div>

                    <!-- COMPARADOR -->
                    <div class="antigravity overflow-hidden">
                        <div class="p-8 bg-slate-900 text-white flex justify-between items-center text-[10px] font-black uppercase tracking-widest">
                            <span>Sincronización Artística Métrica OK</span>
                            <button id="pdfBtn" class="bg-white/10 px-6 py-2 rounded-2xl italic hover:bg-white hover:text-slate-900 transition-all uppercase tracking-widest">Bajar PDF UTP</button>
                        </div>
                        <div id="lyricsContainer" class="max-h-[600px] overflow-y-auto bg-white p-4 custom-scrollbar"></div>
                    </div>
                </div>

                <div id="analysisPlaceholder" class="h-[600px] flex flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-[40px] text-slate-300 font-black italic">
                    SonarIA Esperando Análisis...
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://sonaria-api-test.onrender.com";
        const $ = id => document.getElementById(id);
        let lastData = null;

        async function analizar() {
            const btn = $("analyzeBtn");
            if (!$("titulo").value) return alert("Ingresa el título.");
            btn.disabled = true; btn.innerText = "Sincronizando Métrica...";
            try {
                const res = await fetch(`${API_BASE}/analizar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem("mejoraria_token") },
                    body: JSON.stringify({ titulo: $("titulo").value, artista: $("artista").value })
                });
                lastData = await res.json();
                renderResult(lastData);
            } catch (e) { alert("Error de conexión."); }
            finally { btn.disabled = false; btn.innerText = "Evaluar Canción"; }
        }

        function renderResult(data) {
            $("analysisPlaceholder").classList.add("hidden");
            $("resultsWrapper").classList.remove("hidden");
            const hero = $("statusHero");
            const risk = data.risk_percent;
            
            hero.className = `antigravity border-t-[24px] p-10 border-${data.color}-400 bg-${data.color}-50/30 transition-all duration-1000`;
            $("suitabilityIcon").innerHTML = risk < 25 ? '<svg class="w-12 h-12 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path d="M5 13l4 4L19 7"></path></svg>' : '<svg class="w-12 h-12 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>';
            
            $("riskBar").style.width = risk + "%";
            $("riskBar").className = `bar-fill bg-${data.color}-500`;
            $("riskText").innerText = risk + "%";
            
            // FIX DEFINITIVO PERTINENCIA
            $("schoolBar").style.width = data.risk_school + "%";
            $("schoolText").innerText = data.risk_school + "%";
            
            $("summaryTitle").innerText = data.resultado;
            $("lecturaSug").innerText = data.lectura_sugerida;
            $("edadSug").innerText = data.edad_sugerida;
            $("oaSug").innerText = data.oa;
            $("oaDesc").innerText = data.oa_desc;
            $("rutaSug").innerText = data.lectura_sugerida;
            $("justificacion").innerText = data.justificacion;
            $("preguntaDesafio").innerText = `"${data.pregunta_desafio}"`;

            $("lyricsContainer").innerHTML = data.letra_comparada.map(l => `
                <div class="mirror-row group">
                    <div class="text-xs text-slate-300 italic group-hover:text-blue-400 transition-all">${l.original}</div>
                    <div class="text-xs font-bold ${l.changed ? 'text-orange-600 pl-4 border-l-2 border-orange-400 bg-orange-50/10' : 'text-slate-700'} group-hover:text-slate-900 transition-all">
                        ${l.adapted} ${l.changed ? '<span class="metric-badge">Métrica OK</span>' : ''}
                    </div>
                </div>
            `).join('');
            $("resultsWrapper").scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        $("analyzeBtn").onclick = analizar;
        $("pdfBtn").onclick = async () => {
            if(!lastData) return;
            const res = await fetch(`${API_BASE}/analizar/pdf`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(lastData) });
            const blob = await res.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `Informe_SonarIA_${lastData.titulo}.pdf`; a.click();
        };
    </script>
</body>
</html>
