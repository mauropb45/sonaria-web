<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SonarIA Pro | Dashboard de Decisión Docente</title>
  
  <!-- Tailwind CSS & Google Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
      background-image: 
        radial-gradient(circle at 2% 2%, rgba(47,111,237,0.08) 0%, transparent 25%),
        radial-gradient(circle at 98% 98%, rgba(31,191,117,0.08) 0%, transparent 25%);
      min-height: 100vh;
    }
    
    .antigravity-card {
      @apply bg-white border border-slate-100 rounded-[32px] transition-all duration-500 ease-[cubic-bezier(0.34,1.56,0.64,1)];
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05);
    }
    .antigravity-card:hover { @apply transform -translate-y-2 shadow-2xl border-blue-100; }

    .mirror-row { @apply grid grid-cols-2 gap-8 p-4 rounded-2xl transition-all duration-300 border border-transparent; }
    .mirror-row:hover { @apply bg-blue-50/50 border-blue-100 shadow-inner; }
    
    .smart-tooltip { @apply relative inline-block cursor-help; }
    .tooltip-box { @apply absolute bottom-full left-1/2 -translate-x-1/2 mb-3 w-56 p-4 bg-slate-900 text-white text-[10px] rounded-2xl opacity-0 invisible transition-all duration-300 z-50 shadow-2xl font-bold text-center; }
    .smart-tooltip:hover .tooltip-box { @apply opacity-100 visible -translate-y-2; }

    .metric-badge { @apply px-2 py-0.5 bg-green-100 text-green-700 text-[8px] font-black rounded-md ml-2 border border-green-200 uppercase tracking-tighter align-middle; }

    .shimmer-text {
      background: linear-gradient(90deg, #64748b 25%, #3b82f6 50%, #64748b 75%);
      background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: shimmer 2.5s linear infinite;
    }
    @keyframes shimmer { to { background-position: 200% center; } }
    
    .bar-bg { @apply w-full h-2 bg-slate-100 rounded-full overflow-hidden; }
    .bar-fill { @apply h-full transition-all duration-[1.5s] ease-out; }
  </style>
</head>
<body class="text-slate-800 antialiased pb-20">

  <!-- NAVBAR SUPERIOR -->
  <nav class="max-w-7xl mx-auto px-6 py-8 flex justify-between items-center">
    <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-xl shadow-blue-200">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
        </div>
        <h1 class="text-3xl font-[950] tracking-tighter text-slate-900 italic">Sonar<span class="text-blue-600">IA</span></h1>
    </div>
    
    <div id="userInfo" class="flex items-center gap-4 bg-white p-2 pr-6 rounded-full border border-slate-100 shadow-sm">
        <div id="userLetter" class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center text-white font-[900] text-sm">M</div>
        <div class="flex flex-col">
            <span id="userName" class="text-[11px] font-[900] text-slate-800 leading-none mb-1 italic">Cargando...</span>
            <span id="userPlan" class="text-[9px] font-black text-blue-500 uppercase tracking-widest">Plan Pro</span>
        </div>
        <a href="planes-test.html" class="ml-4 text-[9px] font-black text-slate-400 hover:text-blue-600 uppercase tracking-widest transition-all">Mejorar Plan</a>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-12 gap-12 mt-4">
    
    <!-- COLUMNA IZQUIERDA: INPUTS -->
    <aside class="lg:col-span-4 space-y-6">
      <div class="antigravity-card p-10 bg-white/80 backdrop-blur-xl border-b-4 border-blue-500">
        <h3 class="text-blue-600 font-black uppercase text-[10px] tracking-[0.3em] mb-10 flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-blue-600 animate-pulse"></span>
            Analizador de Aula
        </h3>
        <div class="space-y-6">
          <input id="titulo" type="text" placeholder="Imagine..." class="w-full p-4 bg-slate-50 rounded-2xl border border-transparent font-bold outline-none focus:bg-white focus:border-blue-200 focus:ring-4 focus:ring-blue-50 transition-all">
          <input id="artista" type="text" placeholder="John Lennon..." class="w-full p-4 bg-slate-50 rounded-2xl border border-transparent font-bold outline-none focus:bg-white focus:border-blue-200 focus:ring-4 focus:ring-blue-50 transition-all">
          
          <div>
              <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-3 px-1">Niveles a Evaluar</label>
              <div id="courseChips" class="flex flex-wrap gap-2"></div>
          </div>

          <button id="analyzeBtn" class="w-full py-5 bg-slate-900 text-white rounded-[24px] font-[900] hover:bg-blue-600 shadow-2xl transition-all active:scale-95 flex items-center justify-center gap-3">
            <span>Evaluar Idoneidad</span>
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- COLUMNA DERECHA: DASHBOARD DE RESULTADOS -->
    <section class="lg:col-span-8 space-y-10">
      
      <!-- ESTADO INICIAL -->
      <div id="analysisPlaceholder" class="h-full min-h-[500px] flex flex-col items-center justify-center text-center p-12 border-2 border-dashed border-slate-200 rounded-[40px] bg-white/40">
        <h3 class="text-2xl font-[900] text-slate-300 uppercase italic shimmer-text">SonarIA Esperando...</h3>
      </div>

      <!-- DASHBOARD DINÁMICO -->
      <div id="resultsWrapper" class="hidden space-y-10">
        
        <!-- CARD HERO: EL SEMÁFORO -->
        <div id="statusHero" class="antigravity-card border-t-[24px] p-12 relative overflow-hidden bg-white">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-10 relative z-10">
            <div>
                <div id="suitabilityIcon" class="w-20 h-20 rounded-[32px] bg-slate-50 text-slate-300 flex items-center justify-center mb-6 shadow-inner transition-all duration-1000"></div>
                <h2 id="summaryTitle" class="text-4xl md:text-5xl font-[950] tracking-tighter text-slate-900 leading-none italic mb-4">—</h2>
                <span id="lecturaSug" class="px-4 py-1.5 bg-slate-100 rounded-full text-[10px] font-black uppercase tracking-widest text-slate-500">—</span>
            </div>
            
            <div class="space-y-6">
                <div>
                    <div class="flex justify-between text-[10px] font-black mb-2 tracking-widest"><span>RIESGO DETECTADO</span><span id="riskText">0%</span></div>
                    <div class="bar-bg"><div id="riskBar" class="bar-fill"></div></div>
                </div>
                <div>
                    <div class="flex justify-between text-[10px] font-black mb-2 tracking-widest"><span>PERTINENCIA ESCOLAR</span><span id="schoolText">0%</span></div>
                    <div class="bar-bg"><div id="schoolBar" class="bar-fill bg-green-400"></div></div>
                </div>
            </div>
          </div>

          <div class="grid grid-cols-3 gap-8 border-t border-slate-100 pt-10 mt-10 text-center">
              <div><span class="block text-[10px] font-black text-slate-400 uppercase mb-2 italic">Edad</span><span id="edadSug" class="text-2xl font-black">—</span></div>
              <div class="border-x border-slate-100 px-4">
                  <span class="block text-[10px] font-black text-blue-600 uppercase mb-2 italic tracking-widest">OA Chile</span>
                  <span id="oaSug" class="text-2xl font-black text-blue-600">—</span>
              </div>
              <div><span class="block text-[10px] font-black text-slate-400 uppercase mb-2 italic">Curso</span><span id="cursosSug" class="text-xs font-black uppercase">—</span></div>
          </div>
        </div>

        <!-- ESTRATEGIA DOCENTE -->
        <div class="antigravity-card p-12 bg-gradient-to-br from-blue-50 to-indigo-50 border-blue-100 flex items-start gap-10">
            <div>
                <h4 class="text-blue-600 font-black text-[10px] uppercase mb-4 tracking-[0.3em]">Justificación Pedagógica</h4>
                <p id="preguntaDesafio" class="text-3xl font-[900] text-slate-800 leading-tight mb-4 italic italic"></p>
                <p id="justificacion" class="text-base text-slate-500 font-medium leading-relaxed italic"></p>
            </div>
        </div>

        <!-- COMPARADOR ARTÍSTICO -->
        <div class="antigravity-card overflow-hidden">
          <div class="p-8 bg-slate-900 text-white flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h4 class="text-[10px] font-black uppercase tracking-[0.3em] mb-1">Comparativa de Sincronización Artística</h4>
                <p class="text-xs text-slate-400 italic">Métrica original vs versión escolar protegida.</p>
            </div>
            <button id="pdfBtn" class="px-6 py-3 bg-white text-slate-900 rounded-2xl text-[10px] font-black uppercase hover:bg-blue-500 hover:text-white transition-all">Bajar Informe PDF</button>
          </div>
          <div id="lyricsContainer" class="max-h-[600px] overflow-y-auto bg-white p-4 custom-scrollbar">
              <!-- Letras inyectadas aquí -->
          </div>
        </div>

      </div>
    </section>
  </main>

  <script>
    const API_BASE = "https://sonaria-api-test.onrender.com";
    const $ = id => document.getElementById(id);
    let selectedCourses = ["7", "8", "1M"];
    let lastAnalysisData = null;

    // 1. Detección de Pago
    const params = new URLSearchParams(window.location.search);
    if (params.get("pago") === "exito") {
        alert("🎉 ¡Felicidades Mauricio! Tu cuenta PRO ya está activa. Disfruta de la métrica sincronizada e informes ilimitados.");
    }

    // 2. Manejo de Identidad
    async function loadUser() {
      const token = localStorage.getItem("mejoraria_token");
      if (!token) return;
      try {
        const res = await fetch(`${API_BASE}/me`, { headers: { "Authorization": `Bearer ${token}` } });
        const data = await res.json();
        if (res.ok) {
          $("userName").textContent = data.user.name;
          $("userLetter").textContent = data.user.name.charAt(0);
          $("userPlan").textContent = `Plan ${data.user.plan.toUpperCase()}`;
        }
      } catch (e) { console.error("Identity Sync Failed"); }
    }

    // 3. Chips Curriculares
    function renderCourseChips() {
      const container = $("courseChips");
      const opts = ["5", "6", "7", "8", "1M", "2M", "3M", "4M"];
      container.innerHTML = "";
      opts.forEach(c => {
        const active = selectedCourses.includes(c);
        const btn = document.createElement("button");
        btn.className = `px-4 py-2 rounded-xl text-[10px] font-black tracking-wider transition-all duration-300 ${active ? 'bg-blue-600 text-white shadow-lg scale-105' : 'bg-slate-100 text-slate-400 hover:bg-slate-200'}`;
        btn.textContent = c.includes('M') ? c : `${c}° Básico`;
        btn.onclick = () => {
          if (active) selectedCourses = selectedCourses.filter(x => x !== c);
          else selectedCourses.push(c);
          renderCourseChips();
        };
        container.appendChild(btn);
      });
    }

    // 4. Función de Análisis Principal
    async function analizar() {
      const btn = $("analyzeBtn");
      const tit = $("titulo").value.trim();
      if (!tit) return alert("Ingresa el título.");

      btn.disabled = true;
      btn.innerHTML = `<span class="shimmer-text font-black uppercase text-[10px] tracking-[0.3em]">Sincronizando Métrica...</span>`;

      try {
        const res = await fetch(`${API_BASE}/analizar`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + localStorage.getItem("mejoraria_token") 
          },
          body: JSON.stringify({ titulo: tit, artista: $("artista").value, texto: "" })
        });
        
        const data = await res.json();
        lastAnalysisData = data;
        renderResult(data);

      } catch (e) {
        alert("Error de comunicación con el servidor de Staging.");
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<span>Evaluar Idoneidad</span><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>`;
      }
    }

    function renderResult(data) {
      $("analysisPlaceholder").classList.add("hidden");
      $("resultsWrapper").classList.remove("hidden");
      const hero = $("statusHero");
      const iconWrap = $("suitabilityIcon");
      const risk = data.risk_percent || 0;

      // Semáforo dinámico
      hero.className = `antigravity-card border-t-[24px] p-12 border-${data.color}-400 bg-${data.color}-50/30 transition-all duration-1000`;
      iconWrap.className = `w-20 h-20 rounded-[32px] bg-${data.color}-100 text-${data.color}-600 flex items-center justify-center mb-6 shadow-inner`;
      iconWrap.innerHTML = risk < 30 ? '<svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path d="M5 13l4 4L19 7"></path></svg>' : '<svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>';

      $("riskBar").style.width = risk + "%";
      $("riskBar").className = `bar-fill bg-${data.color}-500`;
      $("riskText").innerText = risk + "%";
      $("schoolBar").style.width = data.risk_school + "%";
      $("schoolText").innerText = data.risk_school + "%";

      $("summaryTitle").innerText = data.resultado;
      $("lecturaSug").innerText = data.lectura_sugerida;
      $("edadSug").innerText = data.edad_sugerida;
      $("oaSug").innerText = data.oa;
      $("cursosSug").innerText = selectedCourses.join(", ") + " Básico/Medio";
      $("preguntaDesafio").innerText = `"${data.pregunta_desafio}"`;
      $("justificacion").innerText = data.justificacion;

      // Inyección de Versos Comparados
      const container = $("lyricsContainer");
      container.innerHTML = data.letra_comparada.map(line => {
        let adaptedHtml = line.adapted;
        if(line.changed) {
            adaptedHtml = `<span class="smart-tooltip"><span class="text-orange-600 font-black underline decoration-dotted decoration-2 underline-offset-4 italic">${line.adapted}</span><span class="tooltip-box"><span class="block mb-1 text-blue-400 font-black uppercase tracking-widest">Sincro Artística:</span>${line.reason}</span></span><span class="metric-badge">Métrica OK</span>`;
        }
        return `
          <div class="mirror-row group">
            <div class="text-slate-300 font-medium italic text-xs group-hover:text-blue-400 transition-colors duration-500">${line.original || '&nbsp;'}</div>
            <div class="text-slate-700 font-bold text-sm ${line.changed ? 'pl-4 border-l-2 border-orange-400 bg-orange-50/10' : ''} group-hover:text-slate-900 transition-colors duration-500">${adaptedHtml || '&nbsp;'}</div>
          </div>
        `;
      }).join('');

      $("resultsWrapper").scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function logout() { localStorage.clear(); window.location.href = "login-test.html"; }

    // Init
    renderCourseChips();
    loadUser();
    $("analyzeBtn").onclick = analizar;
    $("pdfBtn").onclick = async () => {
        if(!lastAnalysisData) return;
        const res = await fetch(`${API_BASE}/analizar/pdf`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(lastAnalysisData)
        });
        const blob = await res.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `Informe_SonarIA_${lastAnalysisData.titulo}.pdf`;
        a.click();
    };
  </script>
</body>
</html>
