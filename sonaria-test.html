<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SonarIA | Workspace Institucional v6.0</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; @apply bg-slate-50; }
    .sidebar { @apply w-80 bg-white border-r border-slate-200 p-8 flex flex-col h-screen sticky top-0; }
    .card-v6 { @apply bg-white border border-slate-200 rounded-[32px] p-8 shadow-sm transition-all; }
    .tab-btn { @apply px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all border border-slate-100 bg-white text-slate-400; }
    .tab-btn.active { @apply bg-blue-600 text-white shadow-lg border-blue-600; }
    .course-checkbox { @apply hidden; }
    .course-label { @apply flex items-center justify-center p-2 rounded-xl border-2 border-slate-100 text-[10px] font-bold cursor-pointer transition-all hover:bg-slate-50; }
    .course-checkbox:checked + .course-label { @apply border-blue-600 bg-blue-50 text-blue-700; }
    .custom-scroll::-webkit-scrollbar { width: 4px; }
    .custom-scroll::-webkit-scrollbar-thumb { @apply bg-slate-200 rounded-full; }
  </style>
</head>
<body class="antialiased text-slate-800">

  <div class="flex">
    <!-- SIDEBAR: CONFIGURACIÓN DOCENTE -->
    <aside class="sidebar">
      <div class="mb-10">
        <h1 class="text-3xl font-[950] tracking-tighter text-slate-900 italic">Sonar<span class="text-blue-600">IA</span></h1>
        <p class="text-[9px] font-black text-slate-300 uppercase tracking-widest mt-1">Institutional Suite v6.0</p>
      </div>

      <div class="space-y-8 flex-1 overflow-y-auto pr-2 custom-scroll">
        <div>
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-3 italic">1. Logo del Colegio</label>
            <div class="border-2 border-dashed border-slate-200 rounded-2xl p-6 text-center hover:bg-slate-50 cursor-pointer transition-all relative overflow-hidden group">
                <input type="file" id="logoUpload" class="absolute inset-0 opacity-0 cursor-pointer">
                <img id="logoPreview" class="hidden max-h-12 mx-auto mb-2">
                <p id="logoText" class="text-[9px] font-bold text-slate-400 uppercase">Subir PNG</p>
            </div>
        </div>

        <div>
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-3 italic">2. Mis Cursos</label>
            <div id="cursosGrid" class="grid grid-cols-2 gap-2">
                <!-- Se genera abajo -->
            </div>
        </div>
      </div>
      
      <div class="mt-8 pt-6 border-t border-slate-100 flex items-center gap-3">
          <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white font-black text-xs">M</div>
          <span class="text-xs font-black italic">Mauricio Pinto</span>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="flex-1 p-12">
      <section class="max-w-5xl mx-auto space-y-10">
        <div class="card-v6 border-b-[12px] border-blue-600">
            <h2 class="text-blue-600 font-black text-[10px] uppercase tracking-[0.3em] mb-6">Radar de Idoneidad v6.0</h2>
            <div class="grid grid-cols-2 gap-6">
                <input id="titulo" type="text" placeholder="Imagine..." class="p-5 bg-slate-50 rounded-2xl font-bold outline-none focus:ring-4 focus:ring-blue-100 transition-all text-lg">
                <input id="artista" type="text" placeholder="John Lennon..." class="p-5 bg-slate-50 rounded-2xl font-bold outline-none focus:ring-4 focus:ring-blue-100 transition-all text-lg">
            </div>
            <button id="analyzeBtn" class="w-full mt-6 py-5 bg-slate-900 text-white rounded-[24px] font-black hover:bg-blue-600 shadow-2xl transition-all active:scale-95 italic">Analizar y Generar Pack</button>
        </div>

        <div id="resultsWrapper" class="hidden space-y-10">
            <div class="card-v6">
                <h3 class="text-slate-400 font-black text-[10px] uppercase tracking-widest mb-6 italic">Comparativa Artística & Traducción</h3>
                <div class="grid grid-cols-3 gap-6 font-black text-[9px] text-slate-300 uppercase px-4 mb-4">
                    <span>Original</span><span>Adaptada (Métrica OK)</span><span>Traducción</span>
                </div>
                <div id="lyricsContainer" class="space-y-1 max-h-96 overflow-y-auto pr-4"></div>
            </div>

            <div class="card-v6 bg-gradient-to-br from-blue-50 to-white border-blue-100">
                <div class="flex justify-between items-center mb-10">
                    <h3 class="text-blue-600 font-black text-[10px] uppercase tracking-widest">Estrategia por Nivel</h3>
                    <div id="courseTabs" class="flex gap-2"></div>
                </div>
                <div id="pedagogiaContent" class="min-h-[200px]"></div>
                <button id="pdfBtn" class="mt-12 w-full py-5 bg-blue-600 text-white rounded-[24px] font-black flex items-center justify-center gap-3">Descargar Pack PDF</button>
            </div>
        </div>

        <div id="placeholder" class="h-[500px] flex items-center justify-center border-4 border-dashed border-slate-200 rounded-[48px] text-slate-300 font-black italic text-2xl uppercase">Configura tus cursos y analiza una obra</div>
      </section>
    </main>
  </div>

  <script>
    const API_BASE = "https://sonaria-api-test.onrender.com";
    const $ = id => document.getElementById(id);
    const cursosDisponibles = ["1B", "2B", "3B", "4B", "5B", "6B", "7B", "8B", "IM", "IIM", "IIIM", "IVM"];
    let selectedCourses = [];

    // Init Sidebar
    $("cursosGrid").innerHTML = cursosDisponibles.map(c => `
        <div>
            <input type="checkbox" id="check-${c}" class="course-checkbox" onchange="toggleCourse('${c}')">
            <label for="check-${c}" class="course-label">${c.replace('B','°B').replace('M','°M')}</label>
        </div>
    `).join('');

    function toggleCourse(code) {
        if(selectedCourses.includes(code)) selectedCourses = selectedCourses.filter(x => x !== code);
        else selectedCourses.push(code);
    }

    async function analizar() {
        if(selectedCourses.length === 0) return alert("Selecciona cursos en la izquierda.");
        const btn = $("analyzeBtn");
        btn.disabled = true; btn.innerText = "Sincronizando con NotebookLM...";

        try {
            const res = await fetch(`${API_BASE}/analizar/v6`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    titulo: $("titulo").value, 
                    artista: $("artista").value,
                    cursos_docente: selectedCourses
                })
            });
            const data = await res.json();
            renderResult(data);
        } catch(e) { alert("Error de CORS o Comunicación"); }
        finally { btn.disabled = false; btn.innerText = "Analizar y Generar Pack"; }
    }

    function renderResult(data) {
        $("placeholder").classList.add("hidden");
        $("resultsWrapper").classList.remove("hidden");
        $("lyricsContainer").innerHTML = data.comparativa.map(l => `
            <div class="grid grid-cols-3 gap-6 p-4 border-b border-slate-50 hover:bg-blue-50 transition-all rounded-2xl">
                <div class="text-[10px] text-slate-300 italic">${l.original}</div>
                <div class="text-[10px] font-bold ${l.changed ? 'text-orange-600' : 'text-slate-700'}">${l.adapted}</div>
                <div class="text-[10px] text-slate-400 font-medium italic">${l.translated}</div>
            </div>
        `).join('');

        window.currentMatrix = data.matriz_pedagogica;
        const cursos = Object.keys(data.matriz_pedagogica);
        $("courseTabs").innerHTML = cursos.map((c, i) => `
            <button onclick="showTab('${c}')" class="tab-btn ${i===0?'active':''} curso-tab">${c}</button>
        `).join('');
        showTab(cursos[0]);
    }

    function showTab(curso) {
        const d = window.currentMatrix[curso];
        $("pedagogiaContent").innerHTML = `
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                <div class="space-y-6">
                    <div><span class="text-[9px] font-black text-blue-400 uppercase">OA</span><p class="text-xl font-black text-slate-800">${d.oa}</p><p class="text-[10px] text-slate-400 font-bold uppercase">${d.desc}</p></div>
                    <div><span class="text-[9px] font-black text-blue-400 uppercase">Actividad</span><p class="text-sm font-bold text-slate-600">${d.actividad}</p></div>
                </div>
                <div class="bg-white p-10 rounded-[40px] shadow-sm border border-blue-50">
                    <span class="text-[9px] font-black text-orange-400 uppercase block mb-4">Pregunta Desafío</span>
                    <p class="text-xl font-black text-slate-800 italic">"${d.pregunta}"</p>
                </div>
            </div>
        `;
    }

    $("analyzeBtn").onclick = analizar;
  </script>
</body>
</html>
