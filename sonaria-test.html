<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SonarIA Pro | Dashboard v2.7</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f8fafc; }
    .antigravity-card { @apply bg-white border border-slate-100 rounded-[32px] shadow-sm transition-all duration-500 ease-[cubic-bezier(0.34,1.56,0.64,1)]; }
    .antigravity-card:hover { @apply transform -translate-y-2 shadow-2xl border-blue-100; }
    
    .mirror-row { @apply grid grid-cols-2 gap-8 p-4 rounded-2xl transition-all duration-300 border border-transparent cursor-default; }
    .mirror-row:hover { @apply bg-blue-50/50 border-blue-100 shadow-inner; }
    
    .line-adapted.modified { @apply border-l-4 border-orange-400 pl-4 bg-orange-50/30; }
    .metric-badge { @apply px-2 py-0.5 bg-green-100 text-green-700 text-[8px] font-black rounded-md ml-2 border border-green-200 uppercase tracking-tighter align-middle; }

    /* Smart Tooltip */
    .smart-tooltip { @apply relative inline-block cursor-help; }
    .tooltip-box { @apply absolute bottom-full left-1/2 -translate-x-1/2 mb-3 w-56 p-4 bg-slate-900 text-white text-[10px] rounded-2xl opacity-0 invisible transition-all duration-300 z-50 shadow-2xl; }
    .smart-tooltip:hover .tooltip-box { @apply opacity-100 visible -translate-y-2; }

    .shimmer-text {
      background: linear-gradient(90deg, #64748b 25%, #3b82f6 50%, #64748b 75%);
      background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: shimmer 2s linear infinite;
    }
    @keyframes shimmer { to { background-position: 200% center; } }
  </style>
</head>
<body class="p-4 md:p-12 text-slate-800">

  <div class="max-w-7xl mx-auto">
    <!-- NAV -->
    <header class="flex justify-between items-center mb-12">
        <h1 class="text-4xl font-[950] tracking-tighter italic">Sonar<span class="text-blue-600">IA</span></h1>
        <div class="px-4 py-2 bg-white border border-slate-100 rounded-full shadow-sm flex items-center gap-3">
            <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Staging v2.7</span>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
      <!-- INPUT -->
      <div class="lg:col-span-4 space-y-6">
        <div class="antigravity-card p-10 bg-white">
          <h3 class="text-blue-600 font-black uppercase text-[10px] tracking-[0.3em] mb-10">Radar de Aula</h3>
          <div class="space-y-6">
            <input id="titulo" type="text" placeholder="Imagine..." class="w-full p-4 bg-slate-50 rounded-2xl border border-transparent font-bold outline-none focus:bg-white focus:border-blue-200 focus:ring-4 focus:ring-blue-50 transition-all">
            <input id="artista" type="text" placeholder="Artista..." class="w-full p-4 bg-slate-50 rounded-2xl border border-transparent font-bold outline-none focus:bg-white focus:border-blue-200 focus:ring-4 focus:ring-blue-50 transition-all">
            <button id="analyzeBtn" class="w-full py-5 bg-slate-900 text-white rounded-[24px] font-black hover:bg-blue-600 shadow-2xl transition-all active:scale-95 flex items-center justify-center gap-3">
              <span>Evaluar Idoneidad</span>
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- RESULTADOS -->
      <div class="lg:col-span-8 space-y-10">
        <div id="resultsWrapper" class="hidden space-y-10">
          
          <!-- SEMÁFORO HERO -->
          <div id="statusHero" class="antigravity-card border-t-[22px] p-12 relative overflow-hidden">
            <div class="flex justify-between items-start">
              <div id="suitIcon" class="p-8 rounded-[36px] bg-white shadow-xl"></div>
              <div class="text-right">
                <div class="text-6xl font-[950] tracking-tighter" id="riskValue">0%</div>
                <div class="text-[10px] font-black uppercase text-slate-400 tracking-widest mt-2 italic">Riesgo Escolar</div>
              </div>
            </div>
            <h2 id="summaryTitle" class="text-5xl font-[950] tracking-tighter my-8 leading-none italic">—</h2>
            
            <div class="grid grid-cols-3 gap-8 border-t border-slate-100 pt-10 text-center">
                <div><span class="block text-[10px] font-black text-slate-400 uppercase mb-2 italic">Edad</span><span id="edadSug" class="text-3xl font-black">—</span></div>
                <div><span class="block text-[10px] font-black text-blue-600 uppercase mb-2 italic tracking-widest">OA Chile</span><span id="oaSug" class="text-3xl font-black text-blue-600">—</span></div>
                <div><span class="block text-[10px] font-black text-slate-400 uppercase mb-2 italic">Ruta</span><span id="rutaSug" class="text-[11px] font-black uppercase">—</span></div>
            </div>
          </div>

          <!-- COMPARADOR MÉTRICO -->
          <div class="antigravity-card overflow-hidden">
            <div class="p-8 bg-slate-900 text-white flex justify-between items-center">
              <div>
                  <h4 class="text-[10px] font-black uppercase tracking-[0.3em] mb-1">Ajuste Artístico Sincronizado</h4>
                  <p class="text-xs text-slate-400 italic">Formato canción preservado (Métrica y Rima)</p>
              </div>
              <button id="pdfBtn" class="px-5 py-2 bg-white/10 hover:bg-white/20 rounded-xl text-[10px] font-black uppercase transition-all backdrop-blur-md italic">Bajar PDF</button>
            </div>
            <div id="lyricsContainer" class="max-h-[600px] overflow-y-auto bg-white p-4">
                <!-- Se inyectan las líneas aquí -->
            </div>
          </div>

          <!-- GUÍA -->
          <div class="antigravity-card p-12 bg-gradient-to-br from-blue-50 to-indigo-50 border-blue-100">
            <h4 class="text-blue-600 font-black text-[10px] uppercase mb-6 tracking-[0.2em]">Estrategia de Aula</h4>
            <p id="preguntaDesafio" class="text-3xl font-black text-slate-800 leading-tight mb-4 italic"></p>
            <p id="justificacion" class="text-sm text-slate-500 font-medium leading-relaxed"></p>
          </div>
        </div>

        <!-- PLACEHOLDER -->
        <div id="analysisPlaceholder" class="h-96 flex flex-col items-center justify-center text-center border-2 border-dashed border-slate-200 rounded-[40px] bg-slate-50/50">
          <p class="text-slate-300 font-black text-2xl italic tracking-tighter shimmer-text">SonarIA Esperando...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://sonaria-api-test.onrender.com";
    const $ = id => document.getElementById(id);

    async function analizar() {
      const btn = $("analyzeBtn");
      btn.disabled = true; 
      btn.innerHTML = `<span class="shimmer-text font-black uppercase text-[10px] tracking-[0.3em]">Sincronizando Métrica...</span>`;

      try {
        const res = await fetch(`${API_BASE}/analizar`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem("mejoraria_token") },
          body: JSON.stringify({ titulo: $("titulo").value, artista: $("artista").value })
        });
        const data = await res.json();
        renderResult(data);
      } catch (e) { alert("Error de comunicación."); }
      finally { 
        btn.disabled = false; 
        btn.innerHTML = `<span>Evaluar Idoneidad</span><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>`;
      }
    }

    function renderResult(data) {
      $("analysisPlaceholder").classList.add("hidden");
      $("resultsWrapper").classList.remove("hidden");
      const hero = $("statusHero");
      hero.className = `antigravity-card border-t-[22px] p-12 border-${data.color}-400 bg-${data.color}-50/30`;
      
      $("riskValue").innerText = data.risk_percent + "%";
      $("summaryTitle").innerText = data.resultado;
      $("edadSug").innerText = data.edad_sugerida;
      $("oaSug").innerText = data.oa;
      $("rutaSug").innerText = data.lectura_sugerida;
      $("preguntaDesafio").innerText = `"${data.pregunta_desafio}"`;
      $("justificacion").innerText = data.justificacion;

      const container = $("lyricsContainer");
      container.innerHTML = data.letra_comparada.map(line => {
        let adaptedHtml = line.adapted;
        if(line.changed) {
            adaptedHtml = `
                <span class="smart-tooltip">
                    <span class="text-orange-600 font-black underline decoration-dotted decoration-2 underline-offset-4">${line.adapted}</span>
                    <span class="tooltip-box">
                        <span class="block mb-1 text-blue-400 font-black tracking-widest">SINCRO SONARIA:</span>
                        ${line.reason}
                    </span>
                </span>
                <span class="metric-badge">Métrica OK</span>`;
        }
        return `
          <div class="mirror-row group">
            <div class="text-slate-300 font-medium italic text-xs group-hover:text-blue-400 transition-colors">${line.original || '&nbsp;'}</div>
            <div class="text-slate-700 font-bold text-sm ${line.changed ? 'pl-4 border-l-2 border-orange-400 bg-orange-50/20' : ''} group-hover:text-slate-900 transition-colors">${adaptedHtml || '&nbsp;'}</div>
          </div>
        `;
      }).join('');
    }
    $("analyzeBtn").onclick = analizar;
  </script>
</body>
</html>
