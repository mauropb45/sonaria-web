<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SonarIA Pro | Dashboard v2.7</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f8fafc; }
    .antigravity-card { @apply bg-white border border-slate-100 rounded-[32px] shadow-sm transition-all duration-500 ease-out; }
    .antigravity-card:hover { @apply transform -translate-y-2 shadow-2xl border-blue-100; }
    .mirror-row { @apply grid grid-cols-2 gap-8 p-4 rounded-2xl transition-all duration-300 border border-transparent; }
    .mirror-row:hover { @apply bg-blue-50/50 border-blue-100 shadow-inner; }
    .smart-tooltip { @apply relative inline-block cursor-help; }
    .tooltip-box { @apply absolute bottom-full left-1/2 -translate-x-1/2 mb-3 w-56 p-4 bg-slate-900 text-white text-[10px] rounded-2xl opacity-0 invisible transition-all duration-300 z-50 shadow-2xl font-bold text-center; }
    .smart-tooltip:hover .tooltip-box { @apply opacity-100 visible -translate-y-2; }
    .shimmer-text { background: linear-gradient(90deg, #64748b 25%, #3b82f6 50%, #64748b 75%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 2s linear infinite; }
    @keyframes shimmer { to { background-position: 200% center; } }
  </style>
</head>
<body class="p-4 md:p-12 text-slate-800">

  <div class="max-w-7xl mx-auto">
    <!-- TOPBAR -->
    <header class="flex justify-between items-center mb-16">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-xl shadow-blue-200">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2z"></path></svg>
            </div>
            <h1 class="text-4xl font-[950] tracking-tighter text-slate-900 italic">Sonar<span class="text-blue-600">IA</span></h1>
        </div>
        
        <!-- Aquí aparecerá tu nombre -->
        <div id="userInfo" class="hidden flex items-center gap-4 bg-white p-2 pr-6 rounded-full border border-slate-100 shadow-sm animate-in">
            <div id="userLetter" class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center text-white font-black text-sm uppercase">?</div>
            <div>
                <span id="userName" class="block text-xs font-[900] text-slate-700 tracking-tight leading-none italic mb-1">Cargando...</span>
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Docente Pro</span>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
      <!-- INPUT -->
      <div class="lg:col-span-4 space-y-6">
        <div class="antigravity-card p-10 bg-white border-b-4 border-blue-500">
          <h3 class="text-blue-600 font-black uppercase text-[10px] tracking-[0.3em] mb-10">Radar de Aula</h3>
          <div class="space-y-6">
            <input id="titulo" type="text" placeholder="Imagine..." class="w-full p-4 bg-slate-50 rounded-2xl border border-transparent font-bold outline-none focus:bg-white focus:border-blue-200 focus:ring-4 focus:ring-blue-50 transition-all">
            <input id="artista" type="text" placeholder="Artista..." class="w-full p-4 bg-slate-50 rounded-2xl border border-transparent font-bold outline-none focus:bg-white focus:border-blue-200 focus:ring-4 focus:ring-blue-50 transition-all">
            <button id="analyzeBtn" class="w-full py-5 bg-slate-900 text-white rounded-[24px] font-black hover:bg-blue-600 shadow-2xl transition-all active:scale-95 flex items-center justify-center gap-3">
              <span>Evaluar Idoneidad</span>
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- DASHBOARD -->
      <div class="lg:col-span-8 space-y-10">
        <div id="resultsWrapper" class="hidden space-y-10 animate-in">
          <div id="statusHero" class="antigravity-card border-t-[22px] p-12">
            <div class="flex justify-between items-start mb-8">
              <div id="suitIcon" class="p-8 rounded-[36px] bg-white shadow-xl shadow-slate-200/50"></div>
              <div class="text-right">
                <div class="text-6xl font-[950] tracking-tighter" id="riskValue">0%</div>
                <div class="text-[10px] font-black uppercase text-slate-400 tracking-widest mt-2">Riesgo Detectado</div>
              </div>
            </div>
            <h2 id="summaryTitle" class="text-5xl font-[950] tracking-tighter text-slate-900 my-4 italic leading-none">—</h2>
            <div class="grid grid-cols-3 gap-8 border-t border-slate-100 pt-10 text-center">
                <div><span class="block text-[10px] font-black text-slate-400 uppercase mb-2">EDAD</span><span id="edadSug" class="text-3xl font-black text-slate-800">—</span></div>
                <div><span class="block text-[10px] font-black text-blue-600 uppercase mb-2">OA CHILE</span><span id="oaSug" class="text-3xl font-black text-blue-600">—</span></div>
                <div><span class="block text-[10px] font-black text-slate-400 uppercase mb-2">RUTA</span><span id="rutaSug" class="text-sm font-black text-slate-800 uppercase">—</span></div>
            </div>
          </div>

          <div class="antigravity-card overflow-hidden">
            <div class="p-8 bg-slate-900 text-white flex justify-between items-center text-[10px] font-black uppercase tracking-widest">
                <span>Comparativa de Ajuste Artístico</span>
                <span class="text-slate-400 italic">Métrica y Rima Preservadas</span>
            </div>
            <div id="lyricsContainer" class="max-h-[600px] overflow-y-auto bg-white p-4"></div>
          </div>
        </div>

        <div id="analysisPlaceholder" class="h-[500px] flex items-center justify-center text-center border-2 border-dashed border-slate-200 rounded-[40px] bg-slate-50/50">
          <p class="text-slate-300 font-black text-2xl italic tracking-tighter shimmer-text uppercase">Radar SonarIA Esperando...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://sonaria-api-test.onrender.com";
    const $ = id => document.getElementById(id);

    // CARGAR IDENTIDAD
    async function loadUser() {
      const token = localStorage.getItem("mejoraria_token");
      if (!token) { window.location.href = "login-test.html"; return; }
      try {
        const res = await fetch(`${API_BASE}/me`, { headers: { "Authorization": `Bearer ${token}` } });
        const data = await res.json();
        if (res.ok) {
          $("userName").textContent = data.user.name;
          $("userLetter").textContent = data.user.name.charAt(0);
          $("userInfo").classList.remove("hidden");
        }
      } catch (e) { console.error("Error cargando perfil"); }
    }

    async function analizar() {
      const btn = $("analyzeBtn");
      btn.disabled = true; btn.innerHTML = `<span class="shimmer-text font-black uppercase text-[10px] tracking-[0.3em]">Sincronizando Métrica...</span>`;
      try {
        const res = await fetch(`${API_BASE}/analizar`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem("mejoraria_token") },
          body: JSON.stringify({ titulo: $("titulo").value, artista: $("artista").value })
        });
        const data = await res.json();
        renderResult(data);
      } catch (e) { alert("Error de comunicación."); }
      finally { 
        btn.disabled = false; btn.innerHTML = `<span>Evaluar Idoneidad</span><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>`;
      }
    }

    function renderResult(data) {
      $("analysisPlaceholder").classList.add("hidden");
      $("resultsWrapper").classList.remove("hidden");
      const hero = $("statusHero");
      hero.className = `antigravity-card border-t-[22px] p-12 border-${data.color}-400 bg-${data.color}-50/20`;
      
      $("riskValue").innerText = data.risk_percent + "%";
      $("summaryTitle").innerText = data.resultado;
      $("edadSug").innerText = data.edad_sugerida;
      $("oaSug").innerText = data.oa;
      $("rutaSug").innerText = data.lectura_sugerida;

      const container = $("lyricsContainer");
      container.innerHTML = data.letra_comparada.map(line => {
        let adaptedHtml = line.adapted;
        if(line.changed) {
            adaptedHtml = `<span class="smart-tooltip"><span class="text-orange-600 font-black underline decoration-dotted decoration-2 underline-offset-4">${line.adapted}</span><span class="tooltip-box"><span class="block mb-1 text-blue-400 font-black tracking-widest uppercase">Sincronización Artística:</span>${line.reason}</span></span>`;
        }
        return `
          <div class="mirror-row group">
            <div class="text-slate-300 font-medium italic text-xs group-hover:text-blue-400 transition-colors">${line.original || '&nbsp;'}</div>
            <div class="text-slate-700 font-bold text-sm ${line.changed ? 'pl-4 border-l-2 border-orange-400 bg-orange-50/20' : ''} group-hover:text-slate-900 transition-colors">${adaptedHtml || '&nbsp;'}</div>
          </div>
        `;
      }).join('');
    }
    $("analyzeBtn").onclick = analizar;
    loadUser();
  </script>
</body>
</html>
