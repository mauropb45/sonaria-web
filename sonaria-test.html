<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonarIA Pro | Dashboard 3.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; background-image: radial-gradient(circle at 2% 2%, rgba(47,111,237,0.08) 0%, transparent 25%); }
        .antigravity { @apply bg-white border border-slate-100 rounded-[32px] shadow-sm transition-all duration-500 hover:-translate-y-1 hover:shadow-2xl; }
        .mirror-row { @apply grid grid-cols-2 gap-8 p-4 rounded-2xl transition-all duration-300 border border-transparent hover:bg-blue-50/50 hover:border-blue-100; }
        .bar-bg { @apply w-full h-2 bg-slate-100 rounded-full overflow-hidden; }
        .bar-fill { @apply h-full transition-all duration-[1.5s] ease-out; }
    </style>
</head>
<body class="p-6 md:p-10 text-slate-800">
    <div class="max-w-7xl mx-auto">
        <!-- HEADER -->
        <header class="flex justify-between items-center mb-12">
            <h1 class="text-4xl font-[950] tracking-tighter italic">Sonar<span class="text-blue-600">IA</span></h1>
            <div id="userInfo" class="flex items-center gap-4 bg-white p-2 pr-6 rounded-full border border-slate-100 shadow-sm">
                <div id="userLetter" class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center text-white font-black text-sm">?</div>
                <div class="flex flex-col"><span id="userName" class="text-[11px] font-[900] text-slate-800 leading-none mb-1 italic">Cargando...</span><span id="userPlan" class="text-[9px] font-black text-blue-500 uppercase tracking-widest">Plan Free</span></div>
                <a href="planes-test.html" class="ml-4 text-[9px] font-black text-slate-300 hover:text-blue-600 uppercase transition-all">Mejorar</a>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <!-- INPUT -->
            <div class="lg:col-span-4 space-y-6">
                <div class="antigravity p-8 border-b-4 border-blue-500">
                    <h3 class="text-blue-600 font-black uppercase text-[10px] tracking-widest mb-8">Radar de Aula</h3>
                    <input id="titulo" type="text" placeholder="Título" class="w-full p-4 bg-slate-50 rounded-2xl mb-4 border-transparent font-bold outline-none focus:bg-white focus:ring-4 focus:ring-blue-50 transition-all">
                    <input id="artista" type="text" placeholder="Artista" class="w-full p-4 bg-slate-50 rounded-2xl mb-6 border-transparent font-bold outline-none focus:bg-white focus:ring-4 focus:ring-blue-50 transition-all">
                    <button id="analyzeBtn" class="w-full py-5 bg-slate-900 text-white rounded-[24px] font-black hover:bg-blue-600 shadow-xl transition-all active:scale-95 flex items-center justify-center gap-3 italic">Evaluar Canción</button>
                </div>
            </div>

            <!-- RESULTADOS -->
            <div class="lg:col-span-8 space-y-8">
                <div id="resultsWrapper" class="hidden space-y-8">
                    <!-- SEMÁFORO -->
                    <div id="statusHero" class="antigravity border-t-[20px] p-10">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
                            <div>
                                <div id="suitIcon" class="w-16 h-16 rounded-2xl bg-white shadow-xl flex items-center justify-center mb-6"></div>
                                <h2 id="summaryTitle" class="text-4xl font-black tracking-tight mb-2">—</h2>
                                <p id="lecturaSug" class="text-xs font-black uppercase text-slate-400 tracking-widest">—</p>
                            </div>
                            <div class="space-y-4">
                                <div><div class="flex justify-between text-[10px] font-black mb-1"><span>RIESGO</span><span id="riskText">0%</span></div><div class="bar-bg"><div id="riskBar" class="bar-fill"></div></div></div>
                                <div><div class="flex justify-between text-[10px] font-black mb-1"><span>PERTINENCIA</span><span id="schoolText">100%</span></div><div class="bar-bg"><div id="schoolBar" class="bar-fill bg-green-400"></div></div></div>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-4 border-t pt-8 text-center">
                            <div><span class="block text-[10px] font-black text-slate-400 uppercase">EDAD</span><span id="edadSug" class="text-xl font-black text-slate-700">—</span></div>
                            <div><span class="block text-[10px] font-black text-blue-600 uppercase tracking-widest">OA CHILE</span><span id="oaSug" class="text-xl font-black text-blue-600">—</span></div>
                            <div><span class="block text-[10px] font-black text-slate-400 uppercase">RUTA</span><span id="rutaSug" class="text-[10px] font-black uppercase text-slate-700">—</span></div>
                        </div>
                    </div>

                    <!-- COMPARADOR -->
                    <div class="antigravity overflow-hidden">
                        <div class="p-8 bg-slate-900 text-white flex justify-between items-center text-[10px] font-black uppercase tracking-widest">
                            <span>Sincronización Métrica v3.1</span>
                            <button id="pdfBtn" class="bg-white/10 px-4 py-2 rounded-xl italic hover:bg-white hover:text-slate-900 transition-all">Bajar PDF UTP</button>
                        </div>
                        <div id="lyricsContainer" class="max-h-[500px] overflow-y-auto bg-white p-4"></div>
                    </div>
                </div>

                <div id="analysisPlaceholder" class="h-[500px] flex items-center justify-center border-2 border-dashed border-slate-200 rounded-[40px] text-slate-300 font-black italic">
                    SonarIA Esperando Análisis...
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://sonaria-api-test.onrender.com";
        const $ = id => document.getElementById(id);
        let lastData = null;

        async function loadUser() {
            const token = localStorage.getItem("mejoraria_token");
            if(!token) return;
            try {
                const res = await fetch(`${API_BASE}/me`, { headers: {'Authorization': `Bearer ${token}`} });
                const data = await res.json();
                if(res.ok) { 
                    $("userName").innerText = data.user.name; 
                    $("userLetter").innerText = data.user.name[0];
                    $("userPlan").innerText = `Plan ${data.user.plan.toUpperCase()}`;
                }
            } catch(e) {}
        }

        async function analizar() {
            const btn = $("analyzeBtn");
            btn.disabled = true; btn.innerText = "Sincronizando Métrica...";
            try {
                const res = await fetch(`${API_BASE}/analizar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem("mejoraria_token") },
                    body: JSON.stringify({ titulo: $("titulo").value, artista: $("artista").value })
                });
                lastData = await res.json();
                renderResult(lastData);
            } catch (e) { alert("Error de comunicación."); }
            finally { btn.disabled = false; btn.innerText = "Evaluar Canción"; }
        }

        function renderResult(data) {
            $("analysisPlaceholder").classList.add("hidden");
            $("resultsWrapper").classList.remove("hidden");
            const hero = $("statusHero");
            const risk = data.risk_percent;
            
            hero.className = `antigravity border-t-[20px] p-10 border-${data.color}-400 bg-${data.color}-50/30 transition-all duration-1000`;
            $("riskBar").style.width = risk + "%";
            $("riskBar").className = `bar-fill bg-${data.color}-500`;
            $("riskText").innerText = risk + "%";
            $("schoolBar").style.width = data.risk_school + "%";
            $("schoolText").innerText = data.risk_school + "%";
            
            $("summaryTitle").innerText = data.resultado;
            $("lecturaSug").innerText = data.lectura_sugerida;
            $("edadSug").innerText = data.edad_sugerida;
            $("oaSug").innerText = data.oa;
            $("rutaSug").innerText = data.lectura_sugerida;

            $("lyricsContainer").innerHTML = data.letra_comparada.map(l => `
                <div class="mirror-row group">
                    <div class="text-xs text-slate-300 italic group-hover:text-blue-400">${l.original}</div>
                    <div class="text-xs font-bold ${l.changed ? 'text-orange-600 pl-4 border-l-2 border-orange-400 bg-orange-50/10' : 'text-slate-700'}">${l.adapted} ${l.changed ? '<span class="metric-badge">Métrica OK</span>' : ''}</div>
                </div>
            `).join('');
            $("resultsWrapper").scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        $("analyzeBtn").onclick = analizar;
        $("pdfBtn").onclick = async () => {
            const res = await fetch(`${API_BASE}/analizar/pdf`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(lastData)
            });
            const blob = await res.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `Informe_${lastData.titulo}.pdf`;
            a.click();
        };
        loadUser();
    </script>
</body>
</html>
