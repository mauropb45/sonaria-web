<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonarIA | Dashboard de Decisión Docente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .card { @apply bg-white border border-slate-200 rounded-[32px] shadow-sm transition-all duration-500; }
        .card:hover { @apply shadow-xl border-slate-300; }
        .traffic-light { transition: border-color 0.8s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.8s ease; }
        
        /* Animación de carga para el botón */
        .btn-loading { pointer-events: none; opacity: 0.7; }
        @keyframes shimmer { to { background-position: 200% 0; } }
        .scanning {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
    </style>
</head>
<body class="p-4 md:p-10 text-slate-800 antialiased">

    <div class="max-w-6xl mx-auto">
        <!-- CABECERA -->
        <header class="text-center mb-12">
            <div class="mb-4 inline-block bg-blue-600 text-white text-[10px] font-black px-4 py-1 rounded-full uppercase tracking-widest shadow-lg shadow-blue-200">
                Motor IA v1.8.0
            </div>
            <h1 class="text-5xl md:text-7xl font-black tracking-tighter mb-4 italic">Sonar<span class="text-blue-600">IA</span></h1>
            <p class="text-slate-500 font-bold max-w-xl mx-auto leading-tight italic">
                "Evita errores en clase y transforma canciones en herramientas pedagógicas."
            </p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <!-- COLUMNA IZQUIERDA: ENTRADA -->
            <div class="lg:col-span-5 space-y-6">
                <div class="card p-8 bg-white/80 backdrop-blur-md">
                    <h3 class="text-blue-600 font-black uppercase text-[10px] tracking-[0.2em] mb-8">Analizador de Aula</h3>
                    
                    <div class="space-y-4">
                        <input id="titulo" type="text" placeholder="Título de la canción" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-200 font-bold focus:ring-4 focus:ring-blue-100 outline-none transition-all">
                        <input id="artista" type="text" placeholder="Artista / Banda" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-200 font-bold focus:ring-4 focus:ring-blue-100 outline-none transition-all">
                        
                        <div class="pt-4">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2 px-1">Cursos</label>
                            <div id="courseChips" class="flex flex-wrap gap-2"></div>
                        </div>

                        <button id="analyzeBtn" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-black hover:bg-blue-600 shadow-2xl shadow-blue-100 transition-all active:scale-95 flex items-center justify-center gap-3 mt-6">
                            <span>Evaluar Idoneidad</span>
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- COLUMNA DERECHA: RESULTADOS -->
            <div class="lg:col-span-7">
                <!-- PLACEHOLDER -->
                <div id="analysisPlaceholder" class="h-full flex flex-col items-center justify-center text-center p-12 border-2 border-dashed border-slate-200 rounded-[40px] bg-white/40">
                    <p class="text-slate-400 font-bold italic">Ingresa una obra para activar el semáforo visual.</p>
                </div>

                <!-- DASHBOARD -->
                <div id="resultsWrapper" class="hidden space-y-6">
                    <div id="statusHero" class="card border-t-[18px] p-10 traffic-light">
                        <div class="flex justify-between items-start mb-8">
                            <div id="suitIcon" class="p-6 rounded-[28px] bg-slate-100 transition-all duration-1000">
                                <svg class="w-14 h-14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            </div>
                            <div class="text-right">
                                <div class="text-5xl font-black tracking-tighter" id="riskValue">0%</div>
                                <div class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Riesgo Escolar</div>
                            </div>
                        </div>
                        <h2 id="summaryTitle" class="text-4xl font-black tracking-tight mb-3">Veredicto</h2>
                        <p id="summaryCopy" class="text-xl text-slate-500 font-medium italic leading-relaxed">—</p>
                        
                        <div class="grid grid-cols-3 gap-4 border-t pt-8 mt-6 text-center">
                            <div><span class="block text-[10px] font-black text-slate-400 uppercase mb-1">Edad</span><span id="edadSugerida" class="text-xl font-black">—</span></div>
                            <div><span class="block text-[10px] font-black text-slate-400 uppercase mb-1">Cursos</span><span id="cursosSugeridos" class="text-sm font-black">—</span></div>
                            <div><span class="block text-[10px] font-black text-slate-400 uppercase mb-1">Ruta</span><span id="lecturaSugerida" class="text-[10px] font-black uppercase">—</span></div>
                        </div>
                    </div>

                    <div id="veredictoCard" class="card p-8 bg-blue-50/50 border-blue-100">
                        <h4 class="text-blue-600 font-black text-[10px] uppercase
