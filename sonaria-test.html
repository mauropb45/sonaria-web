<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonarIA | Professional Workspace v9.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; @apply bg-slate-50; overflow: hidden; }
        .sidebar { @apply bg-[#1a1c23] text-slate-400 transition-all duration-300 flex flex-col h-screen; }
        .workspace-card { @apply bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden transition-all duration-500 hover:shadow-xl; }
        .tab-btn { @apply px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all border border-slate-100 bg-white text-slate-400; }
        .tab-btn.active { @apply bg-blue-600 text-white shadow-lg border-blue-600; }
        .lyrics-grid { display: grid; grid-template-columns: 1fr 1fr 1.2fr; gap: 24px; }
        .course-checkbox { @apply hidden; }
        .course-label { @apply flex items-center justify-center p-2 rounded-xl border-2 border-slate-100 text-[10px] font-bold cursor-pointer transition-all hover:bg-slate-50; }
        .course-checkbox:checked + .course-label { @apply border-blue-600 bg-blue-50 text-blue-700; }
        .shimmer-text { background: linear-gradient(90deg, #64748b 25%, #3b82f6 50%, #64748b 75%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 2s linear infinite; }
        @keyframes shimmer { to { background-position: 200% center; } }
    </style>
</head>
<body class="antialiased text-slate-800">

    <div class="flex h-screen overflow-hidden">
        
        <!-- SIDEBAR -->
        <aside class="sidebar w-72 hidden lg:flex">
            <div class="p-8">
                <h1 class="text-3xl font-black text-white tracking-tighter italic">Sonar<span class="text-blue-600">IA</span></h1>
                <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mt-1">Suite Institucional v9.2</p>
            </div>

            <div class="space-y-8 flex-1 overflow-y-auto px-8 custom-scroll">
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-4 italic italic">1. Identidad Colegio</label>
                    <div class="p-6 border-2 border-dashed border-slate-700 rounded-3xl text-center hover:bg-slate-800 transition-all cursor-pointer">
                        <p class="text-[9px] font-black text-slate-500 uppercase">Logo PNG</p>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-4">2. Mis Cursos</label>
                    <div id="cursosGrid" class="grid grid-cols-2 gap-2 text-white"></div>
                </div>
            </div>

            <div class="p-8 mt-auto bg-black/40">
                <div class="flex items-center gap-3 mb-4 text-white text-left">
                    <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center font-black shadow-lg">M</div>
                    <div class="text-xs font-bold leading-tight">Mauricio Pinto<br><span class="text-[9px] text-slate-500 uppercase font-black tracking-tighter">Plan School v9.2</span></div>
                </div>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="flex-1 overflow-y-auto p-10 bg-slate-50/50 relative">
            <header class="flex justify-between items-center mb-10">
                <h2 class="text-4xl font-[950] tracking-tight text-slate-900 italic">Workspace Docente</h2>
                <div class="flex gap-3">
                    <div class="glass px-4 py-2 flex items-center gap-2 bg-white rounded-full border border-slate-100">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_#22c55e]"></span>
                        <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Motor Online</span>
                    </div>
                </div>
            </header>

            <div class="workspace-card p-10 border-b-[12px] border-blue-600 mb-10 bg-white">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <input id="titulo" type="text" placeholder="¿Qué canción evaluaremos?" class="md:col-span-1 p-4 bg-slate-50 rounded-2xl font-bold border-transparent outline-none focus:bg-white focus:ring-4 focus:ring-blue-50 transition-all text-lg">
                    <input id="artista" type="text" placeholder="Artista" class="md:col-span-1 p-4 bg-slate-50 rounded-2xl font-bold border-transparent outline-none focus:bg-white focus:ring-4 focus:ring-blue-50 transition-all text-lg">
                    <button id="analyzeBtn" class="bg-slate-900 text-white rounded-2xl font-[950] text-sm hover:bg-blue-600 shadow-2xl transition-all active:scale-95 italic uppercase tracking-widest">Iniciar Análisis</button>
                </div>
            </div>

            <div id="resultsWrapper" class="hidden space-y-10 animate-in pb-20">
                <!-- HERO DASHBOARD -->
                <div id="statusHero" class="workspace-card p-12 border-t-[20px] bg-white transition-all duration-1000">
                    <div class="flex flex-col md:flex-row justify-between items-center gap-10">
                        <div class="flex-1 text-left">
                            <span id="resPill" class="px-4 py-1 bg-slate-100 rounded-full text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 inline-block italic">—</span>
                            <h2 id="summaryTitle" class="text-6xl font-[950] tracking-tighter text-slate-900 italic leading-[0.8] mb-6">—</h2>
                            <p id="bandContext" class="text-slate-400 font-bold text-xl italic max-w-xl"></p>
                        </div>
                        <div class="text-right">
                            <div class="text-8xl font-[950] tracking-tighter italic" id="riskValue">0%</div>
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-2 italic">Riesgo Escolar</p>
                        </div>
                    </div>
                </div>

                <!-- TABLA COMPARATIVA -->
                <div class="workspace-card">
                    <div class="p-8 bg-slate-900 text-white flex justify-between items-center border-b border-slate-800">
                        <h4 class="text-[10px] font-black uppercase tracking-[0.3em]">Triple Sincronización Artística</h4>
                        <button id="pdfBtn" class="bg-blue-600 px-6 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg">Descargar Informe UTP</button>
                    </div>
                    <div class="lyrics-grid p-6 bg-slate-100/50 border-b border-slate-200 text-[9px] font-black text-slate-400 uppercase px-12">
                        <span>Original</span><span>Adaptada (Métrica OK)</span><span>Significado</span>
                    </div>
                    <div id="lyricsContainer" class="max-h-[600px] overflow-y-auto p-6 bg-white space-y-1"></div>
                </div>

                <!-- MATRIZ CURRICULAR -->
                <div class="workspace-card p-12 bg-gradient-to-br from-blue-50 to-white border-blue-100">
                    <div class="flex justify-between items-center mb-10">
                        <h3 class="text-blue-600 font-black text-[10px] uppercase tracking-widest">Estrategia por Nivel</h3>
                        <div id="courseTabs" class="flex gap-2"></div>
                    </div>
                    <div id="pedagogiaContent"></div>
                </div>
            </div>

            <div id="placeholder" class="h-[500px] flex flex-col items-center justify-center border-4 border-dashed border-slate-200 rounded-[48px] bg-white/40 text-center p-20">
                <div class="w-24 h-24 bg-white rounded-3xl flex items-center justify-center text-slate-100 shadow-inner mb-8"><svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg></div>
                <h3 class="text-3xl font-[950] text-slate-300 uppercase italic shimmer-text">Radar SonarIA v9.2 Esperando...</h3>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = "https://sonaria-api-test.onrender.com";
        const $ = id => document.getElementById(id);
        const cursosList = ["1B", "2B", "3B", "4B", "5B", "6B", "7B", "8B", "IM", "IIM", "IIIM", "IVM"];
        let selectedCourses = ["7B", "8B", "IM"];

        // Init Sidebar
        $("cursosGrid").innerHTML = cursosList.map(c => `
            <div>
                <input type="checkbox" id="check-${c}" class="course-checkbox" onchange="toggleCourse('${c}')" ${selectedCourses.includes(c)?'checked':''}>
                <label for="check-${c}" class="course-label">${c.replace('B','°B').replace('M','°M')}</label>
            </div>
        `).join('');

        function toggleCourse(code) {
            if(selectedCourses.includes(code)) selectedCourses = selectedCourses.filter(x => x !== code);
            else selectedCourses.push(code);
        }

        async function analizar() {
            const btn = $("analyzeBtn");
            if (!$("titulo").value) return alert("Por favor, ingresa el título.");
            
            btn.disabled = true; 
            btn.innerHTML = `<span class="shimmer-text font-black uppercase text-[10px] tracking-[0.3em]">Escaneando Métrica...</span>`;

            try {
                const res = await fetch(`${API_BASE}/analizar/v9`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        titulo: $("titulo").value, 
                        artista: $("artista").value,
                        cursos_docente: selectedCourses # Enviamos los cursos del docente
                    })
                });

                const data = await res.json();
                if(data.status === "error") throw new Error(data.message);
                
                renderResult(data);

            } catch(e) {
                alert("Error técnico: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<span>Iniciar Análisis</span>`;
            }
        }

        function renderResult(data) {
            $("placeholder").classList.add("hidden");
            $("resultsWrapper").classList.remove("hidden");
            
            const hero = $("statusHero");
            hero.style.borderColor = data.color === "green" ? "#22c55e" : data.color === "orange" ? "#f97316" : "#ef4444";
            
            $("riskValue").innerText = data.intelligence.risk + "%";
            $("summaryTitle").innerText = data.resultado;
            $("bandContext").innerText = data.intelligence.context;
            $("resPill").innerText = data.resultado;

            $("lyricsContainer").innerHTML = data.comparativa.map(l => `
                <div class="lyrics-grid p-4 hover:bg-slate-50 transition-all items-center rounded-2xl group">
                    <div class="text-[10px] text-slate-300 italic font-medium group-hover:text-blue-400 transition-colors">${l.original}</div>
                    <div class="text-[11px] font-[900] ${l.changed ? 'text-blue-600' : 'text-slate-800'} transition-all">${l.adapted}</div>
                    <div class="text-[10px] text-slate-400 font-bold italic opacity-70">${l.translated}</div>
                </div>
            `).join('');

            window.currentMatrix = data.matriz_pedagogica;
            const cursosKeys = Object.keys(data.matriz_pedagogica);
            $("courseTabs").innerHTML = cursosKeys.map((c, i) => `
                <button onclick="showTab('${c}')" class="tab-btn ${i===0?'active':''} curso-tab">${c}</button>
            `).join('');
            showTab(cursosKeys[0]);
            
            hero.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function showTab(curso) {
            document.querySelectorAll(".curso-tab").forEach(b => b.classList.remove("active"));
            const d = window.currentMatrix[curso];
            $("pedagogiaContent").innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10 animate-in">
                    <div class="space-y-6">
                        <div><span class="text-[9px] font-black text-blue-400 uppercase block mb-1">OA Priorizado</span><p class="text-2xl font-[950] text-slate-900 tracking-tight leading-tight">${d.oa}</p><p class="text-[10px] text-slate-400 font-bold mt-1 uppercase tracking-tighter">${d.desc}</p></div>
                        <div><span class="text-[9px] font-black text-blue-400 uppercase block mb-2">Actividad de Aula</span><p class="text-sm font-bold text-slate-600 leading-relaxed italic">${d.actividad}</p></div>
                    </div>
                    <div class="bg-white p-10 rounded-[48px] shadow-sm border border-blue-50 relative overflow-hidden flex flex-col justify-center">
                        <span class="text-[9px] font-black text-orange-400 uppercase block mb-4 tracking-widest">Pregunta Desafío Docente</span>
                        <p class="text-xl font-black text-slate-800 leading-tight italic">"${d.pregunta}"</p>
                    </div>
                </div>
            `;
        }

        $("analyzeBtn").onclick = analizar;
    </script>
</body>
</html>
