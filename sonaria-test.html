<script>
    const API_BASE = "https://sonaria-api-test.onrender.com";
    const $ = id => document.getElementById(id);

    async function analizar() {
        const btn = $("analyzeBtn");
        const tituloInput = $("titulo").value.trim();

        if (!tituloInput) return alert("Por favor, indica qué canción evaluaremos.");

        // UI Feedback
        $("placeholder").classList.add("hidden");
        $("resultsWrapper").classList.add("hidden");
        $("loader").classList.remove("hidden");
        btn.disabled = true;

        try {
            const fetchRes = await fetch(`${API_BASE}/analizar/v8`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + (localStorage.getItem("mejoraria_token") || "dummy")
                },
                body: JSON.stringify({ titulo: tituloInput })
            });

            if (fetchRes.status === 401) {
                alert("Tu sesión expiró. Por favor, ingresa de nuevo.");
                location.href = "login-test.html";
                return;
            }

            const data = await fetchRes.json();
            
            if (!fetchRes.ok) throw new Error(data.detail || "Error en motor");

            // Efecto WOW de revelación
            setTimeout(() => {
                $("loader").classList.add("hidden");
                $("resultsWrapper").classList.remove("hidden");
                renderResult(data);
                btn.disabled = false;
            }, 800);

        } catch (e) {
            console.error("DEBUG:", e);
            alert("Error: " + e.message);
            $("loader").classList.add("hidden");
            $("placeholder").classList.remove("hidden");
            btn.disabled = false;
        }
    }
    
    // ... mantén el resto de las funciones (renderResult, toggleSidebar, etc.) ...
    $("analyzeBtn").onclick = analizar;
  </script>
