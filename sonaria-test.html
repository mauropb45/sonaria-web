<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonarIA | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .card { @apply bg-white border border-slate-200 rounded-[32px] shadow-sm transition-all duration-500; }
        .traffic-light { transition: border-color 0.8s ease; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-black tracking-tighter">Sonar<span class="text-blue-600">IA</span></h1>
            <p class="text-slate-500 font-bold italic">Evita errores en clase y transforma canciones en herramientas pedagógicas.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- INPUT -->
            <div class="lg:col-span-5 space-y-6">
                <div class="card p-8">
                    <h3 class="text-blue-600 font-black uppercase text-[10px] tracking-widest mb-6">Analizador de Aula</h3>
                    <input id="titulo" type="text" placeholder="Título" class="w-full p-4 bg-slate-50 rounded-2xl mb-4 border border-slate-200 font-bold">
                    <input id="artista" type="text" placeholder="Artista" class="w-full p-4 bg-slate-50 rounded-2xl mb-6 border border-slate-200 font-bold">
                    <button id="analyzeBtn" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black hover:bg-blue-600 shadow-xl transition-all">Analizar Ahora</button>
                </div>
            </div>

            <!-- RESULTADO -->
            <div class="lg:col-span-7">
                <div id="resultsWrapper" class="hidden space-y-6">
                    <div id="statusHero" class="card border-t-[16px] p-10 traffic-light">
                        <div class="flex justify-between items-start mb-6">
                            <div id="suitIcon" class="p-6 rounded-3xl bg-slate-100">
                                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            </div>
                            <div class="text-right">
                                <div class="text-5xl font-black tracking-tighter" id="riskValue">0%</div>
                                <div class="text-[10px] font-black uppercase text-slate-400">Riesgo</div>
                            </div>
                        </div>
                        <h2 id="summaryTitle" class="text-4xl font-black tracking-tight mb-2">Veredicto</h2>
                        <p id="summaryCopy" class="text-lg text-slate-500 font-medium italic">—</p>
                    </div>
                    <div class="card p-8 bg-blue-50/50 border-blue-100">
                        <h4 class="text-blue-600 font-black text-[10px] uppercase mb-2">Justificación Pedagógica</h4>
                        <p id="explicacion" class="text-slate-700 font-bold italic"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://sonaria-api-test.onrender.com";
        const $ = id => document.getElementById(id);

        async function analizar() {
            const btn = $("analyzeBtn");
            btn.disabled = true; btn.innerText = "Evaluando...";
            try {
                const res = await fetch(`${API_BASE}/analizar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem("mejoraria_token") },
                    body: JSON.stringify({ titulo: $("titulo").value, artista: $("artista").value })
                });
                const data = await res.json();
                showResult(data);
            } catch (e) { alert("Error de comunicación con el motor."); }
            finally { btn.disabled = false; btn.innerText = "Analizar Ahora"; }
        }

        function showResult(data) {
            $("resultsWrapper").classList.remove("hidden");
            const risk = data.risk_percent;
            const hero = $("statusHero");
            hero.classList.remove('border-green-400', 'border-orange-400', 'border-red-500');
            
            if(risk < 30) { hero.classList.add('border-green-400'); $("suitIcon").className="p-6 rounded-3xl bg-green-100 text-green-600"; }
            else if(risk < 60) { hero.classList.add('border-orange-400'); $("suitIcon").className="p-6 rounded-3xl bg-orange-100 text-orange-600"; }
            else { hero.classList.add('border-red-500'); $("suitIcon").className="p-6 rounded-3xl bg-red-100 text-red-600"; }

            $("riskValue").innerText = risk + "%";
            $("summaryTitle").innerText = data.resultado;
            $("summaryCopy").innerText = data.resumen;
            $("explicacion").innerText = data.explicacion_pedagogica;
        }
        $("analyzeBtn").onclick = analizar;
    </script>
</body>
</html>
