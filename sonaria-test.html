<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonarIA | Dashboard de Impacto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .card { @apply bg-white border border-slate-200 rounded-[32px] shadow-sm transition-all duration-500; }
        .traffic-light { transition: border-color 0.8s ease; }
    </style>
</head>
<body class="p-4 md:p-10 text-slate-800">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-6xl font-black tracking-tighter mb-4 italic text-slate-900">Sonar<span class="text-blue-600">IA</span></h1>
            <h2 class="text-xl font-bold text-slate-400 italic">"Evita errores en clase, transforma el arte en aprendizaje."</h2>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- INPUT -->
            <div class="lg:col-span-5 space-y-6">
                <div class="card p-8 bg-white/80 backdrop-blur-md">
                    <h3 class="font-black mb-6 uppercase text-[10px] tracking-widest text-blue-600">Analizador de Aula</h3>
                    <input id="titulo" type="text" placeholder="Canción (Ej: Imagine o Creep)" class="w-full p-4 bg-slate-50 rounded-xl mb-4 border border-slate-200 font-bold outline-none focus:ring-4 focus:ring-blue-100 transition-all">
                    <input id="artista" type="text" placeholder="Artista" class="w-full p-4 bg-slate-50 rounded-xl mb-6 border border-slate-200 font-bold outline-none focus:ring-4 focus:ring-blue-100 transition-all">
                    <button id="analyzeBtn" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black hover:bg-blue-600 shadow-xl transition-all active:scale-95">Evaluar Canción</button>
                </div>
            </div>

            <!-- RESULTADO -->
            <div class="lg:col-span-7">
                <div id="resultsWrapper" class="hidden space-y-6">
                    <div id="statusHero" class="card border-t-[14px] p-10 traffic-light">
                        <div class="flex justify-between items-start mb-8">
                            <div id="suitabilityIcon" class="p-6 rounded-3xl bg-slate-100 text-slate-300">
                                <svg class="w-14 h-14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            </div>
                            <div class="text-right">
                                <div class="text-5xl font-black tracking-tighter" id="riskValue">0%</div>
                                <div class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Riesgo Detectado</div>
                            </div>
                        </div>
                        <h2 id="summaryTitle" class="text-4xl font-black tracking-tight mb-2">Veredicto</h2>
                        <p id="summaryCopy" class="text-xl text-slate-500 font-medium italic leading-relaxed">—</p>
                        
                        <div class="grid grid-cols-3 gap-4 border-t pt-8 mt-4 text-center">
                            <div><span class="block text-[10px] font-black text-slate-400 uppercase mb-1">Edad</span><span id="edadSugerida" class="text-xl font-black">—</span></div>
                            <div><span class="block text-[10px] font-black text-slate-400 uppercase mb-1">Cursos</span><span id="cursosSugeridos" class="text-sm font-black">—</span></div>
                            <div><span class="block text-[10px] font-black text-slate-400 uppercase mb-1">Ruta</span><span id="lecturaSugerida" class="text-[10px] font-black uppercase">—</span></div>
                        </div>
                    </div>

                    <div class="card p-8 bg-blue-50/50 border-blue-100">
                        <h4 class="text-blue-600 font-black text-[10px] uppercase mb-3 tracking-widest">Justificación Pedagógica</h4>
                        <p id="explicacionPedagogica" class="text-slate-700 font-bold leading-relaxed italic text-lg">—</p>
                        <div id="actividadSugerida" class="mt-4 p-4 bg-white rounded-xl border border-blue-100 text-sm font-medium text-slate-600"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://sonaria-api-test.onrender.com";
        const $ = id => document.getElementById(id);

        async function analizar() {
            const btn = $("analyzeBtn");
            btn.disabled = true; btn.innerText = "Analizando letra...";
            try {
                const res = await fetch(`${API_BASE}/analizar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem("mejoraria_token") },
                    body: JSON.stringify({ titulo: $("titulo").value, artista: $("artista").value })
                });
                const data = await res.json();
                renderResult(data);
            } catch (e) { alert("Error de comunicación con Staging."); }
            finally { btn.disabled = false; btn.innerText = "Evaluar Canción"; }
        }

        function renderResult(data) {
            $("resultsWrapper").classList.remove("hidden");
            const risk = data.risk_percent;
            const hero = $("statusHero");
            hero.classList.remove('border-green-400', 'border-orange-400', 'border-red-500', 'bg-green-50/30', 'bg-orange-50/30', 'bg-red-50/30');

            if (risk < 25) {
                hero.classList.add('border-green-400', 'bg-green-50/30');
                $("suitabilityIcon").className = "p-6 rounded-3xl bg-green-100 text-green-600";
            } else if (risk < 60) {
                hero.classList.add('border-orange-400', 'bg-orange-50/30');
                $("suitabilityIcon").className = "p-6 rounded-3xl bg-orange-100 text-orange-600";
            } else {
                hero.classList.add('border-red-500', 'bg-red-50/30');
                $("suitabilityIcon").className = "p-6 rounded-3xl bg-red-100 text-red-600";
            }

            $("summaryTitle").textContent = data.resultado;
            $("summaryCopy").textContent = data.resumen;
            $("riskValue").textContent = `${risk}%`;
            $("edadSugerida").textContent = data.edad_sugerida;
            $("cursosSugeridos").textContent = (data.cursos_sugeridos || []).join(", ");
            $("lecturaSugerida").textContent = data.risk_percent < 25 ? "USO DIRECTO" : "MEDIACIÓN";
            $("explicacionPedagogica").textContent = data.explicacion_pedagogica;
            $("actividadSugerida").textContent = data.contextos_detectados[0] || "";
        }
        $("analyzeBtn").onclick = analizar;
    </script>
</body>
</html>
