<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Checkout Simulado</title>
<style>
body{
  font-family:Arial;
  background:#0b1220;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box{
  background:#111a2b;
  padding:40px;
  border-radius:20px;
  text-align:center;
}
button{
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}
.ok{background:#22c55e;}
.fail{background:#ef4444;}
</style>
</head>

<body>

<div class="box">
  <h2>Simulación de pago</h2>
  <p>Plan Pro - $4.990</p>

  <button class="ok" onclick="confirmarPago()">Pagar (simulado)</button>
  <button class="fail" onclick="cancelar()">Cancelar</button>

  <p id="status"></p>
</div>

<script>
const API = "https://sonaria-api.onrender.com";

function getToken(){
  return localStorage.getItem("mejoraria_token");
}

async function confirmarPago(){
  const status = document.getElementById("status");
  status.textContent = "Procesando...";

  const res = await fetch(API + "/payments/fake/confirm", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + getToken()
    }
  });

  const data = await res.json();

  if(data.ok){
    status.textContent = "Pago exitoso 🎉";

    setTimeout(()=>{
      window.location.href = "/planes.html?pago=ok";
    }, 1000);
  } else {
    status.textContent = "Error en pago";
  }
}

function cancelar(){
  window.location.href = "/planes.html?pago=error";
}
</script>

</body>
</html>
