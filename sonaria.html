<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SonarIA | Panel docente</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#f4f7fb;
  color:#243043;
}

/* Layout */
.wrap{max-width:1200px;margin:auto;padding:20px}
.card{
  background:white;
  border-radius:18px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}

/* Botones */
.btn{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:700;
}
.btn-green{background:#23c66a;color:white}
.btn-primary{background:#4b82ff;color:white}
.btn-ghost{background:#eef3fa}

/* Inputs */
input, textarea{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #d7deeb;
  margin-top:6px;
}
textarea{min-height:140px}

/* Semáforo */
.lights{display:flex;gap:10px;margin-bottom:10px}
.light{
  width:16px;height:16px;border-radius:50%;
  background:#ccc;opacity:.3
}
.light.active.red{background:#ff6a6a;opacity:1}
.light.active.yellow{background:#f2c14b;opacity:1}
.light.active.green{background:#23c66a;opacity:1}

/* Barras */
.bar{
  height:10px;
  border-radius:10px;
  background:#e4eaf5;
  overflow:hidden;
}
.bar-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#23c66a,#f2c14b,#ff6a6a);
  transition:.3s;
}

/* Uso escolar */
.uso-escolar-box{
  display:none;
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  background:#ffecec;
  border:1px solid #ffbaba;
  color:#a33;
  font-weight:700;
}

/* Resumen */
.summary{
  font-size:1.1rem;
  font-weight:700;
  margin-bottom:10px;
}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
  <h2>🎵 Analizar canción</h2>

  <input id="titulo" placeholder="Título">
  <input id="artista" placeholder="Artista">
  <textarea id="letra" placeholder="Pega la letra aquí..."></textarea>

  <button class="btn btn-green" onclick="analizar()">Analizar</button>
  <button class="btn btn-primary" onclick="resumen()">Resumen</button>
</div>

<div class="card">
  <h2>Resultado pedagógico</h2>

  <div class="lights">
    <div id="l1" class="light"></div>
    <div id="l2" class="light"></div>
    <div id="l3" class="light"></div>
  </div>

  <div class="summary" id="summary">
    Esperando análisis...
  </div>

  <div class="bar"><div id="bar1" class="bar-fill"></div></div>
  <br>
  <div class="bar"><div id="bar2" class="bar-fill"></div></div>

  <div id="usoEscolarBox" class="uso-escolar-box"></div>
</div>

</div>

<script>
function analizar(){
  // simulación (backend conecta aquí)
  document.getElementById("summary").innerText="La canción presenta riesgo medio por lenguaje implícito.";

  document.getElementById("l2").classList.add("active","yellow");

  document.getElementById("bar1").style.width="60%";
  document.getElementById("bar2").style.width="40%";

  let box=document.getElementById("usoEscolarBox");
  box.style.display="block";
  box.innerText="Uso escolar sugerido con mediación docente.";
}

function resumen(){
  alert("Resumen pedagógico generado (conectar a backend)");
}
</script>

</body>
</html>
