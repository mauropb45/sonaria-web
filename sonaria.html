<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SonarIA</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#f5f7fb;
  color:#1f2937;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}

h2{margin-top:0}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.clock{
  font-size:2rem;
  font-weight:800;
}

.efemeride{
  font-size:.95rem;
  color:#6b7280;
}

/* INPUTS */
input,textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  margin-bottom:10px;
}

/* BUTTONS */
.btn{
  padding:10px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.btn-green{background:#22c55e;color:white}
.btn-blue{background:#3b82f6;color:white}
.btn-gray{background:#e5e7eb}

/* SEMÁFORO */
.bar{
  height:10px;
  border-radius:10px;
  background:linear-gradient(90deg,#22c55e,#facc15,#ef4444);
  opacity:.2;
}

.bar-fill{
  height:10px;
  border-radius:10px;
  width:0%;
}

/* SECCIONES */
.section-title{
  font-weight:800;
  margin-bottom:10px;
}

/* PEDAGOGÍA */
.pedagogia-box{
  background:#f9fafb;
  padding:10px;
  border-radius:10px;
}

/* TRADUCCIÓN */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.highlight{
  background:yellow;
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="card header">
  <div>
    <h2>SonarIA</h2>
    <div class="efemeride" id="efemeride">
      Un día como hoy...
    </div>
  </div>

  <div class="clock" id="clock">00:00</div>
</div>

<!-- INPUT -->
<div class="card">
  <h3>Analizar canción</h3>

  <input id="titulo" placeholder="Canción">
  <input id="artista" placeholder="Artista">
  <textarea id="letra" placeholder="Pega la letra aquí"></textarea>

  <button class="btn btn-green" onclick="analizar()">Analizar</button>
</div>

<!-- RESULTADO -->
<div class="card">
  <div class="section-title">Resultado pedagógico</div>

  <div id="resultado"></div>

  <div class="bar">
    <div id="barFill" class="bar-fill"></div>
  </div>
</div>

<!-- PEDAGOGÍA -->
<div class="card">
  <div class="section-title">Pedagogía</div>

  <select id="curso" onchange="cambiarCurso()">
    <option>Selecciona curso</option>
    <option>7° básico</option>
    <option>8° básico</option>
    <option>I° medio</option>
    <option>II° medio</option>
  </select>

  <div class="pedagogia-box" id="pedagogia">
    Selecciona un curso para ver sugerencias.
  </div>
</div>

<!-- TRADUCCIÓN -->
<div class="card">
  <div class="section-title">Traducción y adaptación</div>

  <div class="grid">
    <pre id="adaptada"></pre>
    <pre id="traducida"></pre>
  </div>
</div>

</div>

<script>

/* RELOJ */
setInterval(()=>{
  let d=new Date();
  clock.innerText=d.toLocaleTimeString();
},1000);

/* EFEMÉRIDE SIMPLE */
efemeride.innerText="Un día como hoy en la música pasó algo relevante.";

/* ANALIZAR */
function analizar(){
  resultado.innerText="🟡 Apta con mediación";

  barFill.style.width="60%";
  barFill.style.background="linear-gradient(90deg,#22c55e,#facc15,#ef4444)";

  adaptada.innerText="Versión adaptada aquí...";
  traducida.innerText="Translated version here...";
}

/* PEDAGOGÍA */
function cambiarCurso(){
  let c=curso.value;

  if(c==="7° básico"){
    pedagogia.innerText="Reflexión básica sobre emociones.";
  }
  else if(c==="8° básico"){
    pedagogia.innerText="Análisis de mensaje y contexto.";
  }
  else if(c==="I° medio"){
    pedagogia.innerText="Interpretación crítica.";
  }
  else if(c==="II° medio"){
    pedagogia.innerText="Debate argumentativo.";
  }
}

</script>

</body>
</html>
