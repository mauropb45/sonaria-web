<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SonarIA PRO</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0A0C10;
  color:white;
  padding:20px;
}

h2{
  margin-top:0;
}

.container{
  max-width:900px;
  margin:auto;
}

textarea, input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  background:#111;
  color:white;
}

button{
  margin-top:15px;
  padding:12px;
  width:100%;
  background:#E10600;
  color:white;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.card{
  background:#111;
  padding:15px;
  border-radius:10px;
  margin-top:20px;
}

.cursos-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.cursos-grid label{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px;
  border-radius:10px;
  background:#0f141d;
  border:1px solid rgba(255,255,255,.1);
  cursor:pointer;
}

.callout{
  margin-top:10px;
  padding:10px;
  border-radius:8px;
  background:#1a1f2b;
}
</style>
</head>

<body>

<div class="container">

<h2>SonarIA PRO</h2>

<input id="titulo" placeholder="Título">
<input id="artista" placeholder="Artista">
<textarea id="texto" placeholder="Pega la letra..."></textarea>

<button onclick="analizar()">Analizar canción</button>

<div class="card">
  <strong>Resultado:</strong>
  <div id="resultado">Sin análisis</div>

  <div class="callout">
    <strong>Edad sugerida</strong>
    <div id="edad">—</div>
  </div>

  <div class="callout">
    <strong>Compatibilidad con tus cursos</strong>
    <div id="compatCursos">Aún no evaluado</div>
  </div>
</div>

<div class="card">
  <h3>Mis cursos</h3>

  <div id="misCursos" class="cursos-grid">
    <label><input type="checkbox" value="1 básico"> 1 básico</label>
    <label><input type="checkbox" value="2 básico"> 2 básico</label>
    <label><input type="checkbox" value="3 básico"> 3 básico</label>
    <label><input type="checkbox" value="4 básico"> 4 básico</label>
    <label><input type="checkbox" value="5 básico"> 5 básico</label>
    <label><input type="checkbox" value="6 básico"> 6 básico</label>
    <label><input type="checkbox" value="7 básico"> 7 básico</label>
    <label><input type="checkbox" value="8 básico"> 8 básico</label>
    <label><input type="checkbox" value="1 medio"> 1 medio</label>
    <label><input type="checkbox" value="2 medio"> 2 medio</label>
    <label><input type="checkbox" value="3 medio"> 3 medio</label>
    <label><input type="checkbox" value="4 medio"> 4 medio</label>
  </div>

  <button onclick="guardarCursos()">Guardar cursos</button>
</div>

</div>

<script>
function guardarCursos(){
  const checks = document.querySelectorAll("#misCursos input:checked");
  const cursos = [...checks].map(c => c.value);
  localStorage.setItem("sonaria_cursos", JSON.stringify(cursos));
  alert("Cursos guardados");
}

function cargarCursos(){
  const data = JSON.parse(localStorage.getItem("sonaria_cursos") || "[]");
  const checks = document.querySelectorAll("#misCursos input");

  checks.forEach(c => {
    c.checked = data.includes(c.value);
  });
}

function evaluarCompatibilidadCursos(edadTexto){
  const cursos = JSON.parse(localStorage.getItem("sonaria_cursos") || "[]");
  const n = parseInt((edadTexto || "").replace(/[^0-9]/g,""), 10);

  if(!n || cursos.length === 0){
    return "Selecciona cursos para personalizar";
  }

  let nivel;

  if(n <= 6) nivel = ["1 básico","2 básico","3 básico","4 básico"];
  else if(n <= 8) nivel = ["5 básico","6 básico"];
  else if(n <= 12) nivel = ["7 básico","8 básico"];
  else if(n <= 14) nivel = ["1 medio","2 medio"];
  else nivel = ["3 medio","4 medio"];

  const match = cursos.some(c => nivel.includes(c));

  if(match){
    return "✔ Apta para tus cursos";
  } else {
    return "⚠ No recomendada para tus cursos";
  }
}

function analizar(){
  const texto = document.getElementById("texto").value;

  if(!texto){
    alert("Pega una letra");
    return;
  }

  // Simulación análisis
  const edad = Math.floor(Math.random()*10)+8;

  document.getElementById("resultado").textContent = "Análisis completado";
  document.getElementById("edad").textContent = edad + "+";

  document.getElementById("compatCursos").textContent =
    evaluarCompatibilidadCursos(edad + "+");
}

cargarCursos();
</script>

</body>
</html>
