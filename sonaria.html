```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SonarIA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#061528;
  --panel:#0f1d35;
  --text:#f5f7fb;
  --muted:#9fb0c7;
  --green:#22c55e;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:900px;
  margin:auto;
  padding:40px 20px;
}

h1{
  margin-bottom:10px;
}

textarea{
  width:100%;
  height:120px;
  border-radius:12px;
  border:none;
  padding:12px;
  margin-top:10px;
  font-size:1rem;
}

button{
  margin-top:15px;
  padding:12px 18px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.btn-main{
  background:var(--green);
}

#resultado{
  margin-top:20px;
  padding:20px;
  background:var(--panel);
  border-radius:16px;
}

#status{
  margin-top:10px;
  font-weight:bold;
}

#topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

#planBadge{
  background:#1f2d4a;
  padding:6px 10px;
  border-radius:8px;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  align-items:center;
  justify-content:center;
}

.overlay-box{
  background:#0f1d35;
  padding:30px;
  border-radius:20px;
  width:400px;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

<div id="topbar">
  <div>
    <strong>SonarIA</strong>
  </div>
  <div id="planBadge">...</div>
</div>

<h1>Analizador musical</h1>

<textarea id="input" placeholder="Pega aquí la letra o acordes"></textarea>

<button class="btn-main" onclick="analizar()">Analizar</button>
<button onclick="abrirPro()">Desbloquear Pro</button>

<div id="status"></div>

<div id="resultado"></div>

</div>

<!-- OVERLAY PRO -->
<div id="overlay" class="overlay">
  <div class="overlay-box">
    <h2>🚀 SonarIA Pro</h2>
    <p>Desbloquea análisis ilimitado y funciones completas.</p>

    <button class="btn-main" onclick="irAPago()">Ver planes</button>
    <button onclick="cerrarOverlay()">Cerrar</button>
  </div>
</div>

<script>
const API = "https://sonaria-api.onrender.com";

let USER = null;
let usos = 0;

function getToken(){
  return localStorage.getItem("mejoraria_token") || "";
}

async function loadUser(){
  const res = await fetch(API + "/me", {
    headers:{
      Authorization:"Bearer " + getToken()
    }
  });

  const data = await res.json();
  USER = data.user;

  document.getElementById("planBadge").textContent =
    USER.email + " | " + USER.plan.toUpperCase();
}

function setStatus(msg){
  document.getElementById("status").textContent = msg;
}

function abrirPro(){
  document.getElementById("overlay").style.display = "flex";
}

function cerrarOverlay(){
  document.getElementById("overlay").style.display = "none";
}

function irAPago(){
  window.location.href = "/planes.html";
}

function previewDemo(){
  document.getElementById("resultado").innerHTML = `
    <div style="opacity:.6">
      🎵 Tonalidad: C mayor<br>
      🎸 Acordes: C - G - Am - F<br>
      ...
    </div>

    <div style="margin-top:15px;">
      🔒 Desbloquea análisis completo con Pro
    </div>
  `;
}

function resultadoCompleto(){
  document.getElementById("resultado").innerHTML = `
    🎵 Tonalidad: C mayor<br>
    🎸 Acordes: C - G - Am - F<br>
    🧠 Análisis armónico completo<br>
    🎼 Función tonal detallada<br>
  `;
}

function analizar(){

  if(!USER){
    setStatus("Cargando usuario...");
    return;
  }

  if(USER.plan !== "pro"){
    if(usos >= 3){
      abrirPro();
      setStatus("Límite gratuito alcanzado");
      return;
    }

    usos++;
    previewDemo();
    setStatus("Modo demo (" + usos + "/3)");
    return;
  }

  resultadoCompleto();
  setStatus("Análisis completo activado");
}

loadUser();
</script>

</body>
</html>
```
