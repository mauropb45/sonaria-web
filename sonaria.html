<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SonarIA</title>

<style>
:root{
  --bg:#f5f7fb;
  --bg2:#eef2f7;
  --panel:#ffffff;
  --panel2:#f9fbff;
  --line:#e3e8f0;
  --text:#1f2937;
  --muted:#6b7280;

  --green:#14d68f;
  --yellow:#f3c74b;
  --red:#ff7474;
}

body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(180deg,var(--bg),var(--bg2));
  color:var(--text);
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:var(--panel);
  padding:20px;
  border-radius:20px;
  margin-top:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

input,textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--line);
  margin-bottom:10px;
}

button{
  padding:10px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.primary{background:#4f46e5;color:white;}
.ghost{background:#e5e7eb;}

.bar{
  height:8px;
  border-radius:10px;
  background:linear-gradient(90deg,var(--green),var(--yellow),var(--red));
  opacity:.2;
}

.bar-fill{
  height:8px;
  border-radius:10px;
  width:0%;
}
</style>
</head>

<body>

<div class="container">

<h2>SonarIA</h2>

<input id="titulo" placeholder="Canción">
<input id="artista" placeholder="Artista">
<textarea id="texto" placeholder="Letra"></textarea>

<button class="primary" onclick="analizar()">Analizar canción</button>

<div class="card">

<h3 id="resultado">Resultado</h3>
<p id="justificacion"></p>

<div id="usoEscolar" style="display:none;background:#fee2e2;padding:10px;border-radius:10px;">
⚠️ Esta canción no es directamente apta para el aula.  
Pero SonarIA puede adaptarla automáticamente para que puedas usarla con tus estudiantes de forma segura.
</div>

<div class="bar">
<div id="barFill" class="bar-fill"></div>
</div>

</div>

<div id="adaptBox" class="card" style="display:none">

<div style="text-align:center">
<h3 id="songTitle"></h3>
<p id="songArtist"></p>
<p id="adaptLabel" style="color:#2563eb;"></p>
</div>

<pre id="lyrics"></pre>

</div>

<div style="margin-top:20px">
<button class="ghost" onclick="preview()">Vista previa PDF</button>
<button class="primary" onclick="downloadPDF()">Descargar PDF</button>
</div>

</div>

<div id="modal" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.4);
justify-content:center;
align-items:center;
">

<div style="background:white;padding:20px;border-radius:20px;width:80%">

<h3>Vista previa</h3>
<div id="previewContent"></div>

<button onclick="downloadPDF()" class="primary">Descargar</button>
<button onclick="closeModal()" class="ghost">Cerrar</button>

</div>
</div>

<script>

let lastData=null;

function analizar(){

fetch("/analizar",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
titulo:titulo.value,
artista:artista.value,
texto:texto.value
})
})
.then(r=>r.json())
.then(data=>{

lastData=data;

resultado.innerText=data.resultado;
justificacion.innerText=data.justificacion;

if(data.resultado.includes("🔴")){
usoEscolar.style.display="block";
}else{
usoEscolar.style.display="none";
}

renderBar(data.riesgo);

if(data.letra_adaptada){

adaptBox.style.display="block";

songTitle.innerText=data.titulo;
songArtist.innerText=data.artista;

if(data.letra_adaptada !== data.letra_original){
adaptLabel.innerText="Adaptación realizada por SonarIA";
}else{
adaptLabel.innerText="";
}

lyrics.innerText=data.letra_adaptada;
}

});

}

function renderBar(risk){

if(risk === undefined){
barFill.style.width="100%";
barFill.style.background="linear-gradient(90deg,green,yellow,red)";
barFill.style.opacity=".2";
return;
}

if(risk === 0){
barFill.style.width="100%";
barFill.style.background="green";
return;
}

barFill.style.width=risk+"%";
barFill.style.background="linear-gradient(90deg,green,yellow,red)";
barFill.style.opacity="1";

}

function preview(){

previewContent.innerHTML = `
<h4>${lastData.titulo}</h4>
<p>${lastData.resultado}</p>
<p>${lastData.justificacion}</p>
`;

modal.style.display="flex";

}

function closeModal(){
modal.style.display="none";
}

function downloadPDF(){
window.open("/export/pdf");
}

</script>

</body>
</html>
