<!-- sonaria.html (con botón contexto real) -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SonarIA</title>
</head>
<body>

<h2>Analizar canción</h2>

<textarea id="letra" rows="10" cols="50"></textarea><br><br>

<button onclick="analizar()">Analizar</button>
<button onclick="verContexto()">Contexto</button>

<h3>Resultado</h3>
<div id="resultado"></div>

<h3>Contexto</h3>
<div id="contexto"></div>

<script>

let ultimoResultado = null;

async function analizar(){
    const letra = document.getElementById("letra").value;

    const res = await fetch("http://127.0.0.1:5000/analizar",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({letra})
    });

    const data = await res.json();
    ultimoResultado = data;

    document.getElementById("resultado").innerHTML = "Análisis completado";
}

function verContexto(){
    if(!ultimoResultado){
        alert("Primero analiza una canción");
        return;
    }

    let html = "";

    ultimoResultado.contextos_detectados.forEach(c=>{
        html += `
        <div style="border:1px solid #ccc; padding:10px; margin:10px;">
            <b>Palabra:</b> ${c.termino}<br>
            <b>Fragmento:</b> ${c.fragmento}<br>
            <b>Lectura:</b> ${c.lectura_pedagogica}<br>
            <b>Acción:</b> ${c.accion_sugerida}
        </div>
        `;
    });

    document.getElementById("contexto").innerHTML = html;
}

</script>

</body>
</html>
