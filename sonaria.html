<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SonarIA</title>

<style>
body {
  font-family: Arial;
  background:#f5f7fb;
  margin:0;
  padding:20px;
}

.container{
  max-width:900px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:12px;
}

button{
  padding:12px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.primary{background:#22c55e;color:white;}
.secondary{background:#e5e7eb;}
.orange{background:#fb923c;color:white;}

.progress{
  height:8px;
  background:#e5e7eb;
  border-radius:10px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  background:#22c55e;
  transition:width 0.5s;
}

/* 📱 móvil */
@media(max-width:768px){
  button{width:100%;}
}
</style>

</head>

<body>

<div class="container">

<h2>SonarIA V131.1</h2>

<!-- BOTONES SUPERIORES -->

<button onclick="toggleGuia()">📘 Guía docente</button>

<div id="otrasHerramientasBtn" style="display:none;">
  <button onclick="toggleHerramientas()">⚙️ Otras herramientas</button>
</div>

<!-- GUÍA DOCENTE -->

<div id="guiaDocente" style="display:none;">
  <h3>El arte puede abrir conversaciones</h3>
  <p>La música permite abordar emociones y contexto en el aula.</p>

  <h3>Declaración de principios</h3>
  <p>SonarIA adapta contenido con fines educativos.</p>

  <h3>Alcance</h3>
  <p>La responsabilidad final recae en el docente.</p>
</div>

<!-- HERRAMIENTAS -->

<div id="herramientasPanel" style="display:none;">
  <p>📅 Calendario</p>
  <p>🕒 Hora</p>
  <p id="efemerideBox">🎯 Efeméride aquí</p>
</div>

<!-- FORM -->

<input id="titulo" placeholder="Título">
<input id="artista" placeholder="Artista">

<textarea id="letra" placeholder="Letra"></textarea>

<br>

<button class="primary" onclick="analizar()">Analizar canción</button>

<!-- PROGRESO -->

<div class="progress">
  <div id="barra" class="progress-bar"></div>
</div>

<p id="estado"></p>

</div>

<script>

const esMovil = window.innerWidth <= 768;

if(esMovil){
  document.getElementById("otrasHerramientasBtn").style.display = "block";
}

// toggles
function toggleGuia(){
  let g = document.getElementById("guiaDocente");
  g.style.display = g.style.display==="none"?"block":"none";
}

function toggleHerramientas(){
  let h = document.getElementById("herramientasPanel");
  h.style.display = h.style.display==="none"?"block":"none";
}

// análisis (simulación)
async function analizar(){

  let barra = document.getElementById("barra");
  let estado = document.getElementById("estado");

  barra.style.width="25%";
  estado.innerText="Buscando letra";

  await sleep(800);

  barra.style.width="50%";
  estado.innerText="Analizando contenido";

  await sleep(800);

  barra.style.width="75%";
  estado.innerText="Generando pedagogía";

  await sleep(800);

  barra.style.width="100%";
  estado.innerText="Preparando PDF";

  mostrarEfemeride();
}

// efeméride V128
function mostrarEfemeride(){

  const artista = document.getElementById("artista").value.toLowerCase();

  let texto = "La música permite trabajar emociones y cultura.";

  if(artista.includes("queen")){
    texto="Queen revolucionó el rock con teatralidad.";
  }

  document.getElementById("efemerideBox").innerText = texto;
}

function sleep(ms){
  return new Promise(r=>setTimeout(r,ms));
}

</script>

</body>
</html>
