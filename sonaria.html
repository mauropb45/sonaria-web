<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SonarIA Pro</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b1220;
  color:#fff;
}

.container{
  display:flex;
  gap:20px;
  padding:20px;
}

.panel{
  background:#111a2e;
  padding:20px;
  border-radius:12px;
  flex:1;
}

input, textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#ff8000;
  color:white;
  cursor:pointer;
}

.result{
  margin-top:10px;
}
.badge{
  padding:6px 10px;
  border-radius:8px;
  display:inline-block;
}

.apta{background:#00d084;}
.media{background:#f59e0b;}
.noapta{background:#ef4444;}
</style>
</head>

<body>

<div class="container">

<div class="panel">
<h2>Entrada</h2>

<input id="titulo" placeholder="Título">
<input id="artista" placeholder="Artista">
<textarea id="letra" placeholder="Letra (opcional)"></textarea>

<button onclick="analizar()">Analizar</button>
</div>

<div class="panel">
<h2>Resultado</h2>

<div id="clasificacion"></div>
<div id="justificacion"></div>
<div id="temas"></div>
<div id="riesgo"></div>
</div>

</div>

<script>

let ultimaLetraAuto = "";

async function analizar(){

  const titulo = document.getElementById("titulo").value.trim();
  const artista = document.getElementById("artista").value.trim();
  let letra = document.getElementById("letra").value.trim();

  if(letra === ultimaLetraAuto){
    letra = "";
  }

  const res = await fetch("https://sonaria-api.onrender.com/analizar",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      titulo,
      artista,
      texto:letra
    })
  });

  const data = await res.json();

  if(data.lyrics){
    ultimaLetraAuto = data.lyrics;
    if(!letra){
      document.getElementById("letra").value = data.lyrics;
    }
  }

  render(data);
}

function render(data){

  const clas = data.clasificacion || data.resultado;

  let claseCSS = "media";
  if(clas.includes("Apta")) claseCSS = "apta";
  if(clas.includes("No")) claseCSS = "noapta";

  document.getElementById("clasificacion").innerHTML =
    `<span class="badge ${claseCSS}">${clas}</span>`;

  document.getElementById("justificacion").innerText =
    data.justificacion;

  document.getElementById("temas").innerText =
    "Temas: " + (data.temas || []).join(", ");

  document.getElementById("riesgo").innerText =
    "Riesgo: " + data.riesgo_total + "%";

}

</script>

</body>
</html>
