<!-- SONARIA.HTML CORREGIDO (SESIÓN UNIFICADA) -->

<script>
function getCurrentUser(){
  try{
    return JSON.parse(localStorage.getItem("mejoraria_user") || "null");
  }catch(e){
    return null;
  }
}

let currentUser = null;

function loadUserFromLocal(){
  currentUser = getCurrentUser();

  if(currentUser && currentUser.email){
    console.log("Usuario cargado correctamente:", currentUser);
  }else{
    console.log("No hay usuario en sesión");
  }
}

async function analizarCancion(){

  const user = getCurrentUser();

  if(!user || !user.email){
    alert("Debes iniciar sesión antes de analizar.");
    return;
  }

  const texto = document.getElementById("texto").value;

  if(!texto){
    alert("Pega la letra.");
    return;
  }

  try{
    const res = await fetch("https://sonaria-api.onrender.com/analizar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + localStorage.getItem("mejoraria_token")
      },
      body: JSON.stringify({
        email: user.email,
        texto: texto
      })
    });

    const data = await res.json();

    if(!res.ok){
      throw new Error(data.detail || "Error");
    }

    console.log("Resultado:", data);
    alert("Resultado: " + data.resultado);

    // actualizar contador en local
    localStorage.setItem("mejoraria_user", JSON.stringify({
      ...user,
      plan: data.plan,
      analyses_used: data.analyses_used
    }));

  }catch(err){
    alert(err.message);
  }
}

window.onload = () => {
  loadUserFromLocal();
};
</script>

<textarea id="texto" placeholder="Pega la letra"></textarea>
<br><br>
<button onclick="analizarCancion()">Analizar</button>
