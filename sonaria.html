<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SonarIA</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f7fb;
    padding: 30px;
}

h1 {
    font-size: 28px;
}

textarea {
    width: 100%;
    height: 150px;
    margin-top: 10px;
    padding: 10px;
}

input {
    padding: 10px;
    margin: 5px 0;
    width: 48%;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 6px;
    margin-top: 10px;
    cursor: pointer;
}

.btn-analizar { background: #2ecc71; color: white; }
.btn-sec { background: #3498db; color: white; }
.btn-uso { background: #e67e22; color: white; }

#status {
    margin-top: 15px;
    padding: 10px;
    border-radius: 6px;
}

.error {
    background: #ffe5e5;
    color: #c0392b;
}

.ok {
    background: #eafaf1;
    color: #27ae60;
}
</style>
</head>

<body>

<h1>🎧 SonarIA</h1>

<input id="titulo" placeholder="Título">
<input id="artista" placeholder="Artista">

<textarea id="texto" placeholder="Pega aquí la letra..."></textarea>

<br>

<button class="btn-analizar" onclick="analizarCancion()">Analizar</button>
<button class="btn-sec">Adaptación escolar</button>
<button class="btn-sec">Letra traducida</button>
<button class="btn-uso">Usar en clase</button>

<div id="status"></div>

<script>
const API_URL = "https://sonaria-api.onrender.com";

function setStatus(msg, type=""){
    const el = document.getElementById("status");
    el.className = type;
    el.innerText = msg;
}

async function analizarCancion(){

    const titulo = document.getElementById("titulo").value;
    const artista = document.getElementById("artista").value;
    const texto = document.getElementById("texto").value;

    const token = localStorage.getItem("token");

    if(!token){
        window.location.href = "/login.html";
        return;
    }

    setStatus("Analizando...", "ok");

    try{

        const response = await fetch(API_URL + "/analizar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
                titulo,
                artista,
                texto,
                buscar_letra: true,
                contexto_escolar: true
            })
        });

        const data = await response.json();

        if(!response.ok){
            throw new Error(data.detail || "Error en el servidor");
        }

        setStatus("✅ Análisis realizado correctamente", "ok");
        console.log(data);

    }catch(err){
        setStatus(err.message, "error");  // 👈 ahora muestra el error REAL
    }
}

//////////////////////////////////////////////////////
// ✅ ENTER FUNCIONANDO
//////////////////////////////////////////////////////

function triggerAnalyze(e){
    if(e.key === "Enter"){
        e.preventDefault();
        analizarCancion();
    }
}

document.getElementById("titulo").addEventListener("keydown", triggerAnalyze);
document.getElementById("artista").addEventListener("keydown", triggerAnalyze);

// textarea: Ctrl + Enter o Cmd + Enter
document.getElementById("texto").addEventListener("keydown", function(e){
    if((e.ctrlKey || e.metaKey) && e.key === "Enter"){
        e.preventDefault();
        analizarCancion();
    }
});
</script>

</body>
</html>
