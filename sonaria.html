<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SonarIA Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0b1220;
  color:white;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:30px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.logo{
  font-size:26px;
  font-weight:800;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:none;
  background:#1f2937;
  color:white;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
}

.primary{ background:#00d084; color:black; }
.upgrade{ background:#ff8000; }

.result{
  margin-top:10px;
  padding:10px;
  background:#1f2937;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<div class="topbar">
  <div class="logo">SonarIA PRO</div>
  <div id="user"></div>
</div>

<div class="card">
  <h2>Analizar canción</h2>

  <input id="titulo" placeholder="Título">
  <input id="artista" placeholder="Artista">
  <textarea id="texto" placeholder="Letra (opcional)"></textarea>

  <button class="primary" onclick="analizar()">Analizar</button>
  <button class="upgrade" onclick="upgrade()">PRO</button>

  <div id="resultado" class="result"></div>
</div>

</div>

<script>

const API = "https://sonaria-api.onrender.com";
let token = localStorage.getItem("mejoraria_token");

async function loadUser(){
  if(!token) return;
  const res = await fetch(API + "/me", {
    headers:{ Authorization:"Bearer " + token }
  });
  const data = await res.json();
  document.getElementById("user").innerText =
    data.user.email + " (" + data.user.plan + ")";
}

async function analizar(){
  const res = await fetch(API + "/analizar", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer " + token
    },
    body:JSON.stringify({
      titulo:titulo.value,
      artista:artista.value,
      texto:texto.value
    })
  });

  const data = await res.json();

  document.getElementById("resultado").innerHTML =
    "<b>" + data.resultado + "</b><br>" + data.resumen;
}

async function upgrade(){
  const res = await fetch(API + "/payments/create-checkout", {
    method:"POST",
    headers:{ Authorization:"Bearer " + token }
  });

  const data = await res.json();
  window.location.href = data.checkout_url;
}

loadUser();

</script>

</body>
</html>
