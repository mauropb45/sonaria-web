<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SonarIA | Dashboard escolar</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
/* TODO TU CSS ORIGINAL (NO TOCAR) */
  </style>
</head>

<body>

<!-- 🔐 BOTÓN LOGOUT -->
<button onclick="logout()" style="
  position:absolute;
  top:20px;
  right:20px;
  padding:10px 16px;
  border:none;
  border-radius:10px;
  background:#ff4d4d;
  color:white;
  cursor:pointer;
">
Cerrar sesión
</button>

<div class="container">
  <header class="header">
    <a href="index.html" class="brand">
      <h1 class="brand-main">Sonar<span class="ia">IA</span></h1>
      <div class="brand-sub">Evaluador pedagógico musical</div>
    </a>
  </header>

  <section class="shell">

    <!-- PANEL -->
    <aside class="card panel stack">

      <h2 style="font-size:1.8rem;">Dashboard escolar</h2>

      <form id="analysisForm" class="stack">

        <div class="row">
          <input id="titulo" class="input" placeholder="Título de la canción">
          <input id="artista" class="input" placeholder="Artista">
        </div>

        <textarea id="texto" class="textarea" placeholder="Pega la letra..."></textarea>

        <div class="actions">
          <button type="submit" class="btn btn-primary">Analizar canción</button>
          <button type="button" onclick="clearForm()" class="btn btn-ghost">Limpiar</button>
        </div>

        <div id="statusBox" class="status"></div>

      </form>

    </aside>

    <!-- RESULTADO -->
    <main class="right-col">
      <section class="card panel">
        <div id="resultTitle">Esperando análisis...</div>
      </section>
    </main>

  </section>

  <div class="footer">MauRock · Mauricio José Pinto Basso</div>
</div>

<script>

const API_URL = "https://sonaria-api.onrender.com/analizar";

const form = document.getElementById("analysisForm");
const statusBox = document.getElementById("statusBox");
const resultTitle = document.getElementById("resultTitle");

function setStatus(msg, type){
  statusBox.textContent = msg;
  statusBox.className = "status show " + type;
}

function clearStatus(){
  statusBox.textContent = "";
  statusBox.className = "status";
}

function clearForm(){
  form.reset();
  clearStatus();
  resultTitle.textContent = "Esperando análisis...";
}

async function runAnalysis(data){
  const res = await fetch(API_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  const text = await res.text();
  let json;

  try{
    json = JSON.parse(text);
  }catch{
    throw new Error("Respuesta inválida");
  }

  if(!res.ok) throw new Error("Error API");

  return json;
}

form.addEventListener("submit", async (e)=>{
  e.preventDefault();
  clearStatus();

  const data = {
    titulo:document.getElementById("titulo").value,
    artista:document.getElementById("artista").value,
    texto:document.getElementById("texto").value,
    buscar_letra:true,
    contexto_escolar:true
  };

  try{
    setStatus("Analizando canción...", "loading");

    const result = await runAnalysis(data);

    console.log(result);

    resultTitle.textContent = result.resumen || "Análisis completado";

    setStatus("Análisis listo", "success");

  }catch(err){
    console.error(err);
    setStatus("Error al analizar", "error");
  }
});

</script>

<!-- 🔐 PROTECCIÓN -->
<script>
const user = localStorage.getItem("sonaria_user");

if(!user){
  window.location.href = "login.html";
}
</script>

<!-- 🔐 LOGOUT -->
<script>
function logout(){
  localStorage.removeItem("sonaria_user");
  window.location.href = "login.html";
}
</script>

<!-- 🔐 BLOQUEAR ATRÁS -->
<script>
window.history.pushState(null, null, window.location.href);
window.onpopstate = function () {
  window.history.pushState(null, null, window.location.href);
};
</script>

</body>
</html>
