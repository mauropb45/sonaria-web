<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SonarIA</title>

<style>
body{
  margin:0;
  font-family:Inter, Arial;
  background:#0b1220;
  color:#fff;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:30px;
}

h1{
  font-size:32px;
  margin-bottom:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

input, textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#0f172a;
  color:#fff;
}

textarea{
  height:180px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.btn-primary{
  background:#2563eb;
  color:#fff;
}

.btn-pro{
  background:#14d68f;
  color:#000;
}

.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  margin-right:6px;
}

.free{background:#334155;}
.pro{background:#14d68f;color:#000;}

.risk-low{color:#22c55e;}
.risk-mid{color:#facc15;}
.risk-high{color:#ef4444;}

.blocked{
  opacity:0.5;
  filter:blur(2px);
  pointer-events:none;
}

.upgrade-box{
  background:#0f172a;
  padding:20px;
  border-radius:12px;
  text-align:center;
  margin-top:10px;
}
</style>
</head>

<body>
<div class="container">

<h1>SonarIA 🎵</h1>

<div id="userBox" class="card"></div>

<div class="card">
  <div class="row">
    <input id="titulo" placeholder="Título">
    <input id="artista" placeholder="Artista">
  </div>

  <textarea id="texto" placeholder="Pega la letra..."></textarea>

  <div style="margin-top:10px;">
    <button class="btn-primary" onclick="analizar()">Analizar</button>
    <button class="btn-pro" onclick="window.location.href='planes.html'">Activar PRO</button>
  </div>
</div>

<div id="resultado"></div>

</div>

<script>
const API = "https://sonaria-api.onrender.com";

function getUser(){
  return JSON.parse(localStorage.getItem("mejoraria_user") || "null");
}

function getToken(){
  return localStorage.getItem("mejoraria_token");
}

function renderUser(){
  const u = getUser();
  const box = document.getElementById("userBox");

  if(!u){
    box.innerHTML = "No logueado";
    return;
  }

  box.innerHTML = `
    <b>${u.name}</b><br>
    ${u.email}<br>
    <span class="badge ${u.plan==='pro'?'pro':'free'}">${u.plan.toUpperCase()}</span>
    <span class="badge free">${u.analyses_used}/3</span>
  `;
}

function getRiskClass(risk){
  if(risk < 30) return "risk-low";
  if(risk < 70) return "risk-mid";
  return "risk-high";
}

async function analizar(){
  const token = getToken();
  const user = getUser();

  const texto = document.getElementById("texto").value;

  const res = await fetch(API + "/analizar",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + token
    },
    body:JSON.stringify({
      titulo:document.getElementById("titulo").value,
      artista:document.getElementById("artista").value,
      texto:texto
    })
  });

  const data = await res.json();

  const riskClass = getRiskClass(data.riesgo);

  let bloquePro = "";

  if(user.plan !== "pro"){
    bloquePro = `
      <div class="upgrade-box">
        🔒 Funciones completas disponibles en PRO<br><br>
        <button class="btn-pro" onclick="window.location.href='planes.html'">
          Activar versión completa
        </button>
      </div>
    `;
  }

  document.getElementById("resultado").innerHTML = `
    <div class="card">
      <h2>${data.resultado}</h2>
      <p>${data.resumen}</p>

      <p class="${riskClass}">
        Riesgo: ${data.riesgo}%
      </p>

      <p><b>Edad:</b> ${data.edad_sugerida}</p>
      <p><b>Sugerencia:</b> ${data.sugerencia_clase}</p>
    </div>

    <div class="card ${user.plan !== 'pro' ? 'blocked':''}">
      <h3>Detalle pedagógico</h3>
      ${data.contextos_detectados.map(c=>`
        <p><b>${c.termino}</b> → ${c.lectura_pedagogica}</p>
      `).join("")}
    </div>

    ${bloquePro}
  `;
}

renderUser();
</script>

</body>
</html>
