<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SonarIA Pro | Panel docente</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:linear-gradient(180deg,#050b14,#0b1627);
  color:#fff;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:30px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.logo{
  font-size:28px;
  font-weight:900;
}

.logo span{
  color:#00d084;
}

.user{
  text-align:right;
}

.plan{
  font-weight:700;
  margin-top:5px;
}

.plan.pro{
  color:#00d084;
}

.counter{
  font-size:14px;
  color:#9fb0c7;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:14px;
  margin-bottom:20px;
}

input, textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#1f2937;
  color:#fff;
  margin-bottom:10px;
}

button{
  padding:12px 16px;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

.primary{
  background:#00d084;
  color:#08131d;
}

.ghost{
  background:#1f2937;
  color:#fff;
}

.upgrade{
  background:linear-gradient(135deg,#ff8000,#ff5a00);
  color:#000;
}

.result{
  padding:15px;
  border-radius:10px;
  margin-top:10px;
  background:#1f2937;
}

.history-item{
  background:#1f2937;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
}

.paywall{
  background:rgba(255,128,0,.1);
  border:1px solid rgba(255,128,0,.3);
  padding:15px;
  border-radius:12px;
  margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="topbar">
  <div class="logo">Sonar<span>IA</span></div>

  <div class="user">
    <div id="userName">...</div>
    <div id="userEmail"></div>
    <div id="plan" class="plan"></div>
    <div id="counter" class="counter"></div>
  </div>
</div>

<div class="card">
  <h2>🎧 Analizar canción</h2>

  <input id="titulo" placeholder="Título">
  <input id="artista" placeholder="Artista">

  <textarea id="texto" placeholder="Letra (opcional)"></textarea>

  <button class="primary" onclick="analizar()">Analizar</button>
  <button class="upgrade" onclick="goToCheckout()">Desbloquear Pro</button>

  <div id="paywall" class="paywall" style="display:none;">
    🚫 Has alcanzado el límite diario.<br><br>
    <strong>Pasa a PRO y analiza sin límites.</strong>
  </div>

  <div id="resultado" class="result"></div>
</div>

<div class="card">
  <h2>🕒 Historial</h2>
  <div id="history"></div>
</div>

</div>

<script>

const API = "https://sonaria-api.onrender.com";

let token = localStorage.getItem("mejoraria_token");

// =====================
// LOAD USER
// =====================

async function loadUser(){

  const res = await fetch(API + "/me", {
    headers:{ "Authorization": "Bearer " + token }
  });

  const data = await res.json();

  const user = data.user;
  const usage = data.usage;

  document.getElementById("userName").textContent = user.name;
  document.getElementById("userEmail").textContent = user.email;

  const planEl = document.getElementById("plan");
  const counterEl = document.getElementById("counter");

  if(user.plan === "pro"){
    planEl.textContent = "PRO";
    planEl.classList.add("pro");
    counterEl.textContent = "Uso ilimitado";
  }else{
    planEl.textContent = "FREE";
    counterEl.textContent = "Te quedan " + usage.remaining_today + " análisis";
  }

  if(usage.blocked){
    document.getElementById("paywall").style.display = "block";
  }

}

// =====================
// ANALIZAR
// =====================

async function analizar(){

  const meRes = await fetch(API + "/me", {
    headers:{ "Authorization": "Bearer " + token }
  });

  const meData = await meRes.json();

  if(meData.usage.blocked){
    document.getElementById("paywall").style.display = "block";
    return;
  }

  const titulo = document.getElementById("titulo").value;
  const artista = document.getElementById("artista").value;
  const texto = document.getElementById("texto").value;

  const res = await fetch(API + "/analizar", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + token
    },
    body:JSON.stringify({
      titulo, artista, texto
    })
  });

  const data = await res.json();

  document.getElementById("resultado").innerHTML = `
    <strong>${data.resultado}</strong><br><br>
    ${data.resumen}
  `;

  // actualizar contador
  if(data.usage.plan === "free"){
    document.getElementById("counter").textContent =
      "Te quedan " + data.usage.remaining_today + " análisis";
  }else{
    document.getElementById("counter").textContent = "Uso ilimitado";
  }

  loadHistory();
}

// =====================
// HISTORIAL
// =====================

async function loadHistory(){

  const res = await fetch(API + "/analysis/history", {
    headers:{ "Authorization":"Bearer " + token }
  });

  const data = await res.json();

  const container = document.getElementById("history");
  container.innerHTML = "";

  data.items.forEach(item=>{
    const div = document.createElement("div");
    div.className = "history-item";

    div.innerHTML = `
      <strong>${item.titulo}</strong> - ${item.artista}<br>
      ${item.resultado}
    `;

    container.appendChild(div);
  });

}

// =====================
// CHECKOUT
// =====================

async function goToCheckout(){

  const res = await fetch(API + "/payments/create-checkout", {
    method:"POST",
    headers:{ "Authorization":"Bearer " + token }
  });

  const data = await res.json();

  window.location.href = data.checkout_url;

}

// =====================

loadUser();
loadHistory();

</script>

</body>
</html>
