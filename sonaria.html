<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SonarIA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family: 'Inter', sans-serif;
  background:#0b1220;
  color:#fff;
  margin:0;
}

.container{
  max-width:900px;
  margin:auto;
  padding:30px;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  background:#1e293b;
  color:white;
}

textarea{
  height:180px;
}

button{
  margin-top:15px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  background:#1d4ed8;
}

.result{
  margin-top:25px;
  padding:15px;
  border-radius:10px;
  background:#111827;
}

.bad{color:#ef4444;}
.mid{color:#facc15;}
.good{color:#22c55e;}

.small{
  font-size:13px;
  color:#9ca3af;
}
</style>
</head>

<body>

<div class="container">

<h1>🎧 SonarIA</h1>

<input id="titulo" placeholder="Título de la canción">
<input id="artista" placeholder="Artista">

<textarea id="texto" placeholder="Pega la letra o deja vacío para búsqueda automática"></textarea>

<button onclick="analizar()">Analizar canción</button>

<div id="estado" class="small"></div>

<div id="resultado" class="result" style="display:none;"></div>

</div>

<script>

const API = "https://sonaria-api.onrender.com";

async function analizar(){

  const titulo = document.getElementById("titulo").value;
  const artista = document.getElementById("artista").value;
  const textoInput = document.getElementById("texto");

  const estado = document.getElementById("estado");
  const resultado = document.getElementById("resultado");

  estado.innerText = "🔎 Analizando...";
  resultado.style.display = "none";

  try{

    const res = await fetch(API + "/analizar", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + localStorage.getItem("mejoraria_token")
      },
      body: JSON.stringify({
        titulo,
        artista,
        texto: textoInput.value,
        buscar_letra:true
      })
    });

    const raw = await res.json();

    if(!res.ok){
      estado.innerText = "❌ " + (raw.detail || "Error");
      return;
    }

    // 🔥 ESTA ES LA CLAVE
    if(raw.texto && !textoInput.value.trim()){
      textoInput.value = raw.texto;
    }

    estado.innerText = "✅ Análisis listo";

    let colorClass = "good";
    if(raw.resultado.includes("NO")) colorClass = "bad";
    if(raw.resultado.includes("SUPERVISIÓN")) colorClass = "mid";

    resultado.innerHTML = `
      <h2 class="${colorClass}">${raw.resultado}</h2>
      <p>${raw.resumen}</p>

      <p><b>Edad sugerida:</b> ${raw.edad_sugerida}</p>
      <p><b>Uso pedagógico:</b> ${raw.lectura_sugerida}</p>

      <p class="small">Fuente: ${raw.fuente_usada}</p>

      <hr>

      <p><b>Temas detectados:</b> ${raw.temas_detectados.join(", ")}</p>
    `;

    resultado.style.display = "block";

  }catch(e){
    estado.innerText = "❌ Error de conexión";
  }
}

// ENTER para analizar
document.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    analizar();
  }
});

</script>

</body>
</html>
