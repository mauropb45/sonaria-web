<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SonarIA</title>

<style>
body{
  font-family: Arial;
  background:#0b1220;
  color:white;
  padding:20px;
}
.container{
  max-width:900px;
  margin:auto;
}
textarea{
  width:100%;
  height:150px;
  padding:10px;
  border-radius:10px;
  border:none;
}
button{
  padding:10px 20px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}
.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<h1>SonarIA 🎵</h1>

<textarea id="letra" placeholder="Pega aquí la letra de la canción..."></textarea>

<br>
<button onclick="analizar()">Analizar canción</button>

<div id="resultado" class="card"></div>
<div id="contexto"></div>

</div>

<script>

const API = "https://sonaria-api.onrender.com";

async function analizar(){

  const letra = document.getElementById("letra").value;

  if(!letra){
    alert("Pega una letra primero");
    return;
  }

  document.getElementById("resultado").innerHTML = "Analizando...";
  document.getElementById("contexto").innerHTML = "";

  try{

    const res = await fetch(API + "/analizar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        letra: letra
      })
    });

    const data = await res.json();

    document.getElementById("resultado").innerHTML = "Análisis completado ✅";

    let html = "";

    if(data.contextos_detectados.length === 0){
      html = "<div class='card'>No se detectaron problemas relevantes 👍</div>";
    }else{
      data.contextos_detectados.forEach(c=>{
        html += `
        <div class="card">
          <b>Palabra:</b> ${c.termino}<br>
          <b>Fragmento:</b> ${c.fragmento}<br>
          <b>Tipo:</b> ${c.tipo}<br>
          <b>Lectura pedagógica:</b> ${c.lectura_pedagogica}<br>
          <b>Acción:</b> ${c.accion_sugerida}
        </div>
        `;
      });
    }

    document.getElementById("contexto").innerHTML = html;

  }catch(error){
    console.error(error);
    document.getElementById("resultado").innerHTML = "Error de conexión ❌";
  }

}

</script>

</body>
</html>
