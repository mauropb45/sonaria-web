<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SonarIA Pro</title>
<style>
body{font-family:Arial;background:#0b1220;color:white;padding:20px}
input,textarea{width:100%;margin:5px 0;padding:10px;border-radius:8px;border:none}
button{padding:10px 20px;border:none;border-radius:10px;background:orange;color:black;font-weight:bold;cursor:pointer}
.status{margin-top:10px}
.result{margin-top:20px;padding:15px;border:1px solid #444;border-radius:10px}
.chip{display:inline-block;padding:5px 10px;background:#1f2a44;border-radius:20px;margin:3px}
.arrow{font-size:30px;color:orange;text-align:center;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>

<h1>SonarIA</h1>

<input id="titulo" placeholder="Título">
<input id="artista" placeholder="Artista">
<textarea id="texto" placeholder="Letra"></textarea>

<button onclick="runAnalysis()">Analizar</button>

<div id="statusBox" class="status"></div>

<div id="arrow" class="arrow" style="display:none;">↓ RESULTADO</div>

<div id="resultEmpty">Esperando análisis...</div>

<div id="resultContent" class="result" style="display:none;">
  <h3 id="resumenTexto"></h3>
  <p id="justificacionTexto"></p>
  <div id="temasChips"></div>
</div>

<script>

async function runAnalysis() {
  const titulo = document.getElementById("titulo").value.trim();
  const artista = document.getElementById("artista").value.trim();
  const texto = document.getElementById("texto").value.trim();

  const statusBox = document.getElementById("statusBox");
  const resultEmpty = document.getElementById("resultEmpty");
  const resultContent = document.getElementById("resultContent");
  const resumenTexto = document.getElementById("resumenTexto");
  const justificacionTexto = document.getElementById("justificacionTexto");
  const temasChips = document.getElementById("temasChips");
  const arrow = document.getElementById("arrow");

  if (!texto && !(titulo && artista)) {
    statusBox.textContent = "Ingresa datos para analizar";
    return;
  }

  statusBox.textContent = "Analizando...";

  try {
    const res = await fetch("https://sonaria-api.onrender.com/analizar", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({titulo, artista, texto})
    });

    const data = await res.json();

    resultEmpty.style.display = "none";
    resultContent.style.display = "block";
    arrow.style.display = "block";

    resumenTexto.textContent = data.resultado || "Resultado disponible";
    justificacionTexto.textContent = data.justificacion || "Sin detalle";

    temasChips.innerHTML = "";
    (data.temas?.themes || []).forEach(t=>{
      const el = document.createElement("span");
      el.className="chip";
      el.textContent=t;
      temasChips.appendChild(el);
    });

    statusBox.textContent = "Listo";

  } catch(e) {
    statusBox.textContent = "Error";
  }
}

</script>

</body>
</html>
