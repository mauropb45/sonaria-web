<!-- SONARIA WEB POLISH FACELIFT -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SonarIA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#07121f;
  --panel:#0f1c2e;
  --soft:#16263d;
  --text:#f1f5ff;
  --muted:#9fb0c7;
  --blue:#3b82f6;
  --green:#22c55e;
  --yellow:#facc15;
  --red:#ef4444;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:linear-gradient(180deg,#07121f,#0b1a30);
  color:var(--text);
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:260px 1fr;
  min-height:100vh;
}

/* SIDEBAR */
.sidebar{
  background:var(--panel);
  padding:20px;
  border-right:1px solid rgba(255,255,255,.05);
}
.logo{
  font-weight:800;
  font-size:20px;
  margin-bottom:20px;
}
.menu button{
  width:100%;
  margin-bottom:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:var(--soft);
  color:white;
  cursor:pointer;
}

/* MAIN */
.main{
  padding:25px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

/* CARD */
.card{
  background:var(--panel);
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
  border:1px solid rgba(255,255,255,.05);
}

/* INPUT */
input, textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#0b1628;
  color:white;
  margin-bottom:10px;
}

/* BUTTONS */
.btn{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}
.primary{background:var(--blue)}
.success{background:var(--green)}

/* RESULT */
.result{
  font-size:22px;
  font-weight:800;
}

/* MOBILE */
@media(max-width:900px){
  .container{
    grid-template-columns:1fr;
  }
  .sidebar{
    display:none;
  }
}
</style>
</head>

<body>

<div class="container">

  <aside class="sidebar">
    <div class="logo">🎸 SonarIA</div>
    <div class="menu">
      <button>Dashboard</button>
      <button>Pedagogía</button>
      <button>Historial</button>
    </div>
  </aside>

  <main class="main">

    <div class="header">
      <h2>Evaluación de canciones</h2>
      <div>FREE</div>
    </div>

    <div class="card">
      <input id="titulo" placeholder="Título">
      <input id="artista" placeholder="Artista">
      <textarea id="texto" placeholder="Letra..."></textarea>

      <button class="btn primary" onclick="analizar()">Analizar</button>
      <button class="btn success">PRO</button>
    </div>

    <div class="card">
      <div class="result" id="resultado">Sin análisis</div>
      <div id="detalle">Aquí aparecerá el resultado</div>
    </div>

  </main>

</div>

<script>
async function analizar(){
  document.getElementById("resultado").innerText = "Analizando...";
  setTimeout(()=>{
    document.getElementById("resultado").innerText = "APTA CON MEDIACIÓN";
    document.getElementById("detalle").innerText = "Simulación de respuesta backend";
  },1000);
}
</script>

</body>
</html>
