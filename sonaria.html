<!-- SONARIA V11 FINAL LIMPIO -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SonarIA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
<h1>SonarIA v11 (estable)</h1>

<script>
const API_URL = "https://sonaria-api.onrender.com";

function normalizeVerdict(result){
  const txt = String(result||"").toLowerCase();
  if(txt.includes("adaptable")) return "adaptable";
  if(txt.includes("no apta")) return "noapta";
  if(txt.includes("poco recomendable")) return "noapta";
  if(txt.includes("mediación")||txt.includes("mediacion")) return "mediacion";
  return "apta";
}

let lastAnalysis = null;

async function analizar(){
  const texto = document.getElementById("input").value;

  const res = await fetch(API_URL + "/analizar", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + localStorage.getItem("token")
    },
    body: JSON.stringify({
      texto: texto,
      cursos: ["5B"]
    })
  });

  const data = await res.json();
  lastAnalysis = data;

  document.getElementById("resultado").innerText = data.resultado;

  if(normalizeVerdict(data.resultado) === "adaptable"){
    alert("SonarIA detectó que puedes usar una versión escolar");
  }
}
</script>

<textarea id="input" placeholder="Pega la letra aquí"></textarea>
<br><br>
<button onclick="analizar()">Analizar</button>

<h2 id="resultado"></h2>

</body>
</html>
