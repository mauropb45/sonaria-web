<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SonarIA</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

.container{
  display:flex;
  height:100vh;
}

.sidebar{
  width:220px;
  background:#111827;
  padding:20px;
}

.sidebar button{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border:none;
  background:#1f2937;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.main{
  flex:1;
  padding:20px;
}

textarea, input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
  border:none;
}

button.primary{
  background:#ff4d00;
  color:white;
}

.callout{
  background:#111827;
  padding:15px;
  margin-top:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<button onclick="abrirCursos()">Mis cursos</button>
<button onclick="irPlanes()">PRO 🔒</button>
</div>

<div class="main">

<h1>🎵 SonarIA</h1>

<input id="titulo" placeholder="Canción">
<input id="artista" placeholder="Artista">

<textarea id="texto" placeholder="Pega la letra"></textarea>

<button class="primary" onclick="analizar()">Analizar</button>

<p id="statusLine"></p>

<div class="callout">
<strong>Resultado:</strong>
<p id="resultado"></p>
</div>

</div>
</div>

<script>

const API = "https://sonaria-api.onrender.com";

function irPlanes(){
  window.location.href = "planes.html";
}

async function analizar(){

  const token = localStorage.getItem("token");

  if(!token){
    alert("Debes iniciar sesión");
    window.location.href = "login.html";
    return;
  }

  const texto = document.getElementById("texto").value;

  if(!texto){
    alert("Pega una letra");
    return;
  }

  document.getElementById("statusLine").textContent = "Analizando...";

  try{
    const res = await fetch(API + "/analizar", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + token
      },
      body: JSON.stringify({texto})
    });

    const data = await res.json();

    document.getElementById("resultado").textContent = data.resultado;

  }catch(e){
    document.getElementById("statusLine").textContent = "Error conexión";
  }
}

function abrirCursos(){
  alert("Función en desarrollo");
}

</script>

</body>
</html>
