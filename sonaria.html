<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SonarIA</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6fb;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 900px;
  margin: 40px auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 14px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  margin-bottom: 20px;
}

h1 {
  margin-top: 0;
}

textarea {
  width: 100%;
  height: 180px;
  border-radius: 10px;
  border: 1px solid #ccc;
  padding: 10px;
  font-size: 14px;
}

button {
  background: #ff8c3a;
  color: white;
  border: none;
  padding: 12px 20px;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  opacity: 0.9;
}

.result {
  white-space: pre-wrap;
  line-height: 1.6;
}

.highlight {
  background: yellow;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h1>🎵 SonarIA</h1>
    <p><b>Adaptación escolar inteligente de canciones</b></p>
  </div>

  <div class="card">
    <h2>Analizar canción</h2>

    <textarea id="lyrics" placeholder="Pega aquí la letra..."></textarea>
    <button onclick="analyze()">Analizar</button>
  </div>

  <div id="resultado" class="card" style="display:none;">
    <h2>Resultado</h2>
    <div id="output" class="result"></div>
  </div>

</div>

<script>

async function analyze(){
  const text = document.getElementById("lyrics").value;

  const res = await fetch("/analyze", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({lyrics: text})
  });

  const data = await res.json();

  document.getElementById("resultado").style.display = "block";
  document.getElementById("output").innerHTML = data.adapted_lyrics;
}

</script>

</body>
</html>
