3) JS NUEVO PARA GUARDAR CURSOS

Reemplaza guardarCursos() por esto:

function guardarCursos(){
  const checks = document.querySelectorAll("#misCursos input:checked");
  const cursos = [...checks].map(c => c.value);
  localStorage.setItem("sonaria_cursos", JSON.stringify(cursos));
  showToast("Cursos guardados");
}

4) JS NUEVO PARA CARGAR CURSOS

Reemplaza cargarCursos() por esto:

function cargarCursos(){
  const data = JSON.parse(localStorage.getItem("sonaria_cursos") || "[]");
  const checks = document.querySelectorAll("#misCursos input");

  checks.forEach(c => {
    c.checked = data.includes(c.value);
  });
}

Primera versión sugerida:
- edad 6+  → 1 a 4 básico
- edad 8+  → 5 a 6 básico
- edad 12+ → 7 a 8 básico
- edad 14+ → 1 a 2 medio
- edad 16+ → 3 a 4 medio

8) EJEMPLO JS SIMPLE

function sugerirCursoDesdeEdad(edadTexto){
  const n = parseInt((edadTexto || "").replace(/[^0-9]/g,""), 10);

  if(!n) return "Sin sugerencia automática aún.";
  if(n <= 6) return "Sugerencia: 1 básico a 4 básico";
  if(n <= 8) return "Sugerencia: 5 básico a 6 básico";
  if(n <= 12) return "Sugerencia: 7 básico a 8 básico";
  if(n <= 14) return "Sugerencia: 1 medio a 2 medio";
  return "Sugerencia: 3 medio a 4 medio";
}

Y después de actualizar edad:

document.getElementById("cursoSugerido").textContent = sugerirCursoDesdeEdad(data.edad_sugerida);
