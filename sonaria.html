<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SonarIA</title>

<style>
body{
  background:#0b1220;
  color:white;
  font-family:Arial;
  padding:40px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:none;
}

button{
  padding:10px 20px;
  background:orange;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

#resultado{
  margin-top:30px;
  padding:20px;
  background:#1a2238;
  border-radius:12px;
}
</style>

</head>
<body>

<h1>SonarIA</h1>

<input id="titulo" placeholder="Título">
<input id="artista" placeholder="Artista">

<textarea id="texto" rows="6" placeholder="Pega aquí la letra..."></textarea>

<label>
<input type="checkbox" id="buscarLetra" checked>
 Buscar letra automáticamente
</label>

<br><br>

<button onclick="runAnalysis()">Analizar</button>

<div id="estado"></div>

<div id="resultado"></div>

<script>

const API_URL = "https://sonaria-api.onrender.com/analizar";

const tituloInput = document.getElementById("titulo");
const artistaInput = document.getElementById("artista");
const textoInput = document.getElementById("texto");
const estadoDiv = document.getElementById("estado");
const resultadoDiv = document.getElementById("resultado");

async function postJson(body) {
  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  const text = await res.text();
  let data = null;

  try {
    data = JSON.parse(text);
  } catch {}

  return { ok: res.ok, status: res.status, data };
}

async function runAnalysis(){

  const titulo = tituloInput.value.trim();
  const artista = artistaInput.value.trim();
  const texto = textoInput.value.trim();
  const buscarLetra = document.getElementById("buscarLetra").checked;

  estadoDiv.innerHTML = "Analizando...";

  const { ok, data } = await postJson({
    titulo,
    artista,
    texto,
    buscar_letra: buscarLetra
  });

  if (!ok || !data) {
    estadoDiv.innerHTML = "Error al conectar con la API";
    return;
  }

  estadoDiv.innerHTML = "Análisis completado";

  // 🔥 PEGAR LETRA AUTOMÁTICAMENTE
  if (data.letra_encontrada && data.letra_usada) {
    textoInput.value = data.letra_usada;
  }

  resultadoDiv.innerHTML = `
    <h2>Resultado</h2>
    <p><b>Resumen:</b> ${data.resumen}</p>
    <p><b>Justificación:</b> ${data.justificacion}</p>
    <p><b>Temas:</b> ${data.temas.join(", ")}</p>
    <p><b>Riesgo:</b> ${data.riesgo}</p>
    <p><b>Edad sugerida:</b> ${data.edad}</p>
    <p><b>Letra encontrada:</b> ${data.letra_encontrada ? "Sí" : "No"}</p>
  `;
}

</script>

</body>
</html>
