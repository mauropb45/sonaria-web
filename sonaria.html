<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SonarIA | Dashboard escolar</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle at top left, #0b1623, #020617);
  color:#fff;
}

.container{
  display:flex;
  gap:30px;
  padding:40px;
}

.card{
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
  backdrop-filter:blur(10px);
}

.left{
  width:350px;
}

.right{
  flex:1;
}

input, textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-bottom:10px;
  background:#111;
  color:#fff;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.primary{
  background:#ff8000;
}

.secondary{
  background:#333;
}

.badge{
  padding:4px 10px;
  border-radius:10px;
  font-size:12px;
}

.green{background:#00d084;}
.yellow{background:#facc15;}
.red{background:#ff4d4d;}

.chip{
  display:inline-block;
  background:#1e293b;
  padding:5px 10px;
  border-radius:10px;
  margin:5px;
}

.empty{
  opacity:.6;
}
</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="card left">
  <h2>Dashboard escolar</h2>

  <input id="titulo" placeholder="Título">
  <input id="artista" placeholder="Artista">
  <textarea id="texto" placeholder="Letra..."></textarea>

  <button class="primary" onclick="analizar()">Analizar canción</button>
</div>

<!-- RIGHT -->
<div class="right">

  <div class="card summary-card">
    <div id="summaryIcon">—</div>
    <h2 id="resultTitle">Esperando análisis</h2>
    <span id="resultBadge" class="badge">Sin datos</span>
    <p id="songMeta">—</p>
  </div>

  <div class="card">
    <p><b>Edad:</b> <span id="metaEdad">—</span></p>
    <p><b>Fuente:</b> <span id="metaFuente">—</span></p>
    <p><b>Lectura:</b> <span id="metaLectura">—</span></p>
  </div>

  <div class="card">
    <h4>Resumen</h4>
    <p id="resumenTexto">—</p>
  </div>

  <div class="card">
    <h4>Enfoque</h4>
    <p id="enfoqueTexto">—</p>
  </div>

  <div class="card">
    <h4>Temas</h4>
    <div id="temasChips"></div>
  </div>

  <div class="card">
    <h4>Observaciones</h4>
    <div id="obsChips"></div>
  </div>

  <div class="card">
    <h4>Contexto</h4>
    <div id="contextList"></div>
  </div>

</div>

</div>

<script>
const API_URL = "https://sonaria-api.onrender.com/analizar";

async function analizar(){

  const data = {
    titulo:document.getElementById("titulo").value,
    artista:document.getElementById("artista").value,
    texto:document.getElementById("texto").value,
    buscar_letra:true,
    contexto_escolar:true
  };

  const res = await fetch(API_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  const result = await res.json();

  // TITLE
  resultTitle.textContent = result.clasificacion || "Resultado";

  // BADGE
  const badge = document.getElementById("resultBadge");
  badge.textContent = result.clasificacion;

  if(result.clasificacion?.includes("Apta")){
    badge.className="badge green";
  }else if(result.clasificacion?.includes("Revisión")){
    badge.className="badge yellow";
  }else{
    badge.className="badge red";
  }

  // ICON
  const summaryCard = document.querySelector(".summary-card");

  if(result.clasificacion?.includes("No apta")){
    summaryIcon.textContent="⛔";
    summaryCard.style.boxShadow="0 0 20px red";
  }else if(result.clasificacion?.includes("Apta")){
    summaryIcon.textContent="✅";
  }else{
    summaryIcon.textContent="⚠️";
  }

  // META SONG
  songMeta.textContent = `${data.titulo} · ${data.artista}`;

  // META
  metaEdad.textContent = result.edad_sugerida || "—";
  metaFuente.textContent = result.fuente || "—";
  metaLectura.textContent = result.nivel_lectura || "—";

  // TEXT
  resumenTexto.textContent = result.resumen || "—";
  enfoqueTexto.textContent = result.enfoque || "—";

  // TEMAS
  temasChips.innerHTML="";
  (result.temas||[]).forEach(t=>{
    temasChips.innerHTML+=`<span class="chip">${t}</span>`;
  });

  if((result.temas||[]).length===0){
    temasChips.innerHTML='<div class="empty">No se detectaron temas</div>';
  }

  // OBS
  obsChips.innerHTML="";
  (result.observaciones||[]).forEach(o=>{
    obsChips.innerHTML+=`<span class="chip">${o}</span>`;
  });

  if((result.observaciones||[]).length===0){
    obsChips.innerHTML='<div class="empty">Sin observaciones</div>';
  }

  // CONTEXTO
  contextList.innerHTML="";
  (result.contexto||[]).forEach(c=>{
    contextList.innerHTML+=`<div>${c}</div>`;
  });

  if((result.contexto||[]).length===0){
    contextList.innerHTML='<div class="empty">Sin contexto</div>';
  }
}
</script>

</body>
</html>
