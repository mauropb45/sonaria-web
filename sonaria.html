<!-- SONARIA.HTML COMPLETO CON SESIÓN ÚNICA INTEGRADA -->

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SonarIA</title>
</head>

<body>

<h1>SonarIA</h1>

<script>
const API = "https://sonaria-api.onrender.com";

// 🔐 NUEVO: manejo de sesión
function manejarSesionExpirada(data) {
  const mensaje =
    data?.detail === "session_invalidated"
      ? "Tu sesión se cerró porque iniciaste sesión en otro dispositivo."
      : "Tu sesión expiró. Vuelve a iniciar sesión.";

  localStorage.setItem("mejoraria_logout_message", mensaje);
  localStorage.clear();
  window.location.href = "/login.html";
}

// helper token
function getToken(){
  return localStorage.getItem("mejoraria_token") || "";
}

// 🔍 ANALIZAR
async function analizar(){
  const token = getToken();

  const res = await fetch(API + "/analizar", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({ titulo:"", artista:"" })
  });

  if (res.status === 401) {
    let data = {};
    try { data = await res.json(); } catch {}
    manejarSesionExpirada(data);
    return;
  }

  const data = await res.json();
  console.log(data);
}

// 👤 ME
async function cargarUsuario(){
  const token = getToken();

  const res = await fetch(API + "/me", {
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  if (res.status === 401) {
    let data = {};
    try { data = await res.json(); } catch {}
    manejarSesionExpirada(data);
    return;
  }

  const data = await res.json();
  console.log(data);
}

// 🚪 LOGOUT
async function logout(){
  const token = getToken();

  try{
    await fetch(API + "/auth/logout", {
      method:"POST",
      headers:{ "Authorization":"Bearer " + token }
    });
  }catch(e){}

  localStorage.clear();
  window.location.href = "/login.html";
}

</script>

<button onclick="analizar()">Analizar</button>
<button onclick="logout()">Cerrar sesión</button>

</body>
</html>
