<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SonarIA</title>

<style>
body{
  font-family: system-ui;
  background:#f3f4f6;
  margin:0;
  color:#1f2937;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:20px;
  margin-top:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.btn{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.primary{background:#4f46e5;color:white;}
.ghost{background:#e5e7eb;}

.bar{
  height:8px;
  border-radius:10px;
  margin-top:10px;
  background:linear-gradient(90deg,green,yellow,red);
  opacity:.2;
}

.bar-fill{
  height:8px;
  border-radius:10px;
  width:0%;
}
</style>
</head>

<body>

<div class="container">

<h2>SonarIA</h2>

<input id="titulo" placeholder="Canción"><br><br>
<input id="artista" placeholder="Artista"><br><br>
<textarea id="texto" placeholder="Letra"></textarea><br><br>

<button class="btn primary" onclick="analizar()">Analizar</button>

<div class="card">

<h3 id="resultado">Resultado</h3>
<p id="justificacion"></p>

<div id="usoEscolar" style="display:none;background:#fee2e2;padding:10px;border-radius:10px;">
⚠️ Esta canción no es directamente apta para el aula.  
Pero SonarIA puede adaptarla automáticamente.
</div>

<div class="bar">
<div id="barFill" class="bar-fill"></div>
</div>

</div>

<!-- LETRA -->
<div id="adaptBox" class="card" style="display:none">

<h3 id="songTitle" style="text-align:center"></h3>
<p id="songArtist" style="text-align:center"></p>
<p id="adaptLabel" style="text-align:center;color:#2563eb;"></p>

<pre id="lyrics"></pre>

</div>

<!-- BOTONES PDF -->
<div style="margin-top:20px">
<button class="btn ghost" onclick="preview()">Vista previa PDF</button>
<button class="btn primary" onclick="downloadPDF()">Descargar PDF</button>
</div>

</div>

<!-- MODAL -->
<div id="modal" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.4);
justify-content:center;
align-items:center;
">

<div style="background:white;padding:20px;border-radius:20px;width:80%">
<h3>Vista previa</h3>

<div id="previewContent"></div>

<button onclick="downloadPDF()" class="btn primary">Descargar</button>
<button onclick="closeModal()" class="btn ghost">Cerrar</button>

</div>

</div>

<script>

let lastData = null;

function analizar(){

fetch("/analizar",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
titulo:titulo.value,
artista:artista.value,
texto:texto.value
})
})
.then(r=>r.json())
.then(data=>{

lastData = data;

resultado.innerText = data.resultado;
justificacion.innerText = data.justificacion;

if(data.resultado.includes("🔴")){
usoEscolar.style.display="block";
}else{
usoEscolar.style.display="none";
}

renderBar(data.riesgo);

if(data.letra_adaptada){
adaptBox.style.display="block";
songTitle.innerText = data.titulo;
songArtist.innerText = data.artista;

if(data.letra_adaptada !== data.letra_original){
adaptLabel.innerText = "Adaptación realizada por SonarIA";
}else{
adaptLabel.innerText = "";
}

lyrics.innerText = data.letra_adaptada;
}

});

}

function renderBar(risk){

if(risk === undefined){
barFill.style.width="100%";
barFill.style.background="linear-gradient(90deg,green,yellow,red)";
barFill.style.opacity=".2";
return;
}

if(risk === 0){
barFill.style.width="100%";
barFill.style.background="green";
return;
}

barFill.style.width=risk+"%";
barFill.style.background="linear-gradient(90deg,green,yellow,red)";
barFill.style.opacity="1";

}

function preview(){

previewContent.innerHTML = `
<h4>${lastData.titulo}</h4>
<p>${lastData.resultado}</p>
<p>${lastData.justificacion}</p>
`;

modal.style.display="flex";
}

function closeModal(){
modal.style.display="none";
}

function downloadPDF(){
window.open("/export/pdf");
}

</script>

</body>
</html>
