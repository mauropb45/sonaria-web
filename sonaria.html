<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SonarIA</title>

<style>
body{
  font-family: Arial;
  background:#f6f8fb;
  margin:0;
  padding:20px;
}

.container{
  max-width:900px;
  margin:auto;
}

textarea{
  width:100%;
  height:120px;
}

button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.btn-main{background:#2ecc71;color:white;}
.btn-alt{background:#3498db;color:white;}
.btn-warn{background:#e67e22;color:white;}

.grid{
  display:flex;
  gap:20px;
}

.col{
  width:50%;
  background:white;
  padding:15px;
  border-radius:10px;
  white-space:pre-line;
}

.highlight{
  background:yellow;
}
</style>

</head>
<body>

<div class="container">

<h2>🎧 SonarIA</h2>

<textarea id="lyrics" placeholder="Pega aquí la letra..."></textarea>

<br>

<button class="btn-main" onclick="analizar()">Analizar</button>
<button class="btn-alt" onclick="verAdaptacion()">Adaptación escolar</button>
<button class="btn-alt" onclick="verTraduccion()">Letra traducida</button>
<button class="btn-warn" onclick="usarEnClase()">Usar en clase</button>

<br><br>

<div id="resultado"></div>

<br>

<button onclick="window.location.href='admin.html'">🔧 Ir a Admin</button>

</div>

<script>

const API_URL = "https://sonaria-api.onrender.com";
let dataGlobal = null;

async function analizar(){
  const texto = document.getElementById("lyrics").value;

  const res = await fetch(`${API_URL}/analizar`,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({lyrics:texto})
  });

  dataGlobal = await res.json();
  alert("Análisis listo");
}

function verAdaptacion(){
  if(!dataGlobal) return alert("Primero analiza");

  let html = `<div class="grid">`;

  html += `<div class="col">` + dataGlobal.original + `</div>`;
  html += `<div class="col">` + dataGlobal.adapted + `</div>`;

  html += `</div>`;

  document.getElementById("resultado").innerHTML = html;
}

function verTraduccion(){
  if(!dataGlobal) return alert("Primero analiza");

  let html = `<div class="grid">`;

  html += `<div class="col">` + dataGlobal.adapted + `</div>`;
  html += `<div class="col">` + dataGlobal.translated + `</div>`;

  html += `</div>`;

  document.getElementById("resultado").innerHTML = html;
}

function usarEnClase(){
  if(!dataGlobal) return alert("Primero analiza");

  let curso = prompt("Curso (ej: 7 básico)");

  let html = `<h3>📘 Uso en clase - ${curso}</h3>`;

  html += `<p><b>OA:</b> Comprensión de texto y análisis crítico</p>`;

  html += `<h4>Preguntas</h4>
  <ul>
    <li>¿Qué emoción transmite la canción?</li>
    <li>¿Qué mensaje entrega?</li>
  </ul>`;

  html += `<h4>Actividad</h4>
  <p>Reescribe una estrofa desde otra perspectiva</p>`;

  html += `<h4>Reflexión</h4>
  <p>¿Por qué es importante adaptar contenido en el aula?</p>`;

  html += `<h4>Letra trabajada</h4>
  <pre>${dataGlobal.translated}</pre>`;

  document.getElementById("resultado").innerHTML = html;
}

</script>

</body>
</html>
