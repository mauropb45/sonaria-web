<html>
<body>
<h2>SonarIA PRO</h2>

<input id="titulo" placeholder="Canción"><br>
<textarea id="texto" placeholder="Pega letra"></textarea><br>
<button onclick="analizar()">Analizar</button>

<div id="out"></div>

<script>
async function analizar(){
 let texto = document.getElementById("texto").value;

 let res = await fetch("https://sonaria-api.onrender.com/analizar",{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({texto})
 });

 let data = await res.json();

 document.getElementById("out").innerHTML = `
 <h3>${data.resultado}</h3>
 <p>Palabras: ${data.palabras_detectadas.join(",")}</p>
 ${data.version_escolar_html}
 `;
}
</script>
</body>
</html>
