<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>SonarIA</title>

<style>
body{
  font-family:system-ui;
  background:#f4f6fb;
  padding:20px;
}

.voice-box{
  margin-top:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

canvas{
  background:#eef2ff;
  border-radius:10px;
}

.mic-hint{
  font-size:0.8rem;
  opacity:0.6;
}

.highlight{
  background:#fff3a0;
  padding:2px 4px;
  border-radius:4px;
}
</style>

</head>

<body>

<h2>SonarIA</h2>

<input id="titulo" placeholder="Canción">
<input id="artista" placeholder="Artista">

<!-- 🎙️ VOZ NUEVA -->

<div class="voice-box">
  <button id="btnMic">🎙️</button>
  <canvas id="waveCanvas" width="300" height="60"></canvas>
  <div class="mic-hint">Di: "nombre de la canción de artista"</div>
</div>

<textarea id="letra" placeholder="Pega la letra"></textarea>

<button onclick="analizar()">Analizar</button>

<h3>Versión adaptada</h3>
<div id="adaptada"></div>

<script>

/* highlight */
function highlightChanges(original, adapted){
  const o = original.split(" ");
  const a = adapted.split(" ");

  return a.map((w,i)=>{
    if(o[i] !== w){
      return `<span class="highlight">${w}</span>`;
    }
    return w;
  }).join(" ");
}

/* análisis demo */
function analizar(){
  let letra = document.getElementById("letra").value;

  let adaptada = letra
    .replace(/sexo/gi,"conexión")
    .replace(/kill|dead|trigger/gi,"acto grave");

  document.getElementById("adaptada").innerHTML =
    highlightChanges(letra, adaptada);
}

/* 🎙️ MICRÓFONO */

const canvas = document.getElementById("waveCanvas");
const ctx = canvas.getContext("2d");

function drawWave(data){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let i=0;i<data.length;i++){
    let x = i*4;
    let y = data[i]/2;
    ctx.fillRect(x, canvas.height-y,2,y);
  }
}

let audioContext, analyser, dataArray;

async function startMic(){
  const stream = await navigator.mediaDevices.getUserMedia({audio:true});
  audioContext = new AudioContext();
  const source = audioContext.createMediaStreamSource(stream);

  analyser = audioContext.createAnalyser();
  analyser.fftSize = 64;

  source.connect(analyser);
  dataArray = new Uint8Array(analyser.frequencyBinCount);

  function animate(){
    analyser.getByteFrequencyData(dataArray);
    drawWave(dataArray);
    requestAnimationFrame(animate);
  }

  animate();
}

const recognition = new webkitSpeechRecognition();
recognition.lang = "es-CL";

recognition.onresult = function(e){
  let text = e.results[0][0].transcript;
  let parts = text.split(" de ");

  if(parts.length === 2){
    titulo.value = parts[0];
    artista.value = parts[1];
  } else {
    titulo.value = text;
  }
};

btnMic.onclick = ()=>{
  startMic();
  recognition.start();
};

</script>

</body>
</html>
