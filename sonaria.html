<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SonarIA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Inter',sans-serif;background:#0b1627;color:#eef2f7}
.wrap{max-width:1100px;margin:auto;padding:20px}
.card{background:rgba(255,255,255,.05);padding:20px;border-radius:20px;margin-bottom:20px}
button{padding:10px 14px;border-radius:12px;border:none;font-weight:800;cursor:pointer}
.primary{background:#14d68f;color:#000}
.ghost{background:rgba(255,255,255,.08);color:#fff}
input,textarea{width:100%;padding:10px;border-radius:10px;border:none;margin-top:6px;background:rgba(255,255,255,.08);color:#fff}
</style>
</head>

<body>
<div class="wrap">

<h1>SonarIA</h1>

<div class="card" id="userBox"></div>

<div class="card">
<h3>📊 Impacto en tu aula</h3>
<div style="display:flex;gap:10px">
<div>❌ <span id="impactEvitadas">0</span></div>
<div>⚠️ <span id="impactRiesgo">0</span></div>
<div>✅ <span id="impactSeguras">0</span></div>
</div>
<div id="impactMensaje"></div>
</div>

<div class="card">
<input id="titulo" placeholder="Título">
<input id="artista" placeholder="Artista">
<textarea id="texto" placeholder="Pega la letra"></textarea>

<button class="primary" onclick="analizar()">Analizar</button>
<button class="ghost" onclick="irPlanes()">Activar versión completa</button>

<div id="status"></div>
</div>

<div class="card" id="resultado"></div>

</div>

<script>

const API = "https://sonaria-api.onrender.com";

function getUser(){
  return JSON.parse(localStorage.getItem("mejoraria_user") || "null");
}

function renderUser(){
  const u = getUser();
  const box = document.getElementById("userBox");

  if(!u){
    box.innerHTML = "No logueado";
    return;
  }

  box.innerHTML = `
    <strong>${u.name || "Usuario"}</strong><br>
    ${u.email}<br>
    Plan: ${u.plan || "free"}<br>
    Uso: ${u.analyses_used || 0}/3
  `;
}

function renderImpacto(){
  const items = JSON.parse(localStorage.getItem("sonaria_history_local") || "[]");

  let evitadas=0, riesgo=0, seguras=0;

  items.forEach(i=>{
    const r = (i.resultado || "").toLowerCase();
    if(r.includes("no")) evitadas++;
    else if(r.includes("medi")) riesgo++;
    else seguras++;
  });

  document.getElementById("impactEvitadas").textContent = evitadas;
  document.getElementById("impactRiesgo").textContent = riesgo;
  document.getElementById("impactSeguras").textContent = seguras;

  document.getElementById("impactMensaje").textContent =
    evitadas>0 ? `Te evitó ${evitadas} problemas en clase 🚀` : "Sin datos aún";
}

async function analizar(){

  const user = getUser();
  const token = localStorage.getItem("mejoraria_token");

  if(!token){
    document.getElementById("status").textContent = "No autenticado";
    return;
  }

  const res = await fetch(API + "/analizar",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + token
    },
    body:JSON.stringify({
      email:user.email,
      titulo:titulo.value,
      artista:artista.value,
      texto:texto.value
    })
  });

  const data = await res.json();

  if(res.status===401){
    document.getElementById("status").textContent = "Sesión expirada";
    return;
  }

  if(res.status===403){
    document.getElementById("status").textContent = "Límite alcanzado";
    return;
  }

  document.getElementById("resultado").innerHTML = `
    <h3>${data.resultado}</h3>
    <p>${data.resumen}</p>
  `;

  localStorage.setItem("mejoraria_user", JSON.stringify(data.user));

  let hist = JSON.parse(localStorage.getItem("sonaria_history_local")||"[]");
  hist.unshift(data);
  localStorage.setItem("sonaria_history_local", JSON.stringify(hist));

  renderUser();
  renderImpacto();
}

function irPlanes(){
  window.location.href="planes.html";
}

renderUser();
renderImpacto();

</script>
</body>
</html>
