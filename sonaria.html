<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SonarIA</title>
<style>
body{font-family:Arial;background:#0b1220;color:#fff;padding:20px}
.container{max-width:980px;margin:auto}
textarea,input{width:100%;padding:10px;border:none;border-radius:10px;background:#1e293b;color:#fff}
textarea{height:180px}
button{padding:10px 20px;margin-top:10px;border:none;border-radius:8px;background:#2563eb;color:#fff;cursor:pointer}
.card{background:#1e293b;padding:15px;border-radius:10px;margin-top:15px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.small{color:#cbd5e1;font-size:14px}
.pill{display:inline-block;padding:6px 10px;border-radius:999px;background:#334155;margin-right:8px}
.ok{color:#86efac}.err{color:#fca5a5}
</style>
</head>
<body>
<div class="container">
<h1>SonarIA 🎵</h1>
<div id="userBox" class="card">Cargando usuario...</div>

<div class="card">
  <div class="row">
    <div>
      <div class="small">Título</div>
      <input id="titulo" placeholder="Título canción">
    </div>
    <div>
      <div class="small">Artista</div>
      <input id="artista" placeholder="Artista">
    </div>
  </div>
  <div style="margin-top:12px" class="small">Letra</div>
  <textarea id="texto" placeholder="Pega aquí la letra de la canción..."></textarea>
  <button onclick="analizar()">Analizar canción</button>
  <button onclick="window.location.href='planes.html'">Activar versión completa</button>
  <div id="status" class="card" style="display:none"></div>
</div>

<div id="resultado" class="card"></div>
<div id="contexto"></div>
</div>

<script>
const API = "https://sonaria-api.onrender.com";

function getToken(){
  return localStorage.getItem("mejoraria_token") || localStorage.getItem("token") || localStorage.getItem("access_token");
}
function getUser(){
  try{ return JSON.parse(localStorage.getItem("mejoraria_user") || "null"); }catch(e){ return null; }
}
function setStatus(msg, ok=false){
  const el = document.getElementById("status");
  el.style.display = "block";
  el.className = "card " + (ok ? "ok" : "err");
  el.textContent = msg;
}
function renderUser(){
  const u = getUser();
  const box = document.getElementById("userBox");
  if(!u){ box.innerHTML = "Sin sesión. Ve a <a href='login.html' style='color:#93c5fd'>login</a>"; return; }
  box.innerHTML = `<b>${u.name || 'Usuario'}</b><br>${u.email}<br><span class="pill">${(u.plan || 'free').toUpperCase()}</span><span class="pill">${u.analyses_used || 0}/3 usados</span>`;
}

async function analizar(){
  const token = getToken();
  const user = getUser();
  if(!token || !user){ setStatus("Debes iniciar sesión antes de analizar."); return; }

  const texto = document.getElementById("texto").value.trim();
  if(!texto){ setStatus("Pega una letra primero."); return; }

  document.getElementById("resultado").innerHTML = "Analizando...";
  document.getElementById("contexto").innerHTML = "";
  setStatus("Analizando...", true);

  try{
    const res = await fetch(API + "/analizar",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + token
      },
      body: JSON.stringify({
        titulo: document.getElementById("titulo").value.trim(),
        artista: document.getElementById("artista").value.trim(),
        texto: texto
      })
    });

    const data = await res.json();

    if(res.status === 401){
      setStatus("Tu sesión expiró. Vuelve a iniciar sesión.");
      return;
    }
    if(res.status === 403){
      setStatus(data.detail || "Límite alcanzado.");
      return;
    }
    if(!res.ok){
      throw new Error(data.detail || "No fue posible analizar.");
    }

    const u = getUser() || {};
    u.plan = data.plan;
    u.analyses_used = data.analyses_used;
    localStorage.setItem("mejoraria_user", JSON.stringify(u));
    renderUser();

    document.getElementById("resultado").innerHTML = `
      <h3>${data.resultado}</h3>
      <p>${data.resumen}</p>
      <p><b>Alerta docente:</b> ${data.alerta_docente || "-"}</p>
      <p><b>Edad sugerida:</b> ${data.edad_sugerida || "-"}</p>
      <p><b>Lectura sugerida:</b> ${data.lectura_sugerida || "-"}</p>
      <p><b>Riesgo total:</b> ${data.riesgo || 0}%</p>
      <p><b>Riesgo apoderado:</b> ${data.riesgo_apoderado || 0}%</p>
      <p><b>Sugerencia para clase:</b> ${data.sugerencia_clase || "-"}</p>
      <p><b>Observaciones:</b> ${data.observaciones_pedagogicas || "-"}</p>
      <p><b>Mensaje de contexto:</b> ${data.context_message || "Sin alerta implícita especial."}</p>
      <p><b>Mensaje de reemplazo:</b> ${data.replacement_message || "Sin reemplazos necesarios."}</p>
    `;

    let html = "";
    if(!data.contextos_detectados || data.contextos_detectados.length === 0){
      html = "<div class='card'>No se detectaron problemas relevantes 👍</div>";
    }else{
      data.contextos_detectados.forEach(c=>{
        html += `
        <div class="card">
          <b>Palabra o término:</b> ${c.termino}<br>
          <b>Fragmento:</b> ${c.fragmento}<br>
          <b>Tipo:</b> ${c.tipo}<br>
          <b>Lectura pedagógica:</b> ${c.lectura_pedagogica}<br>
          <b>Acción:</b> ${c.accion_sugerida}
        </div>`;
      });
    }

    if(data.reemplazos_sugeridos && Object.keys(data.reemplazos_sugeridos).length){
      html += "<div class='card'><b>Reemplazos sugeridos</b><br>";
      for(const [k,v] of Object.entries(data.reemplazos_sugeridos)){
        html += `<div style="margin-top:8px"><b>${k}:</b> ${(v || []).join(" · ")}</div>`;
      }
      html += "</div>";
    }

    document.getElementById("contexto").innerHTML = html;
    setStatus("Análisis completado ✅", true);

  }catch(error){
    console.error(error);
    setStatus("Error de conexión o CORS ❌");
    document.getElementById("resultado").innerHTML = "Error de conexión ❌";
  }
}

renderUser();
</script>
</body>
</html>
