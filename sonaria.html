<!-- FRONTEND SONARIA FIX ESTADO COMPLETO -->

<script>

let letraRecuperada = "";

async function analizarCancion(){

  const textoInput = document.getElementById("texto");
  const titulo = document.getElementById("titulo").value;
  const artista = document.getElementById("artista").value;

  // RESET TOTAL
  letraRecuperada = "";
  if (typeof textoInput.value !== "string") textoInput.value = "";
  textoInput.value = "";

  const data = {
    titulo: titulo,
    artista: artista,
    texto: textoInput.value.trim(),
    buscar_letra: true,
    contexto_escolar: true
  };

  try{
    const res = await fetch("https://sonaria-api.onrender.com/analizar", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const raw = await res.json();

    // actualizar letra correctamente
    if (raw.letra_usada && typeof raw.letra_usada === "string" && raw.letra_usada.length > 50){
      letraRecuperada = raw.letra_usada;
      textoInput.value = raw.letra_usada;
    } else {
      letraRecuperada = "";
    }

    console.log("Resultado:", raw);

  }catch(e){
    console.error("Error:", e);
  }
}

</script>
