<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SonarIA</title>

<style>
body {
  font-family: Arial;
  background: #0b0f1a;
  color: white;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

.logo {
  width: 260px;
  margin-bottom: 20px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

button {
  padding: 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.primary {
  background: #00d084;
  color: black;
  font-weight: bold;
}

.result {
  margin-top: 20px;
  padding: 20px;
  background: #111827;
  border-radius: 12px;
}

</style>
</head>

<body>
<div class="container">

<img src="logo-mejoraria.png" class="logo">

<h2>SonarIA</h2>

<form id="form">

<input id="titulo" placeholder="Título">
<input id="artista" placeholder="Artista">
<textarea id="texto" placeholder="Letra"></textarea>

<button class="primary">Analizar</button>

</form>

<div id="resultado" class="result"></div>

</div>

<script>

const API = "https://sonaria-api.onrender.com/analizar"
const token = localStorage.getItem("mejoraria_token")

document.getElementById("form").addEventListener("submit", async (e)=>{
e.preventDefault()

const titulo = document.getElementById("titulo").value
const artista = document.getElementById("artista").value
const texto = document.getElementById("texto").value

document.getElementById("resultado").innerHTML = "Analizando..."

const res = await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({
titulo,
artista,
texto,
buscar_letra:true,
contexto_escolar:true
})
})

const data = await res.json()

document.getElementById("resultado").innerHTML = `
<h3>${data.resultado}</h3>
<p>${data.justificacion}</p>
`

})

</script>
</body>
</html>
