<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso | MejorarIA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050b14;
  --bg2:#081224;
  --text:#f5f7fb;
  --muted:#9eafc8;
  --line:rgba(255,255,255,.08);

  --mclaren:#ff8000;
  --mclaren2:#ff5a00;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:linear-gradient(180deg,var(--bg),var(--bg2));
  color:var(--text);
  height:100vh;
  display:flex;
}

/* LAYOUT */
.left, .right{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:60px;
}

/* LEFT */
.left{
  background:radial-gradient(circle at top left, rgba(255,128,0,.2), transparent);
}
.left h1{
  font-size:2.5rem;
}
.left p{
  color:var(--muted);
  max-width:400px;
}

/* RIGHT */
.right{
  align-items:center;
}
.box{
  width:100%;
  max-width:380px;
}

/* INPUTS */
input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.05);
  color:white;
}

/* BUTTONS */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
}
.primary{
  background:linear-gradient(135deg,var(--mclaren),var(--mclaren2));
  color:#111;
}
.google{
  background:white;
  color:#111;
  margin-bottom:10px;
}

.small{
  text-align:center;
  font-size:.9rem;
  color:var(--muted);
  margin-top:10px;
}

/* MOBILE */
@media(max-width:800px){
  body{flex-direction:column}
  .left{padding:30px}
  .right{padding:30px}
}
</style>
</head>

<body>

<!-- LEFT -->
<div class="left">
  <h1>Estás a un paso de entrar a SonarIA</h1>

  <p>
    Podrás analizar canciones, evaluar su contenido y tomar mejores decisiones
    para el aula.
  </p>

  <p>
    Tendrás acceso a una versión de prueba antes de decidir.
  </p>
</div>

<!-- RIGHT -->
<div class="right">
  <div class="box">

    <button class="google">Continuar con Google</button>

    <input type="email" placeholder="Correo">
    <input type="password" placeholder="Contraseña">

    <button class="primary" onclick="login()">Ingresar</button>

    <div class="small">
      Accederás a SonarIA dentro de MejorarIA
    </div>

  </div>
</div>

<script>
function login(){
  localStorage.setItem("mejoraria_user", "true");
  window.location.href = "panel.html";
}
</script>

</body>
</html>
