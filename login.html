<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Test | SonarIA</title>
  <meta name="description" content="Accede a la versión de prueba del Dashboard de SonarIA.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root{--bg:#f7f9fd;--panel:#ffffffee;--line:#d7deeb;--text:#243043;--muted:#66758c;--blue:#4b82ff;--green:#25c96f;--shadow:0 18px 48px rgba(31,44,74,.10);--radius:26px}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Inter',sans-serif;color:var(--text);min-height:100vh;background:radial-gradient(circle at top left,rgba(145,183,255,.25),transparent 22%),radial-gradient(circle at bottom right,rgba(75,130,255,.12),transparent 18%),linear-gradient(180deg,#f7f9fd,#eef3fa)}
    .stage{min-height:100vh;display:grid;place-items:center;padding:24px}
    .panel{width:100%;max-width:500px;padding:40px;border-radius:var(--radius);background:var(--panel);border:1px solid rgba(255,255,255,.88);box-shadow:var(--shadow);backdrop-filter:blur(8px);text-align:center}
    .brand{font-size:2.8rem;font-weight:900;letter-spacing:-.07em;line-height:1;margin-bottom:10px}
    .brand span{color:var(--blue)}
    .sub{color:var(--muted);font-weight:600;margin-bottom:30px}
    .status{display:none;margin-top:20px;padding:14px;border-radius:16px;font-weight:700;font-size:0.9rem}
    .status.show{display:block}
    .status.error{background:#fff1f1;color:#8b2d2d;border:1px solid #ffcaca}
    .status.loading{background:#fff7ed;color:#9a4a0a;border:1px solid #fed7aa}
    .status.info{background:#eef5ff;color:#26407c;border:1px solid #cdddff}
    .note{margin-top:24px;color:var(--muted);font-size:0.85rem;line-height:1.6}
  </style>
</head>
<body>

  <div class="stage">
    <div class="panel">
      <div class="brand">Sonar<span>IA</span></div>
      <div class="sub text-blue-600 uppercase text-[10px] tracking-[0.2em]">Ambiente de Pruebas v1.5</div>

      <p class="text-slate-600 font-medium mb-8">Ingresa con tu cuenta docente para probar el nuevo Dashboard de Impacto.</p>

      <!-- GOOGLE LOGIN -->
      <div id="g_id_onload"
          data-client_id="723828886665-1be2flu5mgq3ptppkb3i5nvn6ak29kme.apps.googleusercontent.com"
          data-callback="handleCredentialResponse"
          data-auto_prompt="false">
      </div>

      <div class="g_id_signin"
          data-type="standard"
          data-size="large"
          data-theme="filled_blue"
          data-text="continue_with"
          data-shape="pill"
          data-logo_alignment="left">
      </div>

      <div id="statusBox" class="status"></div>

      <div class="note italic">
        "La IA acompaña. Educar es cuidar."<br>
        Esta versión conecta con el backend de Staging para no afectar la producción.
      </div>
    </div>
  </div>

  <script>
    // CONFIGURACIÓN DE CTO: Apuntando al backend de TEST
    const API_URL = "https://sonaria-api-test.onrender.com";
    const NEXT_PAGE = "sonaria-test.html"; // Redirigir al nuevo diseño

    function setStatus(message, type){
      const box = document.getElementById("statusBox");
      box.textContent = message;
      box.className = "status show " + type;
    }

    async function handleCredentialResponse(response) {
      try {
        setStatus("Sincronizando con el servidor de test...", "loading");

        const res = await fetch(`${API_URL}/auth/google`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ credential: response.credential })
        });

        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.detail || "El servidor de test rechazó la conexión.");
        }

        const data = await res.json();
        
        // Guardar sesión
        localStorage.setItem("mejoraria_token", data.access_token);
        localStorage.setItem("mejoraria_user", JSON.stringify(data.user || {}));
        
        setStatus("¡Acceso concedido! Cargando Dashboard...", "info");
        
        // Redirigir al nuevo Dashboard de Test
        setTimeout(() => {
          window.location.href = NEXT_PAGE;
        }, 800);

      } catch (error) {
        console.error("Login Error:", error);
        setStatus("Error: " + error.message + ". Revisa si la URL de Vercel está autorizada en Google Cloud.", "error");
      }
    }

    // Auto-login si ya existe token (opcional para test)
    (async function checkExistingSession(){
      const token = localStorage.getItem("mejoraria_token");
      if(!token) return;
      try {
        const res = await fetch(`${API_URL}/me`, {
          headers: { "Authorization": `Bearer ${token}` }
        });
        if(res.ok) window.location.href = NEXT_PAGE;
      } catch(e) {}
    })();
  </script>
</body>
</html>
