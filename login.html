<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | MejorarIA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#050b14;
  --bg2:#091423;
  --text:#f8fafc;
  --muted:#9fb0c7;
  --orange:#ff8000;
  --green:#00d084;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  background:
    radial-gradient(circle at top left, rgba(255,128,0,.2), transparent 25%),
    radial-gradient(circle at bottom right, rgba(0,208,132,.15), transparent 25%),
    linear-gradient(180deg,var(--bg),var(--bg2));
}

.container{
  width:100%;
  max-width:420px;
  padding:30px;
}

.logo{
  text-align:center;
  font-size:2rem;
  font-weight:800;
}

.logo span{
  color:var(--green);
}

.subtitle{
  text-align:center;
  margin-top:10px;
  color:var(--muted);
}

/* CARD */

.card{
  margin-top:30px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
}

/* GOOGLE BUTTON */

.google-btn{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  font-weight:700;
  cursor:pointer;
  background:white;
  color:black;
  margin-bottom:15px;
}

/* DIVIDER */

.divider{
  text-align:center;
  margin:20px 0;
  color:var(--muted);
  font-size:.9rem;
}

/* INPUTS */

input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,.1);
  color:white;
}

/* BUTTON */

.login-btn{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:var(--orange);
  font-weight:700;
  cursor:pointer;
}

/* FOOTER */

.footer{
  text-align:center;
  margin-top:20px;
  font-size:.9rem;
  color:var(--muted);
}

</style>
</head>

<body>

<div class="container">

  <div class="logo">Mejorar<span>IA</span></div>
  <div class="subtitle">Accede a tu ecosistema docente</div>

  <div class="card">

    <!-- 🔥 GOOGLE PRIMERO -->
    <button class="google-btn" onclick="loginGoogle()">
      🔵 Continuar con Google
    </button>

    <div class="divider">o ingresa manualmente</div>

    <input type="email" placeholder="Correo">
    <input type="password" placeholder="Contraseña">

    <button class="login-btn" onclick="loginManual()">
      Entrar
    </button>

  </div>

  <div class="footer">
    ¿No tienes cuenta? Accede con Google
  </div>

</div>

<script>

/* LOGIN MANUAL (simulado) */
function loginManual(){
  localStorage.setItem("mejoraria_user", "true");
  localStorage.setItem("sonaria_user", "true");
  window.location.href = "dashboard.html";
}

/* LOGIN GOOGLE (simulado por ahora) */
function loginGoogle(){
  localStorage.setItem("mejoraria_user", "true");
  localStorage.setItem("sonaria_user", "true");
  window.location.href = "dashboard.html";
}

</script>

</body>
</html>
