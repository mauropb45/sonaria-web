<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso | MejorarIA</title>
<meta name="description" content="Accede a SonarIA dentro de MejorarIA para probar la herramienta.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
body{margin:0;font-family:Inter,sans-serif;background:#081224;color:#f5f7fb}
.stage{min-height:100vh;display:grid;place-items:center;padding:24px}
.panel{width:100%;max-width:540px;padding:28px;border-radius:26px;background:linear-gradient(180deg, rgba(8,18,36,.82), rgba(8,18,36,.70));border:1px solid rgba(255,255,255,.10)}
.status{display:none;margin-top:16px;padding:12px 14px;border-radius:14px}
.status.show{display:block}.error{background:rgba(255,107,107,.08)}.loading{background:rgba(255,138,0,.09)}
</style>
</head>
<body>
<div class="stage">
  <div class="panel">
    <h1>MejorarIA</h1>
    <p>Ingresa para acceder a SonarIA dentro de la plataforma.</p>
    <div id="g_id_onload" data-client_id="723828886665-1be2flu5mgq3ptppkb3i5nvn6ak29kme.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
    <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="continue_with" data-shape="pill" data-logo_alignment="left"></div>
    <div id="statusBox" class="status"></div>
  </div>
</div>
<script>
const API_URL = "https://sonaria-api.onrender.com";
function setStatus(message, type){ const box=document.getElementById("statusBox"); box.textContent=message; box.className="status show "+type; }
function saveSession(data) {
  localStorage.setItem("mejoraria_token", data.access_token);
  localStorage.setItem("token", data.access_token);
  localStorage.setItem("access_token", data.access_token);
  localStorage.setItem("mejoraria_user", JSON.stringify(data.user || {}));
}
async function handleCredentialResponse(response) {
  try{
    setStatus("Validando acceso...", "loading");
    const res = await fetch(API_URL + "/auth/google", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ credential: response.credential })
    });
    const data = await res.json();
    if(!res.ok){ throw new Error(data.detail || "No fue posible iniciar sesión."); }
    saveSession(data);
    window.location.href = "/sonaria.html";
  }catch(error){
    console.error(error);
    setStatus(error.message || "Error al iniciar sesión", "error");
  }
}
</script>
</body>
</html>
