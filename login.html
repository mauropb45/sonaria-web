<style>
  :root{
    --bg:#f6f9fc;
    --bg2:#eef4fb;
    --panel:#ffffff;
    --panel-soft:rgba(255,255,255,.75);
    --text:#0f172a;
    --muted:#6b7a90;
    --line:rgba(15,23,42,.08);
    --blue:#4b82ff;
    --blue-soft:rgba(75,130,255,.10);
    --shadow:0 20px 60px rgba(15,23,42,.10);
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    font-family:'Inter',sans-serif;
    color:var(--text);
    min-height:100vh;
    background:
      radial-gradient(circle at top left, rgba(75,130,255,.12), transparent 25%),
      linear-gradient(180deg,var(--bg),var(--bg2));
  }

  .topbar{
    width:100%;
    padding:20px 28px 0 28px;
  }

  .brand-logo{
    width:320px;
    max-width:70vw;
  }

  .stage{
    min-height:calc(100vh - 110px);
    display:grid;
    place-items:center;
    padding:24px;
  }

  .panel{
    width:100%;
    max-width:540px;
    padding:30px;
    border-radius:26px;
    background:var(--panel-soft);
    backdrop-filter:blur(10px);
    border:1px solid var(--line);
    box-shadow:var(--shadow);
  }

  .home{
    display:inline-block;
    margin-bottom:16px;
    color:var(--blue);
    text-decoration:none;
    font-weight:700;
  }

  .brand{
    font-size:2.3rem;
    font-weight:900;
    letter-spacing:-1px;
    line-height:1;
    margin-bottom:6px;
  }

  .brand span{
    background:linear-gradient(135deg,#4b82ff,#6ee7ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
  }

  .sub{
    color:var(--muted);
    line-height:1.7;
    margin-bottom:18px;
  }

  .principle{
    margin:0 0 18px;
    padding:16px 18px;
    border-radius:18px;
    background:var(--blue-soft);
    border:1px solid rgba(75,130,255,.15);
  }

  .principle strong{
    display:block;
    margin-bottom:6px;
  }

  .principle p{
    margin:0;
    color:#1e293b;
    line-height:1.68;
    font-size:.96rem;
  }

  .status{
    display:none;
    margin-top:16px;
    padding:12px 14px;
    border-radius:14px;
    line-height:1.55;
  }

  .status.show{display:block}

  .status.error{
    background:rgba(255,107,107,.10);
    border:1px solid rgba(255,107,107,.25);
    color:#b91c1c;
  }

  .status.loading{
    background:rgba(255,138,0,.10);
    border:1px solid rgba(255,138,0,.25);
    color:#c2410c;
  }

  .status.info{
    background:rgba(75,130,255,.12);
    border:1px solid rgba(75,130,255,.25);
    color:#1e3a8a;
  }

  .note{
    margin-top:14px;
    color:var(--muted);
    font-size:.92rem;
    line-height:1.7;
  }
</style>
