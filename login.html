<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crear cuenta | MejorarIA</title>
<meta name="description" content="Solicita acceso o crea tu cuenta en MejorarIA.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#07111d; --bg2:#0b1626; --panel:rgba(255,255,255,.05); --panel-2:rgba(255,255,255,.035); --line:rgba(255,255,255,.10);
      --text:#eef2f7; --muted:#9fb0c7; --muted-2:#8396af;
      --green:#14d68f; --orange:#ff8a00; --orange-2:#ff6500; --blue:#4b82ff; --blue-soft:rgba(75,130,255,.12);
      --shadow:0 24px 70px rgba(0,0,0,.34); --shadow-soft:0 14px 34px rgba(0,0,0,.22);
      --radius-xl:28px; --radius-lg:22px; --max:1180px;
    }
    *{box-sizing:border-box} html{scroll-behavior:smooth}
    body{
      margin:0; font-family:'Inter',sans-serif; color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,138,0,.15), transparent 18%),
        radial-gradient(circle at top right, rgba(20,214,143,.12), transparent 20%),
        radial-gradient(circle at bottom right, rgba(75,130,255,.12), transparent 18%),
        linear-gradient(180deg,var(--bg),var(--bg2));
      overflow-x:hidden;
    }
    body::before{
      content:""; position:fixed; inset:0; pointer-events:none;
      background:
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size:38px 38px; mask-image:linear-gradient(to bottom, rgba(255,255,255,.35), transparent 78%); z-index:0;
    }
    a{color:inherit; text-decoration:none}
    .container{position:relative; z-index:1; max-width:var(--max); margin:0 auto; padding:28px 22px 90px;}
    .header{display:flex; justify-content:center; align-items:center; margin-bottom:24px; animation:fadeIn .8s ease;}
    .brand-global{display:flex; flex-direction:column; align-items:center; text-align:center; text-decoration:none; transition:transform .25s ease; position:relative;}
    .brand-global:hover{transform:scale(1.05)}
    .brand-global::after{content:""; position:absolute; inset:-10px; border-radius:20px; background:radial-gradient(circle, rgba(20,214,143,.25), transparent 70%); opacity:0; transition:opacity .3s ease; z-index:-1;}
    .brand-global:hover::after{opacity:1}
    .brand-main{margin:0; font-size:clamp(3.3rem, 8vw, 6rem); line-height:.92; font-weight:900; letter-spacing:-.065em; text-wrap:balance;}
    .brand-main .ia{color:var(--green); text-shadow:0 0 22px rgba(20,214,143,.35);}
    .brand-sub{margin-top:8px; color:#d7fff0; font-size:clamp(1rem, 2.2vw, 1.35rem); font-weight:800; letter-spacing:-.02em;}
    .btn{display:inline-flex; align-items:center; justify-content:center; min-width:210px; padding:15px 24px; border-radius:18px; border:1px solid transparent; font-weight:800; font-size:1rem; transition:transform .2s ease, box-shadow .25s ease, background .25s ease, border-color .25s ease; cursor:pointer; text-align:center; backdrop-filter:blur(10px);}
    .btn:hover{transform:translateY(-2px)}
    .btn-primary{background:linear-gradient(135deg,var(--orange),var(--orange-2)); color:#111827; box-shadow:0 12px 28px rgba(255,138,0,.28);}
    .btn-primary:hover{box-shadow:0 18px 38px rgba(255,138,0,.34)}
    .btn-ghost{background:rgba(255,255,255,.05); border:1px solid var(--line); color:var(--text); box-shadow:0 10px 24px rgba(0,0,0,.12);}
    .btn-ghost:hover{background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.14)}
    .card{background:linear-gradient(180deg, var(--panel), var(--panel-2)); border:1px solid rgba(255,255,255,.09); border-radius:var(--radius-xl); box-shadow:var(--shadow);}
    .footer{margin-top:48px; text-align:center; color:#d7e2f1; font-size:1.18rem; font-weight:800; line-height:1.8; letter-spacing:-.01em; opacity:.98;}
    @keyframes fadeIn{from{opacity:0; transform:translateY(-10px)} to{opacity:1; transform:translateY(0)}}
    @media (max-width:720px){.container{padding:24px 16px 72px}.btn{width:100%; max-width:340px}}
  </style>

<style>
.register{max-width:760px; margin:18px auto 0; padding:30px}
.register h1{margin:0 0 12px; font-size:clamp(2.2rem, 5vw, 3.6rem); line-height:1; letter-spacing:-.05em}
.register p{margin:0 0 22px; color:var(--muted); line-height:1.8; font-size:1.05rem}
.form{display:grid; gap:12px} .row{display:grid; grid-template-columns:1fr 1fr; gap:12px}
.input,.textarea{width:100%; padding:15px 16px; border-radius:16px; border:1px solid rgba(255,255,255,.09); background:rgba(255,255,255,.05); color:var(--text); font:inherit; outline:none; transition:border-color .2s ease, background .2s ease, box-shadow .2s ease}
.input:focus,.textarea:focus{border-color:rgba(75,130,255,.38); background:rgba(255,255,255,.07); box-shadow:0 0 0 4px rgba(75,130,255,.10)}
.input::placeholder,.textarea::placeholder{color:#8ea3bf} .textarea{min-height:140px; resize:vertical}
.helper{margin-top:14px; color:var(--muted-2); line-height:1.6; text-align:center} .helper a{color:#d7fff0; font-weight:700}
@media (max-width:720px){.row{grid-template-columns:1fr} .register{padding:22px}}
</style></head>
<body><div class="container">

    <div class="header">
      <a href="index.html" class="brand-global">
        <div class="brand-main">Mejorar<span class="ia">IA</span></div>
        <div class="brand-sub">IA aplicada a educación musical</div>
      </a>
    </div>

<section class="register card"><h1>Crear cuenta o solicitar acceso</h1><p>Cuéntanos quién eres, qué asignatura enseñas y qué te gustaría resolver. Queremos construir MejorarIA junto a docentes de distintas áreas.</p>
<form class="form"><div class="row"><input class="input" type="text" placeholder="Tu nombre"><input class="input" type="email" placeholder="Tu correo"></div><div class="row"><input class="input" type="text" placeholder="Tu asignatura"><input class="input" type="text" placeholder="Tu institución o proyecto"></div><textarea class="textarea" placeholder="¿Qué te gustaría probar o proponer para MejorarIA?"></textarea><button class="btn btn-primary" type="submit" style="width:100%;">Enviar solicitud</button></form>
<div class="helper">¿Ya tienes cuenta? <a href="login.html">Ingresa aquí</a></div></section>
<div class="footer">MauRock · Mauricio José Pinto Basso</div>
</div><!-- Google Login -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<div id="g_id_onload"
     data-client_id="723828886665-1be2flu5mgq3ptppkb3i5nvn6ak29kme.apps.googleusercontent.com"
     data-callback="handleCredentialResponse">
</div>

<div style="display:flex; justify-content:center; margin-top:30px;">
  <div class="g_id_signin"
       data-type="standard"
       data-theme="outline"
       data-size="large"
       data-text="continue_with"
       data-shape="pill"
       data-logo_alignment="left">
  </div>
</div>

<script>
function handleCredentialResponse(response){
  console.log("Login Google OK");

  // Guardamos sesión
  localStorage.setItem("sonaria_user", response.credential);

  // Redirigir al dashboard
  window.location.href = "sonaria.html";
}
</script></body></html>
