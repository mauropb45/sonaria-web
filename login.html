<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - MejorarIA</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#111827;
  padding:30px;
  border-radius:12px;
  width:320px;
  text-align:center;
}

.logo{
  font-size:22px;
  margin-bottom:10px;
}

button{
  margin-top:15px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

#error{
  margin-top:10px;
  color:#ff6b6b;
}
</style>
</head>

<body>

<div class="card">

  <div class="logo">MejorarIA</div>
  <p>Ingresa con Google</p>

  <div id="g_id_onload"
    data-client_id="723828886665-1be2flu5mgq3ptppkb3i5nvn6ak29kme.apps.googleusercontent.com"
    data-callback="handleCredentialResponse">
  </div>

  <div class="g_id_signin"
    data-type="standard"
    data-size="large"
    data-theme="outline"
    data-text="continue_with"
    data-shape="pill">
  </div>

  <div id="error"></div>

</div>

<script>
const API = "https://sonaria-api.onrender.com";

async function handleCredentialResponse(response){
  try{

    const res = await fetch(API + "/auth/google", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        credential: response.credential
      })
    });

    const data = await res.json();

    if(!res.ok){
      throw new Error(data.detail || "Error login");
    }

    // Guardar sesión
    localStorage.setItem("mejoraria_token", data.access_token);
    localStorage.setItem("mejoraria_user", JSON.stringify(data.user));

    // Redirigir
    window.location.href = "/sonaria.html";

  }catch(e){
    console.error(e);
    document.getElementById("error").innerText = "Error al iniciar sesión";
  }
}
</script>

</body>
</html>
