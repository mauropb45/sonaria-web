<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>
</head>

<body>

<h2>Panel Admin</h2>

<button onclick="cargarUsuarios()">Cargar usuarios</button>

<div id="usuarios"></div>

<script>

const API_URL = "https://sonaria-api.onrender.com";

async function cargarUsuarios(){
  const res = await fetch(`${API_URL}/admin/users`);
  const data = await res.json();

  let html = "";

  data.forEach(u=>{
    html += `<p>${u.email}</p>`;
  });

  document.getElementById("usuarios").innerHTML = html;
}

</script>

</body>
</html>
