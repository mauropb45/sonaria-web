<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | SonarIA</title>

<style>
:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --line:#e6e9ef;
  --text:#1f2937;
  --muted:#6b7280;
  --blue:#2563eb;
  --green:#22c55e;
  --red:#ef4444;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

.container{
  padding:20px;
  max-width:1200px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:300px 1fr;
  gap:20px;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  padding:16px;
}

input, textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--line);
  margin-bottom:10px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  margin-top:5px;
}

.btn-green{background:var(--green); color:white;}
.btn-red{background:var(--red); color:white;}

table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  padding:10px;
  border-bottom:1px solid var(--line);
  text-align:left;
}

.search{
  margin-bottom:10px;
}

@media(max-width:768px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>

</head>

<body>

<div class="container">

  <h2>Panel Admin SonarIA</h2>

  <div class="grid">

```
<!-- PANEL IZQUIERDO -->
<div class="card">
  <h4>Acciones</h4>

  <input id="email" placeholder="Correo usuario">
  <input id="days" placeholder="Días PRO" value="30">
  <textarea id="note" placeholder="Nota interna"></textarea>

  <button class="btn-green" onclick="activar()">Activar PRO</button>
  <button class="btn-red" onclick="revocar()">Revocar PRO</button>

  <div id="msg"></div>
</div>

<!-- PANEL DERECHO -->
<div class="card">

  <input class="search" id="search" placeholder="Buscar usuario..." oninput="loadUsers()">

  <table>
    <thead>
      <tr>
        <th>Email</th>
        <th>Plan</th>
        <th>Vence</th>
        <th>Nota</th>
      </tr>
    </thead>
    <tbody id="users">
      <tr><td colspan="4">Cargando...</td></tr>
    </tbody>
  </table>

</div>
```

  </div>

</div>

<script>

const API = "https://sonaria-api.onrender.com";

async function getToken(){
  return localStorage.getItem("token");
}

async function loadUsers(){
  const q = document.getElementById("search").value;

  const res = await fetch(API + "/admin/users?q=" + q, {
    headers: {
      Authorization: "Bearer " + await getToken()
    }
  });

  if(!res.ok){
    document.getElementById("users").innerHTML = "<tr><td colspan='4'>Error</td></tr>";
    return;
  }

  const data = await res.json();

  const rows = data.users.map(u => `
    <tr>
      <td>${u.email}</td>
      <td>${u.plan}</td>
      <td>${u.pro_expires_at || "-"}</td>
      <td>${u.note || ""}</td>
    </tr>
  `).join("");

  document.getElementById("users").innerHTML = rows;
}

async function activar(){

  const email = document.getElementById("email").value;
  const days = document.getElementById("days").value;
  const note = document.getElementById("note").value;

  const res = await fetch(API + "/admin/pro/activate", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization: "Bearer " + await getToken()
    },
    body: JSON.stringify({ email, days, note })
  });

  document.getElementById("msg").innerText = res.ok ? "PRO activado" : "Error";
  loadUsers();
}

async function revocar(){

  const email = document.getElementById("email").value;

  const res = await fetch(API + "/admin/pro/revoke", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization: "Bearer " + await getToken()
    },
    body: JSON.stringify({ email })
  });

  document.getElementById("msg").innerText = res.ok ? "PRO revocado" : "Error";
  loadUsers();
}

loadUsers();

</script>

</body>
</html>
