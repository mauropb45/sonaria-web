<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel • SonarIA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  color:#fff;
  background:
    radial-gradient(circle at top left, rgba(255,122,0,.2), transparent 30%),
    radial-gradient(circle at bottom right, rgba(0,208,132,.2), transparent 30%),
    #08121f;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:40px 20px;
}

h1{
  font-size:40px;
}

.card{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  padding:20px;
  border-radius:20px;
  margin-top:20px;
}

input, textarea{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,.08);
  color:white;
}

button{
  margin-top:15px;
  padding:14px;
  width:100%;
  border:none;
  border-radius:12px;
  font-weight:800;
  background:#ff7a00;
  cursor:pointer;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.btn{
  padding:10px 16px;
  border-radius:10px;
  border:none;
  cursor:pointer;
}

.secondary{
  background:#2563eb;
  color:white;
}

</style>
</head>

<body>

<div class="container">

<div class="topbar">
  <h2>Mejorar<span style="color:#00d084">IA</span></h2>
  <div>
    <button class="btn" onclick="window.location.href='index.html'">Volver</button>
    <button class="btn secondary" onclick="logout()">Cerrar sesión</button>
  </div>
</div>

<h1>Panel privado • SonarIA</h1>

<div class="card">
  <h3>Nuevo análisis</h3>

  <input id="titulo" placeholder="Título de la canción">
  <input id="artista" placeholder="Artista o banda">
  <textarea id="letra" rows="6" placeholder="Pega aquí la letra..."></textarea>

  <button onclick="analizar()">Analizar con SonarIA</button>

  <p id="resultado"></p>
</div>

<div class="card">
  <h3>Tu cuenta</h3>
  <p id="usuario">Cargando usuario...</p>
</div>

</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://ibtklkjfpcopzgsrulob.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_IwR4ByvxMHbrJPZF4Q4ZKg_ra6ji7HM;

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// 🔐 Verificar sesión
async function checkUser(){
  const { data } = await supabaseClient.auth.getUser();

  if(!data.user){
    window.location.href = "login.html";
    return;
  }

  document.getElementById("usuario").innerText = "Usuario: " + data.user.email;
}

checkUser();

// 🚪 Logout
async function logout(){
  await supabaseClient.auth.signOut();
  window.location.href = "login.html";
}

// 🧠 Simulación SonarIA (luego lo conectamos con IA real)
function analizar(){
  const titulo = document.getElementById("titulo").value;
  const artista = document.getElementById("artista").value;
  const letra = document.getElementById("letra").value;

  if(!titulo || !artista || !letra){
    alert("Completa todos los campos");
    return;
  }

  document.getElementById("resultado").innerText =
    "🔎 Analizando...\n\nResultado inicial:\nPosible contenido emocional + revisión sugerida para contexto escolar.";
}
</script>

</body>
</html>
