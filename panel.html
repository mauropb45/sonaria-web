<script>
const API = "https://sonaria-api.onrender.com";

function getToken(){
  return localStorage.getItem("mejoraria_token") 
      || localStorage.getItem("token") 
      || localStorage.getItem("access_token") 
      || "";
}

async function cargarResumenAdmin() {
  try {
    const token = getToken();

    const res = await fetch(API + "/admin/resumen", {
      method: "GET",
      headers: {
        "Authorization": "Bearer " + token,
        "Content-Type": "application/json"
      }
    });

    if (res.status === 401) {
      alert("Tu sesión expiró. Vuelve a iniciar sesión.");
      window.location.href = "/login.html";
      return;
    }

    if (!res.ok) {
      console.error("Error backend:", res.status);
      return;
    }

    const data = await res.json();

    console.log("DATA ADMIN:", data);

    // 👇 AQUÍ CARGAS LOS DATOS EN EL UI
    document.getElementById("heroUsers").innerText = data.usuarios?.length || 0;
    document.getElementById("heroPro").innerText = data.licencias?.usadas || 0;
    document.getElementById("heroAnalyses").innerText = data.uso?.total_analisis || 0;

  } catch (err) {
    console.error("Error cargando admin:", err);
  }
}

// Ejecutar al cargar
window.addEventListener("load", cargarResumenAdmin);
</script>
