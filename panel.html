<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SonarIA Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#f5f7fb;
  color:#1e293b;
}

.container{
  max-width:1300px;
  margin:auto;
  padding:30px 20px;
}

h1{
  font-size:2rem;
  margin-bottom:20px;
}

/* KPIs */
.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-bottom:25px;
}

.kpi{
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,.05);
}

.kpi h2{
  margin:0;
  font-size:1.5rem;
}

/* COLEGIOS */
.colegios{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:20px;
  margin-bottom:30px;
}

.card{
  background:white;
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,.05);
}

.card h3{
  margin-top:0;
}

.btn{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.btn-primary{background:#3b82f6;color:white;}
.btn-green{background:#22c55e;color:white;}
.btn-red{background:#ef4444;color:white;}

/* OPERACIÓN */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

/* MOBILE */
@media(max-width:900px){
  .kpis{grid-template-columns:1fr 1fr;}
  .grid{grid-template-columns:1fr;}
}
</style>

</head>

<body>

<div class="container">

<h1>SonarIA Admin</h1>

<!-- KPIs -->

<div class="kpis">
  <div class="kpi">
    <div>Usuarios</div>
    <h2 id="kpiUsers">-</h2>
  </div>
  <div class="kpi">
    <div>PRO activos</div>
    <h2 id="kpiPro">-</h2>
  </div>
  <div class="kpi">
    <div>Trials</div>
    <h2 id="kpiTrials">-</h2>
  </div>
  <div class="kpi">
    <div>Colegios</div>
    <h2 id="kpiSchools">-</h2>
  </div>
</div>

<!-- COLEGIOS -->

<h2>Colegios</h2>
<div class="colegios" id="colegios"></div>

<!-- OPERACIÓN -->

<div class="grid">

  <div class="card">
    <h3>Enviar regalo PRO</h3>
    <input id="giftEmail" placeholder="correo" style="width:100%;padding:8px;margin-bottom:8px">
    <select id="giftDays" style="width:100%;padding:8px;margin-bottom:8px">
      <option value="3">3 días</option>
      <option value="7">7 días</option>
    </select>
    <button class="btn btn-green" onclick="sendGift()">Enviar</button>
  </div>

  <div class="card">
    <h3>Eventos</h3>
    <div id="events">Cargando...</div>
  </div>

</div>

</div>

<script>

const API = "https://sonaria-api.onrender.com";
const token = localStorage.getItem("mejoraria_token");

/* KPIs */
async function loadKPIs(){
  const res = await fetch(API + "/admin/kpis",{headers:{Authorization:"Bearer "+token}});
  const data = await res.json();

  kpiUsers.innerText = data.users;
  kpiPro.innerText = data.pro;
  kpiTrials.innerText = data.trials;
  kpiSchools.innerText = data.schools;
}

/* COLEGIOS */
async function loadSchools(){
  const res = await fetch(API + "/admin/schools",{headers:{Authorization:"Bearer "+token}});
  const data = await res.json();

  const container = document.getElementById("colegios");
  container.innerHTML="";

  data.forEach(s=>{
    const div = document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <h3>${s.name}</h3>
      <p>${s.used}/${s.total} cupos usados</p>
      <button class="btn btn-primary" onclick="enterSchool('${s.id}')">Entrar</button>
    `;

    container.appendChild(div);
  });
}

/* REGALO */
async function sendGift(){
  const email = giftEmail.value;
  const days = giftDays.value;

  await fetch(API+"/admin/gift",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body:JSON.stringify({email,days})
  });

  alert("Regalo enviado");
}

/* EVENTOS */
async function loadEvents(){
  const res = await fetch(API+"/admin/events",{headers:{Authorization:"Bearer "+token}});
  const data = await res.json();

  events.innerHTML = data.map(e=>`<div>${e}</div>`).join("");
}

/* INIT */
loadKPIs();
loadSchools();
loadEvents();

</script>

</body>
</html>
