<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | SonarIA PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#f5f7fb;
  color:#1e293b;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

h1{
  margin:0;
  font-size:2rem;
}

.btn{
  padding:10px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
}

.btn-ghost{
  background:#fff;
  border:1px solid #d9e3f1;
}

.btn-red{
  background:#ef4444;
  color:white;
}

.card{
  background:white;
  border-radius:16px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.05);
}

table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  padding:12px;
  border-bottom:1px solid #eee;
  text-align:left;
}

th{
  background:#f1f5f9;
}

.badge{
  padding:5px 10px;
  border-radius:999px;
  font-size:.75rem;
  font-weight:800;
}

.pro{background:#d1fae5;color:#065f46;}
.free{background:#e2e8f0;color:#334155;}
</style>
</head>

<body>

<div class="container">

  <div class="topbar">
    <h1>Panel Admin SonarIA</h1>

    <div>
      <button class="btn btn-ghost" onclick="irSonaria()">Ir a SonarIA</button>
      <button class="btn btn-red" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>
  </div>

  <div class="card">
    <h2>Usuarios</h2>

    <table id="tablaUsuarios">
      <thead>
        <tr>
          <th>Email</th>
          <th>Nombre</th>
          <th>Plan</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<script>

const API = "https://sonaria-api.onrender.com";

/* =========================
   PROTECCIÓN DE ACCESO
========================= */
const token = localStorage.getItem("mejoraria_token");

if(!token){
  window.location.href = "/login.html";
}

/* =========================
   CARGAR USUARIOS
========================= */
async function cargarUsuarios(){

  const res = await fetch(API + "/admin/users", {
    headers:{
      "Authorization":"Bearer " + token
    }
  });

  const data = await res.json();

  const tbody = document.querySelector("#tablaUsuarios tbody");
  tbody.innerHTML = "";

  (data.users || []).forEach(user => {

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${user.email}</td>
      <td>${user.name || "-"}</td>
      <td>
        <span class="badge ${user.plan === "pro" ? "pro":"free"}">
          ${user.plan}
        </span>
      </td>
      <td>
        <button class="btn btn-red" onclick="eliminarUsuario(${user.id})">
          Eliminar
        </button>
      </td>
    `;

    tbody.appendChild(tr);
  });
}

/* =========================
   ELIMINAR USUARIO
========================= */
async function eliminarUsuario(id){

  if(!confirm("¿Seguro que quieres eliminar este usuario?")) return;

  const res = await fetch(API + "/admin/delete-user/" + id, {
    method:"DELETE",
    headers:{
      "Authorization":"Bearer " + token
    }
  });

  const data = await res.json();

  if(data.ok){
    alert("Usuario eliminado");
    cargarUsuarios();
  }else{
    alert(data.detail || "Error");
  }
}

/* =========================
   LOGOUT REAL
========================= */
async function cerrarSesion(){

  try{
    await fetch(API + "/auth/logout", {
      method:"POST",
      headers:{
        "Authorization":"Bearer " + token
      }
    });
  }catch(e){}

  localStorage.clear();
  sessionStorage.clear();

  window.location.href = "/login.html";
}

/* =========================
   NAV
========================= */
function irSonaria(){
  window.location.href = "/sonaria.html";
}

/* =========================
   INIT
========================= */
cargarUsuarios();

</script>

</body>
</html>
