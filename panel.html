<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SonarIA Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#f5f7fb;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:25px;
}

h1{
  margin-bottom:20px;
}

/* KPIs */
.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-bottom:25px;
}

.kpi{
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 4px 15px rgba(0,0,0,.05);
}

.kpi h2{
  margin:0;
}

/* COLEGIOS */
.colegios{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:15px;
  margin-bottom:25px;
}

.card{
  background:white;
  padding:15px;
  border-radius:14px;
  box-shadow:0 6px 20px rgba(0,0,0,.05);
}

.btn{
  padding:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:8px;
}

.primary{background:#3b82f6;color:white;}
.green{background:#22c55e;color:white;}
.red{background:#ef4444;color:white;}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

@media(max-width:900px){
  .kpis{grid-template-columns:1fr 1fr;}
  .grid{grid-template-columns:1fr;}
}
</style>

</head>

<body>

<div class="container">

<h1>SonarIA Admin</h1>

<!-- KPIs (solo visual por ahora) -->

<div class="kpis">
  <div class="kpi"><div>Usuarios</div><h2 id="u">-</h2></div>
  <div class="kpi"><div>PRO</div><h2 id="p">-</h2></div>
  <div class="kpi"><div>Regalos</div><h2 id="g">-</h2></div>
  <div class="kpi"><div>Colegios</div><h2 id="c">-</h2></div>
</div>

<h2>Colegios</h2>
<div id="colegios" class="colegios"></div>

<div class="grid">

<div class="card">
<h3>Enviar regalo PRO</h3>
<input id="email" placeholder="correo" style="width:100%;margin-bottom:8px;">
<select id="days" style="width:100%;margin-bottom:8px;">
<option value="3">3 días</option>
<option value="7">7 días</option>
</select>
<button class="btn green" onclick="gift()">Enviar</button>
</div>

<div class="card">
<h3>Eventos</h3>
<div id="events">Cargando...</div>
</div>

</div>

</div>

<script>

const API="https://sonaria-api.onrender.com";
const token=localStorage.getItem("mejoraria_token");

/* COLEGIOS (usa endpoint real existente) */
async function loadSchools(){
  const res=await fetch(API+"/admin/schools",{headers:{Authorization:"Bearer "+token}});
  const data=await res.json();

  colegios.innerHTML="";

  data.forEach(s=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <h3>${s.name}</h3>
      <p>${s.used}/${s.total} cupos</p>
      <button class="btn primary" onclick="enter('${s.id}')">Entrar</button>
    `;

    colegios.appendChild(div);
  });

  document.getElementById("c").innerText=data.length;
}

/* REGALO */
async function gift(){
  await fetch(API+"/admin/gift",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body:JSON.stringify({
      email:email.value,
      days:days.value
    })
  });

  alert("Regalo enviado");
}

/* EVENTOS */
async function loadEvents(){
  const res=await fetch(API+"/admin/events",{headers:{Authorization:"Bearer "+token}});
  const data=await res.json();

  events.innerHTML=data.map(e=>`<div>${e}</div>`).join("");
}

/* INIT */
loadSchools();
loadEvents();

</script>

</body>
</html>
