<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SonarIA | Panel Pro</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#07111d;
      --bg2:#0b1626;
      --panel:rgba(255,255,255,.05);
      --line:rgba(255,255,255,.10);
      --text:#eef2f7;
      --muted:#9fb0c7;
      --green:#14d68f;
      --green-soft:rgba(20,214,143,.12);
      --orange:#ff8a00;
      --orange-soft:rgba(255,138,0,.12);
      --red:#ff5d5d;
      --red-soft:rgba(255,93,93,.12);
      --blue:#4b82ff;
      --blue-soft:rgba(75,130,255,.12);
      --shadow:0 20px 60px rgba(0,0,0,.30);
      --radius:24px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:'Inter',sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,138,0,.15), transparent 20%),
        radial-gradient(circle at bottom right, rgba(20,214,143,.12), transparent 20%),
        linear-gradient(180deg,var(--bg),var(--bg2));
      min-height:100vh;
    }

    .container{
      max-width:1260px;
      margin:0 auto;
      padding:28px 22px 60px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:26px;
    }

    .brand{
      font-size:2rem;
      font-weight:800;
      letter-spacing:-.04em;
    }

    .brand .ia{
      color:var(--green);
      text-shadow:0 0 22px rgba(20,214,143,.35);
    }

    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      cursor:pointer;
      border-radius:16px;
      padding:13px 18px;
      font-weight:800;
      font-size:.98rem;
      transition:.2s ease;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .btn:hover{ transform:translateY(-2px); }

    .btn-ghost{
      background:rgba(255,255,255,.05);
      color:var(--text);
      border:1px solid var(--line);
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--orange),#ff6a00);
      color:#111827;
      box-shadow:0 10px 24px rgba(255,138,0,.26);
    }

    .btn-secondary{
      background:linear-gradient(135deg,var(--blue),#2d67f6);
      color:white;
      box-shadow:0 10px 24px rgba(75,130,255,.24);
    }

    .hero{
      margin-bottom:26px;
    }

    .hero-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      background:var(--blue-soft);
      border:1px solid rgba(75,130,255,.24);
      color:#cfe0ff;
      font-weight:700;
      font-size:.9rem;
      margin-bottom:16px;
    }

    .hero h1{
      margin:0 0 10px;
      font-size:clamp(2.2rem, 5vw, 4rem);
      letter-spacing:-.05em;
      line-height:.98;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      font-size:1.08rem;
      line-height:1.7;
      max-width:900px;
    }

    .layout{
      display:grid;
      grid-template-columns:1.05fr .95fr;
      gap:22px;
    }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.03));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:22px;
      overflow:hidden;
    }

    .card h2{
      margin:0 0 8px;
      font-size:1.5rem;
      letter-spacing:-.03em;
    }

    .card p.lead{
      margin:0 0 18px;
      color:var(--muted);
      line-height:1.65;
    }

    .field{
      margin-bottom:12px;
    }

    .label{
      display:block;
      margin-bottom:8px;
      font-size:.95rem;
      font-weight:700;
      color:#dde7f3;
    }

    .input,
    .textarea{
      width:100%;
      padding:15px 16px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.06);
      color:var(--text);
      font:inherit;
      outline:none;
      transition:.18s ease;
    }

    .input:focus,
    .textarea:focus{
      border-color:rgba(75,130,255,.5);
      box-shadow:0 0 0 4px rgba(75,130,255,.12);
    }

    .input::placeholder,
    .textarea::placeholder{
      color:#90a4be;
    }

    .textarea{
      min-height:220px;
      resize:vertical;
      line-height:1.55;
    }

    .helper{
      margin-top:8px;
      color:#8fa5c2;
      font-size:.9rem;
    }

    .actions-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .status{
      margin-top:14px;
      padding:14px 16px;
      border-radius:16px;
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.08);
      color:var(--muted);
      line-height:1.6;
      min-height:56px;
    }

    .status.loading{
      color:#dbeafe;
      border-color:rgba(75,130,255,.35);
      background:rgba(75,130,255,.08);
    }

    .status.ok{
      color:#d1fae5;
      border-color:rgba(20,214,143,.35);
      background:rgba(20,214,143,.08);
    }

    .status.error{
      color:#fee2e2;
      border-color:rgba(255,93,93,.35);
      background:rgba(255,93,93,.08);
    }

    .result-hero{
      display:flex;
      align-items:center;
      gap:14px;
      padding:16px;
      border-radius:20px;
      margin-bottom:18px;
      border:1px solid rgba(255,255,255,.08);
    }

    .result-hero.green{
      background:var(--green-soft);
      border-color:rgba(20,214,143,.22);
    }

    .result-hero.orange{
      background:var(--orange-soft);
      border-color:rgba(255,138,0,.22);
    }

    .result-hero.red{
      background:var(--red-soft);
      border-color:rgba(255,93,93,.22);
    }

    .risk-dot{
      width:18px;
      height:18px;
      border-radius:999px;
      flex:0 0 auto;
      box-shadow:0 0 20px currentColor;
    }

    .green .risk-dot{ background:var(--green); color:var(--green); }
    .orange .risk-dot{ background:var(--orange); color:var(--orange); }
    .red .risk-dot{ background:var(--red); color:var(--red); }

    .result-hero strong{
      display:block;
      font-size:1.06rem;
      margin-bottom:3px;
    }

    .result-hero span{
      color:#e8eef7;
      font-size:.96rem;
    }

    .result-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-bottom:14px;
    }

    .mini{
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:14px 15px;
    }
