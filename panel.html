<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SonarIA | Panel docente</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0b1220;
  color:#fff;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:30px;
}

h1{
  font-size:28px;
  margin-bottom:20px;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

input{
  padding:12px;
  border-radius:8px;
  border:none;
  width:100%;
  margin-bottom:10px;
  background:#1f2937;
  color:#fff;
}

button{
  padding:10px 16px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
  font-weight:600;
}

button:hover{
  background:#1d4ed8;
}

.historial-item{
  background:#1f2937;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

.tag{
  display:inline-block;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
  margin-top:6px;
}

.apta{
  background:#065f46;
}

.no-apta{
  background:#7f1d1d;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

@media(max-width:768px){
  .grid{
    grid-template-columns:1fr;
  }
}

</style>
</head>

<body>

<div class="container">

<h1>🎧 SonarIA Pro — Panel Docente</h1>

<div class="card">
  <h2>🔍 Analizar canción</h2>
  
  <input id="titulo" placeholder="Título de la canción">
  <input id="artista" placeholder="Artista">

  <button onclick="analizar()">Analizar</button>

  <div id="resultado" style="margin-top:20px;"></div>
</div>

<div class="grid">

<div class="card">
  <h2>🕒 Historial</h2>
  <div id="historial"></div>
</div>

<div class="card">
  <h2>📊 Insights docentes</h2>
  <div id="insights"></div>
</div>

</div>

</div>

<script>

const API = "https://sonaria-api.onrender.com";

async function analizar(){
  const titulo = document.getElementById("titulo").value;
  const artista = document.getElementById("artista").value;

  const res = await fetch(API + "/analizar", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ titulo, artista })
  });

  const data = await res.json();

  mostrarResultado(data);
  cargarHistorial();
}

function mostrarResultado(data){
  const div = document.getElementById("resultado");

  let estado = data.apta ? "apta" : "no-apta";
  let textoEstado = data.apta ? "Apta para clase" : "Requiere supervisión docente";

  div.innerHTML = `
    <div class="historial-item">
      <strong>${data.titulo} - ${data.artista}</strong><br>
      <span class="tag ${estado}">${textoEstado}</span>
      <p>${data.justificacion || ""}</p>
    </div>
  `;
}

async function cargarHistorial(){
  const res = await fetch(API + "/historial");
  const data = await res.json();

  const cont = document.getElementById("historial");
  cont.innerHTML = "";

  if(data.items.length === 0){
    cont.innerHTML = "Aún no hay canciones analizadas";
    return;
  }

  data.items.reverse().slice(0,10).forEach(item => {

    let estado = item.apta ? "apta" : "no-apta";
    let textoEstado = item.apta ? "Apta" : "Supervisión";

    const div = document.createElement("div");
    div.className = "historial-item";

    div.innerHTML = `
      <strong>${item.titulo}</strong> - ${item.artista}<br>
      <span class="tag ${estado}">${textoEstado}</span>
      <br><br>
      <button onclick="reanalizar('${item.titulo}','${item.artista}')">
        Reutilizar
      </button>
    `;

    cont.appendChild(div);
  });

  generarInsights(data.items);
}

function reanalizar(titulo, artista){
  document.getElementById("titulo").value = titulo;
  document.getElementById("artista").value = artista;
}

function generarInsights(items){

  const div = document.getElementById("insights");

  if(items.length === 0){
    div.innerHTML = "Sin datos aún";
    return;
  }

  let aptas = items.filter(i=>i.apta).length;
  let noAptas = items.length - aptas;

  div.innerHTML = `
    <p>🎵 Canciones analizadas: <strong>${items.length}</strong></p>
    <p>✅ Aptas: ${aptas}</p>
    <p>⚠️ Requieren supervisión: ${noAptas}</p>
  `;
}

cargarHistorial();

</script>

</body>
</html>
