<script>
    const API_URL = "https://sonaria-api-test.onrender.com";

    async function handleCredentialResponse(response) {
      const status = document.getElementById("status");
      status.innerText = "Validando identidad...";
      
      try {
        const res = await fetch(`${API_URL}/auth/google`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ credential: response.credential })
        });

        if (!res.ok) throw new Error("Servidor fuera de línea");

        const data = await res.json();
        if (data.access_token) {
          localStorage.setItem("mejoraria_token", data.access_token);
          localStorage.setItem("mejoraria_user", JSON.stringify(data.user));
          status.innerText = "Acceso concedido. Entrando al Workspace...";
          setTimeout(() => {
            window.location.href = "dashboard.html"; 
          }, 800);
        }
      } catch (e) { 
          status.innerText = "Error: El motor no responde. Revisa el link de Health.";
          status.style.color = "red";
      }
    }
</script>
