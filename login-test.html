<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Docente | SonarIA Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
  <style>body{font-family:'Plus Jakarta Sans',sans-serif;background-color:#FDFDFF;}</style>
</head>
<body class="flex items-center justify-center min-h-screen">
  <div class="bg-white p-12 rounded-[48px] shadow-2xl text-center max-w-sm w-full border border-slate-100">
    <div class="mb-6 inline-block bg-[#000B29] text-white text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest italic">Staging v35.1</div>
    <h1 class="text-4xl font-[950] tracking-tighter text-[#000B29] mb-10 italic">Sonar<span class="text-[#FF8000]">IA</span></h1>
    
    <div class="flex justify-center">
        <div id="g_id_onload" data-client_id="723828886665-1be2flu5mgq3ptppkb3i5nvn6ak29kme.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
        <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_blue" data-text="continue_with" data-size="large"></div>
    </div>
    
    <div id="status" class="mt-8 text-xs font-black text-blue-600 uppercase tracking-widest animate-pulse"></div>
  </div>

  <script>
    const API_URL = "https://sonaria-api-test.onrender.com";

    async function handleCredentialResponse(response) {
      const statusBox = document.getElementById("status");
      statusBox.innerText = "Sincronizando con el servidor...";
      try {
        const res = await fetch(`${API_URL}/auth/google`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ credential: response.credential })
        });
        if (!res.ok) throw new Error("Offline");
        const data = await res.json();
        if (data.access_token) {
          localStorage.setItem("mejoraria_token", data.access_token);
          statusBox.innerText = "¡Acceso concedido!";
          setTimeout(() => { window.location.href = "dashboard.html"; }, 500);
        }
      } catch (error) {
        statusBox.innerText = "Error: El motor está despertando (30s). Reintenta.";
        statusBox.classList.add("text-red-500");
      }
    }
  </script>
</body>
</html>
