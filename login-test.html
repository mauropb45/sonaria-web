<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Docente | SonarIA Pro</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Tipografía Pro -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
  
  <style>
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: #FDFDFF; 
      background-image: radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.05) 0%, transparent 50%);
    }
    .pearl-card {
      @apply bg-white border border-slate-100 rounded-[48px] shadow-2xl transition-all duration-500;
    }
  </style>
</head>
<body class="antialiased flex items-center justify-center min-h-screen">

  <div class="pearl-card p-12 max-w-sm w-full text-center relative overflow-hidden">
    <!-- Decoración Sutil -->
    <div class="absolute top-0 right-0 w-32 h-32 bg-blue-50 rounded-full -mr-16 -mt-16 opacity-50"></div>
    
    <div class="relative z-10">
      <div class="mb-6 inline-block bg-[#000B29] text-white text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-[0.2em] shadow-lg">
        Staging v31.1
      </div>
      
      <h1 class="text-4xl font-[950] tracking-tighter text-[#000B29] mb-2 italic">
        Sonar<span class="text-[#FF8000]">IA</span>
      </h1>
      
      <p class="text-slate-400 font-bold text-sm mb-10 italic">
        "Transformando la música en una herramienta soberana."
      </p>

      <!-- BOTÓN DE GOOGLE -->
      <div class="flex justify-center">
        <div id="g_id_onload"
             data-client_id="723828886665-1be2flu5mgq3ptppkb3i5nvn6ak29kme.apps.googleusercontent.com"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>

        <div class="g_id_signin"
             data-type="standard"
             data-shape="pill"
             data-theme="filled_blue"
             data-text="continue_with"
             data-size="large"
             data-logo_alignment="left">
        </div>
      </div>

      <!-- ESTADO DE COMUNICACIÓN -->
      <div id="status" class="mt-8 text-xs font-black text-blue-600 uppercase tracking-widest animate-pulse"></div>
      
      <div class="mt-10 pt-10 border-t border-slate-50">
        <p class="text-[9px] font-black text-slate-300 uppercase tracking-[0.3em]">Ambiente de Ingeniería Docente</p>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://sonaria-api-test.onrender.com";

    async function handleCredentialResponse(response) {
      const statusBox = document.getElementById("status");
      statusBox.innerText = "Sincronizando con el cerebro...";
      
      try {
        const res = await fetch(`${API_URL}/auth/google`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ credential: response.credential })
        });

        if (!res.ok) throw new Error("Acceso denegado.");

        const data = await res.json();
        
        if (data.access_token) {
          localStorage.setItem("mejoraria_token", data.access_token);
          localStorage.setItem("mejoraria_user", JSON.stringify(data.user));
          statusBox.innerText = "¡Acceso concedido!";
          
          setTimeout(() => {
            // REDIRIGE AL DASHBOARD SPA QUE NO TIENE SCROLL
            window.location.href = "dashboard.html";
          }, 500);
        }
      } catch (error) {
        console.error(error);
        statusBox.innerText = "Error: El motor está despertando (30s). Reintenta.";
        statusBox.classList.remove("text-blue-600");
        statusBox.classList.add("text-red-500");
      }
    }
  </script>
</body>
</html>
