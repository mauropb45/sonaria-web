<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso SonarIA | Staging</title>
  <!-- Tailwind CSS para el diseño -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen">

  <div class="bg-white p-12 rounded-[48px] shadow-2xl text-center max-w-sm w-full border border-slate-100 relative z-10">
    <div class="mb-4 inline-block bg-blue-100 text-blue-600 text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest">
      Ambiente de Test v23.3
    </div>
    
    <h1 class="text-4xl font-black mb-2 tracking-tighter italic text-slate-900">
      Sonar<span class="text-blue-600">IA</span>
    </h1>
    
    <p class="text-slate-500 font-medium mb-10 text-sm italic">
      "Inteligencia Curricular Sincronizada"
    </p>
    
    <!-- CONTENEDOR DEL BOTÓN DE GOOGLE -->
    <div class="flex justify-center flex-col items-center gap-4">
        <div id="g_id_onload"
             data-client_id="723828886665-1be2flu5mgq3ptppkb3i5nvn6ak29kme.apps.googleusercontent.com"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>

        <div class="g_id_signin"
             data-type="standard"
             data-shape="pill"
             data-theme="filled_blue"
             data-text="continue_with"
             data-size="large"
             data-logo_alignment="left">
        </div>
    </div>
    
    <div id="status" class="mt-8 text-xs font-bold text-blue-500 uppercase tracking-widest animate-pulse"></div>

    <div class="mt-8 pt-8 border-t border-slate-50 text-[10px] text-slate-400 italic">
      Si el botón no aparece, refresca la página (F5).
    </div>
  </div>

  <script>
    const API_URL = "https://sonaria-api-test.onrender.com";

    async function handleCredentialResponse(response) {
      const statusEl = document.getElementById("status");
      statusEl.innerText = "Sincronizando Matrix...";
      
      try {
        const res = await fetch(`${API_URL}/auth/google`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ credential: response.credential })
        });

        if (!res.ok) throw new Error("Acceso denegado por el servidor.");

        const data = await res.json();
        if (data.access_token) {
          localStorage.setItem("mejoraria_token", data.access_token);
          statusEl.innerText = "¡Acceso concedido!";
          setTimeout(() => {
            window.location.href = "sonaria.html";
          }, 500);
        }
      } catch (e) {
        console.error(e);
        statusEl.innerText = "Error de comunicación con el motor.";
        statusEl.style.color = "red";
      }
    }
  </script>
</body>
</html>
