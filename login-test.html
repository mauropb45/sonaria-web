<script>
    const API_URL = "https://sonaria-api-test.onrender.com";

    async function handleCredentialResponse(response) {
      const status = document.getElementById("status");
      status.innerText = "Sincronizando Matrix...";
      
      try {
        const res = await fetch(`${API_URL}/auth/google`, {
          method: "POST",
          headers: { 
            "Content-Type": "application/json"
            // Eliminamos cabeceras extra para evitar preflights complejos
          },
          body: JSON.stringify({ credential: response.credential })
        });

        if (!res.ok) throw new Error("Error en servidor de test");

        const data = await res.json();
        
        if (data.access_token) {
          localStorage.setItem("mejoraria_token", data.access_token);
          status.innerText = "Conexión Exitosa. Cargando Dashboard...";
          setTimeout(() => {
            window.location.href = "sonaria.html";
          }, 800);
        }
      } catch (e) { 
        console.error(e);
        status.innerText = "Error de Red. Reintentando conexión segura...";
        status.style.color = "red";
      }
    }
  </script>
