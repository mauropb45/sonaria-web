<script>
    const API_URL = "https://sonaria-api-test.onrender.com";

    async function handleCredentialResponse(response) {
      const status = document.getElementById("status");
      status.innerText = "Sincronizando Workspace...";
      try {
        const res = await fetch(`${API_URL}/auth/google`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ credential: response.credential })
        });
        const data = await res.json();
        if (data.access_token) {
          localStorage.setItem("mejoraria_token", data.access_token);
          localStorage.setItem("mejoraria_user", JSON.stringify(data.user));
          // REDIRIGE AL NUEVO NOMBRE DE ARCHIVO
          window.location.href = "dashboard.html"; 
        }
      } catch (e) { 
          status.innerText = "Error: El servidor no tiene la ruta de Auth.";
          status.style.color = "red";
      }
    }
</script>
