<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago no completado | SonarIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#f7f9fd;display:grid;place-items:center;min-height:100vh;padding:24px}
    .card{background:#fff;border-radius:2rem;padding:3rem 2.5rem;text-align:center;max-width:480px;width:100%;box-shadow:0 20px 60px rgba(31,44,74,.12);border:1px solid #fde8e8}
    .icon{font-size:4rem;margin-bottom:1.5rem}
    h1{font-size:2rem;font-weight:900;color:#001739;margin-bottom:.75rem;letter-spacing:-.04em}
    p{color:#66758c;line-height:1.7;margin-bottom:.5rem}
    .actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-top:2rem}
    .btn{display:inline-block;padding:.875rem 2rem;border-radius:1rem;font-weight:900;font-size:.9rem;text-decoration:none;text-transform:uppercase;letter-spacing:.04em;transition:.2s}
    .btn-primary{background:#FF8700;color:#fff}
    .btn-primary:hover{background:#e67800;transform:translateY(-1px)}
    .btn-ghost{background:#fff;color:#001739;border:2px solid #d7deeb}
    .btn-ghost:hover{border-color:#FF8700;color:#FF8700}
    .note{margin-top:1.5rem;font-size:.85rem;color:#99a6b8}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">😔</div>
    <h1>Pago no completado</h1>
    <p>El pago no se procesó o fue cancelado.</p>
    <p>No se realizó ningún cobro a tu cuenta.</p>
    <div class="actions">
      <a href="planes-test.html" class="btn btn-primary">Reintentar</a>
      <a href="dashboard.html" class="btn btn-ghost">Volver al panel</a>
    </div>
    <div class="note">
      ¿Tuviste un problema? Escríbenos a
      <a href="https://wa.me/56997322973" style="color:#FF8700;font-weight:700">WhatsApp</a>
    </div>
  </div>
</body>
</html>
