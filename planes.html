<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planes | MejorarIA</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#07111d;
  color:white;
}
.header{
  display:flex;
  justify-content:space-between;
  padding:20px;
}
.logo{
  font-size:28px;
  font-weight:bold;
  cursor:pointer;
}
.logo span{color:#19d28d;}
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}
.card{
  background:#0b1627;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
}
button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
.primary{
  background:#ff8a00;
  color:black;
  font-weight:bold;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo" onclick="goHome()">Mejorar<span>IA</span></div>
</div>

<div class="container">

  <div class="card">
    <h2>Plan gratuito</h2>
    <p>2 análisis disponibles</p>
  </div>

  <div class="card">
    <h2>Plan completo</h2>
    <p>Uso ilimitado de SonarIA</p>
    <button class="primary" onclick="checkout()">Pagar (próximamente)</button>
  </div>

</div>

<script>
function goHome(){
  window.location.href = "index.html";
}

function checkout(){
  alert("Checkout en preparación");
}
</script>

</body>
</html>
