<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planes | SonarIA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050b14;
  --bg2:#081224;
  --panel:rgba(255,255,255,.05);
  --line:rgba(255,255,255,.1);
  --text:#f5f7fb;
  --muted:#9fb0c7;

  --green:#22c55e;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  color:var(--text);
  background:linear-gradient(180deg,var(--bg),var(--bg2));
}

.container{
  max-width:1000px;
  margin:auto;
  padding:40px 20px;
}

.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:20px;
  padding:30px;
  margin-bottom:20px;
}

h1{
  font-size:2.5rem;
}

.plans{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.plan{
  padding:25px;
  border-radius:20px;
  border:1px solid var(--line);
}

.price{
  font-size:2rem;
  font-weight:bold;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.btn-pro{
  background:var(--green);
}

.status{
  margin-top:10px;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

  <div class="card">
    <h1>Planes SonarIA</h1>
    <p id="userInfo">Cargando usuario...</p>
    <div id="status" class="status"></div>
  </div>

  <div class="plans">

```
<div class="plan">
  <h2>Free</h2>
  <div class="price">$0</div>
  <p>Uso básico (demo).</p>
  <button disabled>Plan actual</button>
</div>

<div class="plan">
  <h2>Pro</h2>
  <div class="price">$4.990</div>
  <p>Acceso completo a SonarIA.</p>
  <button id="btnPro" class="btn-pro">Contratar Pro</button>
</div>
```

  </div>

</div>

<script>

const API = "https://sonaria-api.onrender.com";

function getToken(){
  return localStorage.getItem("mejoraria_token");
}

function showStatus(msg){
  document.getElementById("status").textContent = msg;
}

async function loadUser(){

  const token = getToken();

  if(!token){
    showStatus("Debes iniciar sesión");
    return;
  }

  const res = await fetch(API + "/me", {
    headers:{
      "Authorization":"Bearer " + token
    }
  });

  const data = await res.json();

  if(!res.ok){
    showStatus("Sesión inválida");
    return;
  }

  const user = data.user;

  document.getElementById("userInfo").textContent =
    user.email + " | Plan: " + user.plan.toUpperCase();

  if(user.plan === "pro"){
    const btn = document.getElementById("btnPro");
    btn.disabled = true;
    btn.textContent = "Ya eres Pro";
  }
}

async function iniciarPago(){

  const btn = document.getElementById("btnPro");
  btn.disabled = true;
  btn.textContent = "Creando checkout...";

  try{

    const res = await fetch(API + "/payments/create-checkout", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + getToken()
      }
    });

    const data = await res.json();

    if(!res.ok || !data.checkout_url){
      showStatus("Error al crear checkout");
      btn.disabled = false;
      btn.textContent = "Contratar Pro";
      return;
    }

    // guardar order_id para el fake checkout
    sessionStorage.setItem("order_id", data.order_id);

    // redirigir
    window.location.href = data.checkout_url;

  }catch(e){
    showStatus("Error de conexión");
    btn.disabled = false;
    btn.textContent = "Contratar Pro";
  }

}

document.getElementById("btnPro").onclick = iniciarPago;

// mensajes post pago
const params = new URLSearchParams(window.location.search);

if(params.get("pago") === "ok"){
  showStatus("Pago realizado con éxito 🎉");
}

if(params.get("pago") === "error"){
  showStatus("Pago cancelado");
}

loadUser();

</script>

</body>
</html>
