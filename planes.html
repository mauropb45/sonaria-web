<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planes | SonarIA</title>
<style>
body{font-family:Arial;background:#0b1627;color:#fff;padding:20px}
.container{max-width:980px;margin:auto}
.card{background:#1e293b;padding:20px;border-radius:12px;margin-top:15px}
button{padding:10px 20px;border:none;border-radius:8px;background:#14d68f;color:#000;cursor:pointer}
.status{margin-top:12px}
</style>
</head>
<body>
<div class="container">
<h1>Planes SonarIA</h1>
<div class="card">
  <h2>FREE</h2>
  <p>3 análisis totales por usuario.</p>
</div>
<div class="card">
  <h2>Versión completa</h2>
  <p>Análisis ilimitados, uso continuo y mejor experiencia docente.</p>
  <button onclick="upgrade()">Activar versión completa</button>
  <div id="status" class="status"></div>
</div>
</div>
<script>
const API = "https://sonaria-api.onrender.com";
async function upgrade(){
  try{
    const token = localStorage.getItem("mejoraria_token") || localStorage.getItem("token") || localStorage.getItem("access_token");
    const user = JSON.parse(localStorage.getItem("mejoraria_user") || "null");
    if(!token || !user || !user.email){
      document.getElementById("status").textContent = "Debes iniciar sesión antes de activar la versión completa.";
      return;
    }
    const res = await fetch(API + "/upgrade", {
      method:"POST",
      headers:{ "Content-Type":"application/json", "Authorization":"Bearer " + token },
      body: JSON.stringify({ email: user.email })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail || "No se pudo activar.");
    localStorage.setItem("mejoraria_user", JSON.stringify(data.user));
    document.getElementById("status").textContent = "Versión completa activada ✅";
    setTimeout(() => { window.location.href = "sonaria.html"; }, 900);
  }catch(e){
    document.getElementById("status").textContent = e.message || "Error al activar.";
  }
}
</script>
</body>
</html>
