<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Planes | SonarIA</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #071a44;
      color: white;
      margin: 0;
    }

    /* NAV */
    .nav {
      display: flex;
      align-items: center;
      padding: 20px 30px;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      text-decoration: none;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 48px;
    }

    .user {
      text-align: center;
      color: #b8c4d9;
      margin-bottom: 20px;
    }

    .status {
      display: none;
      margin: 0 auto 20px;
      padding: 14px;
      border-radius: 10px;
      max-width: 600px;
      text-align: center;
    }

    .status.show {
      display: block;
    }

    .status.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .status.ok {
      background: #dcfce7;
      color: #166534;
    }

    .plans {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: rgba(5, 18, 50, 0.7);
      border-radius: 20px;
      padding: 24px;
    }

    .price {
      font-size: 42px;
      margin: 10px 0;
    }

    .features {
      color: #b8c4d9;
      margin: 15px 0;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    .free {
      background: #3d4c67;
    }

    .pro {
      background: #28c45a;
    }

    .pro:disabled {
      background: #5a6b87;
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <div class="nav">
    <a href="https://mejoraria.cl" class="logo">MejorarIA</a>
  </div>

  <div class="container">
    <h1>Planes SonarIA</h1>

    <div id="userInfo" class="user">Cargando...</div>
    <div id="status" class="status"></div>

    <div class="plans">

      <!-- FREE -->
      <div class="card">
        <h2>Free</h2>
        <div class="price">$0</div>
        <div class="features">
          • 2 análisis<br>
          • Acceso básico
        </div>
        <button class="free">Plan actual</button>
      </div>

      <!-- PRO -->
      <div class="card">
        <h2>Pro</h2>
        <div class="price">$4.990 CLP</div>
        <div class="features">
          • Análisis ilimitado<br>
          • Funciones avanzadas
        </div>
        <button id="btnPro" class="pro">Contratar Pro</button>
      </div>

    </div>
  </div>

  <script>
    const API = "https://sonaria-api.onrender.com";

    const btn = document.getElementById("btnPro");
    const userInfo = document.getElementById("userInfo");
    const status = document.getElementById("status");

    function show(msg, type) {
      status.className = "status show " + type;
      status.textContent = msg;
    }

    function getToken() {
      return localStorage.getItem("token");
    }

    async function loadUser() {
      const token = getToken();

      if (!token) {
        userInfo.textContent = "No has iniciado sesión";
        btn.disabled = true;
        show("Debes iniciar sesión primero", "error");
        return;
      }

      const res = await fetch(API + "/me", {
        headers: { Authorization: "Bearer " + token }
      });

      const data = await res.json();

      if (!res.ok) {
        show("Sesión inválida", "error");
        return;
      }

      userInfo.textContent = data.user.email + " | Plan: " + data.user.plan;

      if (data.user.plan === "pro") {
        btn.disabled = true;
        btn.textContent = "Ya eres Pro";
      }
    }

    async function pagar() {
      const token = getToken();

      const res = await fetch(API + "/payments/create-checkout", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + token
        }
      });

      const data = await res.json();

      window.location.href = data.checkout_url;
    }

    btn.onclick = pagar;

    loadUser();
  </script>

</body>
</html>
