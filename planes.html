<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planes SonarIA</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#06101c;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:90%;
  max-width:700px;
  text-align:center;
}

h1{
  margin-bottom:10px;
}

.sub{
  color:#aaa;
  margin-bottom:40px;
}

.mp-button{
  width:100%;
  min-height:110px;
  border:none;
  border-radius:24px;
  cursor:pointer;
  background:linear-gradient(180deg,#ffffff,#f4f9ff);
  border:2px solid rgba(0,177,234,0.4);
  box-shadow:0 25px 60px rgba(0,177,234,0.25);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 20px;
  margin-bottom:20px;
}

.mp-left{
  display:flex;
  align-items:center;
  gap:20px;
}

.mp-logo{
  background:white;
  border-radius:18px;
  padding:12px;
}

.mp-logo img{
  width:70px;
}

.mp-copy{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
}

.mp-copy strong{
  color:#1400a5;
}

.mp-check{
  width:55px;
  height:55px;
  border-radius:50%;
  background:rgba(0,177,234,0.15);
  display:flex;
  align-items:center;
  justify-content:center;
}

</style>
</head>

<body>

<div class="container">

<h1>Activa SonarIA Pro</h1>
<p class="sub">Elige tu modalidad</p>

<button class="mp-button" onclick="checkout('monthly')">
<div class="mp-left">
<div class="mp-logo">
<img src="/mercadopago-logo.png">
</div>
<div class="mp-copy">
<strong>$4.990 mensual</strong>
</div>
</div>
<div class="mp-check">✓</div>
</button>

<button class="mp-button" onclick="checkout('annual')">
<div class="mp-left">
<div class="mp-logo">
<img src="/mercadopago-logo.png">
</div>
<div class="mp-copy">
<strong>$49.990 anual</strong>
</div>
</div>
<div class="mp-check">✓</div>
</button>

</div>

<script>
const API="https://sonaria-api.onrender.com";

function getToken(){
return localStorage.getItem("mejoraria_token");
}

async function checkout(tipo){
const res=await fetch(API+"/subscriptions/create-checkout",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+getToken()
},
body:JSON.stringify({cadence:tipo})
});
const data=await res.json();
if(data.checkout_url){
window.location.href=data.checkout_url;
}else{
alert("Error en pago");
}
}
</script>

</body>
</html>
