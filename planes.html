<!-- Reemplaza el botón Pro actual por este bloque en planes.html -->
<!-- Antes, descarga el logo oficial desde el sitio oficial de Mercado Pago y guárdalo como /mercadopago-logo.svg -->
<!-- Luego pega este bloque donde hoy va tu CTA de compra -->

<div class="pay-row">
  <div class="webpay-chip" aria-label="Pago con Mercado Pago">
    <img
      src="/mercadopago-logo.svg"
      alt="Mercado Pago"
      style="height:22px; display:block;"
    >
  </div>

  <button id="btnMP" class="btn btn-pro" type="button" style="display:inline-flex;align-items:center;gap:10px;">
    <img
      src="/mercadopago-logo.svg"
      alt="Mercado Pago"
      style="height:20px;display:block;"
    >
    Pagar con Mercado Pago
  </button>
</div>

<script>
const API = "https://sonaria-api.onrender.com";

function getToken(){
  return (
    localStorage.getItem("mejoraria_token") ||
    localStorage.getItem("token") ||
    localStorage.getItem("access_token") ||
    ""
  );
}

async function iniciarPagoMercadoPago(){
  const btn = document.getElementById("btnMP");
  btn.disabled = true;
  btn.textContent = "Preparando Mercado Pago...";

  try{
    const res = await fetch(API + "/payments/create-checkout", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + getToken()
      }
    });

    const data = await res.json().catch(() => ({}));

    if(!res.ok || !data.checkout_url){
      alert(data.detail || "No se pudo crear el checkout.");
      btn.disabled = false;
      btn.innerHTML = '<img src="/mercadopago-logo.svg" alt="Mercado Pago" style="height:20px;display:block;"> Pagar con Mercado Pago';
      return;
    }

    window.location.href = data.checkout_url;
  }catch(error){
    alert("Error de conexión con Mercado Pago.");
    btn.disabled = false;
    btn.innerHTML = '<img src="/mercadopago-logo.svg" alt="Mercado Pago" style="height:20px;display:block;"> Pagar con Mercado Pago';
  }
}

document.getElementById("btnMP").addEventListener("click", iniciarPagoMercadoPago);
</script>
