<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Planes | SonarIA</title>

<style>
body{
  font-family: system-ui;
  background:#f5f7fb;
  padding:40px;
}

.container{
  max-width:500px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

h1{
  margin-bottom:10px;
}

.plan{
  border:1px solid #eee;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

.pro{
  background:#00c853;
  color:white;
}

.pro:disabled{
  background:#ccc;
}
</style>
</head>

<body>

<div class="container">
  <h1>Plan Pro</h1>
  <p>Desbloquea adaptación completa, PDF y más.</p>

  <div class="plan">
    <h2>$3.990 / mes</h2>
    <button id="btnPro" class="pro">Contratar con MercadoPago</button>
  </div>
</div>

<script>
const API = "https://sonaria-api.onrender.com";

function getToken(){
  return localStorage.getItem("mejoraria_token")
      || localStorage.getItem("token")
      || localStorage.getItem("access_token")
      || "";
}

async function init(){
  const token = getToken();

  if(!token){
    window.location.href = "/login.html";
    return;
  }

  const res = await fetch(API + "/me", {
    headers:{ Authorization:"Bearer "+token }
  });

  const data = await res.json();

  if(data.user.plan === "pro"){
    document.getElementById("btnPro").innerText = "Ya eres Pro";
    document.getElementById("btnPro").disabled = true;
    return;
  }

  document.getElementById("btnPro").onclick = async () => {
    const r = await fetch(API + "/subscriptions/create-checkout", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        Authorization:"Bearer "+token
      }
    });

    const d = await r.json();

    if(d.checkout_url){
      window.location.href = d.checkout_url;
    }else{
      alert("Error creando checkout");
    }
  };
}

init();
</script>

</body>
</html>
