<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planes | SonarIA</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .plans {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: #111827;
      border-radius: 16px;
      padding: 24px;
      border: 1px solid #334155;
    }

    .card h2 {
      margin-top: 0;
    }

    .price {
      font-size: 28px;
      margin: 12px 0;
    }

    .features {
      margin: 16px 0;
      color: #94a3b8;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    .free {
      background: #334155;
      color: white;
    }

    .pro {
      background: #22c55e;
      color: white;
    }

    .disabled {
      background: #475569 !important;
      cursor: not-allowed;
    }

    .status {
      margin-bottom: 20px;
      padding: 14px;
      border-radius: 10px;
      display: none;
    }

    .status.show {
      display: block;
    }

    .status.ok {
      background: #dcfce7;
      color: #166534;
    }

    .status.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .user {
      margin-bottom: 20px;
      text-align: center;
      color: #94a3b8;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Planes SonarIA</h1>

    <div id="userInfo" class="user"></div>

    <div id="resultadoPago" class="status"></div>

    <div class="plans">

      <!-- FREE -->
      <div class="card">
        <h2>Free</h2>
        <div class="price">$0</div>
        <div class="features">
          • 2 análisis<br>
          • Acceso básico<br>
        </div>
        <button class="free" disabled>Plan actual</button>
      </div>

      <!-- PRO -->
      <div class="card">
        <h2>Pro</h2>
        <div class="price">$5.990 CLP</div>
        <div class="features">
          • Análisis ilimitado<br>
          • Funciones avanzadas<br>
        </div>
        <button id="btnPro" class="pro">Contratar Pro</button>
      </div>

    </div>
  </div>

  <script>
    const API_BASE = "https://sonaria-api.onrender.com";

    const btnPro = document.getElementById("btnPro");
    const userInfo = document.getElementById("userInfo");
    const resultadoPago = document.getElementById("resultadoPago");

    function getToken() {
      return localStorage.getItem("token") || localStorage.getItem("access_token");
    }

    function showMessage(msg, type) {
      resultadoPago.className = "status show " + type;
      resultadoPago.textContent = msg;
    }

    function handlePaymentResult() {
      const params = new URLSearchParams(window.location.search);
      const pago = params.get("pago");

      if (!pago) return;

      if (pago === "ok") {
        showMessage("Pago aprobado. Tu plan Pro ya está activo.", "ok");
      } else if (pago === "error") {
        showMessage("El pago no se pudo completar.", "error");
      }
    }

    async function loadUser() {
      const token = getToken();

      if (!token) {
        userInfo.textContent = "No has iniciado sesión";
        btnPro.disabled = true;
        return;
      }

      try {
        const res = await fetch(API_BASE + "/me", {
          headers: {
            "Authorization": "Bearer " + token
          }
        });

        const data = await res.json();

        if (!res.ok) {
          userInfo.textContent = "Error al cargar usuario";
          return;
        }

        const user = data.user;

        userInfo.textContent = user.email + " | Plan: " + user.plan;

        if (user.plan === "pro") {
          btnPro.textContent = "Ya eres Pro";
          btnPro.classList.add("disabled");
          btnPro.disabled = true;
        }

      } catch (err) {
        userInfo.textContent = "Error de conexión";
      }
    }

    async function iniciarPagoPro() {
      const token = getToken();

      if (!token) {
        alert("Debes iniciar sesión");
        return;
      }

      try {
        btnPro.disabled = true;
        btnPro.textContent = "Cargando...";

        const res = await fetch(API_BASE + "/payments/create-checkout", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          }
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.detail || "Error al iniciar pago");
          btnPro.disabled = false;
          btnPro.textContent = "Contratar Pro";
          return;
        }

        window.location.href = data.checkout_url;

      } catch (err) {
        alert("Error de conexión");
        btnPro.disabled = false;
        btnPro.textContent = "Contratar Pro";
      }
    }

    btnPro.addEventListener("click", iniciarPagoPro);

    handlePaymentResult();
    loadUser();
  </script>
</body>
</html>
