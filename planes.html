<!-- BOTÓN PRO OPTIMIZADO SONARIA -->

<button id="btnPro" class="btn-pro">

  <div class="logo-box">
    <img src="/mercadopago-logo.png" alt="Mercado Pago">
  </div>

  <div class="text-box">
    <div class="main">Activar SonarIA Pro</div>
    <div class="sub">Pago seguro con Mercado Pago</div>
  </div>

</button>

<div class="trust">
  ✔ Pago seguro · ✔ Activación inmediata · ✔ Hecho para docentes
</div>

<style>

.btn-pro{
  background:linear-gradient(135deg,#ff8700,#ff5a00);
  border:none;
  border-radius:18px;
  width:100%;
  height:90px;

  display:flex;
  align-items:center;
  gap:18px;
  padding:0 20px;

  cursor:pointer;
  box-shadow:0 20px 50px rgba(255,90,0,0.4);
  transition:0.2s;
}

.btn-pro:hover{
  transform:scale(1.02);
}

.logo-box{
  background:white;
  border-radius:14px;
  padding:10px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo-box img{
  height:32px;
}

.text-box{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
}

.main{
  font-size:20px;
  font-weight:800;
  color:#14181f;
}

.sub{
  font-size:13px;
  opacity:0.85;
  color:#2f2f2f;
}

.trust{
  margin-top:10px;
  font-size:13px;
  color:#aaa;
  text-align:center;
}

</style>

<script>
const API="https://sonaria-api.onrender.com";

function getToken(){
  return localStorage.getItem("mejoraria_token");
}

document.getElementById("btnPro").addEventListener("click", async ()=>{

  const btn=document.getElementById("btnPro");
  btn.innerHTML = "Conectando con Mercado Pago...";

  const res=await fetch(API+"/payments/create-checkout",{
    method:"POST",
    headers:{
      "Authorization":"Bearer "+getToken()
    }
  });

  const data=await res.json();

  if(data.checkout_url){
    window.location.href=data.checkout_url;
  }else{
    alert("Error al iniciar pago");
    location.reload();
  }

});
</script>
