<form action="https://formspree.io/f/TU_ID" method="POST">

<label>¿Qué quieres hacer?</label>
<select name="tipo">
  <option>Probar una herramienta</option>
  <option>Solicitar acceso a SonarIA</option>
  <option>Solicitar acceso a EnsayarIA</option>
  <option>Tengo un problema en mi asignatura</option>
</select>

<input type="text" name="nombre" placeholder="Nombre" required>
<input type="email" name="email" placeholder="Email" required>

<input type="text" name="asignatura" placeholder="¿Qué asignatura enseñas?">

<textarea name="problema" placeholder="Describe tu problema o necesidad..." rows="5"></textarea>

<button type="submit">Enviar</button>

</form>
