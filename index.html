<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MejorarIA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#08121f;
  color:#fff;
  text-align:center;
}

.container{
  max-width:900px;
  margin:auto;
  padding:40px 20px;
}

.btn{
  padding:14px 22px;
  border-radius:10px;
  background:#ff7a00;
  border:none;
  font-weight:800;
  cursor:pointer;
}

input, textarea{
  padding:12px;
  border-radius:8px;
  border:none;
  width:100%;
}
</style>
</head>

<body>

<div class="container">

<h1>MejorarIA</h1>
<p>Herramientas para profesores que buscan mejorar sus clases con IA.</p>

<h2>Herramientas</h2>
<p>SonarIA y EnsayarIA ya están disponibles.</p>

<!-- FORMULARIO -->
<form id="formInteres" style="margin-top:30px; display:grid; gap:12px; max-width:400px; margin-left:auto; margin-right:auto;">
  <input type="text" id="nombre" placeholder="Tu nombre" required>
  <input type="email" id="email" placeholder="Tu correo" required>
  <textarea id="mensaje" placeholder="¿Qué te gustaría resolver?"></textarea>
  <button type="submit" class="btn">Enviar</button>
</form>

</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://ibtklkjfpcopzgsrulob.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_IwR4ByvxMHbrJPZF4Q4ZKg_ra6ji7HM";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// TEST conexión
async function test() {
  const { data, error } = await supabaseClient
    .from("herramientas")
    .select("*");

  console.log("DATA:", data);
  console.log("ERROR:", error);
}
test();

// FORMULARIO
document.getElementById("formInteres").addEventListener("submit", async (e) => {
  e.preventDefault();

  const nombre = document.getElementById("nombre").value;
  const email = document.getElementById("email").value;
  const mensaje = document.getElementById("mensaje").value;

  const { error } = await supabaseClient
    .from("interesados")
    .insert([{ nombre, email, mensaje }]);

  if (error) {
    console.error("ERROR COMPLETO:", error);
    alert("Error al enviar: " + error.message);
    return;
  }

  alert("¡Enviado! 🚀");
  e.target.reset();
});
</script>

</body>
</html>
